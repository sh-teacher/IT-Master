<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자산 상세 정보 - IT Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-200 min-h-screen flex items-center justify-center p-4">
    
    <div id="loader" class="text-gray-500 animate-pulse font-bold text-lg">데이터를 불러오는 중입니다...</div>
    
    <div id="content" class="hidden w-full max-w-sm bg-white rounded-2xl shadow-2xl overflow-hidden transform transition-all">
        <div class="bg-blue-600 p-6 text-white text-center relative">
            <div id="v_type" class="inline-block bg-blue-400 px-3 py-1 rounded-full text-xs font-bold mb-2">로딩중</div>
            <h2 id="v_model" class="text-xl font-bold leading-tight">모델명</h2>
        </div>
        
        <div class="p-6 space-y-4">
            <div class="bg-blue-50 p-3 rounded-xl flex flex-col border border-blue-100">
                <span class="text-blue-500 text-[10px] font-bold uppercase">관리번호(ID)</span>
                <span id="v_sn" class="font-mono text-blue-700 font-black tracking-tight text-lg">-</span>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col border-b border-gray-100 pb-2">
                    <span class="text-gray-400 text-[10px] font-bold uppercase tracking-wider">현재 사용자</span>
                    <span id="v_user" class="font-bold text-gray-800 text-base">-</span>
                </div>
                <div class="flex flex-col border-b border-gray-100 pb-2">
                    <span class="text-gray-400 text-[10px] font-bold uppercase tracking-wider">소속 부서/그룹</span>
                    <span id="v_group" class="font-bold text-gray-800 text-base">-</span>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col border-b border-gray-100 pb-2">
                    <span class="text-gray-400 text-[10px] font-bold uppercase tracking-wider">취득일자 (도입일)</span>
                    <span id="v_date" class="font-bold text-gray-700 text-sm">-</span>
                </div>
                <div class="flex flex-col border-b border-gray-100 pb-2">
                    <span class="text-gray-400 text-[10px] font-bold uppercase tracking-wider">IP 주소</span>
                    <span id="v_ip" class="font-bold text-blue-600 text-sm">-</span>
                </div>
            </div>
            <div class="pt-1">
                <span class="text-gray-400 text-[10px] font-bold">비고</span>
                <div id="v_note" class="bg-gray-50 text-gray-700 text-sm mt-1 p-3 rounded-lg border border-gray-100 min-h-[40px]">-</div>
            </div>
            <div class="flex flex-col items-center pt-4 border-t border-gray-100">
                <span class="text-red-400 text-[12px] font-bold mb-2">이 기기를 습득하신 분은 상일여고 교육정보부(062-370-2586) 또는 교무실(062-370-2850)로 연락주시기 바랍니다.</span>
            </div> 
            <!-- 일단 안보이게 함 qr코드
            <div class="flex flex-col items-center pt-4 border-t border-gray-100">
                <span class="text-gray-400 text-[10px] font-bold mb-2">해당 기기 QR코드</span>
                <div id="v_qr" class="p-2 border border-gray-200 rounded-lg bg-white shadow-sm">
                    </div>
            </div>  -->
        </div>
        <!-- 일단 안보이게 함 qr코드
        <div class="bg-gray-50 p-4 text-center">
            <button onclick="location.href='sangildevice.html'" class="w-full py-2 bg-gray-200 text-gray-700 rounded-lg font-bold hover:bg-gray-300 transition">
                자산 목록 전체보기
            </button>
        </div>   --> 
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyZvgICRHPoQFHKrRX-bI27Ti9RUNWMjdMOlDTzzSNdviEjC1Gxpa0jlMYBi5bOotLyxQ/exec";
        
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        if (id) {
            // pw 없이 id만 서버로 요청합니다!
            fetch(`${GAS_URL}?id=${encodeURIComponent(id)}`)
                .then(res => res.text())
                .then(text => {
                    if (text === "null" || text === "") throw new Error("ID 찾을 수 없음");

                    const data = JSON.parse(text);
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('content').classList.remove('hidden');
                    
                    document.getElementById('v_type').innerText = data.type || "-";
                    document.getElementById('v_model').innerText = `${data.brand || ""} ${data.model || ""}`;
                    document.getElementById('v_user').innerText = data.user || "-";
                    document.getElementById('v_group').innerText = data.group || "-";
                    document.getElementById('v_date').innerText = data.date ? String(data.date).split('T')[0] : "-";
                    document.getElementById('v_ip').innerText = data.ip || "-";
                    
                    // ★ 관리번호(ID) 데이터 연결
                    document.getElementById('v_sn').innerText = data.id || "-";
                    
                    document.getElementById('v_note').innerText = data.note || "-";

                    const currentUrl = window.location.origin + window.location.pathname + '?id=' + id;
                    const qrImgUrl = `https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(currentUrl)}`;
                    document.getElementById('v_qr').innerHTML = `<img src="${qrImgUrl}" alt="QR Code" class="w-24 h-24">`;
                })
                .catch(err => {
                    document.getElementById('loader').innerHTML = `<p class='text-red-500 font-bold'>오류: 기기 정보를 찾을 수 없습니다.</p>`;
                });
        } else {
            document.getElementById('loader').innerText = "기기 관리 번호(ID)가 없습니다.";
        }
    </script>
</body>
</html>
