<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상일 통합 검색 엔진</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .timetable { width: 100%; border-collapse: collapse; text-align: center; font-size: 13px; }
        .timetable th, .timetable td { border: 1px solid #e2e8f0; padding: 10px 4px; }
        .timetable th { background-color: #f8fafc; color: #475569; font-weight: 800; }
        .timetable td { height: 60px; vertical-align: middle; background-color: #ffffff; }
        .tt-subj { font-weight: 900; color: #1e40af; display: block; line-height: 1.2; word-break: keep-all; }
        .tt-teach { font-size: 11px; color: #64748b; margin-top: 4px; display: block; }
    </style>
</head>
<body class="bg-slate-50 p-4 min-h-screen pb-20">
    <div class="max-w-xl mx-auto">
        <h1 class="text-2xl md:text-3xl font-black text-slate-800 mb-6 text-center">🔍 상일여고 만능 탐색기</h1>

        <div class="bg-white rounded-3xl shadow-xl p-5 md:p-7 space-y-5 border border-slate-200">
            
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2">어떤 작업을 하실 건가요?</label>
                <select id="searchType" onchange="toggleInputs()" class="w-full p-3 bg-slate-100 rounded-xl font-black text-slate-700 outline-none focus:ring-2 ring-blue-500">
                    <optgroup label="📍 단일/실시간 위치 조회">
                        <option value="REAL_STUDENT">이 학생 지금 어디 있지? (이름)</option>
                        <option value="REAL_TEACHER">이 선생님 지금 어디 계시지? (성함)</option>
                        <option value="REAL_CLASS">특정 반 지금 수업 누구지? (예: 1-3)</option>
                    </optgroup>
                    <optgroup label="🗓️ 주간 시간표 조회">
                        <option value="TIMETABLE_TEACHER">특정 선생님 [주간 시간표] 보기 (성함)</option>
                        <option value="TIMETABLE_CLASS">특정 반 [주간 시간표] 보기 (예: 1-3)</option>
                        <option value="TIMETABLE_STUDENT">특정 학생 [주간 시간표] 보기 (이름)</option>
                    </optgroup>
                    <optgroup label="☕ 대강/보강 교사 찾기">
                        <option value="FREE_TEACHER" class="bg-amber-100">선택한 요일/교시에 [공강인 선생님] 찾기</option>
                    </optgroup>
                </select>
            </div>
            
            <div id="timeSelector" class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2">요일</label>
                    <select id="searchDay" class="w-full p-3 bg-blue-50 border border-blue-100 rounded-xl font-bold text-blue-700 outline-none">
                        <option value="">🕒 현재 요일</option>
                        <option value="월">월요일</option><option value="화">화요일</option>
                        <option value="수">수요일</option><option value="목">목요일</option><option value="금">금요일</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2">교시</label>
                    <select id="searchPeriod" class="w-full p-3 bg-blue-50 border border-blue-100 rounded-xl font-bold text-blue-700 outline-none">
                        <option value="">🕒 현재 교시</option>
                        <option value="1">1교시</option><option value="2">2교시</option><option value="3">3교시</option>
                        <option value="4">4교시</option><option value="5">5교시</option><option value="6">6교시</option><option value="7">7교시</option>
                    </select>
                </div>
            </div>

            <div class="relative pt-2" id="keywordBox">
                <input type="text" id="keyword" placeholder="검색어 입력..." class="w-full p-4 bg-slate-100 rounded-xl font-black text-lg outline-none focus:ring-2 ring-blue-500">
                <button onclick="runSearch()" class="absolute right-2 top-4 bottom-2 bg-blue-600 text-white px-6 rounded-lg font-bold shadow-md hover:bg-blue-700 transition">검색</button>
            </div>
            <button id="fullSearchBtn" onclick="runSearch()" style="display:none;" class="w-full mt-4 bg-amber-500 text-white p-4 rounded-xl font-black text-lg shadow-md hover:bg-amber-600 transition">☕ 이 시간에 공강인 선생님 찾기</button>

        </div>

        <div id="resultArea" class="mt-6 space-y-4"></div>
    </div>

    <script>
        // 🚨 여기에 선생님의 구글 API 주소를 꼭! 꼭! 넣어주세요!
        const API_URL = "https://script.google.com/macros/s/AKfycbzfIY0Fs4S1EjSSNI2kZfrFgtSqipG_u_KDCkdT8Vy1LjrIwB7k_1awE_psCNw0VQGg/exec";

        function toggleInputs() {
            const type = document.getElementById('searchType').value;
            const keywordBox = document.getElementById('keywordBox');
            const fullSearchBtn = document.getElementById('fullSearchBtn');

            if (type === 'FREE_TEACHER') {
                keywordBox.style.display = 'none';
                fullSearchBtn.style.display = 'block';
            } else {
                keywordBox.style.display = 'block';
                fullSearchBtn.style.display = 'none';
            }
        }

        async function runSearch() {
            const type = document.getElementById('searchType').value;
            const keyword = document.getElementById('keyword').value.trim();
            const day = document.getElementById('searchDay').value;
            const period = document.getElementById('searchPeriod').value;

            if(type !== 'FREE_TEACHER' && !keyword) return alert("검색어를 입력하세요!");
            if(type === 'FREE_TEACHER' && (!day || !period)) return alert("요일과 교시를 반드시 선택해주세요!");

            const area = document.getElementById('resultArea');
            area.innerHTML = '<div class="text-center p-12 bg-white rounded-2xl shadow-sm animate-pulse text-slate-500 font-bold">열심히 데이터를 찾고 있습니다... 🔍</div>';

            try {
                // 1. 리얼타임 단건 조회 (기존 기능)
                if (type.startsWith('REAL_')) {
                    let realType = type.split('_')[1]; // STUDENT, TEACHER, CLASS
                    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ type: "SEARCH_REALTIME", payload: { searchType: realType, keyword: keyword, forceDay: day, forcePeriod: period } }) });
                    const r = await res.json();
                    
                    if(!r.success) return area.innerHTML = `<div class="bg-amber-50 text-amber-700 p-5 rounded-2xl text-center font-bold border border-amber-200">${r.msg}</div>`;
                    if(!r.data || r.data.length === 0) return area.innerHTML = `<div class="bg-slate-200 text-slate-600 p-5 rounded-2xl text-center font-bold">해당 시간에 진행 중인 수업이 없습니다.</div>`;

                    area.innerHTML = r.data.map(item => `
                        <div class="bg-white p-6 rounded-3xl shadow-md border-l-8 border-blue-500 transform transition hover:-translate-y-1">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-xs font-bold text-slate-400">${day||'오늘'} ${r.period}교시</span>
                                ${item.studentInfo ? `<span class="bg-indigo-100 text-indigo-700 text-[11px] px-2 py-0.5 rounded-lg font-black shadow-sm">👤 ${item.studentInfo}</span>` : ''}
                            </div>
                            <div class="text-xl font-black text-slate-800">${item.subject}</div>
                            ${item.teacher ? `<div class="text-blue-600 font-bold mt-2">👨‍🏫 ${item.teacher} 선생님</div>` : ''}
                        </div>
                    `).join('');
                } 
                
                // 2. 고급 기능 (주간 시간표 & 공강 찾기)
                else {
                    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ type: "GET_ADVANCED_SEARCH", payload: { searchType: type, keyword: keyword, day: day, period: period } }) });
                    const r = await res.json();

                    if(!r.success) return area.innerHTML = `<div class="bg-red-50 text-red-600 p-5 rounded-2xl text-center font-bold border border-red-200">${r.msg}</div>`;

                    // ☕ 공강 교사 결과 렌더링
                    if (r.type === "FREE_TEACHER") {
                        if(r.data.length === 0) return area.innerHTML = `<div class="bg-slate-200 text-slate-600 p-5 rounded-2xl text-center font-bold">해당 시간에 공강인 선생님이 없습니다.</div>`;
                        
                        let tags = r.data.map(t => `<span class="inline-block bg-white text-slate-700 border border-slate-300 font-black px-3 py-2 rounded-lg shadow-sm m-1">${t}</span>`).join('');
                        area.innerHTML = `
                            <div class="bg-amber-50 rounded-3xl p-6 border border-amber-200 shadow-sm">
                                <h2 class="text-lg font-black text-amber-800 mb-4">☕ ${day}요일 ${period}교시 공강 선생님 (${r.data.length}명)</h2>
                                <div>${tags}</div>
                            </div>
                        `;
                    } 
                    
                    // 🗓️ 주간 시간표 렌더링
                    else if (r.type === "TIMETABLE") {
                        if(r.data.length === 0) return area.innerHTML = `<div class="bg-slate-200 text-slate-600 p-5 rounded-2xl text-center font-bold">시간표 데이터가 없습니다.</div>`;
                        
                        // 시간표 그리드 조립
                        const grid = {};
                        for(let p=1; p<=8; p++) { grid[p] = { '월':'', '화':'', '수':'', '목':'', '금':'' }; }
                        
                        r.data.forEach(item => {
                            if(item.period >= 1 && item.period <= 8 && grid[item.period][item.day] !== undefined) {
                                // 한 칸에 여러 과목이 겹칠 수 있으니(이동수업 등) 누적 처리
                                const html = `<span class="tt-subj">${item.subject}</span><span class="tt-teach">${item.teacher || ''}</span>`;
                                grid[item.period][item.day] += (grid[item.period][item.day] ? '<hr class="my-1 border-slate-200">' : '') + html;
                            }
                        });

                        let tableHTML = `<div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden"><div class="bg-blue-600 text-white text-center py-4 font-black text-lg">${r.title}</div><div class="overflow-x-auto p-1"><table class="timetable"><thead><tr><th>교시</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th></tr></thead><tbody>`;
                        
                        for(let p=1; p<=7; p++) {
                            tableHTML += `<tr><td class="font-black text-slate-500">${p}</td>`;
                            ['월','화','수','목','금'].forEach(d => {
                                tableHTML += `<td>${grid[p][d] || ''}</td>`;
                            });
                            tableHTML += `</tr>`;
                        }
                        tableHTML += `</tbody></table></div></div>`;
                        area.innerHTML = tableHTML;
                    }
                }
            } catch(e) {
                area.innerHTML = `<div class="text-center p-5 text-red-500 font-bold bg-red-50 rounded-2xl">통신 오류가 발생했습니다. 다시 시도해주세요.</div>`;
            }
        }

        // 엔터키 실행 지원
        document.getElementById('keyword').addEventListener('keypress', function(e) { if (e.key === 'Enter') runSearch(); });
    </script>
</body>
</html>
