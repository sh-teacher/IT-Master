<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>좌석 배치도 - Class Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>if (sessionStorage.getItem("isAllowed") !== "true") location.href = "index.html";</script>
    
    <style>
        /* 출석 상태별 테두리 및 배경색 지정 */
        .status-present { border-left: 8px solid #3b82f6 !important; background-color: #eff6ff; } /* 출석: 파랑 */
        .status-absent { border-left: 8px solid #ef4444 !important; background-color: #fef2f2; }  /* 결석: 빨강 */
        .status-late { border-left: 8px solid #f59e0b !important; background-color: #fffbeb; }    /* 지각: 노랑 */
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-6">
    <div class="max-w-7xl mx-auto bg-white p-8 rounded-3xl shadow-sm border border-slate-200 h-[calc(100vh-48px)] flex flex-col">
        
        <div class="flex items-center justify-between mb-6 pb-4 border-b border-slate-100">
            <h1 class="text-3xl font-black text-slate-800">🪑 좌석 배치 및 출석부</h1>
            <div class="flex gap-2">
                <button onclick="toggleMirror()" class="bg-amber-100 text-amber-700 px-6 py-3 rounded-xl font-bold hover:bg-amber-200 transition">
                    🔄 교사 시선 전환
                </button>
                <button onclick="saveAttendance()" class="bg-emerald-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-emerald-700 transition shadow-md">
                    ✅ 출석 저장
                </button>
                <button onclick="saveSeatingToServer()" id="saveBtn" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-md">
                    💾 좌석표 저장
                </button>
            </div>
        </div>
        
        <div class="mb-6">
            <select id="selectedSubject" onchange="loadStudents()" class="w-full p-3 bg-slate-100 border-2 border-slate-200 rounded-xl font-bold text-slate-700 focus:border-blue-500 focus:outline-none">
                <option value="">과목을 로딩 중입니다...</option>
            </select>
        </div>

        <div class="flex gap-8 flex-1 overflow-hidden">
            <div class="w-1/4 bg-slate-100 rounded-2xl p-4 flex flex-col h-full border border-slate-200">
                <h2 class="text-lg font-bold text-slate-700 mb-4 text-center">학생 대기열</h2>
                <div id="waitingList" class="flex-1 overflow-y-auto space-y-2 p-2 min-h-0" 
                     ondrop="drop(event)" ondragover="allowDrop(event)">
                    <p class="text-slate-400 text-center text-sm mt-10" id="emptyMsg">과목을 선택해주세요</p>
                </div>
            </div>

            <div class="w-3/4 flex flex-col border-2 border-slate-100 rounded-2xl p-6 bg-white h-full relative" id="classroomWrapper">
                <div id="chalkboard" class="bg-emerald-800 text-white text-center py-3 rounded-xl font-black text-xl mb-6 shadow-inner transition-colors duration-300">
                    칠 판 (교탁)
                </div>

                <div class="flex-1 overflow-y-auto min-h-0">
                    <div class="grid grid-cols-6 gap-4 p-2" id="classroomGrid">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ★ 선생님의 앱스 스크립트 URL로 꼭 변경해주세요!
        const API_URL = "https://script.google.com/macros/s/AKfycbxUgpimLYy_9K_vZjbxJYtImA4fcz3ZZxfXPvy9WlYXLv1dY-yBA6yrtHeybyAo1v_Vpg/exec";

        let isMirror = false; 
        let rawStudents = []; 
        let rawSavedSeating = [];

        window.onload = async function() {
            createDesks(); 
            try {
                const response = await fetch(`${API_URL}?type=GET_SUBJECTS`);
                const subjects = await response.json();
                const select = document.getElementById('selectedSubject');
                select.innerHTML = '<option value="">배치할 과목/분반을 선택해주세요</option>';
                
                subjects.forEach(sub => {
                    const option = document.createElement('option');
                    option.value = sub.fullName; option.innerText = sub.fullName;
                    select.appendChild(option);
                });

                const urlParams = new URLSearchParams(window.location.search);
                const targetSubject = urlParams.get('subject'); 
                if (targetSubject) {
                    let found = false;
                    for (let i = 0; i < select.options.length; i++) {
                        if (select.options[i].value.replace(/\s/g, '') === targetSubject.replace(/\s/g, '')) {
                            select.selectedIndex = i; found = true; break;
                        }
                    }
                    if (found) loadStudents(); 
                }
            } catch (e) { alert("과목 목록 로드 실패!"); }
        };

        async function loadStudents() {
            const subject = document.getElementById('selectedSubject').value;
            const waitingList = document.getElementById('waitingList');
            if (!subject) return;

            waitingList.innerHTML = "<p class='text-center text-slate-500 mt-10'>데이터를 불러오는 중...</p>";

            try {
                const [studentsRes, seatingRes] = await Promise.all([
                    fetch(`${API_URL}?type=GET_STUDENTS&subject=${encodeURIComponent(subject)}`),
                    fetch(`${API_URL}?type=GET_SEATING&subject=${encodeURIComponent(subject)}`)
                ]);
                
                rawStudents = await studentsRes.json();
                rawSavedSeating = await seatingRes.json();

                renderClassroomView();
            } catch (e) { alert("데이터 로드 에러가 발생했습니다."); }
        }

        // 실제 화면에 아이들을 앉히는 함수
        function renderClassroomView() {
            const waitingList = document.getElementById('waitingList');
            waitingList.innerHTML = ""; 

            if (rawStudents.length === 0) {
                waitingList.innerHTML = "<p class='text-center text-red-400 mt-10 font-bold'>저장된 학생이 없습니다!</p>";
                return;
            }

            const desks = document.querySelectorAll('.desk');
            desks.forEach(desk => {
                const card = desk.querySelector('.student-card');
                if (card) card.remove();
            });

            rawStudents.forEach((std, index) => {
                const card = createStudentCard(std, index);

                const mySeat = rawSavedSeating.find(seat => seat.name === std.name && String(seat.number) === String(std.number));
                
                if (mySeat && mySeat.seatIndex >= 0 && mySeat.seatIndex < 36) {
                    // 고유번호(논리적 인덱스)를 가진 책상을 찾아서 앉힙니다.
                    const targetDesk = document.querySelector(`.desk[data-logical-index="${mySeat.seatIndex}"]`);
                    if (targetDesk) targetDesk.appendChild(card);
                    else waitingList.appendChild(card);
                } else {
                    waitingList.appendChild(card);
                }
            });
        }

        function createStudentCard(std, index) {
            const card = document.createElement('div');
            card.className = "student-card p-3 rounded-lg shadow-sm border border-slate-200 text-center font-bold text-slate-700 hover:shadow-md mb-2 cursor-grab active:cursor-grabbing status-present";
            card.draggable = true;
            card.id = `std-${index}`;
            card.dataset.grade = std.grade; card.dataset.class = std.class; card.dataset.number = std.number; card.dataset.name = std.name; card.dataset.status = "present"; 
            
            card.innerHTML = `<span class="text-xs text-blue-500 block mb-1 pointer-events-none">${std.class}반 ${std.number}번</span><span class="pointer-events-none">${std.name}</span>`;
            
            card.addEventListener('dragstart', drag); card.addEventListener('dragend', dragEnd);
            
            card.onclick = function() {
                if (!this.parentNode.classList.contains('desk')) return;
                this.classList.remove('status-present', 'status-absent', 'status-late');
                if (this.dataset.status === "present") { this.dataset.status = "absent"; this.classList.add('status-absent'); } 
                else if (this.dataset.status === "absent") { this.dataset.status = "late"; this.classList.add('status-late'); } 
                else { this.dataset.status = "present"; this.classList.add('status-present'); }
            };
            return card;
        }

        // 현재 화면의 배치 상태를 메모리에 임시 저장 (시선 전환 시 안 날아가게)
        function updateLocalSeatingState() {
            const desks = document.querySelectorAll('.desk');
            const newSeating = [];
            desks.forEach(desk => {
                const card = desk.querySelector('.student-card');
                if (card) {
                    newSeating.push({
                        seatIndex: parseInt(desk.dataset.logicalIndex),
                        name: card.dataset.name,
                        number: card.dataset.number
                    });
                }
            });
            rawSavedSeating = newSeating; 
        }

        // 🔄 교사 시선 전환 (앞뒤 + 좌우 완전 반전)
        function toggleMirror() {
            if (rawStudents.length === 0) return alert("과목을 먼저 선택하여 명단을 불러와주세요.");
            
            updateLocalSeatingState(); // 지금 배치해둔 상태 기억하기
            isMirror = !isMirror; 

            const chalkboard = document.getElementById('chalkboard');
            const wrapper = document.getElementById('classroomWrapper');

            if (isMirror) {
                wrapper.appendChild(chalkboard); 
                chalkboard.classList.remove('mb-6', 'bg-emerald-800');
                chalkboard.classList.add('mt-6', 'mb-0', 'bg-slate-700');
            } else {
                wrapper.prepend(chalkboard);
                chalkboard.classList.remove('mt-6', 'mb-0', 'bg-slate-700');
                chalkboard.classList.add('mb-6', 'bg-emerald-800');
            }

            createDesks(); // 바뀐 시선에 맞춰 책상 뼈대 새로 깔기
            renderClassroomView(); // 기억해둔 자리에 아이들 다시 앉히기
        }

        // 책상 36개 생성 로직 (마우스 버그를 없앤 핵심 로직!)
        function createDesks() {
            const grid = document.getElementById('classroomGrid');
            grid.innerHTML = ''; 

            for(let i=0; i<36; i++) {
                const desk = document.createElement('div');
                desk.className = "desk border-2 border-dashed border-slate-300 rounded-xl flex items-center justify-center p-2 bg-slate-50 relative transition-colors duration-200 min-h-[80px]";
                
                // 교사 모드면 책상 번호를 36번부터 거꾸로(역순 배열) 매겨줍니다. 
                // 이 덕분에 마우스 에러가 완전히 사라집니다!
                const logicalIndex = isMirror ? (35 - i) : i;
                desk.dataset.logicalIndex = logicalIndex;

                desk.addEventListener('drop', drop); desk.addEventListener('dragover', allowDrop); desk.addEventListener('dragenter', dragEnter); desk.addEventListener('dragleave', dragLeave);

                const seatNum = document.createElement('span');
                seatNum.className = "absolute text-slate-200 font-bold text-2xl z-0 pointer-events-none";
                seatNum.innerText = logicalIndex + 1; // 1번 ~ 36번
                
                desk.appendChild(seatNum);
                grid.appendChild(desk);
            }
        }

        // --- 저장 및 드래그 로직 ---
        async function saveSeatingToServer() {
            const subject = document.getElementById('selectedSubject').value;
            if (!subject) return alert("과목을 선택해주세요.");
            const btn = document.getElementById('saveBtn');
            btn.innerText = "저장 중..."; btn.disabled = true;

            const desks = document.querySelectorAll('.desk');
            const seatingData = [];
            
            desks.forEach(desk => {
                const card = desk.querySelector('.student-card');
                if (card) {
                    seatingData.push({
                        seatIndex: parseInt(desk.dataset.logicalIndex), // 에러 없앤 절대 번호
                        grade: card.dataset.grade, class: card.dataset.class,
                        number: card.dataset.number, name: card.dataset.name
                    });
                }
            });

            try {
                const response = await fetch(API_URL, {
                    method: 'POST', body: JSON.stringify({ type: "SAVE_SEATING", payload: { subject, seatingData } })
                });
                const result = await response.json();
                if (result.success) alert("✅ 좌석 배치가 완벽하게 저장되었습니다!");
                else alert("❌ 저장 실패");
            } catch (e) { alert("네트워크 오류"); } 
            finally { btn.innerText = "💾 좌석표 저장"; btn.disabled = false; }
        }

        async function saveAttendance() {
            const subject = document.getElementById('selectedSubject').value;
            if (!subject) return alert("과목을 선택해주세요.");
            const cards = document.querySelectorAll('.desk .student-card');
            if (cards.length === 0) return alert("책상에 배치된 학생이 없습니다.");
            const attendanceData = Array.from(cards).map(c => ({
                grade: c.dataset.grade, class: c.dataset.class, number: c.dataset.number, name: c.dataset.name, status: c.dataset.status
            }));
            try {
                const response = await fetch(API_URL, {
                    method: 'POST', body: JSON.stringify({ type: "SAVE_ATTENDANCE", payload: { subject, attendanceData } })
                });
                const res = await response.json();
                if (res.success) alert("✅ 오늘자 출석부가 구글 시트에 기록되었습니다!");
            } catch (e) { alert("출석부 저장 중 오류가 발생했습니다."); }
        }

        function drag(ev) { ev.dataTransfer.setData("text", ev.currentTarget.id); setTimeout(() => { ev.currentTarget.style.opacity = "0.3"; }, 0); }
        function dragEnd(ev) { ev.currentTarget.style.opacity = "1"; }
        function allowDrop(ev) { ev.preventDefault(); }
        function dragEnter(ev) { ev.preventDefault(); const dropZone = ev.target.closest('.desk'); if(dropZone) dropZone.classList.add('bg-blue-100', 'border-blue-500'); }
        function dragLeave(ev) { const dropZone = ev.target.closest('.desk'); if(dropZone) dropZone.classList.remove('bg-blue-100', 'border-blue-500'); }
        function drop(ev) { 
            ev.preventDefault(); 
            const dropZone = ev.target.closest('.desk') || ev.target.closest('#waitingList'); 
            if(!dropZone) return; 
            if(dropZone.classList.contains('desk')) dropZone.classList.remove('bg-blue-100', 'border-blue-500'); 
            
            const data = ev.dataTransfer.getData("text"); 
            const draggedEl = document.getElementById(data); 
            if (!draggedEl) return; 
            draggedEl.style.opacity = "1"; 
            
            if (dropZone.classList.contains('desk')) { 
                const existingStudent = dropZone.querySelector('.student-card'); 
                if (!existingStudent) dropZone.appendChild(draggedEl); 
                else if (existingStudent !== draggedEl) { 
                    const originalParent = draggedEl.parentNode; 
                    dropZone.appendChild(draggedEl); 
                    originalParent.appendChild(existingStudent); 
                } 
            } else if (dropZone.id === 'waitingList') dropZone.appendChild(draggedEl); 
        }
    </script>
</body>
</html>
