<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상일 실시간 검색</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4 min-h-screen">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-black text-slate-800 mb-6 text-center">🔍 실시간 수업 조회</h1>

        <div class="bg-white rounded-2xl shadow-xl p-6 space-y-4 border border-slate-200">
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2">무엇이 궁금하세요?</label>
                <select id="searchType" class="w-full p-3 bg-slate-100 rounded-xl font-bold text-slate-700 outline-none">
                    <option value="STUDENT">이 학생이 지금 어디 있지? (학생이름)</option>
                    <option value="TEACHER">OO선생님 지금 수업 어디지? (성함)</option>
                    <option value="CLASS">특정 반 지금 수업 누구지? (반: 예 1-3)</option>
                </select>
            </div>
            
            <div class="relative">
                <input type="text" id="keyword" placeholder="검색어를 입력하세요..." class="w-full p-4 bg-slate-100 rounded-xl font-black text-lg outline-none focus:ring-2 ring-blue-500">
                <button onclick="runSearch()" class="absolute right-2 top-2 bottom-2 bg-blue-600 text-white px-5 rounded-lg font-bold shadow-lg">검색</button>
            </div>
        </div>

        <div id="resultArea" class="mt-6 space-y-3">
            </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzfIY0Fs4S1EjSSNI2kZfrFgtSqipG_u_KDCkdT8Vy1LjrIwB7k_1awE_psCNw0VQGg/exec";

        async function runSearch() {
            const type = document.getElementById('searchType').value;
            const keyword = document.getElementById('keyword').value;
            if(!keyword) return alert("검색어를 입력하세요!");

            const area = document.getElementById('resultArea');
            area.innerHTML = '<div class="text-center p-10 animate-pulse text-slate-400 font-bold">데이터 분석 중...</div>';

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        type: "SEARCH_REALTIME",
                        payload: { searchType: type, keyword: keyword }
                    })
                });
                const r = await res.json();
                
                if(!r.success) {
                    area.innerHTML = `<div class="bg-amber-50 text-amber-700 p-4 rounded-xl text-center font-bold border border-amber-200">${r.msg}</div>`;
                    return;
                }

                if(r.data.length === 0) {
                    area.innerHTML = `<div class="bg-slate-200 text-slate-500 p-4 rounded-xl text-center font-bold">진행 중인 수업이 없습니다.</div>`;
                    return;
                }

                area.innerHTML = r.data.map(item => `
                    <div class="bg-white p-5 rounded-2xl shadow-md border-l-8 border-blue-500">
                        <div class="text-xs font-bold text-slate-400 mb-1">${r.period}교시 수업 정보</div>
                        <div class="text-lg font-black text-slate-800">${item.subject}</div>
                        ${item.teacher ? `<div class="text-blue-600 font-bold mt-1">담당 교사: ${item.teacher} 선생님</div>` : ''}
                    </div>
                `).join('');

            } catch(e) {
                area.innerHTML = "통신 오류 발생";
            }
        }
    </script>
</body>
</html>
