<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>상일여고 교과관리시스템</title>
  <script>if (!sessionStorage.getItem("userInfo")) { window.location.replace("login.html"); }</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>  
  <style>
    html, body { height: 100%; width: 100%; margin: 0; padding: 0; }
    * { box-sizing: border-box; font-family: 'Pretendard', 'Malgun Gothic', sans-serif; }
    body { background-color: #f8fafc; color: #334155; overflow: hidden; display: flex; }
    
    .sidebar { width: 260px; background-color: #0f172a; color: #f8fafc; height: 100%; display: flex; flex-direction: column; position: fixed; left: 0; top: 0; z-index: 100; transition: transform 0.3s ease; }
    .main-wrapper { margin-left: 260px; display: flex; flex-direction: column; flex: 1; height: 100%; background-color: #f4f7fa; transition: margin-left 0.3s ease; min-width: 0; }
    
    .top-header { height: 64px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; flex-shrink: 0; }
    .header-left { display: flex; align-items: center; }
    .menu-toggle { display: none; font-size: 24px; cursor: pointer; color: #334155; margin-right: 15px; }
    #pageTitle { font-size: 18px; font-weight: 800; color: #1e293b; margin: 0; }
    .time-badge { background: #eff6ff; color: #1e40af; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 800; letter-spacing: 0.5px; }

    .sidebar-header { height: 64px; display: flex; align-items: center; padding: 0 20px; font-size: 18px; font-weight: 900; border-bottom: 1px solid #1e293b; color: #ffffff; cursor: pointer; flex-shrink: 0; }
    .sidebar-menu { flex: 1; overflow-y: auto; padding: 15px 10px; display: flex; flex-direction: column; gap: 4px; }
    .sidebar-footer { padding: 15px 20px; font-size: 13px; color: #cbd5e1; border-top: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; background: #0f172a; z-index: 10; }
    .btn-logout { background-color: #334155; color: #f8fafc; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background-color 0.2s; font-size: 12px; }
    .btn-logout:hover { background-color: #ef4444; color: white; }
    
    .menu-base { display: block; width: 100%; padding: 12px 15px; text-align: left; cursor: pointer; border: none; border-radius: 8px; background: transparent; color: #cbd5e1; font-size: 15px; font-weight: bold; transition: all 0.2s; }
    .menu-base:hover { background-color: #1e293b; color: #ffffff; }
    .menu-base.active { background-color: #1e293b; color: #38bdf8; }
    .admin-menu { display: none !important; }
    .admin-menu.visible { display: block !important; color: #fecdd3; }
    .admin-menu.visible:hover { background-color: #1e293b; color: #f87171; }
    .admin-menu.visible.active { background-color: #1e293b; color: #f87171; }
    
    .sidebar-title { font-size: 12px; font-weight: bold; color: #64748b; padding: 15px 15px 5px; margin-top: 5px; letter-spacing: -0.5px; }
    .subject-btn { background: transparent; border: none; border-left: 4px solid transparent; width: 100%; text-align: left; padding: 10px 11px; cursor: pointer; border-radius: 12px; transition: all 0.2s; margin-bottom: 4px; }
    .subject-btn:hover { background-color: #1e293b; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background-color: #475569; margin-top: 5px; flex-shrink: 0; transition: all 0.3s; }
    
    .content-area { flex: 1; padding: 24px; padding-bottom: 80px; overflow-y: auto; }
    #iframeArea { display: none; flex: 1; width: 100%; height: 100%; border: none; }
    .content-card { background-color: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03); border: 1px solid #f1f5f9; margin-bottom: 24px; }
    
    .dashboard-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 24px; margin-top: 20px; }
    
    .timeline-wrapper { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 24px; margin-bottom: 24px; }
    .timeline-header-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .progress-track { background: #f1f5f9; height: 10px; border-radius: 5px; width: 100%; overflow: hidden; margin-bottom: 24px; box-shadow: inset 0 1px 2px rgba(0,0,0,0.05); }
    .progress-fill { background: #3b82f6; height: 100%; width: 0%; transition: width 1s linear; border-radius: 5px; }
    .timeline-cards { display: flex; gap: 12px; overflow-x: auto; padding: 5px 4px 15px 4px; margin-top: -10px; -webkit-overflow-scrolling: touch; }
    .tl-card { flex: 1; min-width: 90px; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px 8px; text-align: center; background: #ffffff; transition: all 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .tl-card.current { border: 2px solid #3b82f6; box-shadow: 0 4px 12px rgba(59,130,246,0.15); transform: translateY(-2px); }
    .tl-card.current .tl-period { color: #3b82f6; font-weight: 900; }
    .tl-card.current .tl-title { color: #2563eb; font-weight: 900; }
    .tl-card.past { opacity: 0.5; background: #f8fafc; }
    .tl-card.clickable { cursor: pointer; }
    .tl-card.clickable:hover { background-color: #eff6ff; border-color: #93c5fd; }
    
    @keyframes pulse-live { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.95); } }
    .live-class-badge { font-size: 11px; font-weight: 900; color: #fca5a5; background-color: #991b1b; padding: 2px 8px; border-radius: 10px; animation: pulse-live 1.5s infinite; border: 1px solid #ef4444; }

    .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; } 
    .schedule-table { width: 100%; min-width: 600px; table-layout: fixed; border-collapse: separate; border-spacing: 0; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; font-size: 13px; text-align: center; background: white; }
    .schedule-table th, .schedule-table td { padding: 12px 6px; border-bottom: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0; vertical-align: middle; height: 75px; }
    .schedule-table th { background-color: #f8fafc; font-weight: 800; color: #475569; height: auto; padding: 10px; }
    .schedule-table tr:last-child td { border-bottom: none; }
    .schedule-table th:last-child, .schedule-table td:last-child { border-right: none; }
    
    .class-pill { background-color: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 10px 4px; color: #1e40af; font-weight: bold; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; min-height: 54px; transition: all 0.2s; cursor: pointer; line-height: 1.2; word-break: break-all; }
    .class-pill:hover { background-color: #dbeafe; border-color: #93c5fd; transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(59,130,246,0.1); }
    .class-target { font-size: 11px; font-weight: normal; color: #3b82f6; margin-top: 3px; letter-spacing: -0.5px; }

    #extraClassModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:999; align-items:center; justify-content:center; backdrop-filter: blur(2px); }
    .modal-box { background:white; padding:25px; border-radius:16px; width:540px; max-width:95%; max-height:85vh; overflow-y:auto; box-shadow:0 20px 25px -5px rgba(0,0,0,0.1); }
    .extra-class-row { display:flex; flex-direction:column; gap:8px; padding:15px; background:#f8fafc; border-radius:12px; border:1px solid #e2e8f0; margin-bottom: 10px; }
    .ec-input { padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; color: #334155; font-size: 13px; }
    
    .quick-menus { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
    .quick-card { flex: 1; min-width: 200px; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 25px 15px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .quick-card:hover { border-color: #94a3b8; transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); background-color: #ffffff; }
    .quick-icon { font-size: 36px; display: block; margin-bottom: 10px; }
    .quick-title { font-weight: bold; font-size: 16px; color: #1e40af; margin-bottom: 5px;}
    .quick-desc { font-size: 13px; color: #64748b; }

    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; backdrop-filter: blur(2px); }
    @media (max-width: 768px) {
        .sidebar { transform: translateX(-100%); }
        .sidebar.open { transform: translateX(0); }
        .sidebar-overlay.open { display: block; }
        .main-wrapper { margin-left: 0; }
        .menu-toggle { display: block; }
        .top-header { padding: 0 15px; }
        .content-area { padding: 12px; padding-bottom: 120px !important; }
        .time-badge { padding: 4px 10px; font-size: 11px; }
        #pageTitle { font-size: 16px; }
        .content-card, .timeline-wrapper { padding: 15px !important; margin-bottom: 15px; border-radius:12px; }
        .tl-card { min-width: 65px; padding: 10px 2px; }
        .schedule-table { min-width: 100% !important; table-layout: fixed; }
        .schedule-table th:first-child { width: 14%; } 
        .schedule-table th:not(:first-child) { width: 17.2%; } 
        .schedule-table th, .schedule-table td { padding: 2px 1px !important; border: 1px solid #e2e8f0; height: 60px; overflow: hidden; }
        .schedule-table th { font-size: 10px !important; padding: 4px 0 !important; height: auto; }
        .class-pill { padding: 2px 0px; min-height: 45px; border-radius: 4px; font-size: 10px !important; line-height: 1.1; word-break: break-all; }
        .class-target { font-size: 8px !important; margin-top: 1px; letter-spacing: -1px; }
        .modal-box { padding: 20px 15px; max-height: 90vh; }
        .extra-class-row { padding: 12px; }
        .ec-inputs-top { display:flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
        .ec-day, .ec-period { width: calc(50% - 3px); flex: auto; }
        .ec-subject { width: calc(100% - 40px); flex: auto; }
        .ec-target { width: 55px; flex: none; }
        .ec-delete-btn { width: 35px; flex: none; }
        .ec-inputs-bottom { display:flex; flex-wrap: wrap; gap: 6px; align-items: flex-start; }
        .ec-term { width: 100%; flex: none; }
        .dashboard-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header" onclick="document.querySelector('.menu-base').click()">
      🏫 교과관리시스템
    </div>
    <div class="sidebar-menu">
      <button onclick="loadMenu('dashboard', this)" class="active menu-base">🏠 홈 (대시보드)</button>
      
      <button id="adminBtn1" class="admin-menu menu-base" onclick="loadMenu('adminConfig', this)">⚙️ 교과 환경 설정</button>
      <button id="adminBtnSearch" class="admin-menu menu-base" onclick="loadMenu('adminSearch', this)">🔍 전체 교과목 현황</button>
      <button id="adminBtnStudents" class="admin-menu menu-base" onclick="loadMenu('manageStudents', this)">👥 명단 및 사진 관리</button>
      <button id="adminBtn2" class="admin-menu menu-base" onclick="loadMenu('adminUsers', this)">🔐 교직원 계정 관리</button>
      
      <div id="dynamicSubjectMenu" style="display:none;"></div>
    </div>
    <div class="sidebar-footer">
      <span id="userNameDisplay" style="font-weight:bold; color:#f8fafc;">사용자</span>
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
  </nav>

  <main class="main-wrapper">
    <header class="top-header">
      <div class="header-left">
        <span class="menu-toggle" onclick="toggleSidebar()">☰</span>
        <h2 id="pageTitle">홈 (대시보드)</h2>
      </div>
      <div class="header-right">
        <div id="realTimeClock" class="time-badge">로딩 중...</div>
      </div>
    </header>
    
    <div id="contentArea" class="content-area"></div>
    <iframe id="iframeArea" src=""></iframe>
  </main>

  <div id="extraClassModal">
      <div class="modal-box">
          <h2 style="color:#1e40af; margin-bottom:10px; font-size:18px; display:flex; align-items:center; gap:8px;">🕒 방과후/보충 (8~9교시) 설정</h2>
          <p style="font-size:13px; color:#64748b; margin-bottom:20px; background:#f8fafc; padding:12px; border-radius:8px; border:1px solid #e2e8f0; line-height:1.4;">
            ※ 관리자가 등록한 방과후 기간을 선택해주세요. 기간이 지나면 대시보드에서 자동으로 숨겨집니다.
          </p>
          <div id="extraClassList" style="display:flex; flex-direction:column; gap:10px; margin-bottom:15px;"></div>
          <button onclick="addExtraClassRow()" style="width:100%; padding:12px; background:#fff; border:1px dashed #3b82f6; color:#3b82f6; border-radius:8px; font-weight:bold; cursor:pointer; margin-bottom:20px;">+ 새로운 수업 추가</button>
          <div style="display:flex; gap:10px;">
              <button id="btnSaveExtra" onclick="saveExtraClass()" style="flex:1; padding:12px; background:#2563eb; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">저장하기</button>
              <button onclick="closeExtraClassModal()" style="flex:1; padding:12px; background:#e2e8f0; color:#475569; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">닫기</button>
          </div>
      </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzfIY0Fs4S1EjSSNI2kZfrFgtSqipG_u_KDCkdT8Vy1LjrIwB7k_1awE_psCNw0VQGg/exec";
    let myScheduleData = []; 
    let sysConfig = null;

    let currentSearchData = [];
    let sortConfig = { key: null, asc: true };

    const DEFAULT_TIMES = {
        1: { start: "08:45", end: "09:35" }, 2: { start: "09:45", end: "10:35" },
        3: { start: "10:45", end: "11:35" }, 4: { start: "11:45", end: "12:35" },
        5: { start: "13:35", end: "14:25" }, 6: { start: "14:35", end: "15:25" },
        7: { start: "15:40", end: "16:30" }, 8: { start: "16:40", end: "17:30" }, 9: { start: "17:40", end: "18:30" }
    };

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebarOverlay').classList.toggle('open');
    }

    function extractTime(str) {
        if (!str) return "";
        const match = String(str).match(/(\d{1,2}:\d{2})/);
        return match ? match[1].padStart(5, '0') : "";
    }

    function updateRealTimeClock() {
      const now = new Date(); const days = ['일','월','화','수','목','금','토'];
      document.getElementById('realTimeClock').innerText = `${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]}) ${now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;
    }

    function formatDateString(dateStr) {
      if (!dateStr) return ""; const d = new Date(dateStr); if (isNaN(d.getTime())) return dateStr; 
      return `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}(${['일','월','화','수','목','금','토'][d.getDay()]})`;
    }

    function formatForInputDate(dateStr) {
      if (!dateStr) return ""; const d = new Date(dateStr); if (isNaN(d.getTime())) return dateStr; 
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function checkAuth() {
      const userInfoStr = sessionStorage.getItem("userInfo");
      if (!userInfoStr) { window.location.replace("login.html"); return null; }
      const userInfo = JSON.parse(userInfoStr);
      document.getElementById('userNameDisplay').innerText = userInfo.name + " 선생님";
      if (userInfo.role === "관리자") {
          document.querySelectorAll('.admin-menu').forEach(el => el.classList.add('visible'));
      } else {
          document.getElementById('dynamicSubjectMenu').style.display = 'block';
      }
      return userInfo;
    }

    function logout() { if (confirm("로그아웃 하시겠습니까?")) { sessionStorage.removeItem("userInfo"); window.location.replace("login.html"); } }

    function loadMenu(menuId, btnElement, extraParam = "") {
      document.querySelectorAll('.sidebar .menu-base, .sidebar .subject-btn').forEach(btn => btn.classList.remove('active'));
      if(btnElement) btnElement.classList.add('active');

      const contentArea = document.getElementById('contentArea'); 
      const iframeArea = document.getElementById('iframeArea');
      
      if(window.innerWidth <= 768) {
          document.getElementById('sidebar').classList.remove('open');
          document.getElementById('sidebarOverlay').classList.remove('open');
      }

      if (menuId === 'dashboard') {
        document.getElementById('pageTitle').innerText = "홈 (대시보드)";
        iframeArea.style.display = 'none'; contentArea.style.display = 'block';
        contentArea.innerHTML = `<div style="text-align:center; padding: 50px; font-weight:bold; color:#64748b;">데이터를 불러오는 중입니다... ⏳</div>`;
        renderDashboard(); 
      } 
      else if (menuId === 'attendance') {
        document.getElementById('pageTitle').innerText = extraParam;
        contentArea.style.display = 'none'; iframeArea.style.display = 'block';
        iframeArea.src = `attendance.html?subject=${encodeURIComponent(extraParam)}`;
      } 
      else if (menuId === 'manageStudents') {
        document.getElementById('pageTitle').innerText = "명단 및 사진 관리";
        iframeArea.style.display = 'none'; contentArea.style.display = 'block';

        // ✨ 핵심: 데이터가 로딩 중일 때를 대비해 실시간으로 과목 추출
        // myScheduleData가 비어있을 수도 있으므로, 안전하게 빈 배열 처리
        const uniqueSubjects = (myScheduleData && myScheduleData.length > 0) 
            ? [...new Set(myScheduleData.map(s => s.fullName))].sort() 
            : [];

        let subjectOptions = '<option value="">과목을 선택하세요</option>';
        if(uniqueSubjects.length > 0) {
            uniqueSubjects.forEach(s => subjectOptions += `<option value="${s}">${s}</option>`);
        } else {
            // 만약 과목이 안 뜨면 안내 문구 표시
            subjectOptions = '<option value="">등록된 과목 정보를 불러올 수 없습니다.</option>';
        }

        contentArea.innerHTML = `
          <div class="content-card" style="margin-bottom:20px;">
            <h2 style="color: #1e293b; font-size:18px; margin-bottom:15px;">👥 수강생 명단 및 사진 등록</h2>
            <p style="font-size:12px; color:#64748b; margin-bottom:10px;">※ 대시보드(홈)에서 시간표가 정상적으로 표시되는지 먼저 확인해 주세요.</p>
            <div style="display:flex; gap:10px; align-items:center;">
                <select id="rosterSubjectSelect" class="ec-input" style="flex:1; max-width:350px;" onchange="loadRosterTable()">
                    ${subjectOptions}
                </select>
                <button onclick="loadMenu('manageStudents', document.getElementById('adminBtnStudents'))" style="background:#f1f5f9; color:#475569; border:1px solid #cbd5e1; padding:8px 12px; border-radius:8px; font-size:12px; font-weight:bold; cursor:pointer;">🔄 과목 새로고침</button>
            </div>
          </div>

          <div class="dashboard-grid">
            <div class="content-card">
                <h3 style="color:#1e40af; font-size:16px; margin-bottom:15px;">📝 1. 학생편성현황 엑셀 일괄 업로드</h3>
                <p style="font-size:12px; color:#64748b; margin-bottom:15px; line-height:1.5;">나이스 엑셀을 그대로 올리세요.<br>시스템이 <strong style="color:#ef4444;">학년, 반, 번호, 성명, 과목</strong> 열을 자동 탐지합니다.</p>
                <input type="file" id="rosterExcelFile" accept=".xlsx" class="ec-input" style="width:100%; margin-bottom:15px; cursor:pointer;">
                <button onclick="processRosterExcel()" style="width:100%; background:#10b981; color:white; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;">전체 명단 자동 분류 및 업로드</button>
            </div>

            <div class="content-card">
                <h3 style="color:#1e40af; font-size:16px; margin-bottom:15px;">📸 2. 반별 학생 사진 일괄 업로드</h3>
                <div style="background:#eff6ff; padding:12px; border-radius:8px; margin-bottom:15px; border:1px solid #bfdbfe;">
                    <p style="font-size:12px; color:#1e40af; font-weight:bold; margin-bottom:4px;">💡 파일명 규칙 : 이름(번호).jpg</p>
                    <p style="font-size:12px; color:#3b82f6; letter-spacing:-0.5px;">학년과 반 세팅 후, <strong style="background:white; padding:2px 4px; border-radius:4px; color:#ef4444;">김유하(23).jpg</strong> 사진을 올리세요.</p>
                </div>
                
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <select id="photoGrade" class="ec-input" style="flex:1;">
                        <option value="">학년</option><option value="1">1학년</option><option value="2">2학년</option><option value="3">3학년</option>
                    </select>
                    <input type="number" id="photoClass" placeholder="반 (숫자)" class="ec-input" style="flex:1;">
                </div>

    async function saveAdminConfig() {
      const periodTimes = {}; for(let i=1; i<=9; i++) periodTimes[i] = { start: document.getElementById('pStart'+i).value, end: document.getElementById('pEnd'+i).value };
      const extraConfigs = [];

          if(name && start && end) extraConfigs.push({name, startDate: start, endDate: end});
      });
      const payload = { year: document.getElementById('sysYear').value, semester: document.getElementById('sysSemester').value, startDate: document.getElementById('sysStartDate').value, endDate: document.getElementById('sysEndDate').value, periodTimes: periodTimes, extraConfigs: extraConfigs };

    function processExcelData() {
      const year = document.getElementById('uploadYear').value.trim(); const semester = document.getElementById('uploadSemester').value.trim();
      const fileInput = document.getElementById('excelFileInput'); if (fileInput.files.length === 0) return alert("파일을 선택하세요.");
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = new Uint8Array(e.target.result); const workbook = XLSX.read(data, {type: 'array'});
          const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1}); const result = [];
          rows.forEach(cols => {
            if (!cols || cols.length === 0) return;
            let teacherId = "", teacherName = "", startIndex = -1;
            for (let i = 0; i < cols.length; i++) {
              let idMatch = String(cols[i] || "").trim().match(/([a-zA-Z0-9_.-]+)\((.+?)\)/);
              if (idMatch) { teacherId = idMatch[1].trim(); teacherName = idMatch[2].trim(); startIndex = i + 1; break; }
            }
            if (startIndex === -1) return;
            const subjectsMap = {};
            for (let i = startIndex; i < cols.length; i++) {
              let cellMatch = String(cols[i] || "").trim().match(/(\d+)\s*학년\s*(.+?)\s*\(([^)]+)\)/);
              if (cellMatch) {
                const dayIdx = Math.floor((i - startIndex) / 12); const period = ((i - startIndex) % 12) + 1;
                const day = ["월","화","수","목","금","토","일"][dayIdx]; if(!day) continue;
                let targetClass = !isNaN(cellMatch[3]) ? `${cellMatch[1]}-${cellMatch[3]}` : cellMatch[3];
                const key = `${cellMatch[2]}_${targetClass}`;
                if (!subjectsMap[key]) subjectsMap[key] = { subject: cellMatch[2], targetClass: targetClass, schedules: [] };
                subjectsMap[key].schedules.push({ day, period });
              }
            }
            for (let key in subjectsMap) result.push({ teacherId, teacherName, subject: subjectsMap[key].subject, targetClass: subjectsMap[key].targetClass, schedules: subjectsMap[key].schedules });
          });
          sendBulkDataToServer(year, semester, result);
        } catch (err) { alert("엑셀 파일 판독 오류"); }
      }; reader.readAsArrayBuffer(fileInput.files[0]);
    }

        if ((await response.json()).success) alert("연동되었습니다!");
      } catch (e) {} finally { document.getElementById('loadingNeis').style.display = 'none'; }
    }

    function sortTable(key) {
        if (currentSearchData.length === 0) return;
        if (sortConfig.key === key) { sortConfig.asc = !sortConfig.asc; } 
        else { sortConfig.key = key; sortConfig.asc = true; }

        const dayOrder = { '월':1, '화':2, '수':3, '목':4, '금':5, '토':6, '일':7 };

        currentSearchData.sort((a, b) => {
            let res = compareValues(a, b, key, sortConfig.asc, dayOrder);
            if (res !== 0) return res;
            if (key !== 'day') { res = compareValues(a, b, 'day', true, dayOrder); if (res !== 0) return res; }
            if (key !== 'period') { res = compareValues(a, b, 'period', true, dayOrder); return res; }
            return 0;
        });

        document.querySelectorAll('th span').forEach(el => { el.innerText = '↕'; el.style.color = '#94a3b8'; });
        const activeIcon = document.getElementById('sort-icon-' + key);
        if (activeIcon) { activeIcon.innerText = sortConfig.asc ? '▲' : '▼'; activeIcon.style.color = '#ef4444'; }
        renderSearchTable();
    }

    function compareValues(a, b, key, isAsc, dayOrder) {
        let valA = a[key]; let valB = b[key];
        if (key === 'period') { valA = parseInt(valA) || 0; valB = parseInt(valB) || 0; } 
        else if (key === 'day') { valA = dayOrder[valA] || 99; valB = dayOrder[valB] || 99; } 
        else { valA = String(valA || '').toLowerCase(); valB = String(valB || '').toLowerCase(); }

        if (valA < valB) return isAsc ? -1 : 1;
        if (valA > valB) return isAsc ? 1 : -1;
        return 0;
    }

      const grouped = {};
      activeSchedule.forEach(item => {
        if (!grouped[item.fullName]) grouped[item.fullName] = { fullName: item.fullName, times: [], todayPeriods: [] };
        grouped[item.fullName].times.push(`${item.day}${item.period}`);
        if(item.day === todayStr) grouped[item.fullName].todayPeriods.push(parseInt(item.period));
      });
      
      const uniqueSubjects = Object.values(grouped);
      if(uniqueSubjects.length === 0) return menuContainer.innerHTML += '<div style="padding:15px; color:#475569; font-size:13px;">배정된 과목이 없습니다.</div>';
      
      uniqueSubjects.sort((a,b) => {

          return a.fullName.localeCompare(b.fullName);

    // ✨ 엑셀 방탄 파서 적용! (빈 줄, 빈 칸 모두 스킵하고 오류를 뱉지 않습니다)
    function processRosterExcel() {
        const fileInput = document.getElementById('rosterExcelFile');
        if (!fileInput || fileInput.files.length === 0) return alert("엑셀 파일을 선택해주세요.");

        const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});

                let headerRowIdx = -1;
                let colMap = { grade: -1, class: -1, number: -1, name: -1, subject: -1 };

                for(let i=0; i<Math.min(10, rows.length); i++) {
                    if(!rows[i] || !Array.isArray(rows[i])) continue;
                    let foundName = false;
                    for(let j=0; j<rows[i].length; j++) {
                        const val = String(rows[i][j] || "").replace(/\s/g, '');
                        if(val.includes('학년')) colMap.grade = j;
                        else if(val === '반') colMap.class = j;
                        else if(val === '번호') colMap.number = j;
                        else if(val === '성명' || val === '이름') { colMap.name = j; foundName = true; }
                        else if(val.includes('과목')) colMap.subject = j;
                    }
                    if(foundName) { headerRowIdx = i; break; }
                }

                if(headerRowIdx === -1) return alert("엑셀에서 '성명(이름)' 열을 찾을 수 없습니다. 양식을 확인해주세요.");

                const students = [];
                for(let i = headerRowIdx + 1; i < rows.length; i++) {
                    const row = rows[i];
                    if(!row || !Array.isArray(row) || !row[colMap.name]) continue;

                    let g = colMap.grade !== -1 ? String(row[colMap.grade] || "").replace(/[^0-9]/g, '') : "";
                    let c = colMap.class !== -1 ? String(row[colMap.class] || "").replace(/[^0-9]/g, '') : "";
                    let n = colMap.number !== -1 ? String(row[colMap.number] || "").replace(/[^0-9]/g, '') : "";
                    let nm = String(row[colMap.name] || "").trim();
                    let s = colMap.subject !== -1 ? String(row[colMap.subject] || "").trim() : "";

                    if(c && n && nm) {
                        students.push({ grade: g, class: c, number: n, name: nm, subject: s });
                    }
                }

                if(students.length === 0) return alert("추출할 학생 데이터가 없습니다. 양식을 다시 확인해 주세요.");

                const btn = document.querySelector('button[onclick="processRosterExcel()"]');
                if(btn) { btn.innerText = "서버 전송 및 자동 분류 중... ⏳"; btn.disabled = true; }

                const res = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ type: "BULK_UPLOAD_STUDENTS", payload: { students: students } })
                });
                
                let r;
                try { r = await res.json(); } 
                catch(jsonErr) { throw new Error("서버 응답 오류 (백엔드 코드가 최신화되었는지 확인해주세요.)"); }

                if(r.success) {
                    alert(`🎉 완벽합니다! 총 ${r.count}건의 명단이 과목별로 자동 분류되고 정렬 저장되었습니다!`);
                    const rosterSelect = document.getElementById('rosterSubjectSelect');
                    if(rosterSelect && rosterSelect.value) loadRosterTable();
                } else {
                    alert("저장 실패: " + (r.msg || "알 수 없는 오류"));
                }
                
                if(btn) { btn.innerText = "전체 명단 자동 분류 및 업로드"; btn.disabled = false; }
                fileInput.value = '';
            } catch (err) { 
                alert("엑셀 판독 오류: " + err.message); 
                const btn = document.querySelector('button[onclick="processRosterExcel()"]');
                if (btn) { btn.innerText = "전체 명단 자동 분류 및 업로드"; btn.disabled = false; }
            }
        };
        reader.readAsArrayBuffer(fileInput.files[0]);
    }

    // ✨ "이름(번호).jpg" 형식 파서 및 글로벌 업로드
    async function uploadGlobalPhotos() {
        const grade = document.getElementById('photoGrade').value;
        const cls = document.getElementById('photoClass').value;
        const files = document.getElementById('photoFiles').files;
        
        if(!grade || !cls) return alert("먼저 위에서 학년과 반을 입력해주세요.");
        if(files.length === 0) return alert("사진 파일들을 선택해주세요.");
        
        const progress = document.getElementById('photoProgress');
        const btn = document.querySelector('button[onclick="uploadGlobalPhotos()"]');
        progress.style.display = 'block';
        btn.disabled = true;

        let successCount = 0; let failCount = 0;

        for(let i=0; i<files.length; i++) {
            const file = files[i];
            progress.innerText = `업로드 진행 중... (${i+1} / ${files.length})\n[${file.name}]`;
            
            // ✂️ 정규식을 사용해 '김유하(23).jpg' 에서 번호 '23'만 똑똑하게 빼냅니다.
            const match = file.name.match(/(.+)\((\d+)\)/);
            if(!match) { failCount++; continue; }
            
            const num = match[2];
            
            // 학년 + 반(2자리) + 번호(2자리) 조합하여 학생 고유키(예: 10123) 생성!
            const stuKey = String(grade) + String(cls).padStart(2, '0') + String(num).padStart(2, '0');
            
            try {
                const base64 = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.readAsDataUrl(file);
                });

                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ type: "UPLOAD_GLOBAL_PHOTO", payload: { stuKey: stuKey, filename: file.name, imageBase64: base64 } })
                });
                successCount++;
            } catch(e) { failCount++; }
        }

        progress.style.color = '#10b981';
        progress.innerText = `✅ 업로드 완료! (성공: ${successCount}건, 이름형식오류/실패: ${failCount}건)`;
        btn.disabled = false;
        document.getElementById('photoFiles').value = '';
        if(document.getElementById('rosterSubjectSelect') && document.getElementById('rosterSubjectSelect').value) loadRosterTable();
    }

    async function loadRosterTable() {
        const subject = document.getElementById('rosterSubjectSelect').value;
        const tbody = document.getElementById('rosterTbody');
        if(!subject) { tbody.innerHTML = '<tr><td colspan="5" style="padding:30px; text-align:center;">과목을 선택해주세요.</td></tr>'; return; }
        
        tbody.innerHTML = '<tr><td colspan="5" style="padding:30px; text-align:center;">데이터를 불러오는 중입니다... ⏳</td></tr>';
        
        try {
            const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ type: "GET_STUDENTS", payload: { subject: subject } }) });
            const r = await res.json();
            if(r.success) {
                if(r.data.length === 0) tbody.innerHTML = '<tr><td colspan="5" style="padding:30px; text-align:center; color:#ef4444;">등록된 명단이 없습니다.</td></tr>';
                else tbody.innerHTML = r.data.map(d => `
                    <tr>
                        <td>${d.사진 ? `<img src="${d.사진}" style="width:40px; height:40px; border-radius:50%; object-fit:cover; border:2px solid #e2e8f0;">` : `<div style="width:40px; height:40px; border-radius:50%; background:#f1f5f9; display:inline-flex; align-items:center; justify-content:center; color:#94a3b8; font-size:10px;">사진없음</div>`}</td>
                        <td>${d.grade}</td><td>${d.class}</td><td>${d.number}</td><td style="font-weight:bold; color:#1e40af;">${d.name}</td>
                    </tr>
                `).join('');
            }
        } catch(e) { tbody.innerHTML = '<tr><td colspan="5" style="color:red; text-align:center;">오류 발생</td></tr>'; }
    }

    function highlightCurrentClass() {
      const userInfo = JSON.parse(sessionStorage.getItem("userInfo")); if (!userInfo || userInfo.role === "관리자") return; 
      const now = new Date(); const todayStr = ['일','월','화','수','목','금','토'][now.getDay()];
      
      const nowMins = now.getHours() * 60 + now.getMinutes();
      let currentPeriod = 0; let nextPeriod = 0;
      let statusStr = "오늘의 수업 타임라인"; let remainStr = ""; let progressPercent = 0; let dotColor = "#94a3b8";
      
      let maxPeriod = 7; 
      if (myScheduleData.some(s => parseInt(s.period) === 8)) maxPeriod = 8;
      if (myScheduleData.some(s => parseInt(s.period) === 9)) maxPeriod = 9;

      const pTimes = (sysConfig && sysConfig.periodTimes) ? sysConfig.periodTimes : DEFAULT_TIMES;
      
      let found = false;
      for (let p = 1; p <= maxPeriod; p++) { 
          if (!pTimes[p]) continue;
          let sTime = extractTime(pTimes[p].start); let eTime = extractTime(pTimes[p].end);
          if (sTime && eTime) {
              let startMins = parseInt(sTime.split(':')[0]) * 60 + parseInt(sTime.split(':')[1]);
              let endMins = parseInt(eTime.split(':')[0]) * 60 + parseInt(eTime.split(':')[1]);
              
              if (nowMins >= startMins && nowMins <= endMins) { 
                  currentPeriod = p; 
                  let classData = myScheduleData.find(s => s.day === todayStr && s.period == p);
                  let subj = classData ? classData.subject : "공강";
                  statusStr = `${p}교시 ${subj} 시간`;
                  remainStr = `종료: ${endMins - nowMins}분 전`;
                  progressPercent = ((nowMins - startMins) / (endMins - startMins)) * 100;
                  dotColor = classData ? "#3b82f6" : "#94a3b8"; 
                  found = true; break; 
              } else if (nowMins < startMins) {
                  nextPeriod = p;
                  let classData = myScheduleData.find(s => s.day === todayStr && s.period == p);
                  let subj = classData ? classData.subject : "공강";
                  statusStr = `쉬는시간 (다음: ${p}교시 ${subj})`;
                  remainStr = `시작: ${startMins - nowMins}분 전`;
                  progressPercent = 100; 
                  dotColor = "#ef4444"; 
                  found = true; break;
              }
          }
      }
      
      if (!found && nowMins > 1000) { 
          statusStr = "오늘의 일과가 모두 종료되었습니다. 🎉"; remainStr = ""; progressPercent = 100; dotColor = "#10b981"; 
      }

      const tlTitle = document.getElementById('tl-status-title');
      if (tlTitle) {
          tlTitle.innerText = statusStr;
          document.getElementById('tl-remain-text').innerText = remainStr;
          document.getElementById('tl-progress-bar').style.width = `${progressPercent}%`;
          document.getElementById('tl-status-dot').style.backgroundColor = dotColor;

          for (let p = 1; p <= maxPeriod; p++) {
              const card = document.getElementById(`tl-card-${p}`);
              if (card) {
                  card.classList.remove('current', 'past');
                  if (currentPeriod === p) card.classList.add('current');
                  else if (currentPeriod > p || (currentPeriod === 0 && nextPeriod > p)) card.classList.add('past');
              }
          }
      }

      document.querySelectorAll('.live-class-badge').forEach(el => el.remove());
      document.querySelectorAll('.subject-btn').forEach(el => {
          el.style.backgroundColor = 'transparent';
          el.style.borderLeftColor = 'transparent';
      });

      if (currentPeriod === 0 || myScheduleData.length === 0) return; 

      const currentClass = myScheduleData.find(s => s.day === todayStr && s.period == currentPeriod);
      if (currentClass) {
        const btn = document.querySelector(`.subject-btn[data-subject='${currentClass.fullName}']`);
        if (btn) {
            btn.style.backgroundColor = '#1e293b'; 
            btn.style.borderLeftColor = '#ef4444'; 

            const badgeContainer = btn.querySelector('.live-badge-container');
            if (badgeContainer) {
                const badge = document.createElement('span'); 
                badge.className = 'live-class-badge'; 
                badge.innerText = '🔥 수업중!';
                badgeContainer.appendChild(badge);
            }
        }
      }
    }

    window.onload = function() { setInterval(updateRealTimeClock, 1000); updateRealTimeClock(); if(checkAuth()) loadMenu('dashboard', document.querySelector('.sidebar .menu-base')); };
    setInterval(highlightCurrentClass, 10000);
  </script>
</body>
