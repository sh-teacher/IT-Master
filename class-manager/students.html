<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>학생 명단 관리 - Class Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>if (sessionStorage.getItem("isAllowed") !== "true") location.href = "index.html";</script>
    <style>
        .drag-over { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
        .photo-preview { width: 40px; height: 50px; object-fit: cover; border-radius: 4px; border: 1px solid #ddd; }
        .no-photo { width: 40px; height: 50px; background: #f1f5f9; display: flex; align-items: center; justify-content: center; border-radius: 4px; border: 1px dashed #cbd5e1; font-size: 18px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-6 md:p-10">
    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-black mb-2 text-slate-800">👥 학생 명단 및 사진 관리</h1>
                <p class="text-slate-500 font-medium">나이스 명단 업로드 후 학생 사진을 한꺼번에 올려주세요.</p>
            </div>
            <button onclick="location.href='setup.html'" class="text-slate-500 hover:text-slate-800 font-bold underline transition">이전으로</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-5 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <label class="block text-sm font-bold text-slate-700 mb-3">1. 대상 과목 선택</label>
                    <select id="selectedSubject" onchange="loadStudentsForSubject()" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold text-slate-700 focus:border-blue-500 focus:outline-none">
                        <option value="">과목 로딩 중...</option>
                    </select>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <label class="block text-sm font-bold text-slate-700 mb-3">2. 명단 업로드 (나이스 양식)</label>
                    <div id="dropZone" class="border-2 border-dashed border-slate-300 rounded-2xl p-8 text-center transition hover:bg-slate-50 cursor-pointer" onclick="document.getElementById('fileInput').click()">
                        <div class="text-4xl mb-2">📑</div>
                        <p class="text-slate-600 font-bold text-sm">엑셀 파일을 끌어오거나 클릭</p>
                        <input type="file" id="fileInput" accept=".xlsx, .xls" class="hidden" onchange="handleFileUpload(event)">
                    </div>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border border-blue-200 bg-blue-50/20">
                    <label class="block text-sm font-bold text-blue-800 mb-3">3. 사진 일괄 매칭 (JPG 파일들)</label>
                    <div id="photoDropZone" class="border-2 border-dashed border-blue-300 rounded-2xl p-8 text-center transition hover:bg-blue-50 cursor-pointer" onclick="document.getElementById('photoInput').click()">
                        <div class="text-4xl mb-2">📸</div>
                        <p class="text-blue-700 font-bold text-sm">준비한 사진 파일들을 몽땅 드래그!</p>
                        <p class="text-[11px] text-blue-500 mt-2">※ 파일명 예시: 10101.jpg / 30805_강호동.jpg<br>(파일명 숫자로 자동 매칭됩니다)</p>
                        <input type="file" id="photoInput" multiple accept="image/*" class="hidden" onchange="handlePhotoUpload(event)">
                    </div>
                    <div id="uploadStatus" class="mt-3 text-xs font-bold text-center"></div>
                </div>
            </div>

            <div class="lg:col-span-3 bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col h-[800px]">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-black text-slate-800">📋 학생 명단 <span id="studentCount" class="text-blue-600 ml-2">0명</span></h2>
                    <button onclick="saveStudentsToServer()" id="saveBtn" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold text-sm shadow-md hover:bg-blue-700 transition">💾 명단 최종 저장</button>
                </div>

                <div class="flex-1 overflow-y-auto border border-slate-200 rounded-xl">
                    <table class="w-full text-center border-collapse">
                        <thead class="bg-slate-100 sticky top-0 z-10">
                            <tr>
                                <th class="p-3 text-xs font-bold text-slate-500">사진</th>
                                <th class="p-3 text-xs font-bold text-slate-500">학번/이름</th>
                                <th class="p-3 text-xs font-bold text-slate-500">관리</th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody" class="divide-y divide-slate-100">
                            <tr><td colspan="3" class="p-10 text-slate-400">과목을 선택해주세요.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxUgpimLYy_9K_vZjbxJYtImA4fcz3ZZxfXPvy9WlYXLv1dY-yBA6yrtHeybyAo1v_Vpg/exec";
        let currentStudents = [];

        window.onload = async function() {
            try {
                const res = await fetch(`${API_URL}?type=GET_SUBJECTS`);
                const subjects = await res.json();
                const sel = document.getElementById('selectedSubject');
                sel.innerHTML = '<option value="">과목을 선택해주세요</option>';
                subjects.forEach(sub => sel.innerHTML += `<option value="${sub.fullName}">${sub.fullName}</option>`);
            } catch { alert("과목 로드 실패"); }
            setupDragAndDrop();
        };

        async function loadStudentsForSubject() {
            const subject = document.getElementById('selectedSubject').value;
            if (!subject) return;
            const tbody = document.getElementById('studentTableBody');
            tbody.innerHTML = '<tr><td colspan="3" class="p-10 font-bold animate-pulse">데이터 로드 중...</td></tr>';
            try {
                const res = await fetch(`${API_URL}?type=GET_STUDENTS&subject=${encodeURIComponent(subject)}&t=${Date.now()}`);
                currentStudents = await res.json();
                renderTable();
            } catch { alert("불러오기 실패"); }
        }

        function renderTable() {
            const tbody = document.getElementById('studentTableBody');
            document.getElementById('studentCount').innerText = `${currentStudents.length}명`;
            tbody.innerHTML = '';
            
            currentStudents.sort((a,b) => (a.grade-b.grade || a.class-b.class || a.number-b.number));

            currentStudents.forEach((std, idx) => {
                const photoHtml = std.사진 ? `<img src="${std.사진}" class="photo-preview mx-auto">` : `<div class="no-photo mx-auto">👤</div>`;
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-3">${photoHtml}</td>
                        <td class="p-3 text-left">
                            <div class="font-bold text-slate-800">${std.name}</div>
                            <div class="text-[10px] text-slate-400">${std.grade}학년 ${std.class}반 ${std.number}번</div>
                        </td>
                        <td class="p-3"><button onclick="deleteStd(${idx})" class="text-red-400 font-bold text-xs">삭제</button></td>
                    </tr>
                `;
            });
        }

        // 🌟 사진 파일 일괄 처리 및 서버 전송
        async function handlePhotoUpload(event) {
            const files = event.target.files;
            if (!files.length) return;
            const subject = document.getElementById('selectedSubject').value;
            if (!subject) return alert("먼저 대상 과목을 선택해주세요!");

            const statusEl = document.getElementById('uploadStatus');
            let successCount = 0;

            for (let file of files) {
                // 1. 파일명에서 숫자 추출 (예: 10105_홍길동.jpg -> 10105)
                const fileNumStr = file.name.replace(/[^0-9]/g, '');
                if (fileNumStr.length < 3) continue; // 너무 짧으면 패스

                // 2. 현재 명단에서 해당 학번을 가진 학생 찾기
                // 나이스 학번 방식(10105) 또는 번호(5) 매칭
                const targetIdx = currentStudents.findIndex(s => {
                    const fullId = `${s.grade}${String(s.class).padStart(2,'0')}${String(s.number).padStart(2,'0')}`;
                    return fullId === fileNumStr || String(s.number) === fileNumStr;
                });

                if (targetIdx !== -1) {
                    statusEl.innerText = `⏳ [${file.name}] 업로드 중...`;
                    const base64 = await toBase64(file);
                    
                    const res = await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            type: "UPLOAD_PHOTO",
                            payload: {
                                subject: subject,
                                grade: currentStudents[targetIdx].grade,
                                class: currentStudents[targetIdx].class,
                                number: currentStudents[targetIdx].number,
                                name: currentStudents[targetIdx].name,
                                fileName: file.name,
                                imageBase64: base64
                            }
                        })
                    });
                    
                    const result = await res.json();
                    if (result.success) {
                        currentStudents[targetIdx].사진 = result.photoUrl;
                        successCount++;
                        renderTable();
                    }
                }
            }
            statusEl.innerText = `✅ 총 ${successCount}장의 사진 매칭 완료!`;
            alert(`사진 업로드 완료! (${successCount}명 매칭됨)`);
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        // (기타 엑셀 업로드 및 삭제 함수는 이전과 동일...)
        function setupDragAndDrop() {
            const zones = ['dropZone', 'photoDropZone'];
            zones.forEach(id => {
                const zone = document.getElementById(id);
                zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('drag-over'); });
                zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
                zone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    zone.classList.remove('drag-over');
                    if (id === 'dropZone') processExcelFile(e.dataTransfer.files[0]);
                    else handlePhotoUpload({ target: { files: e.dataTransfer.files } });
                });
            });
        }
        
        function handleFileUpload(e) { processExcelFile(e.target.files[0]); }
        function processExcelFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
                let col = { grade: -1, class: -1, num: -1, name: -1 };
                rows.forEach((row, i) => {
                    if (col.name === -1) {
                        row.forEach((cell, idx) => {
                            const v = String(cell);
                            if (v.includes("학년")) col.grade = idx;
                            if (v.includes("반")) col.class = idx;
                            if (v.includes("번호")) col.num = idx;
                            if (v.includes("성명")) col.name = idx;
                        });
                    } else if (row[col.num] && !isNaN(row[col.num])) {
                        currentStudents.push({ grade: row[col.grade], class: row[col.class], number: row[col.num], name: row[col.name] });
                    }
                });
                renderTable();
            };
            reader.readAsArrayBuffer(file);
        }
        function deleteStd(i) { currentStudents.splice(i, 1); renderTable(); }
        async function saveStudentsToServer() {
            const subject = document.getElementById('selectedSubject').value;
            if (!subject) return alert("과목 선택 필수");
            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.innerText = "저장 중...";
            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify({ type: "SAVE_STUDENTS", payload: { subject, students: currentStudents } }) });
                alert("서버 저장 완료!");
            } catch { alert("저장 실패"); }
            finally { btn.disabled = false; btn.innerText = "💾 명단 최종 저장"; }
        }
    </script>
</body>
</html>
