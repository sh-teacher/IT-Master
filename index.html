<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT 자산 관리 시스템 - 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>
        th.sortable { cursor: pointer; position: relative; white-space: nowrap; }
        th.sortable:hover { background-color: #f3f4f6; }
        th.sortable::after { content: ' ↕'; font-size: 0.8em; color: #ccc; }
        td { white-space: nowrap; }
        .note-cell { max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chart-container { position: relative; height: 280px; width: 100%; }
    </nav>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-blue-600 text-white p-4 shadow-md mb-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <span class="font-bold text-lg">📊 IT 자산 통합 관리 현황</span>
            <div class="space-x-4 text-sm font-medium">
                <a href="index.html" class="bg-blue-700 px-3 py-1 rounded">보유목록</a>
                <a href="write.html" class="hover:underline">신규등록</a>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 pb-10">
        <div id="statsSummary" class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8 text-center">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-[10px] text-gray-400 font-bold">TOTAL</p>
                <h3 id="statTotal" class="text-2xl font-black text-blue-600">0</h3>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-[10px] text-gray-400 font-bold">LAPTOP</p>
                <h3 id="statLaptop" class="text-2xl font-black text-gray-700">0</h3>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-[10px] text-gray-400 font-bold">DESKTOP</p>
                <h3 id="statDesktop" class="text-2xl font-black text-gray-700">0</h3>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-[10px] text-gray-400 font-bold">TABLET</p>
                <h3 id="statTablet" class="text-2xl font-black text-gray-700">0</h3>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-[10px] text-gray-400 font-bold">ETC</p>
                <h3 id="statPrinter" class="text-2xl font-black text-gray-700">0</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h4 class="text-sm font-bold text-gray-600 mb-4 border-l-4 border-blue-500 pl-2">🏆 모델별 보유 TOP 5 (제조사/모델)</h4>
                <div class="chart-container">
                    <canvas id="modelChart"></canvas>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h4 class="text-sm font-bold text-gray-600 mb-4 border-l-4 border-green-500 pl-2">📅 연도별 도입 추이</h4>
                <div class="chart-container">
                    <canvas id="yearChart"></canvas>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-lg border border-gray-200">
            <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                <h1 class="text-xl font-bold text-gray-800">보유 자산 상세 리스트</h1>
                <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="검색어 입력..." class="border border-gray-300 p-2 rounded-lg w-full md:w-64 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-sm">
                    <thead>
                        <tr class="bg-gray-50 text-gray-500 uppercase text-[10px] font-black tracking-widest">
                            <th class="p-4 border-b sortable" onclick="handleSort('type')">종류</th>
                            <th class="p-4 border-b sortable" onclick="handleSort('user')">사용자</th>
                            <th class="p-4 border-b sortable" onclick="handleSort('group')">부서</th>
                            <th class="p-4 border-b sortable" onclick="handleSort('brand')">제조사</th>
                            <th class="p-4 border-b sortable" onclick="handleSort('model')">모델명</th>
                            <th class="p-4 border-b sortable" onclick="handleSort('ip')">IP 주소</th>
                            <th class="p-4 border-b sortable" onclick="handleSort('date')">취득일</th>
                            <th class="p-4 border-b sortable" onclick="handleSort('note')">비고</th>
                            <th class="p-4 border-b text-center">조회</th>
                        </tr>
                    </thead>
                    <tbody id="listBody" class="text-gray-700">
                        <tr><td colspan="9" class="p-10 text-center text-gray-400 animate-pulse">데이터 로드 중...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="qrModal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-3xl text-center max-w-xs w-full shadow-2xl scale-in-center">
            <div id="modalQrCode" class="flex justify-center mb-4"></div>
            <p id="modalSnText" class="font-mono text-blue-600 font-bold mb-6 text-sm"></p>
            <button onclick="closeModal()" class="w-full bg-gray-100 py-3 rounded-xl hover:bg-gray-200 transition text-gray-600 font-bold">닫기</button>
        </div>
    </div>

    <script>
        // 플러그인 등록
        Chart.register(ChartDataLabels);

        const GAS_URL = "https://script.google.com/macros/s/AKfycbyZvgICRHPoQFHKrRX-bI27Ti9RUNWMjdMOlDTzzSNdviEjC1Gxpa0jlMYBi5bOotLyxQ/exec"; 
        let assetData = [];
        let currentSort = { column: '', ascending: true };
        let mChart, yChart;

        async function loadData() {
            try {
                const res = await fetch(GAS_URL);
                assetData = await res.json();
                updateDashboard(assetData);
                renderTable(assetData);
            } catch (err) {
                document.getElementById('listBody').innerHTML = `<tr><td colspan="9" class="p-10 text-center text-red-500 font-bold">데이터를 불러오지 못했습니다. URL을 확인하세요.</td></tr>`;
            }
        }

        function updateDashboard(data) {
            const counts = { 노트북: 0, 데스크톱: 0, 태블릿: 0, 기타: 0 };
            const modelGroups = {}; // { "브랜드|모델": {count: 0, latestDate: ""} }
            const years = {};

            data.forEach(item => {
                // 1. 유형별 카운트
                if(item.type.includes('노트북')) counts.노트북++;
                else if(item.type.includes('데스크톱')) counts.데스크톱++;
                else if(item.type.includes('태블릿')) counts.태블릿++;
                else counts.기타++;

                // 2. 모델 그룹화 (브랜드 + 모델명 조합)
                const key = `${item.brand || '기타'}|${item.model || '기타'}`;
                if(!modelGroups[key]) modelGroups[key] = 0;
                modelGroups[key]++;

                // 3. 연도별
                const year = item.date ? String(item.date).substring(0, 4) : "미등록";
                if(year !== "미등록") years[year] = (years[year] || 0) + 1;
            });

            document.getElementById('statTotal').innerText = data.length;
            document.getElementById('statLaptop').innerText = counts.노트북;
            document.getElementById('statDesktop').innerText = counts.데스크톱;
            document.getElementById('statTablet').innerText = counts.태블릿;
            document.getElementById('statPrinter').innerText = counts.기타;

            // 모델 TOP 5 가공 (라벨을 2줄로 만들기 위해 배열로 전달)
            const top5 = Object.entries(modelGroups).sort((a,b) => b[1] - a[1]).slice(0, 5);
            const modelLabels = top5.map(i => {
                const parts = i[0].split('|');
                return [parts[0], parts[1]]; // Chart.js에서 배열은 줄바꿈으로 인식
            });
            renderModelChart(modelLabels, top5.map(i => i[1]));

            // 연도 차트
            const sortedYears = Object.entries(years).sort((a,b) => a[0].localeCompare(b[0]));
            renderYearChart(sortedYears.map(i => i[0]), sortedYears.map(i => i[1]));
        }

        function renderModelChart(labels, counts) {
            const ctx = document.getElementById('modelChart').getContext('2d');
            if(mChart) mChart.destroy();
            mChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        data: counts,
                        backgroundColor: 'rgba(59, 130, 246, 0.8)',
                        borderRadius: 8,
                        barThickness: 30
                    }]
                },
                options: {
                    indexAxis: 'y',
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        datalabels: { // 숫자 표기 설정
                            anchor: 'end',
                            align: 'right',
                            color: '#3b82f6',
                            font: { weight: 'bold' },
                            formatter: (val) => val + '대'
                        }
                    },
                    scales: {
                        x: { display: false, grid: { display: false } },
                        y: { ticks: { font: { size: 10 } }, grid: { display: false } }
                    }
                }
            });
        }

        function renderYearChart(labels, counts) {
            const ctx = document.getElementById('yearChart').getContext('2d');
            if(yChart) yChart.destroy();
            yChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: counts,
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        fill: true,
                        pointRadius: 6,
                        pointBackgroundColor: '#10b981',
                        tension: 0.3
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        datalabels: { // 숫자 표기 설정
                            anchor: 'end',
                            align: 'top',
                            color: '#059669',
                            font: { weight: 'bold', size: 11 },
                            formatter: (val) => val
                        }
                    },
                    scales: {
                        y: { beginAtZero: true, ticks: { display: false }, grid: { display: false } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        function renderTable(data) {
            const tbody = document.getElementById('listBody');
            tbody.innerHTML = "";
            data.forEach(item => {
                const dateStr = item.date ? String(item.date).split('T')[0] : "-";
                const row = `
                    <tr class="border-b hover:bg-blue-50 transition text-[11px]">
                        <td class="p-4 font-bold text-blue-700">${item.type}</td>
                        <td class="p-4 font-bold text-gray-800">${item.user || '-'}</td>
                        <td class="p-4 text-gray-400">${item.group || '-'}</td>
                        <td class="p-4">${item.brand || '-'}</td>
                        <td class="p-4 font-medium">${item.model || '-'}</td>
                        <td class="p-4 font-mono text-blue-600 font-black">${item.ip || '-'}</td>
                        <td class="p-4 text-gray-400">${dateStr}</td>
                        <td class="p-4 text-gray-400"><div class="note-cell" title="${item.note || ''}">${item.note || '-'}</div></td>
                        <td class="p-4 text-center">
                            <div class="flex justify-center gap-1">
                                <a href="view.html?sn=${encodeURIComponent(item.sn)}" class="bg-gray-100 text-gray-500 px-2 py-1 rounded font-black uppercase hover:bg-gray-200">View</a>
                                <button onclick="openQR('${item.sn}')" class="bg-blue-600 text-white px-2 py-1 rounded font-black uppercase hover:bg-blue-700 shadow-sm">QR</button>
                            </div>
                        </td>
                    </tr>`;
                tbody.innerHTML += row;
            });
        }

        function handleSort(column) {
            if (currentSort.column === column) currentSort.ascending = !currentSort.ascending;
            else { currentSort.column = column; currentSort.ascending = true; }

            assetData.sort((a, b) => {
                let valA = (a[column] || "").toString();
                let valB = (b[column] || "").toString();
                return currentSort.ascending 
                    ? valA.localeCompare(valB, undefined, { numeric: true }) 
                    : valB.localeCompare(valA, undefined, { numeric: true });
            });
            renderTable(assetData);
        }

        function filterTable() {
            const input = document.getElementById("searchInput").value.toLowerCase();
            const filtered = assetData.filter(item => Object.values(item).some(v => v.toString().toLowerCase().includes(input)));
            renderTable(filtered);
        }

        function openQR(sn) {
            const currentPath = window.location.href.split('index.html')[0];
            const viewUrl = `${currentPath}view.html?sn=${encodeURIComponent(sn)}`;
            const qrImageUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(viewUrl)}`;
            document.getElementById('modalQrCode').innerHTML = `<img src="${qrImageUrl}" class="rounded-lg" />`;
            document.getElementById('modalSnText').innerText = `SN: ${sn}`;
            document.getElementById('qrModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('qrModal').classList.add('hidden'); }
        window.onload = loadData;
    </script>
</body>
</html>
