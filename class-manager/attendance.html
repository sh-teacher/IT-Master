<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>출석 및 수업 일지 - Class Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>if (sessionStorage.getItem("isAllowed") !== "true") location.href = "index.html";</script>
    <style>
        .row-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .desk { min-height: 88px; border: 2px dashed #cbd5e1; border-radius: 12px; display: flex; align-items: center; justify-content: center; padding: 4px; background: #f8fafc; position: relative; }
        .desk-empty { min-height: 88px; background: transparent; }
        .seat-num-label { position: absolute; top: 3px; left: 5px; font-size: 11px; font-weight: 700; color: #94a3b8; z-index: 10; pointer-events: none; }
        
        .card-present { background-color: #ffffff; border-color: #e2e8f0; }
        .card-absent { background-color: #fef2f2; border-color: #f87171; color: #b91c1c; }
        .card-late { background-color: #fffbeb; border-color: #fbbf24; color: #b45309; }
        .student-card { cursor: pointer; transition: all 0.2s; user-select: none; }
        .student-card:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-6">
    <div class="max-w-7xl mx-auto bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
        
        <div class="flex justify-between items-end mb-6 border-b border-slate-100 pb-4">
            <div>
                <h1 class="text-3xl font-black text-slate-800">📋 출석 및 수업 일지</h1>
                <p class="text-slate-500 mt-2 font-medium" id="currentDateTime">불러오는 중...</p>
            </div>
            <div class="flex gap-3 items-center flex-wrap justify-end">
                
                <input type="date" id="selectedDate" onchange="updatePeriodDropdown()" class="p-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold text-slate-700 focus:border-blue-500 focus:outline-none">
                
                <select id="selectedSubject" onchange="updatePeriodDropdown()" class="p-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold text-slate-700 focus:border-blue-500 focus:outline-none min-w-[200px]">
                    <option value="">과목을 선택하세요...</option>
                </select>

                <div class="flex items-center gap-2 bg-slate-50 p-3 rounded-xl border-2 border-slate-100 cursor-pointer hover:bg-slate-100 transition" onclick="document.getElementById('showAllPeriods').click()">
                    <input type="checkbox" id="showAllPeriods" onchange="updatePeriodDropdown(); event.stopPropagation();" class="w-4 h-4 cursor-pointer accent-blue-600">
                    <label for="showAllPeriods" class="text-xs font-bold text-slate-600 cursor-pointer whitespace-nowrap">모든 교시 허용</label>
                </div>

                <select id="selectedPeriod" onchange="loadClassData()" class="p-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold text-blue-600 focus:border-blue-500 focus:outline-none disabled:opacity-50 disabled:bg-slate-100">
                    <option value="">과목/날짜 선택</option>
                </select>
                
                <button onclick="autoLoadCurrentClass(this)" class="bg-emerald-100 text-emerald-700 px-5 py-3 rounded-xl font-bold hover:bg-emerald-200 transition whitespace-nowrap">
                    ⏰ 현재 수업 로드
                </button>
                <button onclick="location.href='dashboard.html'" class="bg-slate-100 text-slate-600 px-5 py-3 rounded-xl font-bold hover:bg-slate-200 transition whitespace-nowrap">
                    홈으로
                </button>
            </div>
        </div>

        <div class="flex gap-8 flex-col lg:flex-row">
            <div class="w-full lg:w-2/3 flex flex-col gap-5 border-2 border-slate-100 rounded-2xl p-6 bg-white">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-lg font-bold text-slate-700">학생 출석판 <span class="text-sm font-normal text-slate-400 ml-2">(클릭하여 상태 변경)</span></h2>
                    <div class="flex gap-4 text-sm font-bold">
                        <span class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-white border-2 border-slate-200"></div> 출석</span>
                        <span class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-red-100 border-2 border-red-400"></div> 결석</span>
                        <span class="flex items-center gap-1"><div class="w-3 h-3 rounded-full bg-amber-100 border-2 border-amber-400"></div> 지각</span>
                    </div>
                </div>
                
                <div id="board" class="bg-emerald-800 text-white text-center py-3 rounded-xl font-black text-lg shadow-inner">칠 판 (교탁)</div>
                <div id="classroomGrid" class="flex flex-col gap-3"></div>
            </div>

            <div class="w-full lg:w-1/3 flex flex-col gap-6">
                <div class="bg-slate-50 border border-slate-200 rounded-2xl p-5 flex-1 flex flex-col">
                    <h2 class="text-lg font-bold text-slate-700 mb-3">📝 해당 시간 수업 일지</h2>
                    <textarea id="classLog" class="flex-1 w-full p-4 rounded-xl border border-slate-300 focus:border-blue-500 focus:outline-none resize-none" placeholder="수업 진도, 특이사항, 학생 관찰 내용 등을 기록하세요."></textarea>
                </div>

                <div class="bg-red-50 border border-red-100 rounded-2xl p-5 min-h-[250px] max-h-[350px] overflow-y-auto">
                    <h2 class="text-lg font-bold text-red-800 mb-3">🚨 특이사항 (결석/지각)</h2>
                    <ul id="absenceList" class="space-y-2">
                        <li class="text-sm text-red-400 text-center py-4">과목을 선택해주세요.</li>
                    </ul>
                </div>

                <button onclick="saveDailyRecord()" id="saveBtn" class="w-full bg-blue-600 text-white px-6 py-4 rounded-xl font-black text-lg hover:bg-blue-700 transition shadow-lg">
                    💾 출석 및 일지 저장하기
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxUgpimLYy_9K_vZjbxJYtImA4fcz3ZZxfXPvy9WlYXLv1dY-yBA6yrtHeybyAo1v_Vpg/exec";

        const ROW_CONFIG = [
            { desks: 6, empty: 1 }, { desks: 6, empty: 1 },
            { desks: 7, empty: 0 }, { desks: 7, empty: 0 },
        ];
        const TOTAL_SEATS = ROW_CONFIG.reduce((a, r) => a + r.desks, 0);
        
        let attendanceData = {}; 
        let fullSchedule = []; 

        window.onload = async function () {
            const today = new Date();
            document.getElementById('selectedDate').value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

            updateDateTime();
            setInterval(updateDateTime, 1000 * 60); 
            createDesks();

            try {
                const [subRes, schRes] = await Promise.all([
                    fetch(`${API_URL}?type=GET_SUBJECTS`),
                    fetch(`${API_URL}?type=GET_SCHEDULE`)
                ]);
                
                const subjects = await subRes.json();
                fullSchedule = await schRes.json(); 
                
                const sel = document.getElementById('selectedSubject');
                subjects.forEach(s => {
                    const o = document.createElement('option');
                    o.value = s.fullName; o.innerText = s.fullName;
                    sel.appendChild(o);
                });

                const urlParams = new URLSearchParams(window.location.search);
                const targetSubject = urlParams.get('subject');
                if(targetSubject) {
                    sel.value = targetSubject;
                    updatePeriodDropdown(); 
                }
            } catch { console.log("초기 데이터 로드 실패"); }
        };

        function updateDateTime() {
            const now = new Date();
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            const dateStr = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 (${days[now.getDay()]}요일)`;
            document.getElementById('currentDateTime').innerText = `${dateStr} ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;
        }

        // 🌟 수정됨: 체크박스 값에 따라 전체 교시를 보여주거나 필터링합니다.
        function updatePeriodDropdown() {
            const subject = document.getElementById('selectedSubject').value;
            const dateVal = document.getElementById('selectedDate').value;
            const periodSelect = document.getElementById('selectedPeriod');
            const showAll = document.getElementById('showAllPeriods').checked; // 체크박스 상태
            
            periodSelect.innerHTML = '';

            if (!subject || !dateVal) {
                periodSelect.innerHTML = '<option value="">과목/날짜 선택</option>';
                periodSelect.disabled = true;
                clearBoard();
                return;
            }

            const dateObj = new Date(dateVal);
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            const dayStr = days[dateObj.getDay()];

            const matchedPeriods = fullSchedule.filter(s => s.subject === subject && s.day === dayStr);

            if (!showAll && matchedPeriods.length === 0) {
                periodSelect.innerHTML = `<option value="">${dayStr}요일 수업 없음</option>`;
                periodSelect.disabled = true;
                clearBoard(); 
            } else {
                periodSelect.disabled = false;
                
                if (showAll) {
                    // 체크박스가 켜져있으면 1~7교시 전부 렌더링
                    for (let i = 1; i <= 7; i++) {
                        periodSelect.innerHTML += `<option value="${i}">${i}교시</option>`;
                    }
                } else {
                    // 체크박스가 꺼져있으면 원래대로 시간표 기반 렌더링
                    matchedPeriods.sort((a, b) => parseInt(a.period) - parseInt(b.period));
                    matchedPeriods.forEach(p => {
                        periodSelect.innerHTML += `<option value="${p.period}">${p.period}교시</option>`;
                    });
                }
                
                loadClassData();
            }
        }

        function clearBoard() {
            document.querySelectorAll('.desk .student-card').forEach(c => c.remove());
            document.getElementById('classLog').value = '';
            document.getElementById('absenceList').innerHTML = '<li class="text-sm text-red-400 text-center py-4">해당 요일에 등록된 수업이 없습니다.</li>';
        }

        function autoLoadCurrentClass(btnElement) {
            const now = new Date();
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            const currentDay = days[now.getDay()];
            
            const h = now.getHours();
            const currentPeriod = String(h > 8 ? h - 8 : 1); 

            const targetClass = fullSchedule.find(s => s.day === currentDay && String(s.period) === currentPeriod);

            if (targetClass) {
                document.getElementById('selectedDate').value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
                document.getElementById('selectedSubject').value = targetClass.subject;
                
                // 자동 로드 시에는 '모든 교시 허용' 체크를 해제하고 정확한 시간표대로 띄웁니다.
                document.getElementById('showAllPeriods').checked = false;
                
                updatePeriodDropdown(); 
                document.getElementById('selectedPeriod').value = currentPeriod;
                loadClassData(); 
                alert(`⏰ ${currentDay}요일 ${currentPeriod}교시: [${targetClass.subject}] 과목을 불러왔습니다.`);
            } else {
                alert(`현재 시간(${currentDay}요일 ${currentPeriod}교시 기준)에 등록된 시간표가 없습니다.`);
            }
        }

        function createDesks() {
            const grid = document.getElementById('classroomGrid');
            grid.innerHTML = '';
            let seatIdx = 0;

            ROW_CONFIG.forEach((rowCfg) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row-grid';

                for (let c = 0; c < rowCfg.desks; c++) {
                    const desk = document.createElement('div');
                    desk.className = 'desk';
                    desk.dataset.seatIndex = seatIdx;
                    
                    const numLabel = document.createElement('span');
                    numLabel.className = 'seat-num-label';
                    numLabel.innerText = seatIdx + 1;
                    desk.appendChild(numLabel);

                    rowDiv.appendChild(desk);
                    seatIdx++;
                }
                for (let e = 0; e < rowCfg.empty; e++) {
                    const empty = document.createElement('div');
                    empty.className = 'desk-empty';
                    rowDiv.appendChild(empty);
                }
                grid.appendChild(rowDiv);
            });
        }

        async function loadClassData() {
            const subject = document.getElementById('selectedSubject').value;
            const targetDate = document.getElementById('selectedDate').value;
            const period = document.getElementById('selectedPeriod').value;

            if (!subject || !targetDate || !period) return;

            attendanceData = {};
            document.getElementById('classLog').value = '데이터 불러오는 중...';
            document.querySelectorAll('.desk .student-card').forEach(c => c.remove());

            try {
                const [sr, seatingR, recordR] = await Promise.all([
                    fetch(`${API_URL}?type=GET_STUDENTS&subject=${encodeURIComponent(subject)}`),
                    fetch(`${API_URL}?type=GET_SEATING&subject=${encodeURIComponent(subject)}`),
                    fetch(`${API_URL}?type=GET_DAILY_RECORD&subject=${encodeURIComponent(subject)}&date=${targetDate}&period=${period}`)
                ]);
                
                const students = await sr.json();
                const savedSeating = await seatingR.json();
                const recordData = await recordR.json();
                
                let savedRecord = recordData.success ? recordData.data : null;

                document.getElementById('classLog').value = savedRecord ? savedRecord.log : '';

                const issueMap = {};
                if(savedRecord && savedRecord.attendanceIssues) {
                    savedRecord.attendanceIssues.forEach(issue => {
                        issueMap[String(issue.number).trim()] = issue;
                    });
                }

                const desks = document.querySelectorAll('.desk');

                students.forEach((std) => {
                    const stdNum = String(std.number).trim();
                    const seat = savedSeating.find(s => String(s.name).trim() === String(std.name).trim() && String(s.number).trim() === stdNum);
                    
                    if (seat && seat.seatIndex >= 0 && seat.seatIndex < TOTAL_SEATS) {
                        
                        const savedIssue = issueMap[stdNum];
                        
                        attendanceData[std.number] = {
                            name: std.name,
                            class: std.class,
                            number: std.number,
                            status: savedIssue ? savedIssue.status : 'present', 
                            memo: savedIssue ? savedIssue.memo : ''
                        };

                        const card = document.createElement('div');
                        const statusClass = `card-${attendanceData[std.number].status}`;
                        card.className = `student-card w-full h-full flex flex-col items-center justify-center rounded-lg border-2 font-bold text-slate-700 ${statusClass}`;
                        card.style.height = "62px";
                        card.innerHTML = `
                            <span class="text-[11px] opacity-70 block mb-0.5 pointer-events-none">${std.class}반 ${std.number}번</span>
                            <span class="pointer-events-none text-sm">${std.name}</span>
                        `;
                        
                        card.onclick = function() { toggleAttendance(card, std.number); };
                        desks[seat.seatIndex].appendChild(card);
                    }
                });

                updateAbsenceList();

            } catch (e) {
                console.error(e);
                alert("데이터 로드 오류가 발생했습니다.");
                document.getElementById('classLog').value = '';
            }
        }

        function toggleAttendance(card, stdNumber) {
            const student = attendanceData[stdNumber];
            
            if (student.status === 'present') {
                student.status = 'absent';
                const reason = prompt(`[결석] ${student.name} 학생의 결석 사유를 입력하세요 (선택):`, "질병결석");
                student.memo = reason || "사유 미입력";
            } else if (student.status === 'absent') {
                student.status = 'late';
                const reason = prompt(`[지각] ${student.name} 학생의 지각 사유를 입력하세요 (선택):`, "지각");
                student.memo = reason || "사유 미입력";
            } else {
                student.status = 'present';
                student.memo = '';
            }

            card.classList.remove('card-present', 'card-absent', 'card-late');
            card.classList.add(`card-${student.status}`);
            updateAbsenceList();
        }

        function updateAbsenceList() {
            const list = document.getElementById('absenceList');
            list.innerHTML = '';
            let hasIssue = false;
            
            Object.values(attendanceData).forEach(std => {
                if (std.status !== 'present') {
                    hasIssue = true;
                    const li = document.createElement('li');
                    li.className = `p-3 rounded-lg text-sm font-bold border ${std.status === 'absent' ? 'bg-red-100 text-red-800 border-red-200' : 'bg-amber-50 text-amber-800 border-amber-200'}`;
                    const badge = std.status === 'absent' ? '❌ 결석' : '⚠️ 지각';
                    li.innerHTML = `
                        <div class="flex justify-between items-center mb-1">
                            <span>${std.class}반 ${std.number}번 ${std.name}</span>
                            <span class="text-xs px-2 py-1 bg-white rounded-md bg-opacity-50">${badge}</span>
                        </div>
                        <div class="text-xs font-normal opacity-80 mt-1">사유: ${std.memo}</div>
                    `;
                    list.appendChild(li);
                }
            });

            if (!hasIssue) {
                list.innerHTML = '<li class="text-sm text-red-400 text-center py-4">현재 결석 및 지각생이 없습니다.</li>';
            }
        }

        async function saveDailyRecord() {
            const subject = document.getElementById('selectedSubject').value;
            const targetDate = document.getElementById('selectedDate').value;
            const period = document.getElementById('selectedPeriod').value; 

            if (!subject || !period) return alert("저장할 과목과 교시가 올바르게 선택되었는지 확인해주세요.");

            const classLog = document.getElementById('classLog').value;
            const btn = document.getElementById('saveBtn');
            const issues = Object.values(attendanceData).filter(std => std.status !== 'present');

            btn.innerText = "저장 중...";
            btn.disabled = true;

            const payload = {
                date: targetDate,
                period: period,
                subject: subject,
                log: classLog,
                attendanceIssues: issues
            };

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ type: "SAVE_DAILY_RECORD", payload: payload })
                });
                const r = await res.json();
                if(r.success) {
                    alert(`✅ [${targetDate} / ${period}교시] 저장이 완료되었습니다!`);
                } else {
                    alert("❌ 저장 실패: " + r.msg);
                }
            } catch (e) {
                alert("저장 중 네트워크 오류 발생");
            } finally {
                btn.innerText = "💾 출석 및 일지 저장하기";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
