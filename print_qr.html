<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR코드 일괄 출력 - IT Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* 웹 화면에서 미리보기 스타일 */
        body { background-color: #f3f4f6; }
        .page-preview {
            width: 210mm;
            min-height: 297mm;
            padding: 10mm;
            margin: 20px auto;
            background: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        /* A4 5x6 그리드 설정 */
        .qr-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 5mm; /* 라벨지 간격에 맞춰 조절 가능 */
            height: 100%;
        }
        .qr-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px dashed #ccc; /* 자르기 편하게 점선 표시 */
            padding: 5px;
            height: 42mm; /* A4 6줄 기준 높이 */
        }
        .qr-item img { max-width: 100%; max-height: 70%; }

        /* ★ 실제 프린터로 인쇄할 때 적용되는 스타일 */
        @media print {
            @page { size: A4; margin: 10mm; }
            body { background: white; margin: 0; padding: 0; }
            .no-print { display: none !important; }
            .page-preview {
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
                box-shadow: none;
                page-break-after: always; /* 페이지가 넘어가면 강제로 다음 장으로 */
            }
            .qr-item { border: 1px solid #eee; } /* 인쇄 시에는 연한 실선으로 */
        }
    </style>
</head>
<body>
    <div class="bg-gray-800 text-white p-4 sticky top-0 z-50 no-print flex justify-between items-center shadow-md">
        <div class="font-bold">🖨️ QR코드 A4 일괄 출력 (5x6)</div>
        <div class="space-x-2">
            <button onclick="location.href='sangildevice.html'" class="bg-gray-600 px-4 py-2 rounded hover:bg-gray-500 font-bold text-sm">돌아가기</button>
            <button onclick="window.print()" class="bg-blue-500 px-4 py-2 rounded hover:bg-blue-400 font-bold text-sm">인쇄하기 (Ctrl+P)</button>
        </div>
    </div>

    <div id="loader" class="text-center mt-20 text-gray-500 font-bold animate-pulse no-print">데이터를 불러와 QR코드를 생성 중입니다...</div>

    <div id="printArea"></div>

    <script>
        // ★ 선생님의 GAS URL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyZvgICRHPoQFHKrRX-bI27Ti9RUNWMjdMOlDTzzSNdviEjC1Gxpa0jlMYBi5bOotLyxQ/exec"; 
        
        async function loadAndGenerateQR() {
            const savedPw = sessionStorage.getItem('asset_pw');
            if (!savedPw) {
                alert("인증이 필요합니다.");
                location.href = 'login.html';
                return;
            }

            try {
                // 1. 데이터 불러오기
                const res = await fetch(`${GAS_URL}?pw=${encodeURIComponent(savedPw)}`);
                const text = await res.text();
                if (text === "인증 실패") throw new Error("인증 실패");
                
                let data = JSON.parse(text);

                // 2. 관리번호(id) 숫자 기준으로 오름차순 정렬
                data.sort((a, b) => parseInt(a.id) - parseInt(b.id));

                document.getElementById('loader').style.display = 'none';
                
                const printArea = document.getElementById('printArea');
                const ITEMS_PER_PAGE = 30; // 5 x 6
                
                // 3. 30개씩 잘라서 페이지(A4) 만들기
                for (let i = 0; i < data.length; i += ITEMS_PER_PAGE) {
                    const pageData = data.slice(i, i + ITEMS_PER_PAGE);
                    
                    // A4 용지 1장 생성
                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'page-preview';
                    
                    // 그리드 컨테이너 생성
                    const gridDiv = document.createElement('div');
                    gridDiv.className = 'qr-grid';

                    // QR 아이템 렌더링
                    pageData.forEach(item => {
                        const cell = document.createElement('div');
                        cell.className = 'qr-item';

                        // 상단 텍스트 (관리번호)
                        const title = document.createElement('div');
                        title.className = 'text-xs font-bold mb-1 font-mono tracking-tighter text-gray-800';
                        title.innerText = `관리번호: ${item.id}`; // 번호와 모델명 간략히 표시

                        // QR 코드가 그려질 빈 공간
                        const qrDiv = document.createElement('div');
                        
                        cell.appendChild(title);
                        cell.appendChild(qrDiv);
                        gridDiv.appendChild(cell);

                        // 생성할 URL 조합
                        const currentUrl = window.location.origin + window.location.pathname.replace('print_qr.html', '');
                        const viewUrl = `${currentUrl}view.html?id=${item.id}`;

                        // QR코드 라이브러리로 즉시 그리기
                        setTimeout(() => {
                            new QRCode(qrDiv, {
                                text: viewUrl,
                                width: 100,   // 크기 조절 (라벨지 사이즈에 맞게)
                                height: 100,
                                colorDark : "#000000",
                                colorLight : "#ffffff",
                                correctLevel : QRCode.CorrectLevel.L
                            });
                        }, 10); // 렌더링 꼬임 방지용 약간의 지연
                    });

                    pageDiv.appendChild(gridDiv);
                    printArea.appendChild(pageDiv);
                }

            } catch (err) {
                alert("데이터를 불러오지 못했습니다. 다시 로그인해 주세요.");
                location.href = 'login.html';
            }
        }

        window.onload = loadAndGenerateQR;
    </script>
</body>
</html>
