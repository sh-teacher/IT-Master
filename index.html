<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT 자산 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://rawgit.com/davidshimjs/qrcodejs/master/qrcode.min.js"></script>
</head>
<body class="bg-gray-100 p-4 md:p-10">
    <div class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-lg">
        <h1 class="text-2xl font-bold mb-6 text-blue-600">💻 IT 자산 등록 및 QR 관리</h1>
        
        <form id="assetForm" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <select id="assetType" class="border p-3 rounded-lg" onchange="updateFormLayout()">
                    <option value="노트북">노트북</option>
                    <option value="데스크톱">데스크톱PC (+모니터)</option>
                    <option value="태블릿">태블릿</option>
                    <option value="프린터">프린터/복합기</option>
                </select>
                <input type="text" id="user" placeholder="사용자 성명" class="border p-3 rounded-lg" required>
                <input type="text" id="group" placeholder="부서명" class="border p-3 rounded-lg">
                <input type="date" id="date" class="border p-3 rounded-lg">
                <input type="text" id="brand" placeholder="제조사" class="border p-3 rounded-lg">
                <input type="text" id="model" placeholder="모델명" class="border p-3 rounded-lg">
                <input type="text" id="sn" placeholder="시리얼 번호(S/N)" class="border p-3 rounded-lg">
                <input type="text" id="ip" placeholder="IP (10.120.3.XXX)" class="border p-3 rounded-lg">
            </div>

            <div id="monitorSection" class="hidden bg-gray-50 p-4 rounded-lg">
                <h3 class="font-bold mb-2">🖥️ 연결 모니터</h3>
                <input type="text" id="m_brand" placeholder="모니터 제조사" class="border p-2 rounded w-full mb-2">
                <input type="text" id="m_model" placeholder="모니터 모델명" class="border p-2 rounded w-full">
            </div>

            <textarea id="note" placeholder="비고" class="border p-3 rounded-lg w-full"></textarea>
            
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700">
                자산 등록 및 QR 생성
            </button>
        </form>

        <div id="qrResult" class="hidden mt-10 p-6 border-2 border-dashed border-gray-300 rounded-xl text-center">
            <h3 class="font-bold mb-4">등록 완료! 기기 부착용 QR:</h3>
            <div id="qrcode" class="flex justify-center mb-4"></div>
            <p id="qrText" class="text-sm font-mono text-blue-600"></p>
            <button onclick="location.reload()" class="mt-4 bg-gray-200 px-4 py-2 rounded text-sm">새로 등록하기</button>
        </div>
    </div>

    <script>
        // *** 중요: 새로 배포한 주소를 따옴표 안에 '한 줄로' 넣으세요 ***
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyZvgICRHPoQFHKrRX-bI27Ti9RUNWMjdMOlDTzzSNdviEjC1Gxpa0jlMYBi5bOotLyxQ/exec";

        function updateFormLayout() {
            const type = document.getElementById('assetType').value;
            document.getElementById('monitorSection').classList.toggle('hidden', type !== '데스크톱');
        }

        document.getElementById('assetForm').onsubmit = function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; // 중복 클릭 방지
            btn.innerText = "전송 중...";

            const assetType = document.getElementById('assetType').value;
            const snVal = document.getElementById('sn').value || "N/A";
            const data = {
                user: document.getElementById('user').value,
                group: document.getElementById('group').value,
                date: document.getElementById('date').value,
                note: document.getElementById('note').value,
                type: assetType,
                brand: document.getElementById('brand').value,
                model: document.getElementById('model').value,
                sn: snVal,
                ip: document.getElementById('ip').value
            };

            const items = [data];
            if (assetType === '데스크톱') {
                items.push({ ...data, type: '모니터(세트)', brand: document.getElementById('m_brand').value, model: document.getElementById('m_model').value, sn: '본체연결', linkedId: snVal });
            }

            // 구글 서버로 전송
            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ items, ip: data.ip })
            }).then(() => {
                setTimeout(() => {
                    Swal.fire("성공", "시트에 등록되었습니다.", "success");
                    showQR(data);
                    btn.disabled = false;
                    btn.innerText = "자산 등록 및 QR 생성";
                }, 800);
            }).catch(err => {
                alert("전송 에러: " + err);
                btn.disabled = false;
            });
        };

        function showQR(data) {
            const qrDiv = document.getElementById('qrcode');
            qrDiv.innerHTML = ""; // 초기화
            
            // 데이터가 너무 길면 QR이 깨지므로 핵심 정보만
            const text = `유형:${data.type}\n사용자:${data.user}\nS/N:${data.sn}\n날짜:${data.date}`;
            
            try {
                if(typeof QRCode === "undefined") {
                    alert("QR 라이브러리 로딩 중입니다. 잠시 후 다시 시도하세요.");
                    return;
                }
                new QRCode(qrDiv, { text: text, width: 150, height: 150 });
                document.getElementById('qrText').innerText = `S/N: ${data.sn}`;
                document.getElementById('qrResult').classList.remove('hidden');
                window.scrollTo(0, document.body.scrollHeight);
            } catch(e) {
                console.error(e);
            }
        }
    </script>
</body>
</html>
