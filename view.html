<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자산 상세 정보 조회</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-gray-800 text-white p-4 shadow-md mb-6">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <span class="font-bold">자산 정보 조회</span>
            <a href="list.html" class="text-sm bg-gray-700 px-3 py-1 rounded">목록으로</a>
        </div>
    </nav>

    <div class="max-w-md mx-auto p-4">
        <div id="loader" class="text-center py-10 text-gray-500">데이터를 찾는 중...</div>
        
        <div id="content" class="hidden bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
            <div class="bg-blue-600 p-8 text-white text-center">
                <div id="v_type" class="inline-block bg-blue-400 px-3 py-1 rounded-full text-xs mb-2">노트북</div>
                <h2 id="v_model_full" class="text-2xl font-bold">제조사 모델명</h2>
            </div>

            <div class="p-6 space-y-5">
                <div class="flex flex-col border-b pb-2">
                    <span class="text-gray-400 text-xs uppercase tracking-wider">사용자 / 부서</span>
                    <span class="font-bold text-gray-800 text-lg"><span id="v_user">-</span> (<span id="v_group">-</span>)</span>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col border-b pb-2">
                        <span class="text-gray-400 text-xs uppercase tracking-wider">취득일자</span>
                        <span id="v_date" class="font-medium text-gray-700">-</span>
                    </div>
                    <div class="flex flex-col border-b pb-2">
                        <span class="text-gray-400 text-xs uppercase tracking-wider">IP 주소</span>
                        <span id="v_ip" class="font-medium text-gray-700">-</span>
                    </div>
                </div>

                <div class="flex flex-col bg-gray-50 p-4 rounded-xl">
                    <span class="text-gray-400 text-xs uppercase tracking-wider mb-1">시리얼 번호 (S/N)</span>
                    <span id="v_sn" class="font-mono text-blue-600 font-bold text-sm tracking-tighter">-</span>
                </div>

                <div class="flex flex-col pt-2">
                    <span class="text-gray-400 text-xs uppercase tracking-wider">비고</span>
                    <p id="v_note" class="text-gray-600 text-sm mt-1">-</p>
                </div>
            </div>

            <div class="p-4 bg-gray-50 text-center">
                <button onclick="window.print()" class="text-xs text-blue-500 font-bold border border-blue-200 px-4 py-2 rounded-lg">정보 인쇄하기</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "본인의_GAS_URL_입력"; // 반드시 수정!
        const urlParams = new URLSearchParams(window.location.search);
        const sn = urlParams.get('sn');

        if (sn) {
            fetch(`${GAS_URL}?sn=${encodeURIComponent(sn)}`)
                .then(res => res.json())
                .then(data => {
                    if(data.result === "error") throw new Error();
                    
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('content').classList.remove('hidden');
                    
                    document.getElementById('v_type').innerText = data.type;
                    document.getElementById('v_model_full').innerText = `${data.brand} ${data.model}`;
                    document.getElementById('v_user').innerText = data.user || "미지정";
                    document.getElementById('v_group').innerText = data.group || "소속없음";
                    
                    // 날짜 형식 예쁘게 처리 (2024-03-25T... -> 2024-03-25)
                    const dateRaw = new String(data.date);
                    document.getElementById('v_date').innerText = dateRaw.split('T')[0] || "-";
                    
                    document.getElementById('v_sn').innerText = data.sn;
                    document.getElementById('v_ip').innerText = data.ip || "N/A";
                    document.getElementById('v_note').innerText = data.note || "특이사항 없음";
                })
                .catch(() => {
                    document.getElementById('loader').innerHTML = "<p class='text-red-500'>데이터를 찾을 수 없습니다.<br><br><a href='list.html' class='underline'>목록으로 돌아가기</a></p>";
                });
        }
    </script>
</body>
</html>
