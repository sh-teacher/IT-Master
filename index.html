<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT 자산 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-gray-100 p-4 md:p-10">
    <div class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-lg border border-gray-200">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">💻 IT 자산 등록 시스템</h1>
        
        <form id="assetForm" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <select id="assetType" class="border p-3 rounded-lg w-full" onchange="updateFormLayout()">
                    <option value="노트북">노트북</option>
                    <option value="데스크톱">데스크톱PC (+모니터)</option>
                    <option value="태블릿">태블릿</option>
                    <option value="프린터">프린터/복합기</option>
                </select>
                <input type="text" id="user" placeholder="사용자 성명" class="border p-3 rounded-lg" required>
                <input type="text" id="group" placeholder="부서/그룹명" class="border p-3 rounded-lg">
                <input type="date" id="date" class="border p-3 rounded-lg">
                <input type="text" id="brand" placeholder="제조사" class="border p-3 rounded-lg">
                <input type="text" id="model" placeholder="모델명" class="border p-3 rounded-lg">
                <input type="text" id="sn" placeholder="시리얼 번호 (S/N)" class="border p-3 rounded-lg">
                <input type="text" id="ip" placeholder="IP (10.120.3.XXX)" class="border p-3 rounded-lg">
            </div>

            <div id="monitorSection" class="hidden bg-blue-50 p-4 rounded-lg">
                <h3 class="font-bold mb-2">🖥️ 연결 모니터</h3>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="m_brand" placeholder="모니터 제조사" class="border p-2 rounded">
                    <input type="text" id="m_model" placeholder="모니터 모델명" class="border p-2 rounded">
                </div>
            </div>

            <textarea id="note" placeholder="비고" class="border p-3 rounded-lg w-full"></textarea>
            
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition">
                자산 등록 및 QR 생성
            </button>
        </form>

        <div id="qrResult" class="hidden mt-10 p-6 border-2 border-dashed border-gray-300 rounded-xl text-center">
            <h3 class="font-bold mb-4">등록 완료! 기기 부착용 QR:</h3>
            <div id="qrcode" class="flex justify-center mb-4"></div>
            <p id="qrText" class="text-sm font-mono text-gray-600"></p>
            <button onclick="location.reload()" class="mt-4 text-blue-600 underline">새로 등록하기</button>
        </div>
    </div>

    <script>
        // 주소를 "한 줄"로 정확히 입력하세요!
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxCMTkkOjjoQBNUmGI9pawl0SRofvwCsdzEU0-HMrtIFqVHeEAJeNzOx1iDaaA37lUikFw/exec";

        function updateFormLayout() {
            const type = document.getElementById('assetType').value;
            document.getElementById('monitorSection').classList.toggle('hidden', type !== '데스크톱');
        }

        document.getElementById('assetForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // 1. 데이터 수집
            const assetType = document.getElementById('assetType').value;
            const snValue = document.getElementById('sn').value || "N/A";
            
            const commonData = {
                user: document.getElementById('user').value,
                group: document.getElementById('group').value,
                date: document.getElementById('date').value,
                note: document.getElementById('note').value
            };

            const items = [{
                ...commonData,
                type: assetType,
                brand: document.getElementById('brand').value,
                model: document.getElementById('model').value,
                sn: snValue,
                ip: document.getElementById('ip').value
            }];

            if (assetType === '데스크톱') {
                items.push({
                    ...commonData,
                    type: '모니터(세트)',
                    brand: document.getElementById('m_brand').value,
                    model: document.getElementById('m_model').value,
                    sn: "본체연결",
                    linkedId: snValue
                });
            }

            // 2. 전송 시작 (로딩바)
            Swal.fire({ title: '전송 중...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

            // 3. fetch 전송 (응답 무시 모드)
            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ items, ip: document.getElementById('ip').value })
            }).then(() => {
                // 전송 후 0.5초 뒤 성공 처리
                setTimeout(() => {
                    Swal.fire("성공", "데이터가 시트에 저장되었습니다.", "success");
                    showQRCode(items[0]);
                }, 500);
            }).catch(err => {
                Swal.fire("오류", "전송 실패: " + err, "error");
            });
        });

        function showQRCode(data) {
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = ""; // 기존 QR코드 삭제 (중요!)
            
            // QR 데이터 생성
            const qrContent = `유형:${data.type}\n사용자:${data.user}\nS/N:${data.sn}\n날짜:${data.date}`;
            
            try {
                new QRCode(qrContainer, {
                    text: qrContent,
                    width: 160,
                    height: 160
                });
                document.getElementById('qrText').innerText = `S/N: ${data.sn}`;
                document.getElementById('qrResult').classList.remove('hidden');
                
                // 화면 아래로 스크롤
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            } catch (e) {
                console.error("QR 생성 실패:", e);
                alert("QR코드 생성 중 오류가 발생했습니다.");
            }
        }
    </script>
</body>
</html>
