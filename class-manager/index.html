<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Class Manager - 보안 접속</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 h-screen flex items-center justify-center">
    <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-sm border border-slate-200">
        <div class="text-center mb-8">
            <span class="text-5xl">🔐</span>
            <h1 class="text-2xl font-black mt-4 text-slate-800">시스템 접속</h1>
            <p class="text-slate-400 text-sm mt-1">관리자 인증이 필요합니다.</p>
        </div>

        <div class="space-y-4">
            <input type="password" id="pwInput" 
                   class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 focus:outline-none transition" 
                   placeholder="비밀번호 입력"
                   onkeyup="if(window.event.keyCode==13){login()}">
            
            <button onclick="login()" id="loginBtn" 
                    class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl hover:bg-blue-700 transition transform active:scale-95 shadow-lg shadow-blue-100">
                인증 및 접속
            </button>
        </div>
        <p id="msg" class="text-red-500 mt-4 text-sm hidden text-center font-bold">⚠️ 암호가 일치하지 않습니다.</p>
    </div>

    <script>
        // 🔗 선생님의 Apps Script 웹 앱 URL을 넣으세요
        const API_URL = "https://script.google.com/macros/s/AKfycbxUgpimLYy_9K_vZjbxJYtImA4fcz3ZZxfXPvy9WlYXLv1dY-yBA6yrtHeybyAo1v_Vpg/exec";

        async function login() {
            const pw = document.getElementById('pwInput').value;
            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('msg');

            if(!pw) return;

            btn.innerText = "인증 처리 중...";
            btn.disabled = true;
            msg.classList.add('hidden');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ type: "CHECK_PW", payload: { password: pw } })
                });
                const result = await response.json();

                if (result.success) {
                    sessionStorage.setItem("isAllowed", "true"); // 인증 토큰 발행
                    location.href = "setup.html"; // 다음 페이지로 이동
                } else {
                    msg.classList.remove('hidden');
                    btn.innerText = "인증 및 접속";
                    btn.disabled = false;
                    document.getElementById('pwInput').value = "";
                }
            } catch (e) {
                alert("네트워크 연결을 확인해주세요.");
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
