<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자산 보유 현황 - IT Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        th.sortable { cursor: pointer; position: relative; white-space: nowrap; }
        th.sortable:hover { background-color: #f3f4f6; }
        th.sortable::after { content: ' ↕'; font-size: 0.8em; color: #ccc; }
        /* 테이블 텍스트 줄바꿈 방지 */
        td { white-space: nowrap; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-blue-600 text-white p-4 shadow-md mb-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <span class="font-bold text-lg">📋 전체 자산 관리 대장</span>
            <div class="space-x-4 text-sm font-medium">
                <a href="index.html" class="hover:underline">등록</a>
                <a href="list.html" class="bg-blue-700 px-3 py-1 rounded">목록현황</a>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto bg-white p-6 rounded-xl shadow-lg border border-gray-200">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <h1 class="text-xl font-bold text-gray-800">보유 자산 리스트</h1>
            <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="검색어 입력..." class="border border-gray-300 p-2 rounded-lg w-full md:w-64 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse text-sm">
                <thead>
                    <tr class="bg-gray-100 text-gray-600 uppercase text-xs">
                        <th class="p-4 border-b sortable" onclick="handleSort('type')">종류</th>
                        <th class="p-4 border-b sortable" onclick="handleSort('user')">사용자</th>
                        <th class="p-4 border-b sortable" onclick="handleSort('group')">부서</th>
                        <th class="p-4 border-b sortable" onclick="handleSort('brand')">제조사</th>
                        <th class="p-4 border-b sortable" onclick="handleSort('model')">모델명</th>
                        <th class="p-4 border-b sortable" onclick="handleSort('ip')">IP 주소</th>
                        <th class="p-4 border-b sortable" onclick="handleSort('date')">취득일</th>
                        <th class="p-4 border-b text-center">관리</th>
                    </tr>
                </thead>
                <tbody id="listBody" class="text-gray-700">
                    <tr><td colspan="8" class="p-10 text-center text-gray-400">데이터를 불러오는 중...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="qrModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-2xl text-center max-w-xs w-full shadow-2xl">
            <div id="modalQrCode" class="flex justify-center mb-4"></div>
            <p id="modalSnText" class="font-mono text-blue-600 font-bold mb-6"></p>
            <button onclick="closeModal()" class="w-full bg-gray-200 py-2 rounded-lg hover:bg-gray-300 transition text-gray-700 font-bold">닫기</button>
        </div>
    </div>
    
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyZvgICRHPoQFHKrRX-bI27Ti9RUNWMjdMOlDTzzSNdviEjC1Gxpa0jlMYBi5bOotLyxQ/exec"; 
        let assetData = [];
        let currentSort = { column: '', ascending: true };

        async function loadData() {
            try {
                const res = await fetch(GAS_URL);
                assetData = await res.json();
                renderTable(assetData);
            } catch (err) {
                document.getElementById('listBody').innerHTML = `<tr><td colspan="8" class="p-10 text-center text-red-500 font-bold">데이터 로드 실패</td></tr>`;
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('listBody');
            tbody.innerHTML = "";

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="p-10 text-center text-gray-400">표시할 데이터가 없습니다.</td></tr>`;
                return;
            }

            data.forEach(item => {
                const dateStr = item.date ? String(item.date).split('T')[0] : "-";
                const row = `
                    <tr class="border-b hover:bg-blue-50 transition">
                        <td class="p-4 font-semibold text-blue-700">${item.type}</td>
                        <td class="p-4">${item.user}</td>
                        <td class="p-4 text-gray-500">${item.group || '-'}</td>
                        <td class="p-4">${item.brand}</td>
                        <td class="p-4 font-medium">${item.model}</td>
                        <td class="p-4 font-mono text-xs text-blue-600 font-bold">${item.ip || '-'}</td>
                        <td class="p-4 text-xs text-gray-400">${dateStr}</td>
                        <td class="p-4 text-center">
                            <div class="flex justify-center gap-1">
                                <a href="view.html?sn=${encodeURIComponent(item.sn)}" class="bg-gray-100 text-gray-600 px-2 py-1 rounded text-[10px] font-bold hover:bg-gray-200">상세</a>
                                <button onclick="openQR('${item.sn}')" class="bg-blue-100 text-blue-600 px-2 py-1 rounded text-[10px] font-bold hover:bg-blue-200">QR</button>
                            </div>
                        </td>
                    </tr>`;
                tbody.innerHTML += row;
            });
        }

        // 정렬 기능 핵심 로직
        function handleSort(column) {
            if (currentSort.column === column) {
                currentSort.ascending = !currentSort.ascending;
            } else {
                currentSort.column = column;
                currentSort.ascending = true;
            }

            const sortedData = [...assetData].sort((a, b) => {
                let valA = (a[column] || "").toString();
                let valB = (b[column] || "").toString();

                // IP 주소 또는 숫자 포함 문자열 정렬 (Natural Sort)
                // localeCompare의 numeric: true 옵션을 사용하면 3.2 < 3.10 으로 정렬됩니다.
                return currentSort.ascending 
                    ? valA.localeCompare(valB, undefined, { numeric: true, sensitivity: 'base' })
                    : valB.localeCompare(valA, undefined, { numeric: true, sensitivity: 'base' });
            });

            renderTable(sortedData);
        }

        function filterTable() {
            const input = document.getElementById("searchInput").value.toLowerCase();
            const filteredData = assetData.filter(item => {
                return Object.values(item).some(val => 
                    val.toString().toLowerCase().includes(input)
                );
            });
            renderTable(filteredData);
        }

        function openQR(sn) {
            const currentPath = window.location.href.split('list.html')[0];
            const viewUrl = `${currentPath}view.html?sn=${encodeURIComponent(sn)}`;
            const qrImageUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(viewUrl)}`;
            document.getElementById('modalQrCode').innerHTML = `<img src="${qrImageUrl}" class="border-4 border-white shadow-sm" />`;
            document.getElementById('modalSnText').innerText = sn;
            document.getElementById('qrModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('qrModal').classList.add('hidden'); }
        window.onload = loadData;
    </script>
</body>
</html>
