<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상일여고 교과관리시스템</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>  
  <style>
    /* 기본 초기화 */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', 'Malgun Gothic', sans-serif; }
    body { background-color: #f4f7fa; color: #333; }
    
    /* 상단 헤더 */
    header { background-color: #0056b3; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    header h1 { font-size: 20px; margin: 0; }
    .user-info { font-size: 15px; display: flex; align-items: center; gap: 15px; }
    .btn-logout { background-color: white; color: #0056b3; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background-color 0.2s; }
    .btn-logout:hover { background-color: #e0e0e0; }

    /* 전체 레이아웃 (사이드바 + 메인) */
    .container { display: flex; height: calc(100vh - 60px); }
    
    /* 사이드바 메뉴 */
    .sidebar { width: 220px; background-color: #fff; border-right: 1px solid #ddd; padding: 20px 10px; display: flex; flex-direction: column; gap: 8px; }
    .sidebar button { display: block; width: 100%; padding: 12px 15px; text-align: left; cursor: pointer; border: 1px solid transparent; border-radius: 6px; background-color: transparent; font-size: 15px; transition: all 0.2s; }
    .sidebar button:hover { background-color: #f0f4f8; border-color: #dbe4ef; }
    .sidebar button.active { background-color: #e6f0fa; color: #0056b3; font-weight: bold; border-color: #cce0f5; }
    
    /* 🌟 관리자 전용 메뉴 스타일 (우선순위 강화하여 일반 교사에게서 완벽히 숨김) */
    .sidebar button.admin-menu { display: none; } 
    .sidebar button.admin-menu.visible { display: block; background-color: #fff0f0; color: #d32f2f; }
    .sidebar button.admin-menu.visible:hover { background-color: #ffebee; border-color: #ffcdd2; }

    /* 메인 콘텐츠 영역 */
    .main-content { flex: 1; padding: 30px; overflow-y: auto; }
    .content-card { background-color: white; padding: 25px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    
    /* 대시보드 전용 스타일 */
    .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    @media (max-width: 768px) { .dashboard-grid { grid-template-columns: 1fr; } }
    
    /* 타임라인 스타일 */
    .timeline { border-left: 3px solid #0056b3; margin-left: 10px; padding-left: 20px; position: relative; }
    .timeline-item { margin-bottom: 15px; position: relative; }
    .timeline-item::before { content: ''; position: absolute; left: -27px; top: 5px; width: 12px; height: 12px; background-color: white; border: 3px solid #0056b3; border-radius: 50%; }
    .timeline-item.empty::before { border-color: #ccc; }
    .timeline-time { font-size: 12px; color: #666; margin-bottom: 2px; }
    .timeline-title { font-weight: bold; font-size: 15px; color: #333; }
    .timeline-title.empty { color: #999; font-weight: normal; }

    /* 퀵 메뉴 카드 */
    .quick-menus { display: flex; gap: 15px; margin-top: 20px; }
    .quick-card { flex: 1; background-color: #f8f9fa; border: 1px solid #e9ecef; border-radius: 8px; padding: 15px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .quick-card:hover { background-color: #e6f0fa; border-color: #cce0f5; transform: translateY(-2px); }
    .quick-icon { font-size: 24px; margin-bottom: 5px; display: block; }
    .quick-title { font-weight: bold; font-size: 15px; color: #0056b3; margin-bottom: 3px; }
    .quick-desc { font-size: 12px; color: #666; }

    /* 주간 시간표 표 스타일 */
    .schedule-table { width: 100%; border-collapse: collapse; margin-top: 15px; background-color: white; font-size: 13px; text-align: center; }
    .schedule-table th { background-color: #f0f4f8; padding: 10px; border: 1px solid #ddd; color: #333; }
    .schedule-table td { padding: 10px; border: 1px solid #ddd; height: 45px; vertical-align: middle; }
    .has-class { background-color: #e6f0fa; color: #0056b3; font-weight: bold; border-radius: 4px; }
  </style>
</head>
<body>

  <header>
    <h1>상일여고 교과관리시스템</h1>
    <div class="user-info">
      <span><strong id="userNameDisplay">사용자</strong> 선생님 (<span id="userRoleDisplay">권한</span>)</span>
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
  </header>
  
  <div class="container">
    <nav class="sidebar">
      <button onclick="loadMenu('dashboard', this)" class="active">🏠 대시보드</button>
      <button onclick="loadMenu('schedule', this)">📅 시간표 / 명단 조회</button>
      <button onclick="loadMenu('attendance', this)">📝 출결 및 수업일지</button>
      <button onclick="loadMenu('seating', this)">🪑 자리배치도</button>
      
      <hr style="border: 0; border-top: 1px solid #ddd; margin: 10px 0;">
      <button id="adminBtn1" class="admin-menu" onclick="loadMenu('adminConfig', this)">⚙️ 학기/과목 설정</button>
      <button id="adminBtn2" class="admin-menu" onclick="loadMenu('adminUsers', this)">👥 교직원 권한 관리</button>
    </nav>
    
    <main class="main-content">
      <div id="contentArea" class="content-card">
        <h2>데이터를 불러오는 중입니다... ⏳</h2>
      </div>
    </main>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzfIY0Fs4S1EjSSNI2kZfrFgtSqipG_u_KDCkdT8Vy1LjrIwB7k_1awE_psCNw0VQGg/exec";

    // 1. 권한 체크
    function checkAuth() {
      const userInfoStr = sessionStorage.getItem("userInfo");
      
      if (!userInfoStr) {
        alert("로그인이 필요한 서비스입니다.");
        window.location.replace("login.html");
        return;
      }

      const userInfo = JSON.parse(userInfoStr);
      document.getElementById('userNameDisplay').innerText = userInfo.name;
      document.getElementById('userRoleDisplay').innerText = userInfo.role;

      if (userInfo.role === "관리자") {
        document.querySelectorAll('.admin-menu').forEach(el => el.classList.add('visible'));
      }
    }

    // 2. 로그아웃
    function logout() {
      if (confirm("로그아웃 하시겠습니까?")) {
        sessionStorage.removeItem("userInfo"); 
        window.location.replace("login.html"); 
      }
    }

    // 3. 메뉴 이동
    function loadMenu(menuId, btnElement) {
      document.querySelectorAll('.sidebar button').forEach(btn => btn.classList.remove('active'));
      if(btnElement) btnElement.classList.add('active');

      const contentArea = document.getElementById('contentArea');

      if (menuId === 'dashboard') {
        renderDashboard(); 
      } 
      else if (menuId === 'schedule') {
        contentArea.innerHTML = `<h2>시간표 / 명단 조회</h2><p>준비 중...</p>`;
      } 
      else if (menuId === 'adminConfig') {
        renderAdminConfig(); // 학기/과목 설정 화면 렌더링 호출
      }
      else if (menuId === 'adminUsers') {
        contentArea.innerHTML = `<h2>교직원 권한 관리</h2><p>준비 중...</p>`;
      }
      else {
        contentArea.innerHTML = `<h2>준비 중인 기능입니다.</h2>`;
      }
    }

    // 🌟 학기/과목 설정 화면을 그리는 함수 (2026년 기본값 적용)
    function renderAdminConfig() {
      const contentArea = document.getElementById('contentArea');
      contentArea.innerHTML = `
        <h2 style="margin-bottom:20px;">⚙️ 학기 및 과목 설정 (나이스 연동)</h2>
        <div style="background:#f8f9fa; padding:20px; border-radius:8px; border:1px solid #ddd;">
          <div style="margin-bottom:15px;">
            <label>학년도: </label>
            <input type="text" id="setYear" value="2026" style="padding:5px; width:80px;">
            <label style="margin-left:15px;">학기: </label>
            <input type="text" id="setSemester" value="1" style="padding:5px; width:50px;">
          </div>
          
          <div style="margin-bottom:15px;">
            <p style="font-size:14px; color:#666; margin-bottom:10px;">
              ※ 나이스(NEIS)에서 다운로드한 엑셀 파일(.xlsx)을 선택해 주세요.
            </p>
            <input type="file" id="excelFileInput" accept=".xlsx, .xls" style="margin-bottom:10px;">
          </div>
          
          <button onclick="processExcelData()" style="padding:10px 20px; background:#0056b3; color:white; border:none; border-radius:4px; cursor:pointer;">
            엑셀 데이터 분석 및 업로드
          </button>
          
          <div id="loadingNeis" style="display:none; margin-top:15px; color:#0056b3; font-weight:bold;">
            데이터를 처리 중입니다... 잠시만 기다려주세요. ⏳
          </div>
        </div>
      `;
    }

    // 대시보드 통신 및 화면 그리기
    async function renderDashboard() {
      const contentArea = document.getElementById('contentArea');
      contentArea.innerHTML = `<div style="text-align:center; padding: 50px; font-size: 16px;">데이터를 불러오는 중입니다... ⏳</div>`;

      const userInfoStr = sessionStorage.getItem("userInfo");
      if(!userInfoStr) return;
      const userInfo = JSON.parse(userInfoStr);

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({ type: "GET_DASHBOARD", payload: { teacherId: userInfo.id } })
        });
        const result = await response.json();

        if(result.success) {
          buildDashboardHTML(result.schedule);
        } else {
          contentArea.innerHTML = `<div style="color:red; padding:20px;">데이터를 불러오지 못했습니다: ${result.msg}</div>`;
        }
      } catch (e) {
        contentArea.innerHTML = `<div style="color:red; padding:20px;">서버 통신 에러가 발생했습니다.</div>`;
      }
    }

    // 대시보드 HTML 조립
    function buildDashboardHTML(mySchedule) {
      const contentArea = document.getElementById('contentArea');
      
      const days = ["일", "월", "화", "수", "목", "금", "토"];
      const todayNum = new Date().getDay(); 
      const todayStr = days[todayNum]; 
      
      const times = ["08:45 ~ 09:35", "09:45 ~ 10:35", "10:45 ~ 11:35", "11:45 ~ 12:35", "13:35 ~ 14:25", "14:35 ~ 15:25", "15:40 ~ 16:30"];

      let timelineHTML = "";
      if (todayNum === 0 || todayNum === 6) {
        timelineHTML = `<div style="padding: 20px; color:#666;">주말은 수업이 없습니다. 푹 쉬세요! ☕</div>`;
      } else {
        timelineHTML += `<div class="timeline">`;
        for (let period = 1; period <= 7; period++) {
          const classData = mySchedule.find(s => s.day === todayStr && s.period == period);
          if (classData) {
            timelineHTML += `
              <div class="timeline-item">
                <div class="timeline-time">${period}교시 (${times[period-1]})</div>
                <div class="timeline-title">${classData.subject}</div>
              </div>`;
          } else {
            timelineHTML += `
              <div class="timeline-item empty">
                <div class="timeline-time">${period}교시 (${times[period-1]})</div>
                <div class="timeline-title empty">공강</div>
              </div>`;
          }
        }
        timelineHTML += `</div>`;
      }

      let tableHTML = `<table class="schedule-table"><thead><tr><th>교시</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th></tr></thead><tbody>`;
      for (let period = 1; period <= 7; period++) {
        tableHTML += `<tr><td><strong>${period}</strong></td>`;
        ["월", "화", "수", "목", "금"].forEach(day => {
          const classData = mySchedule.find(s => s.day === day && s.period == period);
          if (classData) {
            const shortSubj = classData.subject.replace(" (", "<br>(");
            tableHTML += `<td class="has-class">${shortSubj}</td>`;
          } else {
            tableHTML += `<td></td>`;
          }
        });
        tableHTML += `</tr>`;
      }
      tableHTML += `</tbody></table>`;

      contentArea.innerHTML = `
        <h2 style="color: #0056b3; display:flex; align-items:center; gap:8px;">🏫 상일여고 교과관리시스템</h2>
        <p style="color: #666; margin-top: 5px;">출석부를 들고 다니지 말고, 빠르고 스마트하게 수업을 기록하세요.</p>
        
        <div class="dashboard-grid">
          <div>
            <div class="content-card">
              <h3 style="margin-bottom: 15px; color:#333;">🏃 오늘의 수업 타임라인 (${todayStr}요일)</h3>
              ${timelineHTML}
            </div>
            
            <div class="quick-menus">
              <div class="quick-card" onclick="document.querySelectorAll('.sidebar button')[3].click()">
                <span class="quick-icon">🪑</span>
                <div class="quick-title">좌석 배치</div>
                <div class="quick-desc">드래그 좌석표 세팅</div>
              </div>
              <div class="quick-card" onclick="document.querySelectorAll('.sidebar button')[2].click()">
                <span class="quick-icon">📋</span>
                <div class="quick-title">출석 / 일지</div>
                <div class="quick-desc">수업 및 특이사항 기록</div>
              </div>
            </div>
          </div>

          <div class="content-card">
            <h3 style="color:#333;">🗓️ 나의 주간 시간표</h3>
            ${tableHTML}
          </div>
        </div>
      `;
    }

    // 원본 엑셀 분석
    function processExcelData() {
      const year = document.getElementById('setYear').value.trim();
      const semester = document.getElementById('setSemester').value.trim();
      const fileInput = document.getElementById('excelFileInput');

      if (!year || !semester) {
        alert("학년도와 학기를 먼저 입력해주세요.");
        return;
      }
      if (fileInput.files.length === 0) {
        alert("업로드할 엑셀 파일을 선택해 주세요.");
        return;
      }

      const file = fileInput.files[0];
      const reader = new FileReader();

      reader.onload = function(e) {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, {type: 'array'});
          const firstSheetName = workbook.SheetNames[0];
          const worksheet = workbook.Sheets[firstSheetName];
          
          const rows = XLSX.utils.sheet_to_json(worksheet, {header: 1});
          
          const result = [];
          const days = ["월", "화", "수", "목", "금", "토", "일"];

          rows.forEach(cols => {
            if (!cols || cols.length === 0) return;
            
            let teacherId = "";
            let teacherName = "";
            let startIndex = -1;

            for (let i = 0; i < cols.length; i++) {
              if (!cols[i]) continue;
              let cell = String(cols[i]).trim();
              
              let idMatch = cell.match(/([a-zA-Z0-9_.-]+)\((.+?)\)/);
              if (idMatch) {
                teacherId = idMatch[1].trim();
                teacherName = idMatch[2].trim();
                startIndex = i + 1; 
                break;
              }
            }

            if (startIndex === -1) return;

            const subjectsMap = {};

            for (let i = startIndex; i < cols.length; i++) {
              let cellData = cols[i] ? String(cols[i]).trim() : "";
              if (!cellData) continue;

              const cellMatch = cellData.match(/(\d+)\s*학년\s*(.+?)\s*\(([^)]+)\)/);
              if (cellMatch) {
                const grade = cellMatch[1];
                const subjectName = cellMatch[2].trim();
                const classNum = cellMatch[3].trim(); 

                let targetClass = "";
                if (!isNaN(classNum)) {
                  targetClass = `${grade}-${classNum}`;
                } else {
                  targetClass = classNum;
                }

                const timeIndex = i - startIndex;
                const dayIdx = Math.floor(timeIndex / 12);
                const period = (timeIndex % 12) + 1;

                if (dayIdx >= days.length) continue;
                const day = days[dayIdx];

                const subjectKey = `${subjectName}_${targetClass}`;
                if (!subjectsMap[subjectKey]) {
                  subjectsMap[subjectKey] = {
                    subject: subjectName,
                    targetClass: targetClass,
                    schedules: []
                  };
                }
                subjectsMap[subjectKey].schedules.push({ day: day, period: period });
              }
            }

            for (let key in subjectsMap) {
              result.push({
                teacherId: teacherId,
                teacherName: teacherName,
                subject: subjectsMap[key].subject,
                targetClass: subjectsMap[key].targetClass,
                schedules: subjectsMap[key].schedules
              });
            }
          });

          if (result.length === 0) {
            alert("분석된 데이터가 없습니다. 나이스 양식이 맞는지 확인해주세요.");
            return;
          }

          sendBulkDataToServer(year, semester, result);

        } catch (err) {
          console.error(err);
          alert("파일 판독 중 오류가 발생했습니다. 원본 엑셀(.xlsx) 파일이 맞는지 확인해주세요.");
        }
      };

      reader.readAsArrayBuffer(file);
    }

    // 백엔드로 전송
    async function sendBulkDataToServer(year, semester, parsedData) {
      document.getElementById('loadingNeis').style.display = 'block'; 

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({
            type: "BULK_UPLOAD_NEIS",
            payload: {
              year: year,
              semester: semester,
              data: parsedData
            }
          })
        });
        
        const resResult = await response.json();
        document.getElementById('loadingNeis').style.display = 'none'; 

        if (resResult.success) {
          alert("✅ 나이스 데이터가 성공적으로 분석 및 연동되었습니다!");
          document.getElementById('excelFileInput').value = ""; 
        } else {
          alert("데이터 연동 중 오류: " + resResult.msg);
        }
      } catch (error) {
        document.getElementById('loadingNeis').style.display = 'none';
        alert("서버 통신 중 오류가 발생했습니다.");
        console.error(error);
      }
    }

    // ✨ 페이지 처음 뜰 때 자동 실행 (중복 제거 및 하나로 통합)
    window.onload = function() {
      checkAuth(); // 1. 권한 먼저 체크 (관리자 메뉴 활성화)
      const firstBtn = document.querySelector('.sidebar button');
      loadMenu('dashboard', firstBtn); // 2. 대시보드 불러오기
    };
  </script>
</body>
</html>
