<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전국 대학 지도 — 입시 레이더</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,500&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
    --paper: #FAF5EC; --paper-2: #F2EADD;
    --ink: #16181F; --ink-soft: #54586A;
    --line: #DED3C0; --line-soft: #EBE2D4;
    --now: #BE4B1E; --new: #0E7C6B; --gold: #9A6A12;
    --shadow: 0 24px 60px -28px rgba(22,24,31,.45);
}
* { box-sizing: border-box; }
body {
    margin: 0; font-family: "Pretendard", system-ui, sans-serif;
    color: var(--ink); background: var(--paper);
    -webkit-font-smoothing: antialiased; line-height: 1.6;
}
.mono { font-family: "IBM Plex Mono", monospace; }
a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; }

/* top bar */
header {
    position: sticky; top: 0; z-index: 40; backdrop-filter: blur(12px); background: rgba(250,245,236,.82); border-bottom: 1px solid var(--line);
}
.bar { max-width: 1180px; margin: 0 auto; padding: 14px 26px; display: flex; align-items: center; justify-content: space-between; gap: 18px; }
.logo { display: flex; align-items: center; gap: 11px; }
.logo .mark { width: 34px; height: 34px; position: relative; flex: none; }
.logo b { font-size: 1.06rem; letter-spacing: -.01em; }
.logo small { display: block; font-size: .62rem; letter-spacing: .22em; color: var(--ink-soft); text-transform: uppercase; }
nav.menu { display: flex; gap: 6px; }
nav.menu a { font-size: .85rem; font-weight: 700; color: var(--ink-soft); padding: 8px 12px; border-radius: 999px; transition: .18s; }
nav.menu a:hover { color: var(--ink); background: var(--paper-2); }
.year-pill { font-family: "IBM Plex Mono", monospace; font-size: .72rem; border: 1px solid var(--line); padding: 7px 12px; border-radius: 999px; color: var(--ink-soft); }

/* layout */
.wrap { max-width: 1180px; margin: 0 auto; padding: 40px 26px; position: relative; z-index: 2; }
.eyebrow { font-family: "IBM Plex Mono", monospace; font-size: .74rem; letter-spacing: .18em; text-transform: uppercase; color: var(--gold); display: flex; align-items: center; gap: 10px; }
.eyebrow::before { content: ""; width: 26px; height: 1px; background: var(--gold); display: inline-block; }
.page-header { margin-bottom: 30px; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 20px; }
h1 { font-family: "Fraunces", serif; font-weight: 600; font-size: clamp(2rem, 4vw, 3rem); line-height: 1.1; margin: 10px 0 0; letter-spacing: -.02em; }

/* map controls */
.tracks { display: flex; flex-wrap: wrap; gap: 8px; }
.tracks button { border: 1.5px solid var(--line); background: #fff; border-radius: 999px; padding: 10px 18px; font-weight: 700; font-size: .9rem; color: var(--ink-soft); transition: .16s; }
.tracks button:hover { border-color: var(--ink-soft); }
.tracks button.on { background: var(--ink); color: #fff; border-color: var(--ink); box-shadow: var(--shadow); }

/* map container */
.map-frame {
    width: 100%; height: 75vh; min-height: 600px;
    background: var(--paper-2); border-radius: 24px; border: 1px solid var(--line);
    overflow: hidden; box-shadow: var(--shadow); position: relative;
}

/* 🌟 추가된 CSS: 커스텀 마커(학교 이름표) 스타일 */
.map-pin {
    display: flex; flex-direction: column; align-items: center;
    transform: translateY(-100%); cursor: default;
}
.map-pin .name {
    background: rgba(255, 255, 255, 0.95);
    border: 2px solid var(--now); /* 4년제 기본 색상 (노을빛) */
    padding: 5px 12px; border-radius: 999px;
    font-weight: 800; font-size: 0.8rem; color: var(--ink);
    box-shadow: 0 4px 12px rgba(22, 24, 31, 0.15);
    white-space: nowrap; backdrop-filter: blur(4px);
}
.map-pin .pointer {
    width: 2px; height: 12px; background: var(--now);
}
.map-pin.type2 .name {
    border-color: var(--new); /* 2년제 색상 (새벽빛) */
}
.map-pin.type2 .pointer {
    background: var(--new);
}
.map-pin:hover { z-index: 999 !important; }
.map-pin:hover .name { transform: scale(1.05); transition: 0.2s ease; }
</style>
</head>
<body>

<header>
  <div class="bar">
    <a class="logo" href="index.html">
      <span class="mark" aria-hidden="true">
        <svg viewBox="0 0 34 34"><circle cx="17" cy="17" r="16" fill="none" stroke="#16181F" stroke-width="1.4"/><circle cx="17" cy="17" r="10" fill="none" stroke="#16181F" stroke-width="1.1" opacity=".5"/><circle cx="17" cy="17" r="4" fill="none" stroke="#16181F" stroke-width="1.1" opacity=".5"/><path d="M17 17 L31 9" stroke="#BE4B1E" stroke-width="2" stroke-linecap="round"/><circle cx="26" cy="11.5" r="2.3" fill="#0E7C6B"/></svg>
      </span>
      <span><b>입시 레이더</b><small>Admission Radar</small></span>
    </a>
    <nav class="menu">
      <a href="index.html">← 메인으로 돌아가기</a>
    </nav>
    <span class="year-pill">Map Explorer</span>
  </div>
</header>

<div class="wrap">
  <div class="page-header">
    <div>
      <div class="eyebrow">전국 단위 위치 탐색</div>
      <h1>캠퍼스 맵</h1>
    </div>
    <div class="tracks" id="mapFilter">
      <button class="on" data-type="all">전체 대학</button>
      <button data-type="4">4년제 (노을빛)</button>
      <button data-type="2">전문대 (새벽빛)</button>
    </div>
  </div>

  <div class="map-frame" id="map"></div>
</div>

<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=d8e18dd09077526ad1095af2610ff5a8"></script>

<script>
  // 대규모 대학 데이터 (전국 주요 거점 4년제 & 2년제)
  const univData = [
    // --- 서울/수도권 4년제 ---
    { name: "서울대학교", lat: 37.459882, lng: 126.951905, type: "4" },
    { name: "연세대학교", lat: 37.565784, lng: 126.938572, type: "4" },
    { name: "고려대학교", lat: 37.590799, lng: 127.027777, type: "4" },
    { name: "서강대학교", lat: 37.550944, lng: 126.941002, type: "4" },
    { name: "성균관대학교", lat: 37.588227, lng: 126.993606, type: "4" },
    { name: "한양대학교", lat: 37.557232, lng: 127.045322, type: "4" },
    { name: "이화여자대학교", lat: 37.561872, lng: 126.946824, type: "4" },
    { name: "중앙대학교", lat: 37.505088, lng: 126.957101, type: "4" },
    { name: "경희대학교", lat: 37.596195, lng: 127.052544, type: "4" },
    { name: "한국외국어대학교", lat: 37.597319, lng: 127.057843, type: "4" },
    { name: "서울시립대학교", lat: 37.583865, lng: 127.058777, type: "4" },
    { name: "건국대학교", lat: 37.540762, lng: 127.079342, type: "4" },
    { name: "동국대학교", lat: 37.558273, lng: 126.998243, type: "4" },
    { name: "홍익대학교", lat: 37.551464, lng: 126.925010, type: "4" },
    { name: "인하대학교", lat: 37.449552, lng: 126.653457, type: "4" },
    { name: "아주대학교", lat: 37.282806, lng: 127.046187, type: "4" },
    { name: "가천대학교", lat: 37.450143, lng: 127.129759, type: "4" },
    { name: "단국대학교(죽전)", lat: 37.321876, lng: 127.126620, type: "4" },
    
    // --- 지방 거점 및 국립 4년제 ---
    { name: "카이스트(KAIST)", lat: 36.372142, lng: 127.360394, type: "4" },
    { name: "포항공과대학교(POSTECH)", lat: 36.011980, lng: 129.322896, type: "4" },
    { name: "부산대학교", lat: 35.233221, lng: 129.080517, type: "4" },
    { name: "경북대학교", lat: 35.890313, lng: 128.611295, type: "4" },
    { name: "전남대학교", lat: 35.176882, lng: 126.905786, type: "4" },
    { name: "전북대학교", lat: 35.846875, lng: 127.129486, type: "4" },
    { name: "충남대학교", lat: 36.362243, lng: 127.344445, type: "4" },
    { name: "충북대학교", lat: 36.628876, lng: 127.456079, type: "4" },
    { name: "강원대학교", lat: 37.869408, lng: 127.744158, type: "4" },
    { name: "제주대학교", lat: 33.456074, lng: 126.561937, type: "4" },
    { name: "조선대학교", lat: 35.142835, lng: 126.934812, type: "4" },
    { name: "영남대학교", lat: 35.831518, lng: 128.758416, type: "4" },
    { name: "동아대학교", lat: 35.116518, lng: 128.968254, type: "4" },

    // --- 주요 전문대 (2~3년제) ---
    { name: "명지전문대학", lat: 37.584742, lng: 126.923236, type: "2" },
    { name: "서울예술대학교", lat: 37.319502, lng: 126.840742, type: "2" },
    { name: "인하공업전문대학", lat: 37.448552, lng: 126.655823, type: "2" },
    { name: "동아방송예술대학교", lat: 37.042784, lng: 127.316886, type: "2" },
    { name: "영진전문대학교", lat: 35.895315, lng: 128.622579, type: "2" },
    { name: "대림대학교", lat: 37.404229, lng: 126.931535, type: "2" },
    { name: "부천대학교", lat: 37.487042, lng: 126.776602, type: "2" },
    { name: "동남보건대학교", lat: 37.297442, lng: 126.988019, type: "2" },
    { name: "연암공과대학교", lat: 35.163900, lng: 128.100918, type: "2" },
    { name: "울산과학대학교", lat: 35.539352, lng: 129.351239, type: "2" },
    { name: "조선이공대학교", lat: 35.143224, lng: 126.932822, type: "2" },
    { name: "계명문화대학교", lat: 35.856980, lng: 128.487513, type: "2" },
    { name: "제주한라대학교", lat: 33.475143, lng: 126.467431, type: "2" }
  ];

  if(typeof kakao !== "undefined" && kakao.maps) {
      const mapContainer = document.getElementById('map'); 
      const mapOption = { 
        center: new kakao.maps.LatLng(36.150411, 127.784548), // 대한민국 중앙으로 살짝 조정
        level: 13 
      };
      const kakaoMap = new kakao.maps.Map(mapContainer, mapOption);

      let overlayList = []; // 커스텀 오버레이 관리 배열

      function renderMarkers(type) {
        // 기존 오버레이 모두 제거
        overlayList.forEach(overlay => overlay.setMap(null));
        overlayList = [];

        const filteredData = type === "all" ? univData : univData.filter(univ => univ.type === type);

        filteredData.forEach(univ => {
          const markerPosition = new kakao.maps.LatLng(univ.lat, univ.lng);
          
          // 학교 이름이 바로 보이는 커스텀 HTML 작성 (type에 따라 클래스 다르게 적용)
          const customHtml = `
            <div class="map-pin ${univ.type === '2' ? 'type2' : ''}">
                <div class="name">${univ.name}</div>
                <div class="pointer"></div>
            </div>
          `;

          // 마커 대신 CustomOverlay 생성
          const customOverlay = new kakao.maps.CustomOverlay({
            position: markerPosition,
            content: customHtml,
            yAnchor: 1 // 오버레이의 끝부분이 좌표에 닿도록 정렬
          });
          
          customOverlay.setMap(kakaoMap);
          overlayList.push(customOverlay);
        });
      }

      // 초기 렌더링
      renderMarkers("all");

      // 필터 버튼 이벤트
      const filterBtns = document.querySelectorAll('#mapFilter button');
      filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          filterBtns.forEach(x => x.classList.remove('on'));
          btn.classList.add('on');
          renderMarkers(btn.dataset.type);
        });
      });
  }
</script>

</body>
</html>
