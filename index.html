<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT 자산 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="bg-gray-50 p-4 md:p-10">
    <div class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-lg border border-gray-200">
        <h1 class="text-3xl font-extrabold text-gray-800 mb-8 flex items-center gap-2">
            <span class="text-blue-600">💻</span> IT 자산 등록 시스템
        </h1>
        
        <form id="assetForm" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">자산 유형 *</label>
                    <select id="assetType" class="w-full border-gray-300 border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" onchange="updateFormLayout()">
                        <option value="노트북">노트북</option>
                        <option value="데스크톱">데스크톱PC (+모니터 세트)</option>
                        <option value="모니터">모니터 (단독)</option>
                        <option value="태블릿">태블릿</option>
                        <option value="프린터">프린터/복합기/복사기</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">사용자 성명</label>
                    <input type="text" id="user" placeholder="성함 입력" class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">부서/그룹명</label>
                    <input type="text" id="group" placeholder="부서명 입력" class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">취득일</label>
                    <input type="date" id="date" class="w-full border border-gray-300 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <div class="border-t pt-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">제조사/브랜드</label>
                    <input type="text" id="brand" placeholder="예: 삼성, LG, HP" class="w-full border border-gray-300 p-3 rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">모델명</label>
                    <input type="text" id="model" placeholder="상세 모델명" class="w-full border border-gray-300 p-3 rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">시리얼 번호 (S/N)</label>
                    <input type="text" id="sn" placeholder="기기 뒷면 번호 (선택)" class="w-full border border-gray-300 p-3 rounded-lg">
                </div>
                <div id="ipFieldContainer">
                    <label class="block text-sm font-semibold text-gray-700 mb-1">IP 주소</label>
                    <input type="text" id="ip" placeholder="10.120.3.XXX" class="w-full border border-gray-300 p-3 rounded-lg">
                </div>
                <div id="printerTypeContainer" class="hidden">
                    <label class="block text-sm font-semibold text-gray-700 mb-1">기종 상세</label>
                    <select id="subType" class="w-full border border-gray-300 p-3 rounded-lg">
                        <option value="컬러복합기">컬러복합기</option>
                        <option value="흑백복합기">흑백복합기</option>
                        <option value="컬러레이저">컬러레이저</option>
                        <option value="흑백레이저">흑백레이저</option>
                        <option value="복사기">복사기</option>
                    </select>
                </div>
            </div>

            <div id="monitorSection" class="hidden border-2 border-blue-100 bg-blue-50 p-6 rounded-xl space-y-4">
                <h3 class="font-bold text-blue-800 text-lg flex items-center gap-2">🖥️ 연결 모니터 정보</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="m_brand" placeholder="모니터 제조사" class="border border-gray-300 p-3 rounded-lg">
                    <input type="text" id="m_model" placeholder="모니터 모델명" class="border border-gray-300 p-3 rounded-lg">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">비고</label>
                <textarea id="note" rows="2" class="w-full border border-gray-300 p-3 rounded-lg"></textarea>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition shadow-lg no-print">
                자산 등록 및 QR 생성
            </button>
        </form>

        <div id="qrResult" class="hidden mt-10 p-6 border-2 border-dashed border-gray-300 rounded-xl text-center">
            <h3 class="font-bold mb-4 text-gray-700">성공적으로 등록되었습니다! 기기에 부착할 QR 코드:</h3>
            <div id="qrcode" class="flex justify-center mb-4"></div>
            <p id="qrText" class="text-sm text-gray-500 font-mono"></p>
            <button onclick="window.print()" class="mt-4 text-blue-600 underline text-sm no-print">QR 코드 인쇄하기</button>
        </div>
    </div>

    <script>
        const GAS_URL="https://script.google.com/macros/s/AKfycbw4a7_cBsYzArwE4IrxC7tSPJoYGg3_ilOkf5D12guaAsOGgazpi1Ku9aTyEWthOGuWjQ/exec";        function updateFormLayout() {
            const type = document.getElementById('assetType').value;
            document.getElementById('monitorSection').classList.toggle('hidden', type !== '데스크톱');
            document.getElementById('printerTypeContainer').classList.toggle('hidden', type !== '프린터');
            document.getElementById('ipFieldContainer').classList.toggle('hidden', type === '모니터' || type === '태블릿');
        }

        document.getElementById('assetForm').onsubmit = async (e) => {
    e.preventDefault();
    
    // 1. 데이터 준비
    const assetType = document.getElementById('assetType').value;
    const commonData = {
        user: document.getElementById('user').value,
        group: document.getElementById('group').value,
        date: document.getElementById('date').value,
        note: document.getElementById('note').value
    };

    const items = [{
        ...commonData,
        type: assetType,
        brand: document.getElementById('brand').value,
        model: document.getElementById('model').value,
        sn: document.getElementById('sn').value || "N/A",
        ip: document.getElementById('ip').value,
        subType: assetType === '프린터' ? document.getElementById('subType').value : ""
    }];

    if (assetType === '데스크톱') {
        items.push({
            ...commonData,
            type: '모니터(세트)',
            brand: document.getElementById('m_brand').value,
            model: document.getElementById('m_model').value,
            sn: "본체연결",
            ip: "",
            linkedId: document.getElementById('sn').value || "N/A"
        });
    }

    // 2. 전송 로직 (응답을 기다리지 않고 성공 처리)
    Swal.fire({ title: '등록 중...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

    // 전송 시도
    fetch(GAS_URL, {
        method: "POST",
        mode: "no-cors", // 구글 응답 차단 우회
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ items, ip: document.getElementById('ip').value })
    });

    // 데이터를 보냈으므로 0.5초 뒤에 바로 성공 팝업을 띄웁니다.
    setTimeout(() => {
        Swal.fire({
            title: "등록 요청 완료!",
            text: "데이터가 전송되었습니다. 구글 시트를 확인해 보세요.",
            icon: "success",
            confirmButtonColor: "#3085d6"
        });
        showQRCode(items[0]); // QR 코드 보여주기
    }, 500);
};
 
        function showQRCode(data) {
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = ""; // 초기화
            
            // QR 코드 내용: 나중에 검색 페이지로 연결될 URL 구조 (예시)
            const qrContent = `자산유형:${data.type}\n사용자:${data.user}\n모델:${data.model}\nS/N:${data.sn}`;
            
            new QRCode(qrContainer, {
                text: qrContent,
                width: 150,
                height: 150
            });

            document.getElementById('qrText').innerText = `S/N: ${data.sn} | IP: ${data.ip || 'N/A'}`;
            document.getElementById('qrResult').classList.remove('hidden');
            window.scrollTo(0, document.body.scrollHeight);
        }
    </script>
</body>
</html>
