<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상일여고 교과관리시스템</title>
  <style>
    /* 기본 초기화 */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', 'Malgun Gothic', sans-serif; }
    body { background-color: #f4f7fa; color: #333; }
    
    /* 상단 헤더 */
    header { background-color: #0056b3; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    header h1 { font-size: 20px; margin: 0; }
    .user-info { font-size: 15px; display: flex; align-items: center; gap: 15px; }
    .btn-logout { background-color: white; color: #0056b3; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background-color 0.2s; }
    .btn-logout:hover { background-color: #e0e0e0; }

    /* 전체 레이아웃 (사이드바 + 메인) */
    .container { display: flex; height: calc(100vh - 60px); }
    
    /* 사이드바 메뉴 */
    .sidebar { width: 220px; background-color: #fff; border-right: 1px solid #ddd; padding: 20px 10px; display: flex; flex-direction: column; gap: 8px; }
    .sidebar button { display: block; width: 100%; padding: 12px 15px; text-align: left; cursor: pointer; border: 1px solid transparent; border-radius: 6px; background-color: transparent; font-size: 15px; transition: all 0.2s; }
    .sidebar button:hover { background-color: #f0f4f8; border-color: #dbe4ef; }
    .sidebar button.active { background-color: #e6f0fa; color: #0056b3; font-weight: bold; border-color: #cce0f5; }
    
    /* 관리자 전용 메뉴 스타일 */
    .admin-menu { display: none; } /* 기본적으로는 숨김 */
    .admin-menu.visible { display: block; background-color: #fff0f0; color: #d32f2f; }
    .admin-menu.visible:hover { background-color: #ffebee; border-color: #ffcdd2; }

    /* 메인 콘텐츠 영역 */
    .main-content { flex: 1; padding: 30px; overflow-y: auto; }
    .content-card { background-color: white; padding: 25px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  </style>
</head>
<body>

  <header>
    <h1>상일여고 교과관리시스템</h1>
    <div class="user-info">
      <span><strong id="userNameDisplay">사용자</strong> 선생님 (<span id="userRoleDisplay">권한</span>)</span>
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
  </header>
  
  <div class="container">
    <nav class="sidebar">
      <button onclick="loadMenu('dashboard', this)" class="active">🏠 대시보드</button>
      <button onclick="loadMenu('schedule', this)">📅 시간표 / 명단 조회</button>
      <button onclick="loadMenu('attendance', this)">📝 출결 및 수업일지</button>
      <button onclick="loadMenu('seating', this)">🪑 자리배치도</button>
      
      <hr style="border: 0; border-top: 1px solid #ddd; margin: 10px 0;">
      <button id="adminBtn1" class="admin-menu" onclick="loadMenu('adminConfig', this)">⚙️ 학기/과목 설정</button>
      <button id="adminBtn2" class="admin-menu" onclick="loadMenu('adminUsers', this)">👥 교직원 권한 관리</button>
    </nav>
    
    <main class="main-content">
      <div id="contentArea" class="content-card">
        <h2>환영합니다!</h2>
        <p style="margin-top: 15px; color: #666;">좌측 메뉴를 선택하여 업무를 시작해 주세요.</p>
      </div>
    </main>
  </div>

  <script>
    // 1. 페이지 로드 시 즉시 실행되는 권한 체크 함수
    function checkAuth() {
      const userInfoStr = sessionStorage.getItem("userInfo");
      
      // 로그인이 안 되어 있다면 튕겨냄
      if (!userInfoStr) {
        alert("로그인이 필요한 서비스입니다.");
        window.location.replace("login.html");
        return;
      }

      // 로그인 정보가 있다면 파싱해서 화면에 이름과 권한 표시
      const userInfo = JSON.parse(userInfoStr);
      document.getElementById('userNameDisplay').innerText = userInfo.name;
      document.getElementById('userRoleDisplay').innerText = userInfo.role;

      // 🌟 [핵심] 사용자의 권한이 '관리자'인 경우에만 관리자 메뉴 활성화
      if (userInfo.role === "관리자") {
        document.querySelectorAll('.admin-menu').forEach(el => el.classList.add('visible'));
      }
    }

    // 2. 로그아웃 함수
    function logout() {
      if (confirm("로그아웃 하시겠습니까?")) {
        sessionStorage.removeItem("userInfo"); // 세션 데이터 삭제
        window.location.replace("login.html"); // 로그인 페이지로 이동
      }
    }

    // 3. 메뉴 이동 함수 (SPA 방식: 페이지 이동 없이 내용만 바꿈)
    function loadMenu(menuId, btnElement) {
      // 버튼 활성화(파란색) 효과 변경
      document.querySelectorAll('.sidebar button').forEach(btn => btn.classList.remove('active'));
      btnElement.classList.add('active');

      const contentArea = document.getElementById('contentArea');

      // 각 메뉴에 맞는 화면 렌더링 (추후 여기에 실제 기능 컴포넌트를 붙일 예정입니다)
      if (menuId === 'dashboard') {
        contentArea.innerHTML = `<h2>대시보드</h2><p style="margin-top: 10px;">공지사항이나 오늘의 일정을 보여줄 수 있습니다.</p>`;
      } 
      else if (menuId === 'schedule') {
        contentArea.innerHTML = `<h2>시간표 / 명단 조회</h2><p style="margin-top: 10px;">API를 호출하여 내 과목과 시간표를 불러옵니다...</p>`;
      } 
      else if (menuId === 'attendance') {
        contentArea.innerHTML = `<h2>출결 및 수업일지</h2><p style="margin-top: 10px;">오늘의 출석 체크 및 수업 기록을 남깁니다.</p>`;
      } 
      else if (menuId === 'adminConfig') {
        contentArea.innerHTML = `<h2 style="color: #d32f2f;">⚙️ 학기 및 과목 설정 (관리자)</h2><p style="margin-top: 10px;">새로운 학년도 설정, 과목 일괄 등록 기능이 들어갈 자리입니다.</p>`;
      }
      else {
        contentArea.innerHTML = `<h2>준비 중인 기능입니다.</h2>`;
      }
    }

    // 화면이 켜지자마자 권한 체크 실행
    window.onload = checkAuth;
  </script>
</body>
</html>
