<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자산 등록 - IT Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-blue-600 text-white p-4 shadow-md mb-6">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <span class="font-bold text-lg">➕ 자산 신규 등록</span>
            <div class="space-x-4 text-sm font-medium">
                <a href="sangildevice.html" class="hover:underline">보유목록</a>
                <a href="write.html" class="bg-blue-700 px-3 py-1 rounded">신규등록</a>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-lg border border-gray-200">
        <form id="assetForm" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">자산 유형 *</label>
                    <select id="assetType" class="w-full border-gray-300 border p-3 rounded-lg" onchange="updateFormLayout()">
                        <option value="노트북">노트북</option>
                        <option value="데스크톱">데스크톱PC (+모니터)</option>
                        <option value="태블릿">태블릿</option>
                        <option value="프린터">프린터/복합기</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">사용자 성명 *</label>
                    <input type="text" id="user" placeholder="성명 입력" class="w-full border p-3 rounded-lg" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">부서/그룹명</label>
                    <input type="text" id="group" placeholder="부서명" class="w-full border p-3 rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">취득일</label>
                    <input type="date" id="date" class="w-full border p-3 rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">제조사</label>
                    <input type="text" id="brand" placeholder="제조사(삼성, LG 등)" class="w-full border p-3 rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">모델명</label>
                    <input type="text" id="model" placeholder="상세 모델명" class="w-full border p-3 rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">시리얼 번호 (S/N) *</label>
                    <input type="text" id="sn" placeholder="기기 S/N" class="w-full border p-3 rounded-lg font-mono" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">IP 주소</label>
                    <input type="text" id="ip" placeholder="10.120.3.XXX" class="w-full border p-3 rounded-lg font-mono">
                </div>
            </div>

            <div id="monitorSection" class="hidden bg-blue-50 p-6 rounded-xl space-y-4 border border-blue-100">
                <h3 class="font-bold text-blue-800">🖥️ 연결 모니터 정보</h3>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="m_brand" placeholder="모니터 제조사" class="border p-3 rounded-lg w-full">
                    <input type="text" id="m_model" placeholder="모니터 모델명" class="border p-3 rounded-lg w-full">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">비고</label>
                <textarea id="note" rows="2" placeholder="기타 특이사항" class="w-full border p-3 rounded-lg"></textarea>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 shadow-lg transition">
                등록 및 QR 생성
            </button>
        </form>

        <div id="qrResult" class="hidden mt-10 p-6 border-2 border-dashed border-gray-300 rounded-xl text-center bg-gray-50">
            <h3 class="font-bold mb-4 text-gray-700">✅ 등록 성공!</h3>
            <div id="qrcode" class="flex justify-center mb-4 bg-white p-2 inline-block"></div>
            <p id="qrText" class="text-xs font-mono text-blue-600 font-bold mb-4"></p>
            <button onclick="location.reload()" class="bg-gray-800 text-white px-6 py-2 rounded-lg text-sm">추가 등록하기</button>
        </div>
    </div>

    <script>
        // 1. 페이지 로드되자마자 세션에서 비밀번호 가져오기 (★ 추가)
        const savedPw = sessionStorage.getItem('asset_pw');

        // 2. 비밀번호가 없으면 로그인 페이지로 쫓아내기 (★ 추가)
        if (!savedPw) {
            alert("로그인이 필요합니다.");
            location.href = 'login.html';
        }
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyZvgICRHPoQFHKrRX-bI27Ti9RUNWMjdMOlDTzzSNdviEjC1Gxpa0jlMYBi5bOotLyxQ/exec";

        function updateFormLayout() {
            const type = document.getElementById('assetType').value;
            document.getElementById('monitorSection').classList.toggle('hidden', type !== '데스크톱');
        }

        document.getElementById('assetForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const snVal = document.getElementById('sn').value;

            const formData = {
                user: document.getElementById('user').value,
                group: document.getElementById('group').value,
                date: document.getElementById('date').value,
                type: document.getElementById('assetType').value,
                brand: document.getElementById('brand').value,
                model: document.getElementById('model').value,
                sn: snVal,
                ip: document.getElementById('ip').value,
                note: document.getElementById('note').value
            };

            const items = [formData];
            if (formData.type === '데스크톱') {
                items.push({ ...formData, type: '모니터(세트)', brand: document.getElementById('m_brand').value, model: document.getElementById('m_model').value, sn: '본체연결', linkedId: snVal });
            }

            btn.disabled = true;
            btn.innerText = "전송 중...";
            Swal.fire({ title: '데이터 저장 중...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

            try {
            const response = await fetch(GAS_URL, {
                method: "POST",
                mode: "cors", // 보안을 위해 cors로 변경 권장 (GAS에서 응답을 읽기 위함)
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ 
                    items: items, 
                    ip: formData.ip, 
                    pw: savedPw  // 세션에 저장된 비번 전송
                })
            });

            const resultText = await response.text();
            if (resultText.includes("인증 실패")) {
                alert("비밀번호 인증에 실패했습니다.");
                btn.disabled = false;
                btn.innerText = "등록 및 QR 생성";
                return;
            }

            Swal.fire("등록 완료!", "구글 시트에 저장되었습니다.", "success");
            showQR(formData);
            } catch (err) {
                Swal.fire("오류", "전송 실패: " + err, "error");
                btn.disabled = false;
            }
        };

        function showQR(data) {
            const qrDiv = document.getElementById('qrcode');
            const currentPath = window.location.href.split('write.html')[0];
            const viewUrl = `${currentPath}view.html?sn=${encodeURIComponent(data.sn)}`;
            const qrImageUrl = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${encodeURIComponent(viewUrl)}`;

            qrDiv.innerHTML = `<img src="${qrImageUrl}" class="border p-1" />`;
            document.getElementById('qrText').innerText = `S/N: ${data.sn}`;
            document.getElementById('qrResult').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
