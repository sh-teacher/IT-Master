<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT 자산 등록 - IT Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-blue-600 text-white p-4 shadow-md mb-6">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <span class="font-bold text-lg">💻 IT 자산 관리</span>
            <div class="space-x-4 text-sm font-medium">
                <a href="index.html" class="bg-blue-700 px-3 py-1 rounded">등록</a>
                <a href="list.html" class="hover:underline">목록현황</a>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-lg border border-gray-200 mb-10">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">➕ 신규 자산 등록</h1>
        
        <form id="assetForm" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">자산 유형 *</label>
                    <select id="assetType" class="w-full border-gray-300 border p-3 rounded-lg bg-white" onchange="updateFormLayout()">
                        <option value="노트북">노트북</option>
                        <option value="데스크톱">데스크톱PC (+모니터 세트)</option>
                        <option value="태블릿">태블릿</option>
                        <option value="프린터">프린터/복합기/복사기</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">사용자 성명 *</label>
                    <input type="text" id="user" placeholder="성함 입력" class="w-full border border-gray-300 p-3 rounded-lg" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">부서/그룹명</label>
                    <input type="text" id="group" placeholder="부서명 입력" class="w-full border border-gray-300 p-3 rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">취득일</label>
                    <input type="date" id="date" class="w-full border border-gray-300 p-3 rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">제조사/브랜드</label>
                    <input type="text" id="brand" placeholder="예: 삼성, LG, HP" class="w-full border border-gray-300 p-3 rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">모델명</label>
                    <input type="text" id="model" placeholder="상세 모델명" class="w-full border border-gray-300 p-3 rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">시리얼 번호 (S/N) *</label>
                    <input type="text" id="sn" placeholder="기기 고유 번호" class="w-full border border-gray-300 p-3 rounded-lg font-mono" required>
                </div>
                <div id="ipContainer">
                    <label class="block text-sm font-semibold text-gray-700 mb-1">IP 주소</label>
                    <input type="text" id="ip" placeholder="10.120.3.XXX" class="w-full border border-gray-300 p-3 rounded-lg font-mono">
                </div>
            </div>

            <div id="monitorSection" class="hidden border-2 border-blue-50 bg-blue-50 p-6 rounded-xl space-y-4">
                <h3 class="font-bold text-blue-800 flex items-center gap-2">🖥️ 연결 모니터 정보</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="m_brand" placeholder="모니터 제조사" class="border border-gray-300 p-3 rounded-lg bg-white">
                    <input type="text" id="m_model" placeholder="모니터 모델명" class="border border-gray-300 p-3 rounded-lg bg-white">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">비고</label>
                <textarea id="note" rows="2" placeholder="특이사항 입력" class="w-full border border-gray-300 p-3 rounded-lg"></textarea>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition shadow-lg">
                자산 등록 및 QR 생성
            </button>
        </form>

        <div id="qrResult" class="hidden mt-10 p-6 border-2 border-dashed border-gray-300 rounded-xl text-center bg-gray-50">
            <h3 class="font-bold mb-4 text-gray-700">✅ 등록 성공! 기기 부착용 QR</h3>
            <div id="qrcode" class="flex justify-center mb-4 bg-white p-2 inline-block shadow-sm"></div>
            <p id="qrText" class="text-sm font-mono text-blue-600 font-bold mb-4"></p>
            <div class="flex justify-center gap-2">
                <button onclick="window.print()" class="bg-white border border-gray-300 px-4 py-2 rounded-lg text-sm hover:bg-gray-100">인쇄하기</button>
                <button onclick="location.reload()" class="bg-gray-800 text-white px-4 py-2 rounded-lg text-sm hover:bg-gray-900">새로 등록</button>
            </div>
        </div>
    </div>

    <script>
        // *** 여기에 본인의 구글 스크립트 URL을 넣으세요 ***
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyZvgICRHPoQFHKrRX-bI27Ti9RUNWMjdMOlDTzzSNdviEjC1Gxpa0jlMYBi5bOotLyxQ/exec";

        function updateFormLayout() {
            const type = document.getElementById('assetType').value;
            document.getElementById('monitorSection').classList.toggle('hidden', type !== '데스크톱');
        }

        document.getElementById('assetForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const snVal = document.getElementById('sn').value;

            // 데이터 정리
            const formData = {
                user: document.getElementById('user').value,
                group: document.getElementById('group').value,
                date: document.getElementById('date').value,
                type: document.getElementById('assetType').value,
                brand: document.getElementById('brand').value,
                model: document.getElementById('model').value,
                sn: snVal,
                ip: document.getElementById('ip').value,
                note: document.getElementById('note').value
            };

            const items = [formData];
            if (formData.type === '데스크톱') {
                items.push({ ...formData, type: '모니터(세트)', brand: document.getElementById('m_brand').value, model: document.getElementById('m_model').value, sn: '본체연결', linkedId: snVal });
            }

            btn.disabled = true;
            btn.innerText = "전송 중...";
            Swal.fire({ title: '데이터 전송 중...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

            try {
                await fetch(GAS_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ items, ip: formData.ip })
                });

                setTimeout(() => {
                    Swal.fire("성공!", "구글 시트에 등록되었습니다.", "success");
                    btn.disabled = false;
                    btn.innerText = "자산 등록 및 QR 생성";
                    showQR(formData);
                }, 1000);
            } catch (err) {
                Swal.fire("오류", "전송 실패: " + err, "error");
                btn.disabled = false;
            }
        };

        function showQR(data) {
            const qrDiv = document.getElementById('qrcode');
            // QR 스캔 시 view.html로 연결되도록 현재 주소 기반 URL 생성
            const currentPath = window.location.href.split('index.html')[0];
            const viewUrl = `${currentPath}view.html?sn=${encodeURIComponent(data.sn)}`;
            const qrImageUrl = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${encodeURIComponent(viewUrl)}`;

            qrDiv.innerHTML = `<img src="${qrImageUrl}" alt="QR" class="border p-1" />`;
            document.getElementById('qrText').innerText = `S/N: ${data.sn}`;
            document.getElementById('qrResult').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
