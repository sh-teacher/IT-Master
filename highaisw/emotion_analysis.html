<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 감정 분석</title>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
      padding: 20px;
    }
    h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }
    .subtitle { color: #888; font-size: 0.9rem; }
    #status { font-size: 0.85rem; color: #667eea; text-align: center; max-width: 320px; min-height: 1.2em; }
    .progress-wrap {
      width: 280px; background: #2a2a3e; border-radius: 8px;
      height: 8px; overflow: hidden;
      display: none; /* Hide progress bar for continuous analysis */
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 8px;
      width: 0%;
      transition: width 0.3s;
    }
    .video-wrap {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(102,126,234,0.4);
      position: relative;
    }
    video {
      display: block;
      background: #1a1a2e;
      transform: scaleX(-1); /* Mirror the video for a selfie-like view */
    }
    canvas {
      display: none; /* Hidden canvas for processing */
    }
    .controls { display: flex; gap: 12px; }
    button {
      padding: 10px 28px; border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: transform 0.1s;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.35; cursor: not-allowed; }
    #startBtn { background: linear-gradient(135deg, #2ecc71, #27ae60); color: #fff; }
    #stopBtn { background: #e74c3c; color: #fff; }

    .result-box {
      background: #1a1a2e; border: 1px solid #333;
      border-radius: 16px; padding: 20px 40px;
      text-align: center; min-width: 260px;
    }
    .result-label { font-size: 0.75rem; color: #888; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
    .result-emotion {
      font-size: 3rem; font-weight: 900; line-height: 1;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      min-height: 1em; /* To prevent layout shift */
    }
    .result-conf { font-size: 0.85rem; color: #aaa; margin-top: 8px; min-height: 1.2em; }
    .bar-wrap { margin-top: 16px; }
    .bar-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-size: 0.75rem; }
    .bar-label { width: 60px; text-align: right; color: #aaa; } /* Wider label for emotion names */
    .bar-bg { flex: 1; height: 8px; background: #2a2a3e; border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 4px; transition: width 0.4s ease; }
  </style>
</head>
<body>
  <h1>😊 AI 감정 분석</h1>
  <p class="subtitle">카메라로 얼굴을 촬영하여 감정을 분석합니다</p>
  <p id="status">카메라 준비 중...</p>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>

  <div class="video-wrap">
    <video id="webcamVideo" width="320" height="240" autoplay playsinline></video>
  </div>

  <div class="controls">
    <button id="startBtn">카메라 시작</button>
    <button id="stopBtn" disabled>카메라 중지</button>
  </div>

  <div class="result-box">
    <div class="result-label">현재 감정</div>
    <div class="result-emotion" id="resultEmotion">?</div>
    <div class="result-conf" id="resultConf">카메라를 시작해주세요</div>
    <div class="bar-wrap" id="barWrap"></div>
  </div>

  <script>
    const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/model';
    const EMOTION_KEYS = ['angry', 'disgusted', 'fearful', 'happy', 'sad', 'surprised', 'neutral'];
    const EMOTIONS    = ['화남',  '혐오',      '두려움',  '행복',  '슬픔',  '놀람',     '중립'];

    const statusEl        = document.getElementById('status');
    const webcamVideo     = document.getElementById('webcamVideo');
    const startBtn        = document.getElementById('startBtn');
    const stopBtn         = document.getElementById('stopBtn');
    const resultEmotionEl = document.getElementById('resultEmotion');
    const resultConfEl    = document.getElementById('resultConf');
    const barWrapEl       = document.getElementById('barWrap');

    let videoStream     = null;
    let isAnalyzing     = false;
    let analysisTimeout = null;

    function setStatus(msg, color = '#667eea') {
      statusEl.textContent = msg;
      statusEl.style.color = color;
    }

    async function loadEmotionModel() {
      setStatus('감정 분석 모델 로드 중... (최초 로드 시 시간이 걸릴 수 있습니다)');
      startBtn.disabled = true;
      try {
        await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
        await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
        await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
        setStatus('✅ 모델 로드 완료! 카메라 시작 버튼을 눌러주세요.', '#2ecc71');
        startBtn.disabled = false;
      } catch (err) {
        setStatus('❌ 모델 로드 실패: ' + err.message, '#e74c3c');
      }
    }

    async function startWebcam() {
      setStatus('카메라 접근 요청 중...');
      try {
        videoStream = await navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240 }, audio: false });
        webcamVideo.srcObject = videoStream;
        await webcamVideo.play();
        setStatus('얼굴을 카메라 앞에 위치시켜주세요.', '#2ecc71');
        startBtn.disabled = true;
        stopBtn.disabled = false;
        isAnalyzing = true;
        analyzeEmotion();
      } catch (err) {
        setStatus('❌ 카메라 접근 실패: ' + err.message, '#e74c3c');
        startBtn.disabled = false;
        stopBtn.disabled = true;
      }
    }

    function stopWebcam() {
      isAnalyzing = false;
      if (analysisTimeout) { clearTimeout(analysisTimeout); analysisTimeout = null; }
      if (videoStream) {
        videoStream.getTracks().forEach(t => t.stop());
        webcamVideo.srcObject = null;
        videoStream = null;
      }
      setStatus('카메라 중지됨.', '#e74c3c');
      startBtn.disabled = false;
      stopBtn.disabled = true;
      resultEmotionEl.textContent = '?';
      resultConfEl.textContent = '카메라를 시작해주세요';
      barWrapEl.innerHTML = '';
    }

    async function analyzeEmotion() {
      if (!isAnalyzing) return;

      if (webcamVideo.readyState === webcamVideo.HAVE_ENOUGH_DATA) {
        try {
          const detection = await faceapi
            .detectSingleFace(webcamVideo, new faceapi.TinyFaceDetectorOptions())
            .withFaceLandmarks()
            .withFaceExpressions();

          if (detection) {
            const expr  = detection.expressions;
            const probs = EMOTION_KEYS.map(k => expr[k] || 0);
            displayResults(probs);
            setStatus('얼굴 감지됨 - 분석 중...', '#2ecc71');
          } else {
            setStatus('얼굴을 카메라 앞에 위치시켜주세요.', '#f39c12');
          }
        } catch (err) {
          console.error('Analysis error:', err);
        }
      }

      if (isAnalyzing) {
        analysisTimeout = setTimeout(analyzeEmotion, 400);
      }
    }

    function displayResults(probs) {
      const bestIndex  = probs.indexOf(Math.max(...probs));
      const confidence = probs[bestIndex] * 100;

      resultEmotionEl.textContent = EMOTIONS[bestIndex];
      resultConfEl.textContent    = `신뢰도: ${confidence.toFixed(1)}%`;

      barWrapEl.innerHTML = probs.map((p, i) => `
        <div class="bar-row">
          <span class="bar-label">${EMOTIONS[i]}</span>
          <div class="bar-bg"><div class="bar-fill" style="width:${(p * 100).toFixed(1)}%"></div></div>
          <span style="font-size:0.7rem;color:#aaa;width:38px">${(p * 100).toFixed(1)}%</span>
        </div>`).join('');
    }

    startBtn.addEventListener('click', startWebcam);
    stopBtn.addEventListener('click', stopWebcam);

    loadEmotionModel();
  </script>
</body>
</html>
