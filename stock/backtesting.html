<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SH 포트폴리오 백테스팅</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:   #4f46e5;
            --primary-hover: #4338ca;
            --accent:    #6366f1;
            --up:        #ef4444;
            --down:      #3b82f6;
            --bg:        #f5f4f9;
            --card:      #ffffff;
            --text:      #1e1b4b;
            --text-sub:  #6b7280;
            --border:    #e5e7eb;
            --muted:     #9ca3af;
            --surface:   #f9f8ff;
            --shadow:    0 1px 3px rgba(79,70,229,.06), 0 4px 16px rgba(79,70,229,.05);
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Pretendard', -apple-system, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        header {
            background: var(--primary);
            color: #fff;
            padding: 0 2rem;
            height: 58px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: -.01em;
            display: flex;
            align-items: center;
            gap: .45rem;
        }
        .logo-dot {
            width: 8px; height: 8px;
            background: #a5b4fc;
            border-radius: 50%;
            display: inline-block;
        }
        .header-nav {
            display: flex;
            gap: 1rem;
        }
        .nav-link {
            color: #fff;
            text-decoration: none;
            font-size: .9rem;
            padding: .4rem .8rem;
            border-radius: 6px;
            transition: background .15s;
        }
        .nav-link:hover { background: rgba(255,255,255,.15); }
        .nav-link.active { background: rgba(255,255,255,.25); }

        .wrap { max-width: 1380px; margin: 0 auto; padding: 1.5rem 1.25rem; }
        @media(max-width:768px){ .wrap { padding: 1rem .75rem; } }

        /* Search */
        .search-wrap { position: relative; margin-bottom: 1.5rem; }
        .search-input {
            width: 100%;
            padding: .85rem 1.2rem .85rem 2.9rem;
            font-size: 1rem;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            outline: none;
            background: var(--card);
            color: var(--text);
            transition: border-color .18s, box-shadow .18s;
            box-shadow: var(--shadow);
        }
        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99,102,241,.12);
        }
        .search-icon {
            position: absolute;
            left: .95rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 1rem;
            pointer-events: none;
        }
        .ac-list {
            position: absolute;
            top: calc(100% + 6px);
            left: 0; width: 100%;
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(79,70,229,.1);
            z-index: 1000;
            max-height: 240px;
            overflow-y: auto;
            padding: .3rem;
            list-style: none;
            display: none;
        }
        .ac-list li {
            padding: .65rem 1rem;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            font-size: .92rem;
            transition: background .12s;
        }
        .ac-list li:hover { background: var(--surface); }

        /* Card */
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 1.4rem 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 1.25rem;
        }
        .card-title {
            font-size: 1rem;
            font-weight: 700;
            margin: 0 0 1rem;
            color: var(--text);
        }

        /* Portfolio grid */
        .port-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 1.25rem; margin-bottom: 1.25rem; }
        @media(max-width:768px){ .port-grid { grid-template-columns: 1fr; } }

        /* Portfolio items */
        .port-items {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: .5rem;
        }
        .port-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: .7rem .85rem;
            margin-bottom: .4rem;
            font-size: .9rem;
        }
        .port-item-left {
            flex: 1;
        }
        .port-item-name {
            font-weight: 600;
            color: var(--text);
        }
        .port-item-code {
            font-size: .75rem;
            color: var(--muted);
            margin-top: .15rem;
        }
        .port-item-weight {
            display: flex;
            align-items: center;
            gap: .4rem;
        }
        .port-item-weight input {
            width: 60px;
            padding: .4rem .5rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: .85rem;
        }
        .port-item-weight span {
            font-size: .8rem;
            color: var(--muted);
            min-width: 20px;
        }
        .btn-remove {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
            padding: .25rem .5rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: .75rem;
            margin-left: .4rem;
            transition: all .15s;
        }
        .btn-remove:hover { background: #fee2e2; }

        .port-weight-total {
            background: var(--primary);
            color: #fff;
            padding: .5rem .85rem;
            border-radius: 10px;
            margin-top: .5rem;
            text-align: right;
            font-weight: 600;
            font-size: .9rem;
        }

        /* Form fields */
        .sim-field { margin-bottom: .9rem; }
        .sim-field label {
            display: block;
            margin-bottom: .35rem;
            font-weight: 600;
            font-size: .82rem;
            color: var(--text-sub);
            letter-spacing: .01em;
        }
        .sim-field input,
        .sim-field select {
            width: 100%;
            padding: .7rem .9rem;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: .92rem;
            font-family: inherit;
            color: var(--text);
            background: var(--card);
            outline: none;
            transition: border-color .15s, box-shadow .15s;
        }
        .sim-field input:focus,
        .sim-field select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99,102,241,.1);
        }

        .btn-run {
            width: 100%;
            background: var(--primary);
            color: #fff;
            border: none;
            padding: .85rem;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: .95rem;
            font-family: inherit;
            margin-top: .6rem;
            transition: background .15s, transform .1s;
            letter-spacing: .01em;
        }
        .btn-run:hover { background: var(--primary-hover); }
        .btn-run:active { transform: scale(.99); }

        .btn-mini {
            font-size: .72rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 7px;
            padding: .2rem .6rem;
            cursor: pointer;
            color: var(--text-sub);
            font-family: inherit;
            transition: all .15s;
            width: auto;
            display: inline-block;
        }
        .btn-mini:hover { border-color: var(--accent); color: var(--accent); }

        .chart-wrap { position: relative; height: 350px; }

        .metric-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: .8rem;
            margin-top: 1rem;
        }
        @media(max-width:768px){ .metric-grid { grid-template-columns: repeat(2, 1fr); } }

        .metric-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: .8rem;
            text-align: center;
        }
        .metric-label {
            font-size: .75rem;
            color: var(--muted);
            margin-bottom: .3rem;
            font-weight: 500;
        }
        .metric-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
        }
        .metric-value.pos { color: var(--up); }
        .metric-value.neg { color: var(--down); }

        .section-label {
            font-size: .7rem;
            font-weight: 700;
            letter-spacing: .08em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: .65rem;
            padding-left: .1rem;
        }

        @media(max-width:768px){
            .port-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<header>
    <div class="logo">
        <span class="logo-dot"></span>
        SH Stock 시뮬레이터
    </div>
    <div class="header-nav">
        <a href="index.html" class="nav-link">차트 분석</a>
        <a href="backtesting.html" class="nav-link active">포트폴리오</a>
    </div>
</header>

<div class="wrap">

    <div class="port-grid">
        <!-- 포트폴리오 설정 -->
        <div class="card">
            <div class="card-title">📊 포트폴리오 구성</div>

            <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input id="s-input" class="search-input" type="text" autocomplete="off"
                       placeholder="종목 검색 (예: 삼성전자, AAPL)">
                <ul id="s-list" class="ac-list"></ul>
            </div>

            <div class="port-items" id="port-items"></div>

            <button class="btn-mini" onclick="clearPortfolio()" style="width:100%;margin-top:.6rem;">포트폴리오 초기화</button>
        </div>

        <!-- 백테스팅 설정 -->
        <div class="card">
            <div class="card-title">⚙️ 백테스팅 설정</div>

            <div class="sim-field">
                <label>시작 날짜</label>
                <input type="date" id="bt-start-date" value="2024-01-01">
            </div>

            <div class="sim-field">
                <label>시작 자본 (원)</label>
                <input type="number" id="bt-capital" value="10000000">
            </div>

            <div class="sim-field">
                <label>리밸런싱</label>
                <select id="bt-rebalance">
                    <option value="none">안 함</option>
                    <option value="monthly">매월</option>
                    <option value="quarterly">분기별</option>
                    <option value="yearly">연 1회</option>
                </select>
            </div>

            <button class="btn-run" onclick="runBacktest()">백테스팅 실행 →</button>
        </div>
    </div>

    <!-- 결과 -->
    <div class="card" id="result-card" style="display:none;">
        <div class="card-title">📈 백테스팅 결과</div>

        <div class="chart-wrap">
            <canvas id="btChart"></canvas>
        </div>

        <div class="metric-grid" id="metrics"></div>

        <div id="result-detail" style="margin-top:1.2rem;font-size:.88rem;color:#4b5563;line-height:1.75;"></div>
    </div>

</div>

<script>
const API = "https://9nbhzzof1k.execute-api.ap-northeast-2.amazonaws.com/default/stock-api-test";

let portfolio = [];
let btChart = null;

function fmt(v) {
    const n = Number(v);
    return (isFinite(n) ? n : 0).toLocaleString();
}

async function fetchJSON(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    let data = await res.json();
    if (typeof data === 'string') { try { data = JSON.parse(data); } catch(e) {} }
    if (data && data.body !== undefined && data.statusCode !== undefined) {
        try { data = typeof data.body === 'string' ? JSON.parse(data.body) : data.body; } catch(e) {}
    }
    return data;
}

function renderPortfolio() {
    const container = document.getElementById('port-items');
    container.innerHTML = '';

    if (portfolio.length === 0) {
        container.innerHTML = '<div style="padding:1rem;color:var(--muted);text-align:center;font-size:.85rem;">종목을 추가해주세요.</div>';
        return;
    }

    const total = portfolio.reduce((sum, p) => sum + p.weight, 0);
    portfolio.forEach(item => {
        const div = document.createElement('div');
        div.className = 'port-item';
        div.innerHTML = `
            <div class="port-item-left">
                <div class="port-item-name">${item.name}</div>
                <div class="port-item-code">${item.code}</div>
            </div>
            <div class="port-item-weight">
                <input type="number" min="0" max="100" step="1" value="${item.weight}"
                       onchange="updateWeight('${item.code}', this.value)">
                <span>%</span>
                <button class="btn-remove" onclick="removeFromPortfolio('${item.code}')">×</button>
            </div>
        `;
        container.appendChild(div);
    });

    const totalDiv = document.createElement('div');
    totalDiv.className = 'port-weight-total';
    totalDiv.innerText = `총 비율: ${total.toFixed(1)}%`;
    container.appendChild(totalDiv);
}

function updateWeight(code, value) {
    const item = portfolio.find(p => p.code === code);
    if (item) item.weight = Math.max(0, Math.min(100, parseFloat(value) || 0));
    renderPortfolio();
}

function removeFromPortfolio(code) {
    portfolio = portfolio.filter(p => p.code !== code);
    renderPortfolio();
}

function clearPortfolio() {
    if (!portfolio.length) return;
    if (confirm('포트폴리오를 초기화하시겠습니까?')) {
        portfolio = [];
        renderPortfolio();
    }
}

// Search
const sInput = document.getElementById('s-input');
const sList  = document.getElementById('s-list');
let   sTimer = null;

sInput.addEventListener('input', function() {
    const kw = this.value.trim();
    clearTimeout(sTimer);
    if (!kw) { sList.style.display='none'; return; }
    sTimer = setTimeout(async () => {
        try {
            const res = await fetch(API + '?mode=search&keyword=' + encodeURIComponent(kw));
            const arr = await res.json();
            sList.innerHTML = '';
            if (arr.length) {
                arr.forEach(s => {
                    const li = document.createElement('li');
                    const flag = s.market === 'US' ? '🇺🇸 ' : '🇰🇷 ';
                    li.innerHTML = '<span>' + flag + s.name + '</span><span style="color:var(--muted);font-size:.82rem;">' + s.code + '</span>';
                    li.onclick = () => selectStockForPortfolio(s);
                    sList.appendChild(li);
                });
                sList.style.display = 'block';
            } else {
                sList.style.display = 'none';
            }
        } catch(e) { console.error(e); }
    }, 300);
});
document.addEventListener('click', e => { if (e.target !== sInput) sList.style.display = 'none'; });

function selectStockForPortfolio(stock) {
    if (portfolio.find(p => p.code === stock.code)) {
        alert('이미 추가된 종목입니다.');
        return;
    }
    if (portfolio.length >= 10) {
        alert('최대 10개까지 추가 가능합니다.');
        return;
    }
    portfolio.push({ name: stock.name, code: stock.code, weight: 0, data: null });
    renderPortfolio();
    sInput.value = '';
    sList.style.display = 'none';
}

function findPriceByDate(daily, ymd) {
    let result = null;
    for (let i = 0; i < daily.length; i++) {
        if (daily[i].d <= ymd) result = daily[i]; else break;
    }
    return result;
}

async function runBacktest() {
    if (!portfolio.length) {
        alert('포트폴리오에 종목을 추가해주세요.');
        return;
    }

    const total = portfolio.reduce((sum, p) => sum + p.weight, 0);
    if (Math.abs(total - 100) > 0.1) {
        alert('종목 비율의 합이 100%가 되어야 합니다. (현재: ' + total.toFixed(1) + '%)');
        return;
    }

    const startDate = document.getElementById('bt-start-date').value;
    const capital = parseInt(document.getElementById('bt-capital').value) || 0;
    const rebalance = document.getElementById('bt-rebalance').value;

    if (!startDate || capital <= 0) {
        alert('시작 날짜와 시작 자본을 입력해주세요.');
        return;
    }

    // 각 종목 데이터 로드
    try {
        document.getElementById('result-card').style.display = 'none';
        let allLoaded = true;

        for (let p of portfolio) {
            try {
                const data = await fetchJSON(API + '?mode=data&code=' + p.code);
                if (!data || data.code === 'ERROR') {
                    alert('종목 ' + p.name + ' 데이터 오류');
                    allLoaded = false;
                    break;
                }
                p.data = data;
            } catch(e) {
                alert('종목 ' + p.name + ' 로드 실패: ' + e.message);
                allLoaded = false;
                break;
            }
        }

        if (!allLoaded) return;

        // 백테스팅 계산
        const startYMD = startDate.replace(/-/g, '');
        const now = new Date();
        const endYMD = now.toISOString().slice(0, 10).replace(/-/g, '');

        // 모든 거래일 수집 (공통 거래일만)
        const allDates = new Set();
        for (let p of portfolio) {
            const daily = p.data.dailyData || [];
            daily.forEach(d => allDates.add(d.d));
        }
        const dates = Array.from(allDates).sort();
        const validDates = dates.filter(d => d >= startYMD && d <= endYMD);

        if (!validDates.length) {
            alert('해당 기간에 거래일이 없습니다.');
            return;
        }

        // 포트폴리오 계산
        let holdings = {}; // code -> shares
        portfolio.forEach(p => holdings[p.code] = 0);

        const results = [];
        let lastRebalanceDate = startYMD;
        let totalValue = capital;

        for (let i = 0; i < validDates.length; i++) {
            const date = validDates[i];
            const isFirstDay = (i === 0);
            const shouldRebalance = isFirstDay || needsRebalance(date, lastRebalanceDate, rebalance);

            if (shouldRebalance) {
                // 현재 포트폴리오 가치 계산
                let currentValue = 0;
                for (let p of portfolio) {
                    const daily = p.data.dailyData || [];
                    const price = findPriceByDate(daily, date);
                    if (price && price.c) {
                        currentValue += holdings[p.code] * Number(price.c);
                    }
                }

                if (currentValue === 0) currentValue = capital;

                // 리밸런싱: 비율에 맞게 매매
                for (let p of portfolio) {
                    const daily = p.data.dailyData || [];
                    const price = findPriceByDate(daily, date);
                    if (price && price.c) {
                        const c = Number(price.c);
                        const targetValue = currentValue * (p.weight / 100);
                        holdings[p.code] = targetValue / c;
                    }
                }
                lastRebalanceDate = date;
            }

            // 현재 날짜의 포트폴리오 가치 계산
            totalValue = 0;
            for (let p of portfolio) {
                const daily = p.data.dailyData || [];
                const price = findPriceByDate(daily, date);
                if (price && price.c) {
                    totalValue += holdings[p.code] * Number(price.c);
                }
            }

            results.push({
                date: date,
                value: totalValue
            });
        }

        // 차트 그리기 및 메트릭 계산
        renderBacktestChart(results);
        calculateMetrics(results, capital);
        document.getElementById('result-card').style.display = 'block';

    } catch(e) {
        console.error('백테스팅 오류:', e);
        alert('백테스팅 실행 실패: ' + e.message);
    }
}

function needsRebalance(curDate, lastDate, type) {
    if (type === 'none') return false;
    const cur = new Date(curDate.slice(0, 4), parseInt(curDate.slice(4, 6)) - 1, curDate.slice(6, 8));
    const last = new Date(lastDate.slice(0, 4), parseInt(lastDate.slice(4, 6)) - 1, lastDate.slice(6, 8));
    const months = (cur.getFullYear() - last.getFullYear()) * 12 + (cur.getMonth() - last.getMonth());

    if (type === 'monthly') return months >= 1;
    if (type === 'quarterly') return months >= 3;
    if (type === 'yearly') return months >= 12;
    return false;
}

function renderBacktestChart(results) {
    const ctx = document.getElementById('btChart').getContext('2d');
    if (btChart) btChart.destroy();

    const labels = results.map(r => {
        const d = r.date;
        return d.slice(0, 4) + '-' + d.slice(4, 6) + '-' + d.slice(6, 8);
    });
    const values = results.map(r => r.value);

    btChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: '포트폴리오 가치',
                data: values,
                borderColor: '#6366f1',
                backgroundColor: 'rgba(99,102,241,.06)',
                borderWidth: 1.5,
                fill: true,
                tension: 0.25,
                pointRadius: 0,
                pointHoverRadius: 4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: true, position: 'top', labels: { font: { size: 11 }, boxWidth: 12 } },
                tooltip: { callbacks: { label: c => '₩' + Math.round(c.parsed.y).toLocaleString() } }
            },
            scales: {
                x: { ticks: { maxTicksLimit: 12, font: { size: 10 }, color: '#9ca3af' }, grid: { color: 'rgba(0,0,0,.04)' } },
                y: { ticks: { callback: v => '₩' + Math.round(v).toLocaleString(), color: '#9ca3af' }, grid: { color: 'rgba(0,0,0,.04)' } }
            }
        }
    });
}

function calculateMetrics(results, startCapital) {
    if (!results.length) return;

    const endValue = results[results.length - 1].value;
    const returnAmount = endValue - startCapital;
    const returnRate = (returnAmount / startCapital) * 100;

    // MDD (Maximum Drawdown) 계산
    let peak = results[0].value;
    let maxDD = 0;
    for (let r of results) {
        peak = Math.max(peak, r.value);
        const dd = ((peak - r.value) / peak) * 100;
        maxDD = Math.max(maxDD, dd);
    }

    // 샤프 비율 (간단한 계산)
    let sumReturn = 0, sumReturnSq = 0;
    for (let i = 1; i < results.length; i++) {
        const dailyReturn = (results[i].value - results[i-1].value) / results[i-1].value;
        sumReturn += dailyReturn;
        sumReturnSq += dailyReturn * dailyReturn;
    }
    const avgDailyReturn = sumReturn / (results.length - 1);
    const variance = (sumReturnSq / (results.length - 1)) - (avgDailyReturn * avgDailyReturn);
    const stdDev = Math.sqrt(Math.max(0, variance));
    const sharpeRatio = stdDev > 0 ? (avgDailyReturn / stdDev) * Math.sqrt(252) : 0;

    // 누적 수익률
    const cumulativeReturn = ((endValue - startCapital) / startCapital) * 100;

    // 메트릭 표시
    const metricsEl = document.getElementById('metrics');
    metricsEl.innerHTML = `
        <div class="metric-box">
            <div class="metric-label">최종 자산</div>
            <div class="metric-value ${returnAmount >= 0 ? 'pos' : 'neg'}">₩${fmt(Math.round(endValue))}</div>
        </div>
        <div class="metric-box">
            <div class="metric-label">수익률</div>
            <div class="metric-value ${returnRate >= 0 ? 'pos' : 'neg'}">${returnRate >= 0 ? '+' : ''}${returnRate.toFixed(2)}%</div>
        </div>
        <div class="metric-box">
            <div class="metric-label">최대낙폭 (MDD)</div>
            <div class="metric-value neg">-${maxDD.toFixed(2)}%</div>
        </div>
        <div class="metric-box">
            <div class="metric-label">샤프 비율</div>
            <div class="metric-value">${sharpeRatio.toFixed(2)}</div>
        </div>
    `;

    // 상세 정보
    const detailEl = document.getElementById('result-detail');
    detailEl.innerHTML = `
        <p style="margin:0 0 .3rem"><strong>📌 포트폴리오:</strong> ${portfolio.map(p => p.name + ' ' + p.weight + '%').join(' + ')}</p>
        <p style="margin:0 0 .3rem"><strong>💵 시작 자본:</strong> ₩${fmt(startCapital)}</p>
        <p style="margin:0 0 .3rem"><strong>📈 수익:</strong> ₩${fmt(returnAmount)} (${returnRate >= 0 ? '+' : ''}${returnRate.toFixed(2)}%)</p>
        <p style="margin:0 0 .3rem"><strong>📊 최대낙폭:</strong> -${maxDD.toFixed(2)}%</p>
        <p style="margin:0"><strong>⚡ 샤프 비율:</strong> ${sharpeRatio.toFixed(2)} (높을수록 좋음)</p>
    `;
}

window.onload = () => {
    renderPortfolio();
};
</script>
</body>
</html>
