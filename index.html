<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT 자산 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://rawgit.com/davidshimjs/qrcodejs/master/qrcode.min.js"></script>
</head>
<body class="bg-gray-100 p-4 md:p-10">
    <div class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-lg">
        <h1 class="text-2xl font-bold mb-6 text-blue-600 font-sans">💻 IT 자산 등록 시스템</h1>
        
        <form id="assetForm" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <select id="assetType" class="border p-3 rounded-lg bg-white" onchange="updateFormLayout()">
                    <option value="노트북">노트북</option>
                    <option value="데스크톱">데스크톱PC (+모니터)</option>
                    <option value="태블릿">태블릿</option>
                    <option value="프린터">프린터/복합기</option>
                </select>
                <input type="text" id="user" placeholder="사용자 성명" class="border p-3 rounded-lg" required>
                <input type="text" id="group" placeholder="부서명" class="border p-3 rounded-lg">
                <input type="date" id="date" class="border p-3 rounded-lg">
                <input type="text" id="brand" placeholder="제조사" class="border p-3 rounded-lg">
                <input type="text" id="model" placeholder="모델명" class="border p-3 rounded-lg">
                <input type="text" id="sn" placeholder="시리얼 번호(S/N)" class="border p-3 rounded-lg">
                <input type="text" id="ip" placeholder="IP (10.120.3.XXX)" class="border p-3 rounded-lg">
            </div>

            <div id="monitorSection" class="hidden bg-blue-50 p-4 rounded-lg border border-blue-100">
                <h3 class="font-bold mb-2 text-blue-800">🖥️ 연결 모니터 정보</h3>
                <input type="text" id="m_brand" placeholder="모니터 제조사" class="border p-2 rounded w-full mb-2">
                <input type="text" id="m_model" placeholder="모니터 모델명" class="border p-2 rounded w-full">
            </div>

            <textarea id="note" placeholder="비고 (특이사항)" class="border p-3 rounded-lg w-full"></textarea>
            
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-all shadow-md">
                자산 등록 및 QR 생성
            </button>
        </form>

        <div id="qrResult" class="hidden mt-10 p-6 border-2 border-dashed border-gray-300 rounded-xl text-center bg-gray-50">
            <h3 class="font-bold mb-4 text-gray-700">✅ 등록 완료! 기기 부착용 QR</h3>
            <div id="qrcode" class="flex justify-center mb-4 bg-white p-2 inline-block"></div>
            <p id="qrText" class="text-sm font-mono text-blue-600 font-bold"></p>
            <button onclick="location.reload()" class="mt-4 bg-white border border-gray-300 px-6 py-2 rounded-lg text-sm hover:bg-gray-100">새로 등록하기</button>
        </div>
    </div>

    <script>
        // *** 1. 구글 앱스 스크립트 URL을 "한 줄로" 정확히 입력하세요 ***
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyZvgICRHPoQFHKrRX-bI27Ti9RUNWMjdMOlDTzzSNdviEjC1Gxpa0jlMYBi5bOotLyxQ/exec";

        function updateFormLayout() {
            const type = document.getElementById('assetType').value;
            document.getElementById('monitorSection').classList.toggle('hidden', type !== '데스크톱');
        }

        document.getElementById('assetForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            
            // 데이터 수집
            const assetType = document.getElementById('assetType').value;
            const snVal = document.getElementById('sn').value || "N/A";
            const formData = {
                user: document.getElementById('user').value,
                group: document.getElementById('group').value,
                date: document.getElementById('date').value,
                note: document.getElementById('note').value,
                type: assetType,
                brand: document.getElementById('brand').value,
                model: document.getElementById('model').value,
                sn: snVal,
                ip: document.getElementById('ip').value
            };

            const items = [formData];
            if (assetType === '데스크톱') {
                items.push({ 
                    ...formData, 
                    type: '모니터(세트)', 
                    brand: document.getElementById('m_brand').value, 
                    model: document.getElementById('m_model').value, 
                    sn: '본체연결', 
                    linkedId: snVal 
                });
            }

            // UI 처리
            btn.disabled = true;
            btn.innerText = "전송 중...";
            Swal.fire({ title: '데이터 전송 중...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

            // 서버 전송
            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ items, ip: formData.ip })
            })
            .then(() => {
                // 전송 성공 시 처리
                setTimeout(() => {
                    Swal.fire({
                        title: "성공!",
                        text: "시트에 등록되었습니다.",
                        icon: "success",
                        timer: 1500,
                        showConfirmButton: false
                    });
                    btn.disabled = false;
                    btn.innerText = "자산 등록 및 QR 생성";
                    showQR(formData);
                }, 1000);
            })
            .catch(err => {
                Swal.fire("오류", "전송 실패: " + err, "error");
                btn.disabled = false;
                btn.innerText = "다시 시도";
            });
        });

        function showQR(data) {
            const qrDiv = document.getElementById('qrcode');
            qrDiv.innerHTML = ""; // 초기화
            
            // 핵심 정보만 담아서 QR 생성 (너무 길면 생성 에러 날 수 있음)
            const qrContent = `유형:${data.type}\n사용자:${data.user}\nSN:${data.sn}\nIP:${data.ip || '-'}`;
            
            try {
                if (typeof QRCode === "undefined") {
                    throw new Error("라이브러리 로딩 실패");
                }
                new QRCode(qrDiv, {
                    text: qrContent,
                    width: 160,
                    height: 160,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
                document.getElementById('qrText').innerText = `S/N: ${data.sn}`;
                document.getElementById('qrResult').classList.remove('hidden');
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            } catch (e) {
                console.error("QR 생성 실패:", e);
                Swal.fire("참고", "데이터는 등록되었으나 QR 생성에 실패했습니다. (라이브러리 로딩 지연)", "warning");
            }
        }
    </script>
</body>
</html>
