<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 숫자 인식</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }
    h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }
    .subtitle { color: #888; font-size: 0.9rem; }
    .canvas-wrap {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(102,126,234,0.4);
    }
    canvas {
      display: block;
      cursor: crosshair;
      background: #1a1a2e;
    }
    .controls {
      display: flex;
      gap: 12px;
    }
    button {
      padding: 10px 28px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    button:active { transform: scale(0.97); }
    #clearBtn {
      background: #e74c3c;
      color: #fff;
    }
    #recognizeBtn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
    }
    .result-box {
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 20px 40px;
      text-align: center;
      min-width: 260px;
    }
    .result-label { font-size: 0.8rem; color: #888; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
    .result-number {
      font-size: 5rem;
      font-weight: 900;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    .result-conf { font-size: 0.85rem; color: #aaa; margin-top: 8px; }
    .bar-wrap { margin-top: 16px; }
    .bar-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-size: 0.75rem; }
    .bar-label { width: 14px; text-align: right; color: #aaa; }
    .bar-bg { flex: 1; height: 8px; background: #2a2a3e; border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 4px; transition: width 0.4s ease; }
    #status { font-size: 0.8rem; color: #667eea; }
  </style>
</head>
<body>
  <h1>✏️ AI 숫자 인식</h1>
  <p class="subtitle">캔버스에 숫자(0~9)를 그리면 AI가 인식합니다</p>
  <p id="status">모델 로딩 중...</p>

  <div class="canvas-wrap">
    <canvas id="drawCanvas" width="280" height="280"></canvas>
  </div>

  <div class="controls">
    <button id="clearBtn">지우기</button>
    <button id="recognizeBtn">인식하기</button>
  </div>

  <div class="result-box">
    <div class="result-label">인식 결과</div>
    <div class="result-number" id="resultNum">?</div>
    <div class="result-conf" id="resultConf">숫자를 그린 후 인식하기를 눌러주세요</div>
    <div class="bar-wrap" id="barWrap"></div>
  </div>

  <script>
    const canvas = document.getElementById('drawCanvas');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('status');
    let drawing = false;
    let model = null;
    let hasDrawing = false;

    ctx.lineWidth = 22;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = '#fff';

    function getPos(e) {
      const r = canvas.getBoundingClientRect();
      if (e.touches) {
        return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top };
      }
      return { x: e.clientX - r.left, y: e.clientY - r.top };
    }

    canvas.addEventListener('mousedown', e => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); });
    canvas.addEventListener('mousemove', e => {
      if (!drawing) return;
      const p = getPos(e);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      hasDrawing = true;
    });
    canvas.addEventListener('mouseup', () => { drawing = false; if (hasDrawing) autoRecognize(); });
    canvas.addEventListener('mouseleave', () => { drawing = false; });

    canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); }, { passive: false });
    canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); hasDrawing = true; }, { passive: false });
    canvas.addEventListener('touchend', () => { drawing = false; if (hasDrawing) autoRecognize(); });

    document.getElementById('clearBtn').addEventListener('click', () => {
      ctx.clearRect(0, 0, 280, 280);
      hasDrawing = false;
      document.getElementById('resultNum').textContent = '?';
      document.getElementById('resultConf').textContent = '숫자를 그린 후 인식하기를 눌러주세요';
      document.getElementById('barWrap').innerHTML = '';
    });

    document.getElementById('recognizeBtn').addEventListener('click', recognize);

    let autoTimer = null;
    function autoRecognize() {
      clearTimeout(autoTimer);
      autoTimer = setTimeout(recognize, 800);
    }

    async function recognize() {
      if (!model || !hasDrawing) return;
      const tensor = tf.tidy(() => {
        const img = tf.browser.fromPixels(canvas, 1);
        const resized = tf.image.resizeBilinear(img, [28, 28]);
        const norm = resized.toFloat().div(255.0);
        return norm.reshape([1, 28, 28, 1]);
      });
      const pred = await model.predict(tensor).data();
      tensor.dispose();

      const probs = Array.from(pred);
      const best = probs.indexOf(Math.max(...probs));
      const conf = (probs[best] * 100).toFixed(1);

      document.getElementById('resultNum').textContent = best;
      document.getElementById('resultConf').textContent = `신뢰도: ${conf}%`;

      const barWrap = document.getElementById('barWrap');
      barWrap.innerHTML = '';
      probs.forEach((p, i) => {
        const pct = (p * 100).toFixed(1);
        barWrap.innerHTML += `
          <div class="bar-row">
            <span class="bar-label">${i}</span>
            <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
            <span style="font-size:0.7rem;color:#aaa;width:38px">${pct}%</span>
          </div>`;
      });
    }

    async function loadModel() {
      try {
        model = await tf.loadLayersModel('https://storage.googleapis.com/tfjs-models/tfjs/mnist_transfer_cnn_v1/model.json');
        statusEl.textContent = '✅ 모델 준비 완료! 숫자를 그려보세요';
        statusEl.style.color = '#2ecc71';
      } catch (e) {
        statusEl.textContent = '❌ 모델 로드 실패. 인터넷 연결을 확인하세요.';
        statusEl.style.color = '#e74c3c';
      }
    }

    loadModel();
  </script>
</body>
</html>
