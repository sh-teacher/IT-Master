<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상일여고 교과관리시스템</title>
  <style>
    /* 기본 초기화 */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', 'Malgun Gothic', sans-serif; }
    body { background-color: #f4f7fa; color: #333; }
    
    /* 상단 헤더 */
    header { background-color: #0056b3; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    header h1 { font-size: 20px; margin: 0; }
    .user-info { font-size: 15px; display: flex; align-items: center; gap: 15px; }
    .btn-logout { background-color: white; color: #0056b3; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background-color 0.2s; }
    .btn-logout:hover { background-color: #e0e0e0; }

    /* 전체 레이아웃 (사이드바 + 메인) */
    .container { display: flex; height: calc(100vh - 60px); }
    
    /* 사이드바 메뉴 */
    .sidebar { width: 220px; background-color: #fff; border-right: 1px solid #ddd; padding: 20px 10px; display: flex; flex-direction: column; gap: 8px; }
    .sidebar button { display: block; width: 100%; padding: 12px 15px; text-align: left; cursor: pointer; border: 1px solid transparent; border-radius: 6px; background-color: transparent; font-size: 15px; transition: all 0.2s; }
    .sidebar button:hover { background-color: #f0f4f8; border-color: #dbe4ef; }
    .sidebar button.active { background-color: #e6f0fa; color: #0056b3; font-weight: bold; border-color: #cce0f5; }
    
    /* 관리자 전용 메뉴 스타일 */
    .admin-menu { display: none; } /* 기본적으로는 숨김 */
    .admin-menu.visible { display: block; background-color: #fff0f0; color: #d32f2f; }
    .admin-menu.visible:hover { background-color: #ffebee; border-color: #ffcdd2; }

    /* 메인 콘텐츠 영역 */
    .main-content { flex: 1; padding: 30px; overflow-y: auto; }
    .content-card { background-color: white; padding: 25px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  </style>
</head>
<body>

  <header>
    <h1>상일여고 교과관리시스템</h1>
    <div class="user-info">
      <span><strong id="userNameDisplay">사용자</strong> 선생님 (<span id="userRoleDisplay">권한</span>)</span>
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
  </header>
  
  <div class="container">
    <nav class="sidebar">
      <button onclick="loadMenu('dashboard', this)" class="active">🏠 대시보드</button>
      <button onclick="loadMenu('schedule', this)">📅 시간표 / 명단 조회</button>
      <button onclick="loadMenu('attendance', this)">📝 출결 및 수업일지</button>
      <button onclick="loadMenu('seating', this)">🪑 자리배치도</button>
      
      <hr style="border: 0; border-top: 1px solid #ddd; margin: 10px 0;">
      <button id="adminBtn1" class="admin-menu" onclick="loadMenu('adminConfig', this)">⚙️ 학기/과목 설정</button>
      <button id="adminBtn2" class="admin-menu" onclick="loadMenu('adminUsers', this)">👥 교직원 권한 관리</button>
    </nav>
    
    <main class="main-content">
      <div id="contentArea" class="content-card">
        <h2>환영합니다!</h2>
        <p style="margin-top: 15px; color: #666;">좌측 메뉴를 선택하여 업무를 시작해 주세요.</p>
      </div>
    </main>
  </div>

  <script>
    // 1. 페이지 로드 시 즉시 실행되는 권한 체크 함수
    function checkAuth() {
      const userInfoStr = sessionStorage.getItem("userInfo");
      
      // 로그인이 안 되어 있다면 튕겨냄
      if (!userInfoStr) {
        alert("로그인이 필요한 서비스입니다.");
        window.location.replace("login.html");
        return;
      }

      // 로그인 정보가 있다면 파싱해서 화면에 이름과 권한 표시
      const userInfo = JSON.parse(userInfoStr);
      document.getElementById('userNameDisplay').innerText = userInfo.name;
      document.getElementById('userRoleDisplay').innerText = userInfo.role;

      // 🌟 [핵심] 사용자의 권한이 '관리자'인 경우에만 관리자 메뉴 활성화
      if (userInfo.role === "관리자") {
        document.querySelectorAll('.admin-menu').forEach(el => el.classList.add('visible'));
      }
    }

    // 2. 로그아웃 함수
    function logout() {
      if (confirm("로그아웃 하시겠습니까?")) {
        sessionStorage.removeItem("userInfo"); // 세션 데이터 삭제
        window.location.replace("login.html"); // 로그인 페이지로 이동
      }
    }

    // 3. 메뉴 이동 함수 (SPA 방식: 페이지 이동 없이 내용만 바꿈)
    function loadMenu(menuId, btnElement) {
      // 버튼 활성화(파란색) 효과 변경
      document.querySelectorAll('.sidebar button').forEach(btn => btn.classList.remove('active'));
      btnElement.classList.add('active');

      const contentArea = document.getElementById('contentArea');

      // 각 메뉴에 맞는 화면 렌더링 (추후 여기에 실제 기능 컴포넌트를 붙일 예정입니다)
      if (menuId === 'dashboard') {
        contentArea.innerHTML = `<h2>대시보드</h2><p style="margin-top: 10px;">공지사항이나 오늘의 일정을 보여줄 수 있습니다.</p>`;
      } 
      else if (menuId === 'schedule') {
        contentArea.innerHTML = `<h2>시간표 / 명단 조회</h2><p style="margin-top: 10px;">API를 호출하여 내 과목과 시간표를 불러옵니다...</p>`;
      } 
      else if (menuId === 'attendance') {
        contentArea.innerHTML = `<h2>출결 및 수업일지</h2><p style="margin-top: 10px;">오늘의 출석 체크 및 수업 기록을 남깁니다.</p>`;
      } 
      else if (menuId === 'adminConfig') {
        contentArea.innerHTML = `
          <h2 style="color: #d32f2f;">⚙️ 학기 및 나이스(NEIS) 연동 설정</h2>
          
          <div style="margin-top: 20px;">
            <label><strong>1. 학년도 및 학기 설정</strong></label>
            <div style="margin-top: 5px;">
              <input type="text" id="setYear" placeholder="예: 2026" style="padding: 8px; width: 100px; border: 1px solid #ccc; border-radius: 4px;"> 년도
              <input type="text" id="setSemester" placeholder="예: 1" style="padding: 8px; width: 60px; margin-left: 10px; border: 1px solid #ccc; border-radius: 4px;"> 학기
            </div>
          </div>

          <div style="margin-top: 30px;">
            <label><strong>2. 나이스 과목/시간표 일괄 등록 (CSV 파일 업로드)</strong></label>
            <p style="font-size: 13px; color: #666; margin-bottom: 10px;">나이스에서 다운받은 엑셀 파일을 <strong>CSV(쉼표로 분리)</strong> 형식으로 저장한 후 업로드해 주세요.</p>
            
            <input type="file" id="csvFileInput" accept=".csv" style="padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 100%; background-color: #f9f9f9; margin-bottom: 15px;">
            
            <button style="background-color: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer;" onclick="processCSVData()">파일 분석 및 서버 등록</button>
            <div id="loadingNeis" style="display: none; color: #0056b3; font-weight: bold; margin-top: 10px;">열심히 파일을 분석하고 등록하는 중입니다... 잠시만 기다려주세요! ⏳</div>
          </div>
        `;
      }
      else {
        contentArea.innerHTML = `<h2>준비 중인 기능입니다.</h2>`;
      }
    }
    // ----------------------------------------
    // CSV 파일 읽기 및 데이터 분석 로직
    // ----------------------------------------
    function processCSVData() {
      const year = document.getElementById('setYear').value.trim();
      const semester = document.getElementById('setSemester').value.trim();
      const fileInput = document.getElementById('csvFileInput');

      if (!year || !semester) {
        alert("학년도와 학기를 먼저 입력해주세요. (예: 2026, 1)");
        return;
      }
      
      if (fileInput.files.length === 0) {
        alert("업로드할 CSV 파일을 선택해 주세요.");
        return;
      }

      const file = fileInput.files[0];
      const reader = new FileReader();

      // 파일 읽기가 완료되었을 때 실행될 로직
      reader.onload = function(e) {
        const rawData = e.target.result;
        const rows = rawData.split('\n');
        const result = [];
        const days = ["월", "화", "수", "목", "금", "토", "일"];

        rows.forEach(row => {
          // CSV는 쉼표(,)로 열을 분리합니다.
          const cols = row.split(','); 
          
          // 올려주신 CSV 구조상 cols[1]에 순번(숫자)이 들어갑니다. 숫자가 아니면 무시 (헤더 등)
          if (!cols[1] || isNaN(cols[1].trim()) || cols[1].trim() === "") return;

          // cols[2]에 아이디와 이름이 있습니다. (예: kmj048070(강민주))
          const teacherRaw = cols[2] ? cols[2].trim() : ""; 
          const idMatch = teacherRaw.match(/(.+)\((.+)\)/); 
          if (!idMatch) return; 
          
          const teacherId = idMatch[1].trim(); 
          const teacherName = idMatch[2].trim(); 

          const subjectsMap = {}; 

          // 3번 인덱스(월1)부터 반복하여 시간표 파싱
          for (let i = 3; i < cols.length; i++) {
            const cellData = cols[i] ? cols[i].trim() : "";
            if (!cellData) continue; 

            // 예: "1학년 통합사회1(1)" -> 정규식으로 추출
            const cellMatch = cellData.match(/(\d+)학년\s+(.+?)\((\d+)\)/);
            if (cellMatch) {
              const grade = cellMatch[1];
              const subjectName = cellMatch[2];
              const classNum = cellMatch[3];
              const targetClass = `${grade}-${classNum}`;

              // 요일 및 교시 계산
              const timeIndex = i - 3; 
              const dayIdx = Math.floor(timeIndex / 12); 
              const period = (timeIndex % 12) + 1; 

              if (dayIdx >= days.length) continue; 
              const day = days[dayIdx];

              const subjectKey = `${subjectName}_${targetClass}`;
              if (!subjectsMap[subjectKey]) {
                subjectsMap[subjectKey] = {
                  subject: subjectName,
                  targetClass: targetClass,
                  schedules: []
                };
              }
              subjectsMap[subjectKey].schedules.push({ day: day, period: period });
            }
          }

          for (let key in subjectsMap) {
            result.push({
              teacherId: teacherId,
              teacherName: teacherName,
              subject: subjectsMap[key].subject,
              targetClass: subjectsMap[key].targetClass,
              schedules: subjectsMap[key].schedules
            });
          }
        });

        if (result.length === 0) {
          alert("분석된 데이터가 없습니다. 나이스 엑셀 형식이 맞는지 확인해주세요.");
          return;
        }

        // 백엔드로 전송 (기존에 작성해둔 sendBulkDataToServer 함수 그대로 사용)
        sendBulkDataToServer(year, semester, result);
      };

      // 나이스 시스템 특성상 한글 깨짐을 방지하기 위해 EUC-KR로 읽어들입니다.
      // (만약 한글이 깨지면 'euc-kr' 대신 'utf-8'로 변경하면 됩니다)
      reader.readAsText(file, "utf-8"); 
    }

    // 추출된 데이터를 백엔드로 전송하는 함수
    async function sendBulkDataToServer(year, semester, parsedData) {
      setLoading(true); // 아까 만들어둔 로딩 화면 표시

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({
            type: "BULK_UPLOAD_NEIS",
            payload: {
              year: year,
              semester: semester,
              data: parsedData
            }
          })
        });
        
        const resResult = await response.json();
        setLoading(false);

        if (resResult.success) {
          alert("✅ 나이스 데이터가 성공적으로 분석 및 연동되었습니다!");
          document.getElementById('neisDataInput').value = ""; // 텍스트박스 비우기
        } else {
          alert("데이터 연동 중 오류: " + resResult.msg);
        }
      } catch (error) {
        setLoading(false);
        alert("서버 통신 중 오류가 발생했습니다.");
        console.error(error);
      }
    }
    // 화면이 켜지자마자 권한 체크 실행
    window.onload = checkAuth;


    // ----------------------------------------
    // 나이스(NEIS) 엑셀 데이터 분석 및 전송 로직
    // ----------------------------------------
    function processNeisData() {
      const year = document.getElementById('setYear').value.trim();
      const semester = document.getElementById('setSemester').value.trim();
      const rawData = document.getElementById('neisDataInput').value.trim();

      if (!year || !semester) {
        alert("학년도와 학기를 먼저 입력해주세요. (예: 2026, 1)");
        return;
      }
      if (!rawData) {
        alert("엑셀 데이터를 텍스트 박스에 붙여넣어 주세요.");
        return;
      }

      const rows = rawData.split('\n');
      const result = [];
      const days = ["월", "화", "수", "목", "금", "토", "일"];

      rows.forEach(row => {
        const cols = row.split('\t'); 
        
        // 첫 번째 열이 '숫자(순번)'가 아니면 건너뜁니다 (엑셀의 헤더행 등 무시)
        if (!cols[0] || isNaN(cols[0].trim())) return;

        // 아이디와 이름 분리 (예: kmj048070(강민주))
        const teacherRaw = cols[1] ? cols[1].trim() : ""; 
        const idMatch = teacherRaw.match(/(.+)\((.+)\)/); 
        if (!idMatch) return; 
        
        const teacherId = idMatch[1].trim(); 
        const teacherName = idMatch[2].trim(); 

        const subjectsMap = {}; 

        // 2번 인덱스(월1)부터 반복하여 시간표 파싱
        for (let i = 2; i < cols.length; i++) {
          const cellData = cols[i] ? cols[i].trim() : "";
          if (!cellData) continue; 

          // 예: "1학년 통합사회1(1)" -> 학년, 과목, 반 추출
          const cellMatch = cellData.match(/(\d+)학년\s+(.+?)\((\d+)\)/);
          if (cellMatch) {
            const grade = cellMatch[1];
            const subjectName = cellMatch[2];
            const classNum = cellMatch[3];
            const targetClass = `${grade}-${classNum}`;

            // 요일 및 교시 계산 (엑셀 열 인덱스 기준)
            const timeIndex = i - 2; 
            const dayIdx = Math.floor(timeIndex / 12); 
            const period = (timeIndex % 12) + 1; 

            if (dayIdx >= days.length) continue; 
            const day = days[dayIdx];

            const subjectKey = `${subjectName}_${targetClass}`;
            if (!subjectsMap[subjectKey]) {
              subjectsMap[subjectKey] = {
                subject: subjectName,
                targetClass: targetClass,
                schedules: []
              };
            }
            subjectsMap[subjectKey].schedules.push({ day: day, period: period });
          }
        }

        // 완성된 한 명의 데이터를 배열에 넣기
        for (let key in subjectsMap) {
          result.push({
            teacherId: teacherId,
            teacherName: teacherName,
            subject: subjectsMap[key].subject,
            targetClass: subjectsMap[key].targetClass,
            schedules: subjectsMap[key].schedules
          });
        }
      });

      if (result.length === 0) {
        alert("분석된 데이터가 없습니다. 복사한 영역이 맞는지 확인해주세요.");
        return;
      }

      // 백엔드로 쏘기
      sendBulkDataToServer(year, semester, result);
    }

    async function sendBulkDataToServer(year, semester, parsedData) {
      document.getElementById('loadingNeis').style.display = 'block'; // 로딩바 켜기

      try {
        // 주의: 상단에서 선언한 API_URL을 그대로 사용합니다. (없다면 상단에 const API_URL = "내주소"; 추가 필요)
        const response = await fetch("https://script.google.com/macros/s/AKfycbzfIY0Fs4S1EjSSNI2kZfrFgtSqipG_u_KDCkdT8ర్ణVy1LjrIwB7k_1awE_psCNw0VQGg/exec", {
          method: "POST",
          body: JSON.stringify({
            type: "BULK_UPLOAD_NEIS",
            payload: { year: year, semester: semester, data: parsedData }
          })
        });
        
        const resResult = await response.json();
        document.getElementById('loadingNeis').style.display = 'none'; // 로딩바 끄기

        if (resResult.success) {
          alert("✅ " + resResult.msg);
          document.getElementById('neisDataInput').value = ""; 
        } else {
          alert("서버 오류: " + resResult.msg);
        }
      } catch (error) {
        document.getElementById('loadingNeis').style.display = 'none';
        alert("서버 통신 중 오류가 발생했습니다.");
        console.error(error);
      }
    }
  </script>
</body>
</html>
