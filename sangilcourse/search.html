<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>상일 통합 검색 엔진</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 테이블 스타일 세련되게 다듬기 */
        .timetable { width: 100%; border-collapse: collapse; text-align: center; }
        .timetable th, .timetable td { border: 1px solid #e2e8f0; padding: 8px 4px; }
        .timetable th { background-color: #f8fafc; color: #475569; font-weight: 800; }
        .timetable td { height: 50px; vertical-align: middle; background-color: #ffffff; }
        .tt-subj { font-weight: 900; color: #1e40af; display: block; line-height: 1.3; word-break: keep-all; font-size: 13px; }
        .tt-teach { font-size: 11px; color: #64748b; margin-top: 2px; display: block; }
    </style>
</head>
<body class="bg-slate-50 p-3 md:p-8 min-h-screen pb-24 font-sans text-slate-800">
    <div class="max-w-3xl mx-auto">
        <h1 class="text-2xl md:text-[26px] font-black text-slate-800 mb-5 md:mb-6 text-center tracking-tight">🔍 교과수업 만능 탐색기</h1>

        <div class="bg-white rounded-3xl shadow-sm md:shadow-md p-5 md:p-6 border border-slate-200 space-y-4 md:space-y-5">
            
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1.5 md:mb-2">어떤 작업을 하실 건가요?</label>
                <select id="searchType" onchange="toggleInputs()" class="w-full p-4 md:py-2.5 md:px-3 bg-slate-100 rounded-2xl md:rounded-xl font-black md:font-bold text-slate-700 outline-none focus:ring-2 ring-blue-500/50 transition text-sm md:text-[15px]">
                    <optgroup label="📍 단일/실시간 위치 조회">
                        <option value="REAL_STUDENT">이 학생 지금 어디 있지? (이름)</option>
                        <option value="REAL_TEACHER">이 선생님 지금 어디 계시지? (성함)</option>
                        <option value="REAL_CLASS">특정 반 지금 수업 누구지? (예: 1-3)</option>
                    </optgroup>
                    <optgroup label="🗓️ 주간 시간표 조회">
                        <option value="TIMETABLE_TEACHER">특정 선생님 [주간 시간표] 보기 (성함)</option>
                        <option value="TIMETABLE_CLASS">특정 반(실) [주간 시간표] 보기 (예: 1-3, 아름실)</option>
                        <option value="TIMETABLE_STUDENT">특정 학생 [주간 시간표] 보기 (이름)</option>
                    </optgroup>
                    <optgroup label="☕ 대강/보강 교사 찾기">
                        <option value="FREE_TEACHER" class="bg-amber-100">선택한 요일/교시에 [공강인 선생님] 찾기</option>
                    </optgroup>
                </select>
            </div>
            
            <div id="timeSelector" class="grid grid-cols-2 gap-3 md:gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1.5 md:mb-2">요일</label>
                    <select id="searchDay" class="w-full p-4 md:py-2.5 md:px-3 bg-blue-50 border border-blue-100 rounded-2xl md:rounded-xl font-bold text-blue-700 outline-none focus:ring-2 ring-blue-500/50 transition text-sm md:text-[15px]">
                        <option value="">🕒 현재 요일</option>
                        <option value="월">월요일</option><option value="화">화요일</option>
                        <option value="수">수요일</option><option value="목">목요일</option><option value="금">금요일</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1.5 md:mb-2">교시</label>
                    <select id="searchPeriod" class="w-full p-4 md:py-2.5 md:px-3 bg-blue-50 border border-blue-100 rounded-2xl md:rounded-xl font-bold text-blue-700 outline-none focus:ring-2 ring-blue-500/50 transition text-sm md:text-[15px]">
                        <option value="">🕒 현재 교시</option>
                        <option value="1">1교시</option><option value="2">2교시</option><option value="3">3교시</option>
                        <option value="4">4교시</option><option value="5">5교시</option><option value="6">6교시</option><option value="7">7교시</option>
                    </select>
                </div>
            </div>

            <div id="keywordBox" class="flex flex-col md:flex-row gap-2 md:gap-3 pt-1">
                <input type="text" id="keyword" placeholder="검색어 입력..." class="flex-1 w-full p-4 md:py-2.5 md:px-4 bg-slate-100 rounded-2xl md:rounded-xl font-black md:font-bold text-base md:text-[15px] outline-none focus:ring-2 ring-blue-500/50 transition text-center md:text-left">
                <button onclick="runSearch()" class="w-full md:w-28 bg-blue-600 text-white px-6 py-4 md:py-2.5 rounded-2xl md:rounded-xl font-black md:font-bold text-base md:text-[15px] shadow-sm hover:bg-blue-700 active:scale-95 transition-transform flex items-center justify-center gap-1.5">
                    <span>🔍</span> 검색
                </button>
            </div>

            <button id="fullSearchBtn" onclick="runSearch()" style="display:none;" class="w-full mt-2 bg-amber-500 text-white p-4 md:py-3 rounded-2xl md:rounded-xl font-black md:font-bold text-base md:text-[15px] shadow-sm hover:bg-amber-600 active:scale-95 transition-transform flex items-center justify-center gap-2">
                <span>☕</span> 이 시간에 공강인 선생님 찾기
            </button>

        </div>

        <div id="resultArea" class="mt-5 md:mt-6 space-y-3 md:space-y-4"></div>
    </div>

    <script>
        // 🚨 여기에 선생님의 구글 API 주소를 꼭! 꼭! 넣어주세요!
        const API_URL = "https://script.google.com/macros/s/AKfycbzfIY0Fs4S1EjSSNI2kZfrFgtSqipG_u_KDCkdT8Vy1LjrIwB7k_1awE_psCNw0VQGg/exec";

        function toggleInputs() {
            const type = document.getElementById('searchType').value;
            const keywordBox = document.getElementById('keywordBox');
            const fullSearchBtn = document.getElementById('fullSearchBtn');

            if (type === 'FREE_TEACHER') {
                keywordBox.style.display = 'none';
                fullSearchBtn.style.display = 'flex';
            } else {
                keywordBox.style.display = 'flex';
                fullSearchBtn.style.display = 'none';
            }
        }

        async function runSearch() {
            const type = document.getElementById('searchType').value;
            const keyword = document.getElementById('keyword').value.trim();
            const day = document.getElementById('searchDay').value;
            const period = document.getElementById('searchPeriod').value;

            if (type !== 'FREE_TEACHER' && !keyword) return alert("검색어를 입력하세요!");

            const area = document.getElementById('resultArea');
            area.innerHTML = '<div class="text-center p-8 md:p-10 bg-white rounded-3xl md:rounded-2xl shadow-sm animate-pulse text-slate-400 font-bold border border-slate-100 text-sm md:text-base">열심히 데이터를 찾고 있습니다... 🔍</div>';

            try {
                // 1. 리얼타임 단건 조회
                if (type.startsWith('REAL_')) {
                    let realType = type.split('_')[1];
                    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ type: "SEARCH_REALTIME", payload: { searchType: realType, keyword: keyword, forceDay: day, forcePeriod: period } }) });
                    const r = await res.json();
                    
                    if (!r.success) return area.innerHTML = `<div class="bg-amber-50 text-amber-700 p-4 md:p-5 rounded-2xl md:rounded-xl text-center font-bold border border-amber-200 shadow-sm text-sm">${r.msg}</div>`;
                    if (!r.data || r.data.length === 0) return area.innerHTML = `<div class="bg-slate-100 text-slate-500 p-4 md:p-5 rounded-2xl md:rounded-xl text-center font-bold shadow-sm text-sm">해당 시간에 진행 중인 수업이 없습니다.</div>`;

                    area.innerHTML = r.data.map(item => `
                        <div class="bg-white p-5 md:p-6 rounded-3xl md:rounded-2xl shadow-sm border-l-4 md:border-l-8 border-blue-500 transform transition hover:-translate-y-1">
                            <div class="flex justify-between items-start mb-1.5 md:mb-2">
                                <span class="text-[11px] md:text-xs font-bold text-slate-400">${day || '오늘'} ${r.period}교시</span>
                                ${item.studentInfo ? `<span class="bg-indigo-50 text-indigo-600 text-[10px] md:text-xs px-2 py-0.5 md:py-1 rounded-md font-bold border border-indigo-100 shadow-sm">👤 ${item.studentInfo}</span>` : ''}
                            </div>
                            <div class="text-lg md:text-xl font-black text-slate-800 tracking-tight leading-snug">${item.subject}</div>
                            ${item.teacher && type !== 'REAL_TEACHER' ? `<div class="text-blue-600 font-bold mt-1.5 md:mt-2 text-xs md:text-sm">${item.teacher} 선생님</div>` : ''}
                        </div>
                    `).join('');
                } 
                
                // 2. 고급 기능 (주간 시간표 & 공강 찾기)
                else {
                    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ type: "GET_ADVANCED_SEARCH", payload: { searchType: type, keyword: keyword, day: day, period: period } }) });
                    const r = await res.json();

                    if (!r.success) return area.innerHTML = `<div class="bg-red-50 text-red-600 p-4 md:p-5 rounded-2xl md:rounded-xl text-center font-bold border border-red-200 shadow-sm text-sm">${r.msg}</div>`;

                    // ☕ 공강 교사 결과
                    if (r.type === "FREE_TEACHER") {
                        const finalDay = r.day || day;
                        const finalPeriod = r.period || period;

                        if (r.data.length === 0) return area.innerHTML = `<div class="bg-slate-100 text-slate-500 p-4 md:p-5 rounded-2xl md:rounded-xl text-center font-bold shadow-sm text-sm">해당 시간에 공강인 선생님이 없습니다.</div>`;
                        
                        let tags = r.data.map(t => `<span class="inline-block bg-white text-slate-600 border border-slate-200 font-bold px-3 py-1.5 md:px-3.5 md:py-1.5 rounded-lg shadow-sm m-1 text-[13px] md:text-sm">${t}</span>`).join('');
                        area.innerHTML = `
                            <div class="bg-amber-50 rounded-3xl md:rounded-2xl p-5 md:p-6 border border-amber-200 shadow-sm">
                                <h2 class="text-base md:text-lg font-black text-amber-800 mb-3 md:mb-4 tracking-tight">☕ ${finalDay}요일 ${finalPeriod}교시 공강 선생님 (${r.data.length}명)</h2>
                                <div>${tags}</div>
                            </div>
                        `;
                    } 
                    
                    // 🗓️ 주간 시간표 렌더링
                    else if (r.type === "TIMETABLE") {
                        if (r.data.length === 0) return area.innerHTML = `<div class="bg-slate-100 text-slate-500 p-4 md:p-5 rounded-2xl md:rounded-xl text-center font-bold shadow-sm text-sm">시간표 데이터가 없습니다.</div>`;
                        
                        const grid = {};
                        for (let p = 1; p <= 8; p++) { grid[p] = { '월': '', '화': '', '수': '', '목': '', '금': '' }; }
                        
                        r.data.forEach(item => {
                            if (item.period >= 1 && item.period <= 8 && grid[item.period][item.day] !== undefined) {
                                let teacherHTML = '';
                                if (type !== 'TIMETABLE_TEACHER' && item.teacher) {
                                    // 🔥 모바일에서는 선생님 성함을 더 아담하게(8.5px) 줄이고, '선생님' 글자 생략
                                    teacherHTML = `<div class="text-[8.5px] md:text-[11px] text-blue-600 font-bold mt-0.5 md:mt-1 truncate leading-none">${item.teacher}</div>`;
                                }
                                
                                // 🔥 모바일에서는 과목명도 알맞게 줄이고, 글자가 넘치면 예쁘게 줄바꿈(break-words) 적용!
                                const html = `<div class="font-bold md:font-black text-slate-800 break-words md:break-keep leading-tight text-[10.5px] md:text-[13px] tracking-tighter">${item.subject}</div>${teacherHTML}`;
                                grid[item.period][item.day] += (grid[item.period][item.day] ? '<hr class="my-1 border-slate-100">' : '') + html;
                            }
                        });

                        let tableHTML = `
                        <div class="bg-white rounded-3xl md:rounded-2xl shadow-sm md:shadow border border-slate-200 overflow-hidden">
                            <div class="bg-blue-600 text-white text-center py-2.5 md:py-3.5 font-bold md:font-black text-sm md:text-lg tracking-tight">${r.title}</div>
                            <div class="w-full p-0.5 md:p-1">
                                <table class="w-full text-center border-collapse table-fixed">
                                    <thead class="bg-slate-50 text-slate-500 text-[10px] md:text-[13px]">
                                        <tr>
                                            <th class="border border-slate-200 p-0.5 md:p-2 w-[12%] md:w-[10%]">교시</th>
                                            <th class="border border-slate-200 p-0.5 md:p-2 w-[17.6%] md:w-[18%]">월</th>
                                            <th class="border border-slate-200 p-0.5 md:p-2 w-[17.6%] md:w-[18%]">화</th>
                                            <th class="border border-slate-200 p-0.5 md:p-2 w-[17.6%] md:w-[18%]">수</th>
                                            <th class="border border-slate-200 p-0.5 md:p-2 w-[17.6%] md:w-[18%]">목</th>
                                            <th class="border border-slate-200 p-0.5 md:p-2 w-[17.6%] md:w-[18%]">금</th>
                                        </tr>
                                    </thead>
                                    <tbody class="text-[10px] md:text-[13px]">`;
                        
                        for (let p = 1; p <= 7; p++) {
                            // 🔥 각 교시 줄 높이(height)를 균일하게 맞춤
                            tableHTML += `<tr class="hover:bg-blue-50/30 transition-colors h-[52px] md:h-[60px]">
                                <td class="border border-slate-200 p-0.5 md:p-2 font-bold text-slate-400 bg-slate-50 align-middle text-[9px] md:text-[13px] tracking-tighter">${p}교시</td>`;
                            ['월', '화', '수', '목', '금'].forEach(d => {
                                const cellContent = grid[p][d] ? grid[p][d] : `<span class="text-slate-200">-</span>`;
                                tableHTML += `<td class="border border-slate-200 p-0.5 md:p-2 align-middle overflow-hidden">${cellContent}</td>`;
                            });
                            tableHTML += `</tr>`;
                        }
                        
                        tableHTML += `</tbody></table></div></div>`;
                        area.innerHTML = tableHTML;
                    }
                }
            } catch (e) {
                area.innerHTML = `<div class="text-center p-4 md:p-5 text-red-500 font-bold bg-red-50 rounded-2xl md:rounded-xl shadow-sm border border-red-100 text-sm">통신 오류가 발생했습니다. 다시 시도해주세요.</div>`;
            }
        }

        // 엔터키 실행 지원
        document.getElementById('keyword').addEventListener('keypress', function(e) { if (e.key === 'Enter') runSearch(); });
    </script>
</body>
</html>
