<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>쿨메신저 리액션 대백과 (1000개 확장판)</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
    body {
        background:#f7f6f3;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .emoji-btn {
        transition: all 0.15s;
        cursor: pointer;
    }

    .emoji-btn:hover {
        transform: scale(1.03);
        background:#e6f4ea;
        border-color:#34a853;
    }

    .emoji-btn:active {
        transform: scale(0.97);
    }

    #toast {
        visibility:hidden;
        min-width:200px;
        background:#333;
        color:#fff;
        text-align:center;
        border-radius:999px;
        padding:10px 16px;
        position:fixed;
        left:50%;
        transform:translateX(-50%);
        bottom:30px;
        opacity:0;
        transition:0.3s;
        font-weight:bold;
        z-index:50;
    }

    #toast.show {
        visibility:visible;
        opacity:1;
        bottom:50px;
    }
</style>
</head>

<body class="p-6 md:p-10">

<div class="max-w-6xl mx-auto">
    <h1 class="text-3xl font-black mb-2">✨ 쿨메신저 리액션 대백과 (1000개 자동 생성)</h1>
    <p class="text-gray-500 mb-6">클릭하면 자동 복사됩니다 🚀</p>

    <div id="reaction-container"></div>
</div>

<div id="toast">복사 완료!</div>

<script>
/* =========================
   1. 데이터 생성 엔진
========================= */

function createBigReactionPack() {
    const emojis = [
        "😊","😂","🤣","😍","😎","🔥","✨","💯","👍",
        "👏","🙌","💪","🙏","☀️","🌸","🍀","🎉","⚡",
        "💡","🎯","🚀","🕊️","☕","🍚","🎈","🫡","🤝"
    ];

    const bases = {
        "☀️ 아침 인사": [
            "좋은 아침입니다!",
            "오늘도 화이팅!",
            "상쾌한 하루 시작!",
            "반갑습니다!",
            "출근 완료!"
        ],
        "🫡 확인 / 응답": [
            "네, 확인했습니다!",
            "알겠습니다!",
            "바로 처리하겠습니다!",
            "접수 완료!",
            "문제없습니다!"
        ],
        "🙏 감사": [
            "정말 감사합니다!",
            "큰 도움 되었습니다!",
            "덕분입니다!",
            "감동입니다!",
            "고맙습니다!"
        ],
        "🤣 웃음": [
            "ㅋㅋㅋㅋㅋㅋ",
            "너무 웃겨요",
            "빵 터짐",
            "진짜 재밌네요",
            "웃고 갑니다"
        ],
        "💪 응원": [
            "힘내세요!",
            "할 수 있습니다!",
            "조금만 더!",
            "응원합니다!",
            "화이팅!"
        ]
    };

    const result = [];

    Object.entries(bases).forEach(([title, texts]) => {
        for (let i = 0; i < 200; i++) { // 5 × 200 = 1000+
            const items = texts.map(t => {
                const emoji = emojis[Math.floor(Math.random() * emojis.length)];
                return `${t} ${emoji}`;
            });

            result.push({
                title: `${title} ${i + 1}`,
                type: "text",
                items
            });
        }
    });

    return result;
}

const reactionData = createBigReactionPack();


/* =========================
   2. 렌더링 (고속 버전)
========================= */

const container = document.getElementById("reaction-container");

function render() {
    const fragment = document.createDocumentFragment();

    reactionData.forEach(group => {
        const wrap = document.createElement("div");
        wrap.className = "bg-white p-5 rounded-2xl border shadow-sm mb-5";

        wrap.innerHTML = `
            <h2 class="text-lg font-bold mb-3 border-b pb-2 flex justify-between">
                <span>${group.title}</span>
                <span class="text-[11px] bg-blue-50 text-blue-500 px-2 py-1 rounded-full">
                    클릭 복사
                </span>
            </h2>
        `;

        const grid = document.createElement("div");
        grid.className = "grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-2";

        group.items.forEach(text => {
            const btn = document.createElement("button");
            btn.className = "emoji-btn p-3 bg-gray-50 border rounded-xl text-[13px] font-bold";
            btn.innerText = text;
            btn.onclick = () => copyText(text);
            grid.appendChild(btn);
        });

        wrap.appendChild(grid);
        fragment.appendChild(wrap);
    });

    container.appendChild(fragment);
}


/* =========================
   3. 복사 기능
========================= */

function copyText(text) {
    navigator.clipboard.writeText(text).then(() => {
        showToast("복사됨: " + text);
    });
}


/* =========================
   4. 토스트
========================= */

function showToast(msg) {
    const toast = document.getElementById("toast");
    toast.innerText = msg;
    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
    }, 1200);
}


/* =========================
   실행
========================= */

render();

</script>

</body>
</html>
