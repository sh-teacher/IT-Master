<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Manager - 교과관리시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // 간단한 로그인 체크 (필요 없으시면 지우셔도 됩니다)
        if (sessionStorage.getItem("isAllowed") !== "true") {
            // location.href = "login.html"; // 로그인 페이지가 따로 있다면 연결
        }
    </script>
</head>
<body class="bg-slate-100 flex h-screen overflow-hidden text-slate-800">

    <aside class="w-72 bg-slate-900 text-slate-300 flex flex-col h-full shadow-2xl z-20">
        <div class="p-6 border-b border-slate-700">
            <h1 class="text-2xl font-black text-white flex items-center gap-2">
                <span>🏫</span> Class Manager
            </h1>
        </div>

        <nav class="flex-1 overflow-y-auto p-4 space-y-2" id="menuNav">
            <a href="dashboard.html" target="mainFrame" class="block px-4 py-3 rounded-xl hover:bg-slate-800 hover:text-white transition font-bold text-slate-200 bg-slate-800">
                🏠 홈 (대시보드)
            </a>
            <a href="setup.html" target="mainFrame" class="block px-4 py-3 rounded-xl hover:bg-slate-800 hover:text-white transition font-bold">
                ⚙️ 교과 환경 설정
            </a>
            <a href="students.html" target="mainFrame" class="block px-4 py-3 rounded-xl hover:bg-slate-800 hover:text-white transition font-bold">
                👥 학생 명단 관리
            </a>
            
            <div class="pt-6 pb-2">
                <p class="px-4 text-xs font-black text-slate-500 uppercase tracking-wider">나의 교과목 (자동 로드)</p>
            </div>
            
            <div id="dynamicMenu" class="space-y-1">
                <p class="px-4 text-sm text-slate-500 animate-pulse">과목을 불러오는 중...</p>
            </div>
        </nav>

        <div class="p-4 border-t border-slate-700 text-sm text-slate-500">
            <p>ⓒ 2026 선생님의 교과관리</p>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full relative">
        <header class="bg-white h-16 border-b border-slate-200 flex items-center justify-between px-8 shadow-sm z-10">
            <h2 class="font-bold text-xl text-slate-700" id="headerTitle">대시보드</h2>
            <div class="flex items-center gap-4">
                <span class="bg-blue-50 text-blue-600 px-4 py-1.5 rounded-full font-bold text-sm tracking-wide" id="realTimeClock">
                    00:00:00
                </span>
            </div>
        </header>

        <div class="flex-1 overflow-hidden bg-slate-50 relative">
            <iframe name="mainFrame" id="mainFrame" src="dashboard.html" class="w-full h-full border-none"></iframe>
        </div>
    </main>

    <script>
        // ★ 선생님의 앱스 스크립트 URL로 꼭 변경해주세요!
        const API_URL = "https://script.google.com/macros/s/AKfycbxUgpimLYy_9K_vZjbxJYtImA4fcz3ZZxfXPvy9WlYXLv1dY-yBA6yrtHeybyAo1v_Vpg/exec";

        // 1. 실시간 시계 작동 함수
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const dateString = now.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric', weekday: 'short' });
            document.getElementById('realTimeClock').innerText = `${dateString} ${timeString}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. 서버에서 과목 목록을 가져와서 사이드바에 메뉴 만들기
        async function loadSubjectsMenu() {
            try {
                const response = await fetch(`${API_URL}?type=GET_SUBJECTS`);
                const subjects = await response.json();
                const menuContainer = document.getElementById('dynamicMenu');
                
                menuContainer.innerHTML = ''; // 로딩 텍스트 지우기

                if (subjects.length === 0) {
                    menuContainer.innerHTML = '<p class="px-4 text-sm text-slate-500">등록된 과목이 없습니다.</p>';
                    return;
                }

                subjects.forEach(sub => {
                    // 각 과목별 폴더(그룹) 만들기
                    const groupDiv = document.createElement('div');
                    groupDiv.className = "mb-2";
                    
                    // 과목명 타이틀
                    groupDiv.innerHTML = `
                        <div class="px-4 py-2 text-slate-300 font-bold flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-blue-400"></span>
                            ${sub.fullName}
                        </div>
                        <div class="pl-8 pr-4 space-y-1 mt-1">
                            <a href="seating.html?subject=${encodeURIComponent(sub.fullName)}" target="mainFrame" class="block py-2 px-3 text-sm rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition">
                                🪑 좌석 및 출석부
                            </a>
                            <a href="#" class="block py-2 px-3 text-sm rounded-lg text-slate-500 hover:bg-slate-800 transition cursor-not-allowed">
                                📝 수업 기록 (준비중)
                            </a>
                        </div>
                    `;
                    menuContainer.appendChild(groupDiv);
                });
            } catch (e) {
                document.getElementById('dynamicMenu').innerHTML = '<p class="px-4 text-sm text-red-400">메뉴 로드 실패</p>';
            }
        }

        // 페이지 로딩 시 메뉴 그리기
        window.onload = loadSubjectsMenu;

        // 3. 메뉴 클릭 시 활성화 효과 및 상단 타이틀 변경 로직
        const links = document.querySelectorAll('nav a');
        links.forEach(link => {
            link.addEventListener('click', function() {
                // 클릭한 메뉴만 배경색 활성화 (준비중 메뉴 제외)
                if(this.classList.contains('cursor-not-allowed')) return;
                
                links.forEach(l => l.classList.remove('bg-slate-800', 'text-white'));
                this.classList.add('bg-slate-800', 'text-white');
                
                // 오른쪽 위 헤더 타이틀 변경
                document.getElementById('headerTitle').innerText = this.innerText.replace(/[^가-힣a-zA-Z\s]/g, '').trim();
            });
        });
    </script>
</body>
</html>
