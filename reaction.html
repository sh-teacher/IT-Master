<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소통 치트키 — 이모티콘 & 짤</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Gaegu:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fef9f0;
            --card: #ffffff;
            --border: #e8e0d0;
            --text: #2d2417;
            --sub: #8a7a66;
            --accent1: #ff6b35;
            --accent2: #ffd23f;
            --accent3: #06d6a0;
            --accent4: #118ab2;
            --accent5: #ef476f;
            --accent6: #8338ec;
            --shadow: 0 2px 12px rgba(45,36,23,0.07);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            font-family: 'Noto Sans KR', sans-serif;
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Header ── */
        .site-header {
            background: linear-gradient(135deg, #fff8ee 0%, #fff0d8 100%);
            border-bottom: 2px solid var(--border);
            padding: 32px 24px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .site-header::before {
            content: "✨💬🎉😎🙏🔥💯🎊😊👍";
            position: absolute;
            top: 8px; left: 0; right: 0;
            font-size: 20px;
            letter-spacing: 10px;
            opacity: 0.15;
            animation: scrollTicker 20s linear infinite;
            white-space: nowrap;
        }
        @keyframes scrollTicker {
            from { transform: translateX(0); }
            to   { transform: translateX(-50%); }
        }
        .site-header h1 {
            font-family: 'Gaegu', cursive;
            font-size: clamp(28px, 5vw, 48px);
            color: var(--text);
            position: relative;
        }
        .site-header h1 span {
            background: linear-gradient(90deg, var(--accent1), var(--accent5), var(--accent6));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .site-header p {
            margin-top: 8px;
            font-size: 13px;
            color: var(--sub);
            position: relative;
        }

        /* ── Search ── */
        .search-bar {
            max-width: 480px;
            margin: 20px auto 0;
            position: relative;
        }
        .search-bar input {
            width: 100%;
            padding: 12px 20px 12px 44px;
            border: 2px solid var(--border);
            border-radius: 50px;
            font-size: 14px;
            font-family: 'Noto Sans KR', sans-serif;
            background: white;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-bar input:focus { border-color: var(--accent1); }
        .search-bar::before {
            content: "🔍";
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
        }

        /* ── Layout ── */
        .main-wrap { max-width: 1400px; margin: 0 auto; padding: 32px 20px 60px; }

        /* ── Section Title ── */
        .section-title {
            font-size: 16px;
            font-weight: 900;
            color: var(--text);
            margin-bottom: 14px;
            padding: 10px 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .badge {
            font-size: 10px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }
        .badge-click { background: #e8f4ff; color: var(--accent4); }
        .badge-anim  { background: #fff0f5; color: var(--accent5); }

        /* ── Card ── */
        .group-card {
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
        }

        /* ── Emoji Buttons ── */
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 8px;
        }
        .emoji-btn {
            border: 1.5px solid var(--border);
            padding: 10px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: 700;
            color: var(--text);
            background: #fafaf8;
            cursor: pointer;
            text-align: center;
            transition: all 0.18s;
            line-height: 1.4;
            word-break: keep-all;
        }
        .emoji-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 4px 14px rgba(0,0,0,0.1);
            border-color: var(--accent1);
            background: #fff8f5;
            color: var(--accent1);
        }
        .emoji-btn:active { transform: scale(0.96); }

        /* ── Animation Banners ── */
        .anim-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }
        .anim-card {
            border: 1.5px solid var(--border);
            border-radius: 16px;
            padding: 14px 10px 10px;
            background: #fafaf8;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .anim-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
            border-color: var(--accent5);
        }
        .anim-card .anim-stage {
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            position: relative;
        }
        .anim-card .anim-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--sub);
            margin-top: 8px;
        }
        .copied-badge {
            position: absolute;
            top: 6px; right: 6px;
            background: var(--accent3);
            color: white;
            font-size: 9px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .anim-card.just-copied .copied-badge { opacity: 1; }

        /* ── Animations ── */
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
        @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
        @keyframes shake { 0%,100%{transform:rotate(0)} 20%,60%{transform:rotate(-12deg)} 40%,80%{transform:rotate(12deg)} }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.25)} }
        @keyframes wave { 0%{transform:rotate(0deg)} 20%{transform:rotate(-20deg)} 40%{transform:rotate(20deg)} 60%{transform:rotate(-10deg)} 80%{transform:rotate(10deg)} 100%{transform:rotate(0deg)} }
        @keyframes float { 0%,100%{transform:translateY(0) rotate(0)} 33%{transform:translateY(-8px) rotate(-5deg)} 66%{transform:translateY(-4px) rotate(5deg)} }
        @keyframes flip { 0%,100%{transform:scaleX(1)} 50%{transform:scaleX(-1)} }
        @keyframes wiggle { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-15deg) scale(1.1)} 75%{transform:rotate(15deg) scale(1.1)} }
        @keyframes jello { 0%,100%{transform:skew(0deg)} 30%{transform:skewX(-10deg) skewY(-3deg)} 60%{transform:skewX(6deg) skewY(2deg)} }
        @keyframes rubberband { 0%,100%{transform:scale(1,1)} 30%{transform:scale(1.25,0.75)} 60%{transform:scale(0.8,1.25)} 80%{transform:scale(1.1,0.9)} }
        @keyframes tada { 0%{transform:scale(1)} 10%{transform:scale(0.9)rotate(-3deg)} 20%{transform:scale(0.9)rotate(-3deg)} 30%{transform:scale(1.1)rotate(3deg)} 50%{transform:scale(1.1)rotate(3deg)} 70%{transform:scale(1.1)rotate(3deg)} 90%{transform:scale(1.1)rotate(-3deg)} 100%{transform:scale(1)rotate(0)} }
        @keyframes heartbeat { 0%,100%{transform:scale(1)} 14%{transform:scale(1.3)} 28%{transform:scale(1)} 42%{transform:scale(1.3)} 70%{transform:scale(1)} }
        @keyframes slideUp { 0%{transform:translateY(20px);opacity:0} 100%{transform:translateY(0);opacity:1} }
        @keyframes swing { 0%,100%{transform:rotate(0)} 25%{transform:rotate(20deg)} 75%{transform:rotate(-20deg)} }
        @keyframes zoom { 0%,100%{transform:scale(1)} 50%{transform:scale(1.5)} }
        @keyframes run { 0%{transform:translateX(-20px)} 100%{transform:translateX(20px)} }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }
        @keyframes rain { 0%{transform:translateY(-20px);opacity:0} 70%{opacity:1} 100%{transform:translateY(20px);opacity:0} }
        @keyframes celebrate { 0%{transform:scale(1) rotate(0)} 25%{transform:scale(1.2) rotate(-10deg)} 50%{transform:scale(0.9) rotate(10deg)} 75%{transform:scale(1.15) rotate(-5deg)} 100%{transform:scale(1) rotate(0)} }
        @keyframes nod { 0%,100%{transform:rotate(0)} 30%{transform:rotate(15deg)} 60%{transform:rotate(-5deg)} }
        @keyframes dash { 0%{transform:translateX(0)} 50%{transform:translateX(18px)} 100%{transform:translateX(0)} }
        @keyframes sparkle { 0%,100%{opacity:0;transform:scale(0)} 50%{opacity:1;transform:scale(1)} }

        /* ── 감사/축하/감탄 전용 ── */
        @keyframes bow       { 0%,100%{transform:rotate(0) translateY(0)} 40%{transform:rotate(25deg) translateY(6px)} 70%{transform:rotate(15deg) translateY(3px)} }
        @keyframes clap      { 0%,100%{transform:scale(1) rotate(0)} 25%{transform:scale(1.35) rotate(-10deg)} 50%{transform:scale(1) rotate(0)} 75%{transform:scale(1.35) rotate(10deg)} }
        @keyframes crown     { 0%,60%,100%{transform:translateY(0) scale(1)} 30%{transform:translateY(-16px) scale(1.25)} }
        @keyframes firework  { 0%{transform:scale(0.5) rotate(0deg);opacity:0.6} 50%{transform:scale(1.4) rotate(180deg);opacity:1} 100%{transform:scale(1) rotate(360deg);opacity:0.7} }
        @keyframes starPop   { 0%,100%{transform:scale(1) rotate(0)} 20%{transform:scale(0.7) rotate(-15deg)} 50%{transform:scale(1.5) rotate(10deg)} 80%{transform:scale(1.1) rotate(-5deg)} }
        @keyframes rainbow   { 0%{filter:hue-rotate(0deg) saturate(1)} 50%{filter:hue-rotate(180deg) saturate(2)} 100%{filter:hue-rotate(360deg) saturate(1)} }
        @keyframes trophySpin{ 0%{transform:rotate(-8deg) scale(1)} 25%{transform:rotate(0deg) scale(1.2)} 50%{transform:rotate(8deg) scale(1)} 75%{transform:rotate(0deg) scale(1.2)} 100%{transform:rotate(-8deg) scale(1)} }
        @keyframes confetti  { 0%,100%{transform:translateY(0) rotate(0) scale(1)} 33%{transform:translateY(-12px) rotate(120deg) scale(1.2)} 66%{transform:translateY(-6px) rotate(240deg) scale(0.9)} }
        @keyframes glitter   { 0%,100%{opacity:1;transform:scale(1)} 33%{opacity:0.3;transform:scale(1.4) rotate(20deg)} 66%{opacity:0.8;transform:scale(0.8) rotate(-10deg)} }
        @keyframes angelic   { 0%,100%{transform:translateY(0);filter:brightness(1)} 50%{transform:translateY(-10px);filter:brightness(1.5) drop-shadow(0 0 8px gold)} }
        @keyframes medalSwing{ 0%,100%{transform:rotate(-12deg)} 50%{transform:rotate(12deg)} }
        @keyframes lovePop   { 0%,100%{transform:scale(1)} 15%{transform:scale(1.4)} 30%{transform:scale(0.9)} 45%{transform:scale(1.3)} 60%{transform:scale(1)} }
        @keyframes riseUp    { 0%{transform:translateY(14px);opacity:0} 40%{transform:translateY(-4px);opacity:1} 70%{transform:translateY(2px)} 100%{transform:translateY(0)} }
        @keyframes diamondSpin{0%{transform:rotate(0) scale(1)} 50%{transform:rotate(180deg) scale(1.3)} 100%{transform:rotate(360deg) scale(1)} }
        @keyframes burstOut  { 0%,100%{transform:scale(1)} 40%{transform:scale(1.5)} 60%{transform:scale(0.85)} 80%{transform:scale(1.2)} }

        /* 복합 배너 카드 (감사/축하 전용 스타일) */
        .anim-card.theme-thanks  { background: linear-gradient(135deg,#fff8f0,#fff0f8); border-color: #ffcce0; }
        .anim-card.theme-cheer   { background: linear-gradient(135deg,#f0fff8,#f0f8ff); border-color: #b0e8ff; }
        .anim-card.theme-wow     { background: linear-gradient(135deg,#fffbf0,#fff8e0); border-color: #ffe08a; }
        .anim-card.theme-thanks:hover { border-color: var(--accent5); box-shadow: 0 6px 20px rgba(239,71,111,0.15); }
        .anim-card.theme-cheer:hover  { border-color: var(--accent4); box-shadow: 0 6px 20px rgba(17,138,178,0.15); }
        .anim-card.theme-wow:hover    { border-color: var(--accent1); box-shadow: 0 6px 20px rgba(255,107,53,0.18); }

        .anim-card .particle {
            position: absolute;
            font-size: 14px;
            animation: confetti 1.4s ease-in-out infinite;
            pointer-events: none;
        }
        .anim-section-label {
            font-size: 13px;
            font-weight: 900;
            color: var(--sub);
            letter-spacing: 0.04em;
            padding: 6px 0 10px 2px;
            margin-top: 4px;
        }

        /* ── Toast ── */
        #toast {
            visibility: hidden;
            min-width: 240px;
            background: var(--text);
            color: #fff;
            text-align: center;
            border-radius: 40px;
            padding: 13px 22px;
            font-weight: 700;
            font-size: 13px;
            position: fixed;
            z-index: 999;
            left: 50%;
            transform: translateX(-50%);
            bottom: 30px;
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        #toast.show { visibility: visible; opacity: 1; bottom: 50px; }

        /* ── Tabs ── */
        .tab-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
        }
        .tab-btn {
            padding: 8px 16px;
            border-radius: 30px;
            border: 1.5px solid var(--border);
            background: white;
            font-size: 12px;
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.18s;
            color: var(--sub);
        }
        .tab-btn:hover, .tab-btn.active {
            background: var(--text);
            color: white;
            border-color: var(--text);
        }

        .hidden-group { display: none; }

        /* ── Color accents per group ── */
        .group-card:nth-child(1) .section-title { background: #fff3ee; }
        .group-card:nth-child(2) .section-title { background: #f0fff8; }
        .group-card:nth-child(3) .section-title { background: #fff8f0; }
        .group-card:nth-child(4) .section-title { background: #f0f8ff; }
        .group-card:nth-child(5) .section-title { background: #fff0f5; }
        .group-card:nth-child(6) .section-title { background: #f5f0ff; }
        .group-card:nth-child(7) .section-title { background: #f0fff8; }
        .group-card:nth-child(8) .section-title { background: #fffbf0; }
        .group-card:nth-child(9) .section-title { background: #fff0ee; }
        .group-card:nth-child(10) .section-title { background: #f0f5ff; }
        .group-card:nth-child(11) .section-title { background: #fff5f0; }
        .group-card:nth-child(12) .section-title { background: #f5fff0; }
        .group-card:nth-child(13) .section-title { background: #fff0fb; }
        .group-card:nth-child(14) .section-title { background: #f0fbff; }
        .group-card:nth-child(15) .section-title { background: #fdfff0; }
        .group-card:nth-child(16) .section-title { background: #fff3ee; }
        .group-card:nth-child(17) .section-title { background: #eefff8; }
        .group-card:nth-child(18) .section-title { background: #fff8ee; }
        .group-card:nth-child(19) .section-title { background: #eef5ff; }
        .group-card:nth-child(20) .section-title { background: #ffeefc; }

        @media (max-width: 600px) {
            .emoji-grid { grid-template-columns: repeat(2, 1fr); }
            .anim-grid  { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <h1>✨ 소통 치트키 — <span>이모티콘 & 짤</span></h1>
    <p>클릭하면 바로 복사! 메신저에 Ctrl+V로 붙여넣으세요 😎</p>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="찾고 싶은 리액션 검색..." autocomplete="off">
    </div>
</header>

// ── Tab 생성 ──
const tabBar = document.getElementById('tabBar');
const allBtn = document.createElement('button');
allBtn.className = 'tab-btn active';
allBtn.textContent = '🗂️ 전체 보기';
allBtn.dataset.target = 'all';
tabBar.appendChild(allBtn);

reactionData.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.textContent = g.title.split(' ').slice(0,2).join(' ');
    btn.dataset.target = g.id;
    tabBar.appendChild(btn);
});

tabBar.addEventListener('click', e => {
    const btn = e.target.closest('.tab-btn');
    if (!btn) return;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const target = btn.dataset.target;
    document.querySelectorAll('.group-card').forEach(card => {
        card.style.display = (target === 'all' || card.dataset.id === target) ? '' : 'none';
    });
    document.getElementById('searchInput').value = '';
});

// ── 렌더링 ──
const container = document.getElementById('reaction-container');

reactionData.forEach(group => {
    const card = document.createElement('div');
    card.className = 'group-card';
    card.dataset.id = group.id;

    const badgeHtml = group.type === 'anim'
        ? '<span class="badge badge-anim">클릭 복사</span>'
        : '<span class="badge badge-click">클릭 복사</span>';

    card.innerHTML = `<div class="section-title">${group.title}${badgeHtml}</div>`;

    const itemsDiv = document.createElement('div');

    if (group.type === 'text') {
        itemsDiv.className = 'emoji-grid';
        group.items.forEach(text => {
            const btn = document.createElement('button');
            btn.className = 'emoji-btn';
            btn.dataset.text = text;
            btn.textContent = text;
            btn.addEventListener('click', () => copyText(text, btn));
            itemsDiv.appendChild(btn);
        });
    } else if (group.type === 'anim') {
        itemsDiv.className = 'anim-grid';
        group.items.forEach(item => {
            const animCard = document.createElement('div');
            animCard.className = 'anim-card' + (group.theme ? ' theme-' + group.theme : '');
            animCard.dataset.text = item.text;
            animCard.innerHTML = `
                <span class="copied-badge">복사됨!</span>
                <div class="anim-stage">
                    <span class="anim-emoji" style="display:inline-block; animation: ${getAnim(item.animClass)}; font-size:44px;">${item.emoji}</span>
                </div>
                <div class="anim-label">${item.label}</div>
            `;
            animCard.addEventListener('click', () => {
                copyText(item.text, null);
                animCard.classList.add('just-copied');
                setTimeout(() => animCard.classList.remove('just-copied'), 1800);
            });
            itemsDiv.appendChild(animCard);
        });
    }

    card.appendChild(itemsDiv);
    container.appendChild(card);
});

function getAnim(cls) {
    const map = {
        bounce: 'bounce 0.7s ease infinite',
        spin: 'spin 1.2s linear infinite',
        shake: 'shake 0.6s ease infinite',
        pulse: 'pulse 0.8s ease infinite',
        wave: 'wave 1s ease infinite',
        float: 'float 2s ease-in-out infinite',
        flip: 'flip 1.4s ease infinite',
        wiggle: 'wiggle 0.5s ease infinite',
        jello: 'jello 1s ease infinite',
        rubberband: 'rubberband 1s ease infinite',
        tada: 'tada 1.2s ease infinite',
        heartbeat: 'heartbeat 1s ease infinite',
        swing: 'swing 1s ease infinite',
        zoom: 'zoom 1s ease infinite',
        dash: 'dash 0.8s ease-in-out infinite',
        blink: 'blink 1s ease infinite',
        celebrate: 'celebrate 0.9s ease infinite',
        nod: 'nod 0.8s ease infinite',
        flash:        'blink 0.4s step-start infinite',
        sparkle_anim: 'sparkle 1.2s ease infinite',
        bow:          'bow 1.1s ease-in-out infinite',
        clap:         'clap 0.6s ease infinite',
        crown:        'crown 1.2s ease-in-out infinite',
        firework:     'firework 1.0s ease-in-out infinite',
        starPop:      'starPop 0.9s ease infinite',
        rainbow:      'rainbow 2s linear infinite',
        trophySpin:   'trophySpin 1.0s ease-in-out infinite',
        confetti:     'confetti 1.2s ease-in-out infinite',
        glitter:      'glitter 1.0s ease-in-out infinite',
        angelic:      'angelic 1.4s ease-in-out infinite',
        medalSwing:   'medalSwing 0.8s ease-in-out infinite',
        lovePop:      'lovePop 1.1s ease infinite',
        riseUp:       'riseUp 1.2s ease-in-out infinite',
        diamondSpin:  'diamondSpin 2.0s linear infinite',
        burstOut:     'burstOut 0.8s ease infinite',
    };
    return map[cls] || 'bounce 0.8s ease infinite';
}

// ── 검색 ──
document.getElementById('searchInput').addEventListener('input', function() {
    const q = this.value.trim().toLowerCase();
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-target="all"]').classList.add('active');

    if (!q) {
        document.querySelectorAll('.group-card').forEach(c => c.style.display = '');
        document.querySelectorAll('.emoji-btn').forEach(b => b.style.display = '');
        return;
    }

    document.querySelectorAll('.group-card').forEach(card => {
        const buttons = card.querySelectorAll('.emoji-btn, .anim-card');
        let anyVisible = false;
        buttons.forEach(btn => {
            const text = (btn.dataset.text || btn.textContent).toLowerCase();
            const match = text.includes(q);
            btn.style.display = match ? '' : 'none';
            if (match) anyVisible = true;
        });
        card.style.display = anyVisible ? '' : 'none';
    });
});

// ── 복사 ──
function copyText(text, el) {
    navigator.clipboard.writeText(text).then(() => {
        showToast(`복사 완료! ✅`);
        if (el) {
            el.style.background = '#e6fff4';
            el.style.borderColor = '#06d6a0';
            setTimeout(() => { el.style.background = ''; el.style.borderColor = ''; }, 1200);
        }
    }).catch(() => alert('복사 실패! 수동 복사 해주세요.'));
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show';
    setTimeout(() => { t.className = ''; }, 2000);
}
