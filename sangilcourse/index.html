<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상일여고 교과관리시스템</title>
  <script>if (!sessionStorage.getItem("userInfo")) { window.location.replace("login.html"); }</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', 'Malgun Gothic', sans-serif; }
    body { background-color: #f4f7fa; color: #333; overflow: hidden; }
    
    header { background-color: #0056b3; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 10; position: relative; }
    header h1 { font-size: 20px; margin: 0; cursor: pointer; transition: opacity 0.2s; white-space: nowrap; }
    header h1:hover { opacity: 0.8; }
    
    #realTimeClock { font-size: 14px; font-weight: bold; color: #fff; background: rgba(255,255,255,0.15); padding: 5px 15px; border-radius: 20px; letter-spacing: 0.5px; margin-left: auto; margin-right: 20px; white-space: nowrap; }
    .user-info { font-size: 15px; display: flex; align-items: center; gap: 15px; white-space: nowrap; }
    .btn-logout { background-color: white; color: #0056b3; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background-color 0.2s; }
    .btn-logout:hover { background-color: #e0e0e0; }

    .container { display: flex; height: calc(100vh - 60px); }
    .sidebar { width: 240px; background-color: #fff; border-right: 1px solid #ddd; padding: 20px 10px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
    .sidebar button { display: block; width: 100%; padding: 12px 15px; text-align: left; cursor: pointer; border: 1px solid transparent; border-radius: 6px; background-color: transparent; font-size: 15px; transition: all 0.2s; }
    .sidebar button:hover { background-color: #f0f4f8; border-color: #dbe4ef; }
    .sidebar button.active { background-color: #e6f0fa; color: #0056b3; font-weight: bold; border-color: #cce0f5; }
    
    .sidebar-title { font-size: 12px; font-weight: bold; color: #999; padding: 10px 15px 5px; margin-top: 10px; }
    .subject-btn { font-size: 14px !important; padding: 10px 15px !important; display: flex !important; flex-direction: column; align-items: flex-start; gap: 4px; }
    .subject-btn-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
    .subject-btn-bottom { font-size: 11px; color: #888; font-weight: normal; }
    .sidebar button.active .subject-btn-bottom { color: #0056b3; opacity: 0.8; }

    .sidebar button.admin-menu { display: none !important; }
    .sidebar button.admin-menu.visible { display: block !important; background-color: #fff0f0; color: #d32f2f; }
    .sidebar button.admin-menu.visible:hover { background-color: #ffebee; border-color: #ffcdd2; }

    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #contentArea { flex: 1; padding: 30px; overflow-y: auto; }
    #iframeArea { display: none; flex: 1; width: 100%; height: 100%; border: none; }
    .content-card { background-color: white; padding: 25px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    
    .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    .timeline { border-left: 3px solid #0056b3; margin-left: 10px; padding-left: 20px; position: relative; }
    .timeline-item { margin-bottom: 15px; position: relative; }
    .timeline-item::before { content: ''; position: absolute; left: -27px; top: 5px; width: 12px; height: 12px; background-color: white; border: 3px solid #0056b3; border-radius: 50%; }
    .timeline-item.empty::before { border-color: #ccc; }
    .timeline-time { font-size: 12px; color: #666; margin-bottom: 2px; }
    .timeline-title { font-weight: bold; font-size: 15px; color: #333; }
    .timeline-title.empty { color: #999; font-weight: normal; }
    
    .schedule-table { width: 100%; table-layout: fixed; border-collapse: collapse; margin-top: 15px; background-color: white; font-size: 13px; text-align: center; }
    .schedule-table th, .schedule-table td { padding: 10px; border: 1px solid #ddd; word-break: keep-all; }
    .schedule-table th { background-color: #f0f4f8; }
    .schedule-table th:first-child { width: 12%; } 
    .schedule-table th:not(:first-child) { width: 17.6%; } 
    .has-class { background-color: #e6f0fa; color: #0056b3; font-weight: bold; border-radius: 4px; line-height: 1.4; }

    .quick-menus { display: flex; gap: 20px; margin-top: 20px; }
    .quick-card { flex: 1; background-color: #f8f9fa; border: 1px solid #e9ecef; border-radius: 10px; padding: 25px 15px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .quick-card:hover { background-color: #ffebee; border-color: #ffcdd2; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .quick-icon { font-size: 36px; display: block; margin-bottom: 10px; }
    .quick-title { font-weight: bold; font-size: 16px; color: #d32f2f; margin-bottom: 5px;}
    .quick-desc { font-size: 13px; color: #666; }

    @keyframes pulse-live { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.95); } }
    .live-class-badge { font-size: 11px; font-weight: 900; color: #d32f2f; background-color: rgba(211, 47, 47, 0.15); border: 1px solid #d32f2f; padding: 2px 6px; border-radius: 8px; animation: pulse-live 1.5s infinite; margin-left: 5px; }

    #extraClassModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:999; align-items:center; justify-content:center; }
    .modal-box { background:white; padding:25px; border-radius:12px; width:540px; max-width:95%; max-height:85vh; overflow-y:auto; box-shadow:0 10px 25px rgba(0,0,0,0.2); }
    .extra-class-row { display:flex; flex-direction:column; gap:8px; padding:12px; background:#f8f9fa; border-radius:8px; border:1px solid #ddd; }
  </style>
</head>
<body>

  <header>
    <h1 onclick="document.querySelector('.sidebar button.menu-base').click()">상일여고 교과관리시스템</h1>
    <div id="realTimeClock">로딩 중...</div>
    <div class="user-info">
      <span><strong id="userNameDisplay">사용자</strong> 선생님 (<span id="userRoleDisplay">권한</span>)</span>
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
  </header>
  
  <div class="container">
    <nav class="sidebar">
      <button onclick="loadMenu('dashboard', this)" class="active menu-base">🏠 대시보드</button>
      <div id="sidebarSubjectTitle" class="sidebar-title" style="display:none;">📚 나의 교과목</div>
      <div id="dynamicSubjectMenu" style="display:none;"></div>
      <hr id="sidebarDivider" style="border: 0; border-top: 1px solid #ddd; margin: 10px 0; display:none;">
      <button id="adminBtn1" class="admin-menu menu-base" onclick="loadMenu('adminConfig', this)">⚙️ 학기/과목 설정</button>
      <button id="adminBtn2" class="admin-menu menu-base" onclick="loadMenu('adminUsers', this)">👥 교직원 권한 관리</button>
    </nav>
    
    <main class="main-content">
      <div id="contentArea"></div>
      <iframe id="iframeArea" src=""></iframe>
    </main>
  </div>

  <div id="extraClassModal">
      <div class="modal-box">
          <h2 style="color:#0056b3; margin-bottom:10px; font-size:18px; display:flex; align-items:center; gap:8px;">🕒 방과후/보충 (8~9교시) 설정</h2>
          <p style="font-size:13px; color:#666; margin-bottom:20px; background:#f0f4f8; padding:10px; border-radius:6px; line-height:1.4;">
            ※ 관리자가 등록한 방과후 기간을 선택해주세요. 기간이 지나면 대시보드에서 자동으로 숨겨집니다.
          </p>
          <div id="extraClassList" style="display:flex; flex-direction:column; gap:10px; margin-bottom:15px;"></div>
          <button onclick="addExtraClassRow()" style="width:100%; padding:10px; background:#fff; border:1px dashed #0056b3; color:#0056b3; border-radius:6px; font-weight:bold; cursor:pointer; margin-bottom:20px;">+ 새로운 수업 추가</button>
          <div style="display:flex; gap:10px;">
              <button id="btnSaveExtra" onclick="saveExtraClass()" style="flex:1; padding:12px; background:#0056b3; color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">저장하기</button>
              <button onclick="closeExtraClassModal()" style="flex:1; padding:12px; background:#e0e0e0; color:#333; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">닫기</button>
          </div>
      </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzfIY0Fs4S1EjSSNI2kZfrFgtSqipG_u_KDCkdT8Vy1LjrIwB7k_1awE_psCNw0VQGg/exec";
    let myScheduleData = []; 
    let sysConfig = null;

    const DEFAULT_TIMES = {
        1: { start: "08:45", end: "09:35" }, 2: { start: "09:45", end: "10:35" },
        3: { start: "10:45", end: "11:35" }, 4: { start: "11:45", end: "12:35" },
        5: { start: "13:35", end: "14:25" }, 6: { start: "14:35", end: "15:25" },
        7: { start: "15:40", end: "16:30" }, 8: { start: "16:40", end: "17:30" }, 9: { start: "17:40", end: "18:30" }
    };

    function updateRealTimeClock() {
      const now = new Date(); const days = ['일','월','화','수','목','금','토'];
      document.getElementById('realTimeClock').innerText = `${now.getFullYear()}.${now.getMonth()+1}.${now.getDate()}(${days[now.getDay()]}) ${now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;
    }

    function formatDateString(dateStr) {
      if (!dateStr) return ""; const d = new Date(dateStr); if (isNaN(d.getTime())) return dateStr; 
      return `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}(${['일','월','화','수','목','금','토'][d.getDay()]})`;
    }

    function formatForInputDate(dateStr) {
      if (!dateStr) return ""; const d = new Date(dateStr); if (isNaN(d.getTime())) return dateStr; 
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function checkAuth() {
      const userInfoStr = sessionStorage.getItem("userInfo");
      if (!userInfoStr) { window.location.replace("login.html"); return null; }
      const userInfo = JSON.parse(userInfoStr);
      document.getElementById('userNameDisplay').innerText = userInfo.name;
      document.getElementById('userRoleDisplay').innerText = userInfo.role;
      if (userInfo.role === "관리자") document.querySelectorAll('.admin-menu').forEach(el => el.classList.add('visible'));
      else {
        document.getElementById('sidebarSubjectTitle').style.display = 'block';
        document.getElementById('dynamicSubjectMenu').style.display = 'block';
        document.getElementById('sidebarDivider').style.display = 'block';
      }
      return userInfo;
    }

    function logout() { if (confirm("로그아웃 하시겠습니까?")) { sessionStorage.removeItem("userInfo"); window.location.replace("login.html"); } }

    function loadMenu(menuId, btnElement, extraParam = "") {
      document.querySelectorAll('.sidebar button').forEach(btn => btn.classList.remove('active', 'live-class-active'));
      if(btnElement) btnElement.classList.add('active');

      const contentArea = document.getElementById('contentArea'); const iframeArea = document.getElementById('iframeArea');

      if (menuId === 'dashboard') {
        iframeArea.style.display = 'none'; contentArea.style.display = 'block';
        contentArea.innerHTML = `<div style="text-align:center; padding: 50px; font-size: 16px;">데이터를 불러오는 중입니다... ⏳</div>`;
        renderDashboard(); 
      } 
      else if (menuId === 'attendance') {
        contentArea.style.display = 'none'; iframeArea.style.display = 'block';
        iframeArea.src = `attendance.html?subject=${encodeURIComponent(extraParam)}`;
      }
      else if (menuId === 'adminConfig') {
        iframeArea.style.display = 'none'; contentArea.style.display = 'block';
        
        let periodInputsHTML = '';
        for(let i=1; i<=9; i++) {
          periodInputsHTML += `
            <div style="background:#fff; padding:10px; border:1px solid #ddd; border-radius:4px; text-align:center;">
              <strong style="font-size:13px; color:#0056b3;">${i}교시</strong>
              <div style="display:flex; flex-direction:column; gap:5px; margin-top:8px;">
                <label style="font-size:11px; color:#666; display:flex; justify-content:space-between; align-items:center;">시작: <input type="time" id="pStart${i}" style="padding:4px; border:1px solid #ccc; border-radius:4px; width:100px;"></label>
                <label style="font-size:11px; color:#666; display:flex; justify-content:space-between; align-items:center;">종료: <input type="time" id="pEnd${i}" style="padding:4px; border:1px solid #ccc; border-radius:4px; width:100px;"></label>
              </div>
            </div>`;
        }

        // ✨ 관리자용 방과후 기간 설정 영역 추가
        contentArea.innerHTML = `
          <div class="content-card" style="margin-bottom: 20px;">
            <h2 style="color: #0056b3; margin-bottom: 10px;">⚙️ 시스템 환경 설정 (현재 적용 학기)</h2>
            <div style="background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #e9ecef;">
              <h3 style="color: #333; margin-bottom: 10px; font-size: 15px;">📅 시스템 활성 학기 및 운영 기간</h3>
              <div style="display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap;">
                <label style="font-weight:bold;">학년도: <input type="number" id="sysYear" style="padding:8px; border:1px solid #ddd; border-radius:4px; width:100px;"></label>
                <label style="font-weight:bold;">학기: 
                  <select id="sysSemester" style="padding:8px; border:1px solid #ddd; border-radius:4px;"><option value="1">1학기</option><option value="2">2학기</option></select>
                </label>
                <label style="font-weight:bold;">시작일: <input type="date" id="sysStartDate" style="padding:8px; border:1px solid #ddd; border-radius:4px;"></label>
                <label style="font-weight:bold;">종료일: <input type="date" id="sysEndDate" style="padding:8px; border:1px solid #ddd; border-radius:4px;"></label>
              </div>
              <hr style="border: 0; border-top: 1px solid #ddd; margin: 20px 0;">
              
              <h3 style="color: #333; margin-bottom: 10px; font-size: 15px;">⏰ 일과 시간(교시별) 설정</h3>
              <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 15px;">${periodInputsHTML}</div>

              <hr style="border: 0; border-top: 1px solid #ddd; margin: 20px 0;">
              
              <h3 style="color: #333; margin-bottom: 10px; font-size: 15px;">📆 방과후/보충 운영기간 공통 관리</h3>
              <p style="font-size:12px; color:#666; margin-bottom:10px;">교사들이 방과후 시간표를 등록할 때 선택할 수 있는 기간(1차, 2차 등)을 미리 세팅합니다.</p>
              <div id="adminExtraConfigContainer" style="display:flex; flex-direction:column; gap:8px; margin-bottom:10px;"></div>
              <button onclick="addAdminExtraConfigRow()" style="background:#fff; border:1px dashed #0056b3; color:#0056b3; padding:8px 12px; border-radius:4px; font-weight:bold; cursor:pointer; font-size:12px; margin-bottom:15px;">+ 방과후 기간 추가</button>

              <button onclick="saveAdminConfig()" style="background:#28a745; color:white; border:none; padding:12px 20px; font-weight:bold; border-radius:6px; cursor:pointer; width:100%; margin-top:10px;">현재 환경설정 일괄 저장 (선생님 화면에 즉시 반영)</button>
            </div>
          </div>

          <div class="content-card">
            <h2 style="color: #0056b3; margin-bottom: 10px;">🏫 나이스 시간표 사전 업로드</h2>
            <div style="background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #e9ecef;">
              <p style="font-size:12px; color:#666; margin-bottom:15px;">※ 이곳에서 다음 학기 시간표를 미리 업로드해둘 수 있습니다. (업로드해도 위쪽 '시스템 활성 학기'를 바꾸기 전까지는 교사들에게 보이지 않습니다.)</p>
              <div style="margin-bottom: 15px;">
                <label style="font-weight:bold; margin-right:10px;">업로드 대상 학년도: <input type="number" id="uploadYear" value="${new Date().getFullYear()}" style="padding:8px; border:1px solid #ddd; border-radius:4px; width:100px;"></label>
                <label style="font-weight:bold;">업로드 대상 학기: <select id="uploadSemester" style="padding:8px; border:1px solid #ddd; border-radius:4px;"><option value="1">1학기</option><option value="2">2학기</option></select></label>
              </div>
              <div style="margin-bottom: 15px;"><input type="file" id="excelFileInput" accept=".xlsx" style="padding: 10px; width: 100%; border: 1px dashed #bbb; border-radius: 4px; background: #f8f9fa;"></div>
              <button onclick="processExcelData()" style="background:#0056b3; color:white; border:none; padding:12px 20px; font-weight:bold; border-radius:6px; cursor:pointer; width:100%;">엑셀 시간표 DB 등록 실행</button>
              <div id="loadingNeis" style="display:none; color:#d32f2f; margin-top:15px; font-weight:bold; text-align:center;">데이터 연동 중... ⏳</div>
            </div>
          </div>
        `;
        loadAdminInitialData(); 
      }
    }

    // ✨ 관리자용 방과후 기간 추가 함수
    function addAdminExtraConfigRow(name='', start='', end='') {
        const container = document.getElementById('adminExtraConfigContainer');
        const row = document.createElement('div');
        row.className = 'admin-extra-row';
        row.style.cssText = "display:flex; gap:10px; align-items:center; background:#fff; padding:10px; border:1px solid #ddd; border-radius:4px;";
        row.innerHTML = `
            <input type="text" class="a-ec-name" placeholder="예: 1차 방과후" value="${name}" style="padding:6px; border:1px solid #ccc; border-radius:4px; flex:1;">
            <input type="date" class="a-ec-start" value="${formatForInputDate(start)}" style="padding:6px; border:1px solid #ccc; border-radius:4px;">
            <span style="color:#999;">~</span>
            <input type="date" class="a-ec-end" value="${formatForInputDate(end)}" style="padding:6px; border:1px solid #ccc; border-radius:4px;">
            <button onclick="this.parentElement.remove()" style="padding:6px 10px; background:#ffebee; color:#d32f2f; border:none; border-radius:4px; cursor:pointer; font-weight:bold;">X</button>
        `;
        container.appendChild(row);
    }

    async function loadAdminInitialData() {
      try {
        const res = await fetch(API_URL + "?type=GET_CONFIG"); 
        const config = await res.json();
        if (config) {
          if(config.year) { document.getElementById('sysYear').value = config.year; document.getElementById('uploadYear').value = config.year; }
          if(config.semester) { document.getElementById('sysSemester').value = config.semester; document.getElementById('uploadSemester').value = config.semester; }
          if(config.startDate) document.getElementById('sysStartDate').value = formatForInputDate(config.startDate);
          if(config.endDate) document.getElementById('sysEndDate').value = formatForInputDate(config.endDate);
          if(config.periodTimes) {
            for(let i=1; i<=9; i++) {
              if(document.getElementById('pStart'+i)) document.getElementById('pStart'+i).value = config.periodTimes[i].start || DEFAULT_TIMES[i].start;
              if(document.getElementById('pEnd'+i)) document.getElementById('pEnd'+i).value = config.periodTimes[i].end || DEFAULT_TIMES[i].end;
            }
          }
          // ✨ 관리자 방과후 설정 로드
          if(config.extraConfigs && config.extraConfigs.length > 0) {
              config.extraConfigs.forEach(ec => addAdminExtraConfigRow(ec.name, ec.startDate, ec.endDate));
          } else {
              addAdminExtraConfigRow('1차 방과후', '', '');
          }
        }
      } catch (e) { console.log(e); }
    }

    async function saveAdminConfig() {
      const periodTimes = {};
      for(let i=1; i<=9; i++) periodTimes[i] = { start: document.getElementById('pStart'+i).value, end: document.getElementById('pEnd'+i).value };
      
      const extraConfigs = [];
      document.querySelectorAll('.admin-extra-row').forEach(row => {
          const name = row.querySelector('.a-ec-name').value.trim();
          const start = row.querySelector('.a-ec-start').value;
          const end = row.querySelector('.a-ec-end').value;
          if(name && start && end) extraConfigs.push({name, startDate: start, endDate: end});
      });

      const payload = {
        year: document.getElementById('sysYear').value, semester: document.getElementById('sysSemester').value,
        startDate: document.getElementById('sysStartDate').value, endDate: document.getElementById('sysEndDate').value,
        periodTimes: periodTimes, extraConfigs: extraConfigs
      };

      if(!payload.year || !payload.semester) return alert("학년도와 학기를 입력해주세요.");
      if(!payload.startDate || !payload.endDate) return alert("시작일과 종료일을 지정해주세요.");

      try {
        const btn = document.querySelector('button[onclick="saveAdminConfig()"]'); btn.innerText = "저장 중..."; btn.disabled = true;
        await fetch(API_URL, { method: 'POST', body: JSON.stringify({ type: "SAVE_CONFIG", payload: payload }) });
        alert("저장되었습니다!"); btn.innerText = "현재 환경설정 일괄 저장 (선생님 화면에 즉시 반영)"; btn.disabled = false;
      } catch(e) { alert("저장 실패"); }
    }

    function processExcelData() {
      const year = document.getElementById('uploadYear').value.trim(); const semester = document.getElementById('uploadSemester').value.trim();
      const fileInput = document.getElementById('excelFileInput'); if (fileInput.files.length === 0) return alert("파일을 선택하세요.");
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = new Uint8Array(e.target.result); const workbook = XLSX.read(data, {type: 'array'});
          const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1}); const result = [];
          rows.forEach(cols => {
            if (!cols || cols.length === 0) return;
            let teacherId = "", teacherName = "", startIndex = -1;
            for (let i = 0; i < cols.length; i++) {
              let idMatch = String(cols[i] || "").trim().match(/([a-zA-Z0-9_.-]+)\((.+?)\)/);
              if (idMatch) { teacherId = idMatch[1].trim(); teacherName = idMatch[2].trim(); startIndex = i + 1; break; }
            }
            if (startIndex === -1) return;
            const subjectsMap = {};
            for (let i = startIndex; i < cols.length; i++) {
              let cellMatch = String(cols[i] || "").trim().match(/(\d+)\s*학년\s*(.+?)\s*\(([^)]+)\)/);
              if (cellMatch) {
                const dayIdx = Math.floor((i - startIndex) / 12); const period = ((i - startIndex) % 12) + 1;
                const day = ["월","화","수","목","금","토","일"][dayIdx]; if(!day) continue;
                let targetClass = !isNaN(cellMatch[3]) ? `${cellMatch[1]}-${cellMatch[3]}` : cellMatch[3];
                const key = `${cellMatch[2]}_${targetClass}`;
                if (!subjectsMap[key]) subjectsMap[key] = { subject: cellMatch[2], targetClass: targetClass, schedules: [] };
                subjectsMap[key].schedules.push({ day, period });
              }
            }
            for (let key in subjectsMap) result.push({ teacherId, teacherName, subject: subjectsMap[key].subject, targetClass: subjectsMap[key].targetClass, schedules: subjectsMap[key].schedules });
          });
          sendBulkDataToServer(year, semester, result);
        } catch (err) { alert("엑셀 파일 판독 오류"); }
      }; reader.readAsArrayBuffer(fileInput.files[0]);
    }

    async function sendBulkDataToServer(year, semester, parsedData) {
      document.getElementById('loadingNeis').style.display = 'block'; 
      try {
        const response = await fetch(API_URL, { method: "POST", body: JSON.stringify({ type: "BULK_UPLOAD_NEIS", payload: { year, semester, data: parsedData } }) });
        if ((await response.json()).success) alert("연동되었습니다!");
      } catch (e) {} finally { document.getElementById('loadingNeis').style.display = 'none'; }
    }

    async function renderDashboard() {
      const userInfo = checkAuth(); if(!userInfo) return;
      const contentArea = document.getElementById('contentArea');
      if (userInfo.role === "관리자") {
        contentArea.innerHTML = `<div class="content-card mb-4"><h2 style="color: #d32f2f;">🏫 상일여고 교과관리시스템 (관리자)</h2><p>원하시는 업무를 선택해 주세요.</p></div><div class="quick-menus"><div class="quick-card" onclick="document.getElementById('adminBtn1').click()"><span class="quick-icon">⚙️</span><div class="quick-title">학기/일과 설정</div></div><div class="quick-card" onclick="document.getElementById('adminBtn2').click()"><span class="quick-icon">👥</span><div class="quick-title">교직원 권한 관리</div></div></div>`;
        return; 
      }
      try {
        const response = await fetch(API_URL, { method: "POST", body: JSON.stringify({ type: "GET_DASHBOARD", payload: { teacherId: userInfo.id } }) });
        const result = await response.json();
        if(result.success) {
          myScheduleData = result.schedule; sysConfig = result.config;

          const todayD = new Date(); todayD.setHours(0,0,0,0);
          const activeSchedule = myScheduleData.filter(s => {
              if (parseInt(s.period) < 8) return true; 
              if (!s.startDate || !s.endDate) return true; 
              const sd = new Date(s.startDate); sd.setHours(0,0,0,0);
              const ed = new Date(s.endDate); ed.setHours(23,59,59,999);
              return todayD >= sd && todayD <= ed; 
          });
          buildDashboardHTML(activeSchedule); buildSidebarSubjects(activeSchedule); 
        }
      } catch (e) { console.log(e); }
    }

    function buildSidebarSubjects(activeSchedule) {
      const menuContainer = document.getElementById('dynamicSubjectMenu'); menuContainer.innerHTML = '';
      const grouped = {};
      activeSchedule.forEach(item => {
        if (!grouped[item.fullName]) grouped[item.fullName] = { fullName: item.fullName, times: [] };
        grouped[item.fullName].times.push(`${item.day}${item.period}`);
      });
      const uniqueSubjects = Object.values(grouped);
      if(uniqueSubjects.length === 0) return menuContainer.innerHTML = '<div style="padding:15px; color:#999; font-size:12px;">과목 없음</div>';
      uniqueSubjects.forEach(s => {
        s.times.sort((a,b) => {
            const dayOrder = { '월':1,'화':2,'수':3,'목':4,'금':5 };
            const dayA = dayOrder[a.charAt(0)] || 9; const dayB = dayOrder[b.charAt(0)] || 9;
            return (dayA !== dayB) ? dayA - dayB : parseInt(a.slice(1)) - parseInt(b.slice(1));
        });
        const btn = document.createElement('button'); btn.className = 'subject-btn'; btn.dataset.subject = s.fullName;
        btn.innerHTML = `<div class="subject-btn-top"><span>${s.fullName}</span></div><div class="subject-btn-bottom">${s.times.join(' ')}</div>`;
        btn.onclick = function() { loadMenu('attendance', this, s.fullName); };
        menuContainer.appendChild(btn);
      });
      highlightCurrentClass();
    }

    function buildDashboardHTML(activeSchedule) {
      const contentArea = document.getElementById('contentArea');
      const todayNum = new Date().getDay(); const todayStr = ["일", "월", "화", "수", "목", "금", "토"][todayNum]; 

      let maxPeriod = 7; 
      if (activeSchedule.some(s => parseInt(s.period) === 8)) maxPeriod = 8;
      if (activeSchedule.some(s => parseInt(s.period) === 9)) maxPeriod = 9;

      const pTimes = (sysConfig && sysConfig.periodTimes) ? sysConfig.periodTimes : DEFAULT_TIMES;
      const timeTexts = []; for(let i=1; i<=maxPeriod; i++) timeTexts.push((pTimes[i] && pTimes[i].start) ? `${pTimes[i].start}~${pTimes[i].end}` : "");

      let operationText = ""; let isOperating = true;
      if (sysConfig && sysConfig.startDate && sysConfig.endDate) {
          operationText = `<span style="font-size:13px; color:#e91e63; font-weight:bold; margin-left:10px;">[운영기간: ${formatDateString(sysConfig.startDate)} ~ ${formatDateString(sysConfig.endDate)}]</span>`;
          const todayD = new Date(); todayD.setHours(0,0,0,0);
          if (todayD < new Date(sysConfig.startDate) || todayD > new Date(sysConfig.endDate)) isOperating = false;
      }

      let timelineHTML = "";
      if (!isOperating) timelineHTML = `<div style="padding:20px; color:#d32f2f; font-weight:bold;">현재는 학기 운영 기간이 아닙니다.</div>`;
      else if (todayNum === 0 || todayNum === 6) timelineHTML = `<div style="padding:20px; color:#666;">주말은 수업이 없습니다. 푹 쉬세요! ☕</div>`;
      else {
        timelineHTML = `<div class="timeline">`;
        for (let period = 1; period <= maxPeriod; period++) {
          const classData = activeSchedule.find(s => s.day === todayStr && s.period == period);
          if (classData) {
            let targetClassHtml = classData.targetClass ? ` <span style="font-size:12px; font-weight:normal; color:#666;">(${classData.targetClass})</span>` : "";
            timelineHTML += `<div class="timeline-item"><div class="timeline-time">${period}교시 (${timeTexts[period-1]})</div><div class="timeline-title" style="color:#0056b3;">${classData.subject}${targetClassHtml}</div></div>`;
          } else timelineHTML += `<div class="timeline-item empty"><div class="timeline-time">${period}교시 (${timeTexts[period-1]})</div><div class="timeline-title empty">공강</div></div>`;
        }
        timelineHTML += `</div>`;
      }

      let tableHTML = `<table class="schedule-table"><thead><tr><th>교시</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th></tr></thead><tbody>`;
      for (let period = 1; period <= maxPeriod; period++) {
        tableHTML += `<tr><td><strong>${period}</strong></td>`;
        ["월", "화", "수", "목", "금"].forEach(day => {
          const classData = activeSchedule.find(s => s.day === day && s.period == period);
          if (classData) {
            let targetClassHtml = classData.targetClass ? `<br><span style="font-size:11px; font-weight:normal; color:#555;">(${classData.targetClass})</span>` : "";
            tableHTML += `<td class="has-class cursor-pointer" onclick="document.querySelector('.subject-btn[data-subject=\\'${classData.fullName}\\']').click()">${classData.subject}${targetClassHtml}</td>`;
          } else tableHTML += `<td></td>`;
        });
        tableHTML += `</tr>`;
      }
      tableHTML += `</tbody></table>`;

      contentArea.innerHTML = `
        <div class="content-card mb-4"><h2 style="color: #0056b3;">🏫 상일여고 교과관리시스템</h2><p>수업을 클릭하여 출석 및 일지를 관리하세요. ${operationText}</p></div>
        <div class="dashboard-grid mt-4">
          <div class="content-card"><h3>🏃 오늘의 타임라인 (${todayStr})</h3>${timelineHTML}</div>
          <div class="content-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 style="margin:0;">🗓️ 주간 시간표 (1~${maxPeriod}교시)</h3>
                <button onclick="openExtraClassModal()" style="border:1px solid #0056b3; color:#0056b3; padding:6px 12px; border-radius:4px; font-weight:bold; cursor:pointer; font-size:12px; background:white;">+ 방과후(8~9교시) 관리</button>
            </div>
            ${tableHTML}
          </div>
        </div>`;
    }

    function openExtraClassModal() {
        document.getElementById('extraClassModal').style.display = 'flex';
        const container = document.getElementById('extraClassList'); container.innerHTML = '';
        const extraClasses = myScheduleData.filter(s => parseInt(s.period) >= 8);
        if (extraClasses.length === 0) addExtraClassRow(); 
        else extraClasses.forEach(c => addExtraClassRow(c.day, c.period, c.subject, c.targetClass, c.startDate, c.endDate));
    }
    
    function closeExtraClassModal() { document.getElementById('extraClassModal').style.display = 'none'; }
    
    // ✨ 드롭다운 선택으로 변경된 모달 UI
    function addExtraClassRow(day = '월', period = 8, subject = '', targetClass = '', startDate = '', endDate = '') {
        const sd = formatForInputDate(startDate); const ed = formatForInputDate(endDate);
        const row = document.createElement('div'); row.className = 'extra-class-row'; 
        
        let termOptions = `<option value="">기간 선택(필수)</option>`;
        let hasMatch = false;
        if(sysConfig && sysConfig.extraConfigs) {
            sysConfig.extraConfigs.forEach(ec => {
                let selected = (ec.startDate === sd && ec.endDate === ed) ? 'selected' : '';
                if(selected) hasMatch = true;
                termOptions += `<option value="${ec.startDate}|${ec.endDate}" ${selected}>${ec.name} (${formatDateString(ec.startDate)}~${formatDateString(ec.endDate)})</option>`;
            });
        }
        if (sd && ed && !hasMatch) {
             termOptions += `<option value="${sd}|${ed}" selected>[이전 설정] ${formatDateString(sd)}~${formatDateString(ed)}</option>`;
        }

        row.innerHTML = `
            <div style="display:flex; gap:8px;">
                <select class="ec-day" style="padding:8px; border:1px solid #ddd; border-radius:4px;">${['월','화','수','목','금'].map(d => `<option value="${d}" ${d===day?'selected':''}>${d}</option>`).join('')}</select>
                <select class="ec-period" style="padding:8px; border:1px solid #ddd; border-radius:4px;"><option value="8" ${period==8?'selected':''}>8교시</option><option value="9" ${period==9?'selected':''}>9교시</option></select>
                <input type="text" class="ec-subject" placeholder="과목 (예: 보충A)" value="${subject}" style="flex:1; padding:8px; border:1px solid #ddd; border-radius:4px;">
                <input type="text" class="ec-target" placeholder="반" value="${targetClass}" style="width:70px; padding:8px; border:1px solid #ddd; border-radius:4px;">
                <button onclick="this.parentElement.parentElement.remove()" style="padding:8px; background:#ffebee; color:#d32f2f; border:none; border-radius:4px; cursor:pointer; font-weight:bold;">X</button>
            </div>
            <div style="display:flex; gap:8px; align-items:center; margin-top:4px;">
                <span style="font-size:12px; font-weight:bold; color:#666;">운영기간:</span>
                <select class="ec-term" style="padding:6px; border:1px solid #ddd; border-radius:4px; flex:1;">
                    ${termOptions}
                </select>
            </div>`;
        document.getElementById('extraClassList').appendChild(row);
    }

    async function saveExtraClass() {
        const userInfo = JSON.parse(sessionStorage.getItem("userInfo"));
        const rows = document.querySelectorAll('.extra-class-row');
        const extraData = [];
        let hasError = false;

        rows.forEach(row => {
            const subject = row.querySelector('.ec-subject').value.trim();
            const targetClass = row.querySelector('.ec-target').value.trim();
            const termVal = row.querySelector('.ec-term').value;
            const [startDate, endDate] = termVal ? termVal.split('|') : ["", ""];
            
            if(subject || targetClass) {
                if(!subject || !targetClass) { 
                    alert("과목명과 대상반을 모두 입력해주세요."); 
                    hasError = true; 
                } 
                else if(!startDate || !endDate) { 
                    alert("수업의 운영기간을 목록에서 선택해주세요. (선택할 기간이 없다면 관리자에게 문의하세요)"); 
                    hasError = true; 
                } 
                else { 
                    extraData.push({ day: row.querySelector('.ec-day').value, period: parseInt(row.querySelector('.ec-period').value), subject, targetClass, startDate, endDate }); 
                }
            }
        });

        if (hasError) return;
        if(!sysConfig || !sysConfig.year) return alert("시스템 설정에서 현재 학기 정보가 지정되지 않았습니다.");

        const btnSave = document.getElementById('btnSaveExtra'); 
        btnSave.innerText = "저장 중..."; 
        btnSave.disabled = true;

        try {
            const res = await fetch(API_URL, { 
                method: "POST", 
                body: JSON.stringify({ 
                    type: "SAVE_EXTRA_SCHEDULE", 
                    payload: { teacherId: userInfo.id, year: sysConfig.year, semester: sysConfig.semester, extraData: extraData } 
                }) 
            });
            const json = await res.json();
            
            if(json.success) { 
                alert("저장되었습니다!"); 
                closeExtraClassModal(); 
                renderDashboard(); 
            } else {
                alert("저장 실패: " + json.msg);
            }
        } catch (e) { 
            alert("오류 발생: " + e.message); 
        } finally { 
            btnSave.innerText = "저장하기"; 
            btnSave.disabled = false; 
        }
    }

    function highlightCurrentClass() {
      const userInfo = JSON.parse(sessionStorage.getItem("userInfo")); if (!userInfo || userInfo.role === "관리자") return; 
      const now = new Date(); const todayStr = ['일','월','화','수','목','금','토'][now.getDay()];
      const nowTimeStr = String(now.getHours()).padStart(2, '0') + ":" + String(now.getMinutes()).padStart(2, '0');
      let currentPeriod = 0; const pTimes = (sysConfig && sysConfig.periodTimes) ? sysConfig.periodTimes : DEFAULT_TIMES;
      for (let p = 1; p <= 9; p++) { if (pTimes[p] && nowTimeStr >= pTimes[p].start && nowTimeStr <= pTimes[p].end) { currentPeriod = p; break; } }

      document.querySelectorAll('.live-class-badge').forEach(el => el.remove());
      const currentClass = myScheduleData.find(s => s.day === todayStr && s.period == currentPeriod);
      if (currentClass) {
        const btn = document.querySelector(`.subject-btn[data-subject='${currentClass.fullName}']`);
        if (btn) {
          const badge = document.createElement('span'); badge.className = 'live-class-badge'; badge.innerText = '🔥수업중!';
          btn.querySelector('.subject-btn-top').appendChild(badge);
        }
      }
    }

    window.onload = function() { setInterval(updateRealTimeClock, 1000); updateRealTimeClock(); if(checkAuth()) loadMenu('dashboard', document.querySelector('.sidebar .menu-base')); };
    setInterval(highlightCurrentClass, 60000);
  </script>
