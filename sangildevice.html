<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자산 관리 대시보드 - IT Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        th.sortable { cursor: pointer; position: relative; white-space: nowrap; }
        th.sortable:hover { background-color: #f3f4f6; }
        th.sortable::after { content: ' ↕'; font-size: 0.8em; color: #ccc; }
        td { white-space: nowrap; }
        /* 비고란이 너무 길면 잘라내고 말줄임표 처리 */
        .note-cell { max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chart-container { position: relative; height: 200px; width: 100%; }
        /* 팝업창 스크롤바 숨기기 (깔끔한 디자인) */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-blue-600 text-white p-4 shadow-md mb-6 no-print">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <span class="font-bold text-lg">📊 교육정보화 기자재현황 대시보드</span>
            <div class="space-x-4 text-sm font-medium">
                <a href="write.html" class="hover:underline">등록</a>
                <a href="sangildevice.html" class="bg-blue-700 px-3 py-1 rounded">목록현황</a>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 pb-10">
        <div id="statsSummary" class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-xs text-gray-400 font-bold uppercase">전체 자산</p>
                <h3 id="statTotal" class="text-2xl font-black text-blue-600">0</h3>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-xs text-gray-400 font-bold uppercase">노트북</p>
                <h3 id="statLaptop" class="text-2xl font-black text-gray-700">0</h3>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-xs text-gray-400 font-bold uppercase">데스크톱</p>
                <h3 id="statDesktop" class="text-2xl font-black text-gray-700">0</h3>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-xs text-gray-400 font-bold uppercase">태블릿</p>
                <h3 id="statTablet" class="text-2xl font-black text-gray-700">0</h3>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-xs text-gray-400 font-bold uppercase">프린터류</p>
                <h3 id="statPrinter" class="text-2xl font-black text-gray-700">0</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h4 class="text-sm font-bold text-gray-500 mb-4">🏆 부서별 보유 순위</h4>
                <div class="chart-container"><canvas id="modelChart"></canvas></div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h4 class="text-sm font-bold text-gray-500 mb-4">📅 연도별 도입 현황</h4>
                <div class="chart-container"><canvas id="yearChart"></canvas></div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-lg border border-gray-200">
            <div class="flex flex-col md:flex-row justify-between items-start mb-6 gap-4">
                <div class="flex flex-col">
                    <h1 class="text-xl font-bold text-gray-800 underline decoration-blue-200 decoration-4 text-left">보유 자산 상세 리스트</h1>
                    <p class="text-sm text-gray-500 font-bold mt-2 text-left">조회된 자산: <span id="resultCount" class="text-blue-600 font-black text-lg">0</span>대</p>
                </div>
                
                <div class="flex flex-col items-end gap-2 w-full md:w-auto">
                    <div class="flex flex-wrap gap-2 no-print justify-end">
                        <button onclick="filterByType('전체')" class="bg-gray-200 px-3 py-1 rounded-full text-xs font-bold hover:bg-gray-300">전체</button>
                        <button onclick="filterByType('노트북')" class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-xs font-bold hover:bg-blue-200">💻 노트북</button>
                        <button onclick="filterByType('데스크톱')" class="bg-green-100 text-green-600 px-3 py-1 rounded-full text-xs font-bold hover:bg-green-200">🖥️ 데스크톱</button>
                        <button onclick="filterByType('태블릿')" class="bg-purple-100 text-purple-600 px-3 py-1 rounded-full text-xs font-bold hover:bg-purple-200">📱 태블릿</button>
                        <button onclick="filterByType('프린터')" class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-xs font-bold hover:bg-orange-200">📠 프린터/복사기</button>
                        <button onclick="filterByAging()" class="bg-red-100 text-red-600 px-3 py-1 rounded-full text-xs font-bold hover:bg-red-200">⚠️ 교체대상</button>
                    </div>
                    <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="검색어 입력..." class="border border-gray-300 p-2 rounded-lg w-full md:w-64 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-sm">
                    <thead>
                        <tr class="bg-gray-50 text-gray-500 uppercase text-xs font-sm tracking-widest">
                            <th class="p-4 border-b">No.</th>
                            <th class="p-4 border-b sortable" onclick="handleSort('type')">종류</th>
                            <th class="p-4 border-b sortable" onclick="handleSort('user')">사용자</th>
                            <th class="p-4 border-b sortable" onclick="handleSort('group')">부서</th>
                            <th class="p-4 border-b sortable" onclick="handleSort('brand')">제조사</th>
                            <th class="p-4 border-b sortable" onclick="handleSort('model')">모델명</th>
                            <th class="p-4 border-b sortable" onclick="handleSort('ip')">IP 주소</th>
                            <th class="p-4 border-b sortable" onclick="handleSort('date')">취득일</th>
                            <th class="p-4 border-b sortable" onclick="handleSort('note')">비고</th> 
                            <th class="p-4 border-b text-center">관리</th>
                        </tr>
                    </thead>
                    <tbody id="listBody" class="text-gray-700">
                        <tr><td colspan="10" class="p-10 text-center text-gray-400 animate-pulse">데이터 로드 중...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="assetModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 transition-opacity">
        <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden border border-gray-100">
            <div class="bg-blue-600 p-6 text-white text-center relative">
                <button onclick="closeAssetModal()" class="absolute top-4 right-4 text-white hover:text-blue-200 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
                <div id="m_type" class="inline-block bg-blue-400 px-3 py-1 rounded-full text-xs font-bold mb-2 uppercase">ASSET INFO</div>
                <h2 id="m_model" class="text-xl font-bold leading-tight">모델명</h2>
            </div>
            
            <div class="p-6 space-y-4 max-h-[60vh] overflow-y-auto no-scrollbar">
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col border-b border-gray-100 pb-2">
                        <span class="text-gray-400 text-[10px] font-bold uppercase tracking-wider">현재 사용자</span>
                        <span id="m_user" class="font-bold text-gray-800 text-base">-</span>
                    </div>
                    <div class="flex flex-col border-b border-gray-100 pb-2">
                        <span class="text-gray-400 text-[10px] font-bold uppercase tracking-wider">소속 부서/그룹</span>
                        <span id="m_group" class="font-bold text-gray-800 text-base">-</span>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col border-b border-gray-100 pb-2">
                        <span class="text-gray-400 text-[10px] font-bold uppercase tracking-wider">취득일자</span>
                        <span id="m_date" class="font-bold text-gray-700 text-sm">-</span>
                    </div>
                    <div class="flex flex-col border-b border-gray-100 pb-2">
                        <span class="text-gray-400 text-[10px] font-bold uppercase tracking-wider">IP 주소</span>
                        <span id="m_ip" class="font-bold text-blue-600 text-sm">-</span>
                    </div>
                </div>

                <div class="pt-2">
                    <span class="text-gray-400 text-[10px] font-bold">비고</span>
                    <div id="m_note" class="bg-gray-50 text-gray-700 text-sm mt-1 p-3 rounded-lg border border-gray-100 min-h-[40px]">-</div>
                </div>

                <div class="flex flex-col items-center pt-4 border-t border-gray-100">
                    <span class="text-gray-400 text-[10px] font-bold mb-2">해당 기기 QR코드</span>
                    <div id="m_qr" class="p-2 border border-gray-200 rounded-lg bg-white shadow-sm"></div>
                </div>
            </div>
            <div class="bg-gray-50 p-4 text-center border-t border-gray-100">
                <button onclick="closeAssetModal()" class="w-full py-2 bg-gray-200 text-gray-700 rounded-lg font-bold hover:bg-gray-300 transition">닫기</button>
            </div>
        </div>
    </div>

    <div id="qrModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-2xl text-center max-w-xs w-full shadow-2xl">
            <div id="modalQrCode" class="flex justify-center mb-4"></div>
            <p id="modalSnText" class="font-mono text-blue-600 font-bold mb-6"></p>
            <button onclick="closeModal()" class="w-full bg-gray-200 py-2 rounded-lg hover:bg-gray-300 transition text-gray-700 font-bold font-sans">닫기</button>
        </div>
    </div>

    <script>
        const savedPw = sessionStorage.getItem('asset_pw');
        if (!savedPw && !window.location.href.includes('login.html')) {
            location.href = 'login.html';
        }
        
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyZvgICRHPoQFHKrRX-bI27Ti9RUNWMjdMOlDTzzSNdviEjC1Gxpa0jlMYBi5bOotLyxQ/exec"; 
        let assetData = [];
        let currentSort = { column: '', ascending: true };
        let mChart, yChart;

        async function loadData() {
            try {
                const res = await fetch(`${GAS_URL}?pw=${encodeURIComponent(savedPw)}`);
                const text = await res.text();
                if (text === "인증 실패") {
                    sessionStorage.removeItem('asset_pw');
                    alert("비밀번호가 틀렸습니다.");
                    location.href = 'login.html';
                    return;
                }
                assetData = JSON.parse(text);
                updateDashboard(assetData);
                renderTable(assetData);
            } catch (err) {
                document.getElementById('listBody').innerHTML = `<tr><td colspan="10" class="p-10 text-center text-red-500 font-bold">네트워크 오류가 발생했습니다.</td></tr>`;
            }
        }

        function updateDashboard(data) {
            const counts = { 노트북: 0, 데스크톱: 0, 태블릿: 0, 프린터: 0 };
            const groupData = {};
            const ageData = { "신규(3년이내)": 0, "보통(3~5년)": 0, "교체대상(5년이상)": 0 };
            const currentYear = 2026;

            data.forEach(item => {
                const type = (item.type || "").trim();
                if (type.includes('노트북')) counts.노트북++;
                else if (type.includes('데스크톱')) counts.데스크톱++;
                else if (type.includes('태블릿')) counts.태블릿++;
                else if (type.includes('프린터') || type.includes('복사기') || type.includes('복합기') || type.includes('렌탈')) counts.프린터++;

                const group = (item.group || "미지정").trim();
                groupData[group] = (groupData[group] || 0) + 1;

                if (item.date) {
                    const buyYear = parseInt(String(item.date).split('.')[0]);
                    if (!isNaN(buyYear)) {
                        const age = currentYear - buyYear;
                        if (age >= 5) ageData["교체대상(5년이상)"]++;
                        else if (age >= 3) ageData["보통(3~5년)"]++;
                        else ageData["신규(3년이내)"]++;
                    }
                }
            });

            document.getElementById('statTotal').innerText = data.length;
            document.getElementById('statLaptop').innerText = counts.노트북;
            document.getElementById('statDesktop').innerText = counts.데스크톱;
            document.getElementById('statTablet').innerText = counts.태블릿;
            document.getElementById('statPrinter').innerText = counts.프린터;

            const sortedGroups = Object.entries(groupData).sort((a,b) => b[1] - a[1]).slice(0, 10);
            renderModelChart(sortedGroups);
            renderYearChart(ageData);
        }

        function renderModelChart(items) {
            const ctx = document.getElementById('modelChart').getContext('2d');
            if(mChart) mChart.destroy();
            mChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: items.map(i => i[0]),
                    datasets: [{ label: '보유 대수', data: items.map(i => i[1]), backgroundColor: 'rgba(59, 130, 246, 0.8)', borderRadius: 5 }]
                },
                options: { indexAxis: 'y', maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function renderYearChart(ageObj) {
            const ctx = document.getElementById('yearChart').getContext('2d');
            if(yChart) yChart.destroy();
            yChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(ageObj),
                    datasets: [{ data: Object.values(ageObj), backgroundColor: ['#10b981', '#f59e0b', '#ef4444'], hoverOffset: 4 }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
            });
        }

        function renderTable(data) {
            const tbody = document.getElementById('listBody');
            const resultCount = document.getElementById('resultCount');
            
            if (resultCount) resultCount.innerText = data.length; 
            tbody.innerHTML = ""; 

            if (!data || data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="10" class="p-10 text-center text-gray-400">조회된 데이터가 없습니다.</td></tr>`;
                return;
            }

            data.forEach((item, index) => {
                const dateStr = item.date ? String(item.date).split('T')[0] : "-";
                // ★수정됨: View 버튼을 a 태그에서 button 태그로 바꾸고 팝업 함수 연결
                const row = `
                    <tr class="border-b hover:bg-blue-50 transition text-[11px]">
                        <td class="p-4 text-center font-bold text-gray-400">${index + 1}</td>
                        <td class="p-4 font-bold text-gray-800 text-xs">${item.type}</td>
                        <td class="p-4 text-xs font-bold">${item.user}</td>
                        <td class="p-4 text-bold text-[12px]">${item.group || '-'}</td>
                        <td class="p-4 text-xs">${item.brand}</td>
                        <td class="p-4 text-xs font-medium">${item.model}</td>
                        <td class="p-4 font-mono text-base text-blue-600 font-bold">${item.ip || '-'}</td>
                        <td class="p-4 text-[12px] text-gray-400">${dateStr}</td>
                        <td class="p-4 text-[10px] text-gray-500"><div class="note-cell" title="${item.note || ''}">${item.note || '-'}</div></td> 
                        <td class="p-4 text-center">
                            <div class="flex justify-center gap-1">
                                <button onclick="openAssetDetail('${item.id}')" class="bg-gray-100 text-gray-500 px-2 py-1 rounded text-[9px] font-black uppercase hover:bg-gray-200">View</button>
                                <button onclick="openQR('${item.id}')" class="bg-blue-600 text-white px-2 py-1 rounded text-[9px] font-black uppercase hover:bg-blue-700 shadow-sm">QR</button>
                            </div>
                        </td>
                    </tr>`;
                tbody.innerHTML += row;
            });
        }

        // ★ 추가됨: 초고속 상세 팝업창 띄우기 함수
        function openAssetDetail(id) {
            // 이미 다운받은 assetData에서 해당 id를 가진 데이터를 찾습니다 (서버 요청 필요 없음)
            const data = assetData.find(item => item.id == id);
            
            if (!data) {
                alert("해당 기기의 정보를 찾을 수 없습니다.");
                return;
            }

            // 찾은 데이터를 팝업창에 매핑합니다
            document.getElementById('m_type').innerText = data.type || "-";
            document.getElementById('m_model').innerText = `${data.brand || ""} ${data.model || ""}`.trim() || "-";
            document.getElementById('m_user').innerText = data.user || "-";
            document.getElementById('m_group').innerText = data.group || "-";
            document.getElementById('m_date').innerText = data.date ? String(data.date).split('T')[0] : "-";
            document.getElementById('m_ip').innerText = data.ip || "-";
            document.getElementById('m_note').innerText = data.note || "-";

            // 스마트폰으로 찍었을 때 view.html 페이지로 이동하는 QR 코드 생성
            const currentUrl = window.location.origin + window.location.pathname.replace('sangildevice.html', '');
            const viewUrl = `${currentUrl}view.html?id=${id}`;
            const qrImgUrl = `https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(viewUrl)}`;
            document.getElementById('m_qr').innerHTML = `<img src="${qrImgUrl}" alt="QR Code" class="w-24 h-24">`;

            // 모달 열기
            document.getElementById('assetModal').classList.remove('hidden');
        }

        function closeAssetModal() {
            document.getElementById('assetModal').classList.add('hidden');
        }

        function openQR(id) {
            const currentUrl = window.location.origin + window.location.pathname.replace('sangildevice.html', '');
            const viewUrl = `${currentUrl}view.html?id=${id}`;
            const qrImageUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(viewUrl)}`;
            document.getElementById('modalQrCode').innerHTML = `<img src="${qrImageUrl}" class="rounded-lg shadow-sm" />`;
            document.getElementById('modalSnText').innerText = `관리번호: ${id}번`;
            document.getElementById('qrModal').classList.remove('hidden');
        }

        function handleSort(column) {
            if (currentSort.column === column) currentSort.ascending = !currentSort.ascending;
            else { currentSort.column = column; currentSort.ascending = true; }

            assetData.sort((a, b) => {
                let valA = (a[column] || "").toString();
                let valB = (b[column] || "").toString();
                return currentSort.ascending 
                    ? valA.localeCompare(valB, undefined, { numeric: true }) 
                    : valB.localeCompare(valA, undefined, { numeric: true });
            });
            renderTable(assetData);
        }

        function filterTable() {
            const input = document.getElementById("searchInput").value.toLowerCase();
            const filtered = assetData.filter(item => {
                return Object.values(item).some(v => v && v.toString().toLowerCase().includes(input));
            });
            renderTable(filtered); 
        }

        function filterByType(type) {
            if (type === '전체') renderTable(assetData);
            else {
                const filtered = assetData.filter(item => 
                    (item.type && item.type.includes(type)) || (type === '프린터' && item.type && item.type.includes('복사기'))
                );
                renderTable(filtered);
            }
        }

        function filterByAging() {
            const currentYear = 2026;
            const filtered = assetData.filter(item => {
                if (!item.date) return false;
                const buyYear = parseInt(String(item.date).split('.')[0]);
                return (currentYear - buyYear) >= 5;
            });
            renderTable(filtered);
        }

        function closeModal() { document.getElementById('qrModal').classList.add('hidden'); }
        
        window.onload = loadData;
    </script>
</body>
</html>
