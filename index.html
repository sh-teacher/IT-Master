<!-- 메인홈페이지 노션기반 -->

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher's Workspace</title>
    <style>
        /* 노션 스타일의 깔끔한 폰트와 배경 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #37352f;
            margin: 0;
            padding: 0;
            display: flex;
            min-height: 100vh;
        }

        /* 왼쪽 사이드바 (북마크 등) */
        .sidebar {
            width: 250px;
            background-color: #f7f6f3;
            padding: 20px;
            border-right: 1px solid #e0e0e0;
        }

        .sidebar h3 {
            font-size: 14px;
            color: #787774;
            margin-bottom: 10px;
        }

        .bookmark-list {
            list-style: none;
            padding: 0;
        }

        .bookmark-list li {
            margin-bottom: 8px;
        }

        .bookmark-list a {
            text-decoration: none;
            color: #37352f;
            font-size: 15px;
            display: block;
            padding: 5px;
            border-radius: 3px;
        }

        .bookmark-list a:hover {
            background-color: #e8e7e4;
        }

        /* 메인 콘텐츠 영역 */
        .main-content {
            flex: 1;
            padding: 50px 80px;
            max-width: 900px;
            margin: 0 auto;
        }

        .page-title {
            font-size: 40px;
            font-weight: 700;
            margin-bottom: 30px;
            outline: none; /* 클릭 시 테두리 제거 */
        }

        .section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 15px;
            border-bottom: 1px solid #eaeaea;
            padding-bottom: 5px;
        }

        /* 편집 가능한 텍스트 영역 */
        .editable-area {
            min-height: 100px;
            padding: 10px;
            background-color: #fdfdfc;
            border: 1px dashed #d9d9d9;
            border-radius: 4px;
            font-size: 16px;
            line-height: 1.6;
            outline: none;
        }
        
        .editable-area:focus {
            border-color: #2eaadc;
            background-color: #fff;
        }

        /* 구글 캘린더 영역 */
        .calendar-container {
            width: 100%;
            height: 400px;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #eaeaea;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3>📌 즐겨찾기</h3>
        <ul class="bookmark-list">
            <li><a href="https://sh-teacher.github.io/IT-Master/sangildevice.html" target="_blank">💻 상일여고 정보화기기 대시보드</a></li>
            <li><a href="https://gen.eduptl.kr" target="_blank">🏫 업무포탈</a></li>
            <li><a href="https://drive.google.com" target="_blank">☁️ 구글 드라이브</a></li>
            <li><a href="https://gemini.google.com" target="_blank">🤖 Gemini</a></li>
            <li><a href="https://claude.ai" target="_blank">🤖 Claude</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="page-title" contenteditable="true" id="main-title">👋 환영합니다, 선생님!</div>

        <div class="section">
            <div class="section-title">📝 오늘의 업무 및 일기</div>
            <div class="editable-area" contenteditable="true" id="daily-log">
                여기를 클릭해서 오늘의 업무 내용이나 일기를 작성해 보세요.<br>
                새로고침해도 내용이 지워지지 않습니다!
            </div>
        </div>

        <div class="section">
            <div class="section-title">📚 교과 수업 메모</div>
            <div class="editable-area" contenteditable="true" id="class-memo">
                수업 진도나 아이디어, 특이사항을 기록하세요.
            </div>
        </div>

        <div class="section">
            <div class="section-title">📅 내 스케줄 (구글 캘린더)</div>
            <div class="calendar-container">
                <iframe src="https://calendar.google.com/calendar/embed?src=comhwan%40gmail.com&ctz=Asia%2FSeoul" style="border: 0" width="800" height="800" frameborder="0" scrolling="no"></iframe>
            </div>
        </div>
    </div>

    <script>
        // 저장할 요소들의 ID 목록
        const editableElements = ['main-title', 'daily-log', 'class-memo'];

        // 페이지가 열릴 때, 저장된 데이터가 있으면 불러오기
        window.onload = function() {
            editableElements.forEach(id => {
                const savedData = localStorage.getItem(id);
                if (savedData) {
                    document.getElementById(id).innerHTML = savedData;
                }
            });
        };

        // 글씨를 입력(수정)할 때마다 브라우저에 즉시 저장하기
        editableElements.forEach(id => {
            const element = document.getElementById(id);
            element.addEventListener('input', function() {
                localStorage.setItem(id, this.innerHTML);
            });
        });
    </script>
</body>
</html>
