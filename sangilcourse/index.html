<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상일여고 교과관리시스템</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>  
  <style>
    /* 기본 초기화 */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', 'Malgun Gothic', sans-serif; }
    body { background-color: #f4f7fa; color: #333; overflow: hidden; }
    
    /* 상단 헤더 */
    header { background-color: #0056b3; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 10; position: relative; }
    header h1 { font-size: 20px; margin: 0; cursor: pointer; transition: opacity 0.2s; }
    header h1:hover { opacity: 0.8; }
    .user-info { font-size: 15px; display: flex; align-items: center; gap: 15px; }
    .btn-logout { background-color: white; color: #0056b3; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background-color 0.2s; }
    .btn-logout:hover { background-color: #e0e0e0; }

    /* 전체 레이아웃 (사이드바 + 메인) */
    .container { display: flex; height: calc(100vh - 60px); }
    
    /* 사이드바 메뉴 */
    .sidebar { width: 240px; background-color: #fff; border-right: 1px solid #ddd; padding: 20px 10px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
    .sidebar button { display: block; width: 100%; padding: 12px 15px; text-align: left; cursor: pointer; border: 1px solid transparent; border-radius: 6px; background-color: transparent; font-size: 15px; transition: all 0.2s; }
    .sidebar button:hover { background-color: #f0f4f8; border-color: #dbe4ef; }
    .sidebar button.active { background-color: #e6f0fa; color: #0056b3; font-weight: bold; border-color: #cce0f5; }
    
    .sidebar-title { font-size: 12px; font-weight: bold; color: #999; padding: 10px 15px 5px; margin-top: 10px; }
    
    /* ✨ 수정됨: 나의 교과목 버튼을 두 줄(과목명, 시간표)로 예쁘게 배치 */
    .subject-btn { font-size: 14px !important; padding: 10px 15px !important; display: flex !important; flex-direction: column; align-items: flex-start; gap: 4px; }
    .subject-btn-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
    .subject-btn-bottom { font-size: 11px; color: #888; font-weight: normal; }
    .sidebar button.active .subject-btn-bottom { color: #0056b3; opacity: 0.8; } /* 선택됐을 때 아래 글씨도 파랗게 */

    /* 관리자 메뉴 숨김 처리 */
    .sidebar button.admin-menu { display: none !important; }
    .sidebar button.admin-menu.visible { display: block !important; background-color: #fff0f0; color: #d32f2f; }
    .sidebar button.admin-menu.visible:hover { background-color: #ffebee; border-color: #ffcdd2; }

    /* 메인 콘텐츠 영역 */
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #contentArea { flex: 1; padding: 30px; overflow-y: auto; }
    #iframeArea { display: none; flex: 1; width: 100%; height: 100%; border: none; }
    
    .content-card { background-color: white; padding: 25px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    
    .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    .timeline { border-left: 3px solid #0056b3; margin-left: 10px; padding-left: 20px; position: relative; }
    .timeline-item { margin-bottom: 15px; position: relative; }
    .timeline-item::before { content: ''; position: absolute; left: -27px; top: 5px; width: 12px; height: 12px; background-color: white; border: 3px solid #0056b3; border-radius: 50%; }
    .timeline-item.empty::before { border-color: #ccc; }
    .timeline-time { font-size: 12px; color: #666; margin-bottom: 2px; }
    .timeline-title { font-weight: bold; font-size: 15px; color: #333; }
    .timeline-title.empty { color: #999; font-weight: normal; }
    
    .schedule-table { width: 100%; table-layout: fixed; border-collapse: collapse; margin-top: 15px; background-color: white; font-size: 13px; text-align: center; }
    .schedule-table th, .schedule-table td { padding: 10px; border: 1px solid #ddd; word-break: keep-all; }
    .schedule-table th { background-color: #f0f4f8; }
    .schedule-table th:first-child { width: 10%; } 
    .schedule-table th:not(:first-child) { width: 18%; } 
    .has-class { background-color: #e6f0fa; color: #0056b3; font-weight: bold; border-radius: 4px; line-height: 1.4; }

    /* 퀵 메뉴 (관리자용) */
    .quick-menus { display: flex; gap: 20px; margin-top: 20px; }
    .quick-card { flex: 1; background-color: #f8f9fa; border: 1px solid #e9ecef; border-radius: 10px; padding: 25px 15px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .quick-card:hover { background-color: #ffebee; border-color: #ffcdd2; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .quick-icon { font-size: 36px; display: block; margin-bottom: 10px; }
    .quick-title { font-weight: bold; font-size: 16px; color: #d32f2f; margin-bottom: 5px;}
    .quick-desc { font-size: 13px; color: #666; }

    /* 🔥 수업중 애니메이션 배지 */
    @keyframes pulse-live { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.95); } }
    .live-class-badge { font-size: 11px; font-weight: 900; color: #d32f2f; background-color: rgba(211, 47, 47, 0.15); border: 1px solid #d32f2f; padding: 2px 6px; border-radius: 8px; animation: pulse-live 1.5s infinite; margin-left: 5px; }
  </style>
</head>
<body>

  <header>
    <h1 onclick="document.querySelector('.sidebar button.menu-base').click()">상일여고 교과관리시스템</h1>
    <div class="user-info">
      <span><strong id="userNameDisplay">사용자</strong> 선생님 (<span id="userRoleDisplay">권한</span>)</span>
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
  </header>
  
  <div class="container">
    <nav class="sidebar">
      <button onclick="loadMenu('dashboard', this)" class="active menu-base">🏠 대시보드</button>
      
      <div id="sidebarSubjectTitle" class="sidebar-title">📚 나의 교과목</div>
      <div id="dynamicSubjectMenu">
        <div style="padding: 10px 15px; font-size: 12px; color: #999;">로딩 중...</div>
      </div>

      <hr id="sidebarDivider" style="border: 0; border-top: 1px solid #ddd; margin: 10px 0;">
      <button id="adminBtn1" class="admin-menu menu-base" onclick="loadMenu('adminConfig', this)">⚙️ 학기/과목 설정</button>
      <button id="adminBtn2" class="admin-menu menu-base" onclick="loadMenu('adminUsers', this)">👥 교직원 권한 관리</button>
    </nav>
    
    <main class="main-content">
      <div id="contentArea"></div>
      <iframe id="iframeArea" src=""></iframe>
    </main>
  </div>

  <script>
    // API 주소
    const API_URL = "https://script.google.com/macros/s/AKfycbzfIY0Fs4S1EjSSNI2kZfrFgtSqipG_u_KDCkdT8Vy1LjrIwB7k_1awE_psCNw0VQGg/exec";
    let myScheduleData = [];

    function checkAuth() {
      const userInfoStr = sessionStorage.getItem("userInfo");
      if (!userInfoStr) {
        alert("로그인이 필요한 서비스입니다.");
        window.location.replace("login.html");
        return null;
      }
      const userInfo = JSON.parse(userInfoStr);
      document.getElementById('userNameDisplay').innerText = userInfo.name;
      document.getElementById('userRoleDisplay').innerText = userInfo.role;
      
      if (userInfo.role === "관리자") {
        document.querySelectorAll('.admin-menu').forEach(el => el.classList.add('visible'));
      }
      return userInfo;
    }

    function logout() {
      if (confirm("로그아웃 하시겠습니까?")) {
        sessionStorage.removeItem("userInfo"); 
        window.location.replace("login.html"); 
      }
    }

    function loadMenu(menuId, btnElement, extraParam = "") {
      document.querySelectorAll('.sidebar button').forEach(btn => btn.classList.remove('active', 'live-class-active'));
      if(btnElement) btnElement.classList.add('active');

      const contentArea = document.getElementById('contentArea');
      const iframeArea = document.getElementById('iframeArea');

      if (menuId === 'dashboard') {
        iframeArea.style.display = 'none';
        contentArea.style.display = 'block';
        contentArea.innerHTML = `<div style="text-align:center; padding: 50px; font-size: 16px;">데이터를 불러오는 중입니다... ⏳</div>`;
        renderDashboard(); 
      } 
      else if (menuId === 'attendance') {
        contentArea.style.display = 'none';
        iframeArea.style.display = 'block';
        iframeArea.src = `attendance.html?subject=${encodeURIComponent(extraParam)}`;
      }
      else if (menuId === 'adminConfig') {
        iframeArea.style.display = 'none';
        contentArea.style.display = 'block';
        contentArea.innerHTML = `
          <div class="content-card">
            <h2 style="color: #0056b3; margin-bottom: 10px;">⚙️ 학기/과목 설정 (나이스 연동)</h2>
            <p style="color: #666; margin-bottom: 20px;">나이스에서 다운로드한 전체 시간표 엑셀(.xlsx) 파일을 업로드하여 학기 정보와 교사별 과목을 자동 세팅합니다.</p>
            
            <div style="background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #e9ecef;">
              <div style="margin-bottom: 15px;">
                <label style="font-weight:bold; margin-right:10px;">학년도: <input type="number" id="setYear" value="${new Date().getFullYear()}" style="padding:8px; border:1px solid #ddd; border-radius:4px; width:100px;"></label>
                <label style="font-weight:bold;">학기: 
                  <select id="setSemester" style="padding:8px; border:1px solid #ddd; border-radius:4px;">
                    <option value="1">1학기</option>
                    <option value="2">2학기</option>
                  </select>
                </label>
              </div>
              <div style="margin-bottom: 15px;">
                <label style="font-weight:bold; display:block; margin-bottom:8px;">나이스 엑셀 파일 업로드:</label>
                <input type="file" id="excelFileInput" accept=".xlsx" style="padding: 10px; width: 100%; border: 1px dashed #bbb; border-radius: 4px; background: white;">
              </div>
              <button onclick="processExcelData()" style="background:#0056b3; color:white; border:none; padding:12px 20px; font-weight:bold; border-radius:6px; cursor:pointer; width:100%;">엑셀 데이터 분석 및 서버 연동 실행</button>
              
              <div id="loadingNeis" style="display:none; color:#d32f2f; margin-top:15px; font-weight:bold; text-align:center;">
                데이터를 분석하고 서버와 연동 중입니다. 잠시만 기다려주세요... ⏳
              </div>
            </div>

            <hr style="margin: 30px 0; border: 0; border-top: 1px solid #ddd;">
            
            <h3 style="color: #333; margin-bottom: 15px;">🔍 나이스 연동 데이터 검색</h3>
            <div style="background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #e9ecef; margin-bottom: 15px;">
                <div style="display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap;">
                    <select id="fSem" style="padding:8px; border:1px solid #ddd; border-radius:4px;"><option value="">학년도-학기 전체</option></select>
                    <select id="fName" style="padding:8px; border:1px solid #ddd; border-radius:4px;"><option value="">교사명 전체</option></select>
                    <select id="fSubj" style="padding:8px; border:1px solid #ddd; border-radius:4px;"><option value="">과목명 전체</option></select>
                    <select id="fTClass" style="padding:8px; border:1px solid #ddd; border-radius:4px;"><option value="">대상반 전체</option></select>
                    <select id="fDay" style="padding:8px; border:1px solid #ddd; border-radius:4px;">
                        <option value="">요일 전체</option><option value="월">월</option><option value="화">화</option><option value="수">수</option><option value="목">목</option><option value="금">금</option>
                    </select>
                </div>
                <button onclick="searchNeisDataCall()" style="background:#28a745; color:white; border:none; padding:10px 20px; font-weight:bold; border-radius:6px; cursor:pointer;">조회하기</button>
            </div>
            
            <div style="overflow-x: auto; background: white; border: 1px solid #e9ecef; border-radius: 8px;">
                <table class="schedule-table" style="margin-top:0; border:none; font-size: 13px; white-space: nowrap;">
                    <thead>
                        <tr>
                            <th style="width: 12%;">학년도</th>
                            <th style="width: 10%;">학기</th>
                            <th style="width: 18%;">교사명(ID)</th>
                            <th style="width: 20%;">과목명</th>
                            <th style="width: 15%;">대상반</th>
                            <th style="width: 10%;">요일</th>
                            <th style="width: 15%;">교시</th>
                        </tr>
                    </thead>
                    <tbody id="searchResultBody">
                        <tr><td colspan="7" style="color:#999; padding: 20px;">검색 조건을 선택하고 조회버튼을 눌러주세요.</td></tr>
                    </tbody>
                </table>
            </div>
          </div>
        `;
        loadNeisFilters();
      }
      else {
        iframeArea.style.display = 'none';
        contentArea.style.display = 'block';
        contentArea.innerHTML = `<div class="content-card"><h2>준비 중인 기능입니다.</h2></div>`;
      }
    }

    async function loadNeisFilters() {
      try {
        const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ type: "GET_NEIS_FILTERS" }) });
        const r = await res.json();
        if(r.success && r.data) {
          const populate = (id, arr) => {
            const el = document.getElementById(id);
            if(!el) return;
            arr.forEach(val => el.innerHTML += `<option value="${val}">${val}</option>`);
          };
          populate('fSem', r.data.sem);
          populate('fName', r.data.name);
          populate('fSubj', r.data.subj);
          populate('fTClass', r.data.tClass);
        }
      } catch(e) { console.error("필터 로드 에러", e); }
    }

    async function searchNeisDataCall() {
      const btn = document.querySelector('button[onclick="searchNeisDataCall()"]');
      const tbody = document.getElementById('searchResultBody');
      
      btn.innerText = "조회 중..."; btn.disabled = true;
      tbody.innerHTML = '<tr><td colspan="7" style="padding: 20px;">데이터를 불러오는 중입니다... ⏳</td></tr>';
      
      try {
        const payload = {
          fSem: document.getElementById('fSem').value,
          fName: document.getElementById('fName').value,
          fSubj: document.getElementById('fSubj').value,
          fTClass: document.getElementById('fTClass').value,
          fDay: document.getElementById('fDay').value
        };
        const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ type: "SEARCH_NEIS_DATA", payload: payload }) });
        const r = await res.json();
        
        if(r.success) {
          if(r.data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="padding: 20px;">조건에 맞는 데이터가 없습니다.</td></tr>';
          } else {
            tbody.innerHTML = r.data.map(d => `
              <tr style="border-bottom: 1px solid #eee;">
                <td style="padding: 10px;">${d.year}</td>
                <td style="padding: 10px;">${d.semester}</td>
                <td style="padding: 10px; font-weight: bold; color: #0056b3;">${d.teacherName}<br><span style="font-size:11px; color:#666;">(${d.teacherId})</span></td>
                <td style="padding: 10px;">${d.subject}</td>
                <td style="padding: 10px;">${d.targetClass}</td>
                <td style="padding: 10px;">${d.day}</td>
                <td style="padding: 10px;">${d.period}교시</td>
              </tr>
            `).join('');
          }
        } else {
          tbody.innerHTML = `<tr><td colspan="7" style="color:red; padding: 20px;">검색 실패: ${r.msg}</td></tr>`;
        }
      } catch(e) {
        tbody.innerHTML = '<tr><td colspan="7" style="color:red; padding: 20px;">서버 통신 오류가 발생했습니다.</td></tr>';
      } finally {
        btn.innerText = "조회하기"; btn.disabled = false;
      }
    }

    function processExcelData() {
      const year = document.getElementById('setYear').value.trim();
      const semester = document.getElementById('setSemester').value.trim();
      const fileInput = document.getElementById('excelFileInput');

      if (!year || !semester) { alert("학년도와 학기를 먼저 입력해주세요."); return; }
      if (fileInput.files.length === 0) { alert("업로드할 엑셀 파일을 선택해 주세요."); return; }

      const file = fileInput.files[0];
      const reader = new FileReader();

      reader.onload = function(e) {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, {type: 'array'});
          const worksheet = workbook.Sheets[workbook.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(worksheet, {header: 1});
          
          const result = [];
          const days = ["월", "화", "수", "목", "금", "토", "일"];

          rows.forEach(cols => {
            if (!cols || cols.length === 0) return;
            
            let teacherId = "";
            let teacherName = "";
            let startIndex = -1;

            for (let i = 0; i < cols.length; i++) {
              if (!cols[i]) continue;
              let cell = String(cols[i]).trim();
              let idMatch = cell.match(/([a-zA-Z0-9_.-]+)\((.+?)\)/);
              if (idMatch) { teacherId = idMatch[1].trim(); teacherName = idMatch[2].trim(); startIndex = i + 1; break; }
            }

            if (startIndex === -1) return;
            const subjectsMap = {};

            for (let i = startIndex; i < cols.length; i++) {
              let cellData = cols[i] ? String(cols[i]).trim() : "";
              if (!cellData) continue;

              const cellMatch = cellData.match(/(\d+)\s*학년\s*(.+?)\s*\(([^)]+)\)/);
              if (cellMatch) {
                const grade = cellMatch[1];
                const subjectName = cellMatch[2].trim();
                const classNum = cellMatch[3].trim(); 
                let targetClass = !isNaN(classNum) ? `${grade}-${classNum}` : classNum;

                const timeIndex = i - startIndex;
                const dayIdx = Math.floor(timeIndex / 12);
                const period = (timeIndex % 12) + 1;

                if (dayIdx >= days.length) continue;
                const day = days[dayIdx];

                const subjectKey = `${subjectName}_${targetClass}`;
                if (!subjectsMap[subjectKey]) subjectsMap[subjectKey] = { subject: subjectName, targetClass: targetClass, schedules: [] };
                subjectsMap[subjectKey].schedules.push({ day: day, period: period });
              }
            }

            for (let key in subjectsMap) {
              result.push({
                teacherId: teacherId, teacherName: teacherName,
                subject: subjectsMap[key].subject, targetClass: subjectsMap[key].targetClass,
                schedules: subjectsMap[key].schedules
              });
            }
          });

          if (result.length === 0) { alert("분석된 데이터가 없습니다. 나이스 양식이 맞는지 확인해주세요."); return; }
          sendBulkDataToServer(year, semester, result);

        } catch (err) {
          console.error(err);
          alert("파일 판독 중 오류가 발생했습니다. 원본 엑셀(.xlsx) 파일이 맞는지 확인해주세요.");
        }
      };
      reader.readAsArrayBuffer(file);
    }

    async function sendBulkDataToServer(year, semester, parsedData) {
      document.getElementById('loadingNeis').style.display = 'block'; 
      try {
        const response = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({ type: "BULK_UPLOAD_NEIS", payload: { year: year, semester: semester, data: parsedData } })
        });
        const resResult = await response.json();
        document.getElementById('loadingNeis').style.display = 'none'; 

        if (resResult.success) {
          alert("✅ 나이스 데이터가 성공적으로 분석 및 연동되었습니다!");
          document.getElementById('excelFileInput').value = ""; 
          loadNeisFilters();
        } else alert("데이터 연동 중 오류: " + resResult.msg);
      } catch (error) {
        document.getElementById('loadingNeis').style.display = 'none';
        alert("서버 통신 중 오류가 발생했습니다.");
      }
    }

    async function renderDashboard() {
      const userInfo = checkAuth();
      if(!userInfo) return;

      const contentArea = document.getElementById('contentArea');

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({ type: "GET_DASHBOARD", payload: { teacherId: userInfo.id } })
        });
        const result = await response.json();

        if(result.success) {
          myScheduleData = result.schedule;
          buildDashboardHTML(myScheduleData);
          buildSidebarSubjects(myScheduleData); 
        } else {
          contentArea.innerHTML = `<div style="color:red; padding:20px;">데이터를 불러오지 못했습니다: ${result.msg}</div>`;
        }
      } catch (e) {
        contentArea.innerHTML = `<div style="color:red; padding:20px;">서버 통신 에러가 발생했습니다.</div>`;
      }
    }

    // ✨ 핵심: 과목명 + 하단 시간표 결합 로직
    function buildSidebarSubjects(mySchedule) {
      const userInfo = JSON.parse(sessionStorage.getItem("userInfo"));
      const menuContainer = document.getElementById('dynamicSubjectMenu');
      const titleContainer = document.getElementById('sidebarSubjectTitle');
      const divider = document.getElementById('sidebarDivider');

      if (userInfo.role === "관리자") {
        if(titleContainer) titleContainer.style.display = 'none';
        if(menuContainer) menuContainer.style.display = 'none';
        if(divider) divider.style.display = 'none';
        return; 
      }

      if(titleContainer) titleContainer.style.display = 'block';
      if(menuContainer) menuContainer.style.display = 'block';
      if(divider) divider.style.display = 'block';

      menuContainer.innerHTML = '';

      // fullName 기준으로 그룹화하여 시간표 문자열 만들기
      const grouped = {};
      mySchedule.forEach(item => {
        if (!grouped[item.fullName]) {
          grouped[item.fullName] = { fullName: item.fullName, times: [] };
        }
        grouped[item.fullName].times.push(`${item.day}${item.period}`);
      });

      const uniqueSubjects = Object.values(grouped);

      if(uniqueSubjects.length === 0) {
        menuContainer.innerHTML = '<div style="padding: 10px 15px; font-size: 13px; color: #999;">배정된 과목이 없습니다.</div>';
        return;
      }

      const dayOrder = { '월':1, '화':2, '수':3, '목':4, '금':5, '토':6, '일':7 };

      uniqueSubjects.forEach(s => {
        s.times.sort((a, b) => {
            const dayA = dayOrder[a.charAt(0)] || 9;
            const dayB = dayOrder[b.charAt(0)] || 9;
            if (dayA !== dayB) return dayA - dayB;
            return parseInt(a.charAt(1)) - parseInt(b.charAt(1));
        });
        const scheduleStr = s.times.join(' ');

        const btn = document.createElement('button');
        btn.className = 'subject-btn';
        btn.dataset.subject = s.fullName;
        // ✨ 위에는 과목명, 아래에는 시간표 텍스트 추가
        btn.innerHTML = `
            <div class="subject-btn-top">
                <span class="subj-name">${s.fullName}</span>
            </div>
            <div class="subject-btn-bottom">${scheduleStr}</div>
        `;
        btn.onclick = function() { loadMenu('attendance', this, s.fullName); };
        menuContainer.appendChild(btn);
      });

      highlightCurrentClass(); 
    }

    function buildDashboardHTML(mySchedule) {
      const contentArea = document.getElementById('contentArea');
      const userInfo = JSON.parse(sessionStorage.getItem("userInfo"));

      if (userInfo.role === "관리자") {
        contentArea.innerHTML = `
          <div class="content-card mb-4" style="margin-bottom: 20px;">
              <h2 style="color: #d32f2f; display:flex; align-items:center; gap:8px;">🏫 상일여고 교과관리시스템 (관리자 모드)</h2>
              <p style="color: #666; margin-top: 5px;">시스템 관리자 계정으로 접속하셨습니다. 원하시는 관리 업무를 선택해 주세요.</p>
          </div>
          <div class="quick-menus">
              <div class="quick-card" onclick="document.getElementById('adminBtn1').click()">
                  <span class="quick-icon">⚙️</span>
                  <div class="quick-title">학기/과목 설정</div>
                  <div class="quick-desc">나이스 데이터 연동 및 전교 시간표 조회</div>
              </div>
              <div class="quick-card" onclick="document.getElementById('adminBtn2').click()">
                  <span class="quick-icon">👥</span>
                  <div class="quick-title">교직원 권한 관리</div>
                  <div class="quick-desc">선생님 계정 생성 및 권한 설정</div>
              </div>
          </div>
        `;
        return;
      }

      const days = ["일", "월", "화", "수", "목", "금", "토"];
      const todayNum = new Date().getDay(); 
      const todayStr = days[todayNum]; 
      const times = ["08:45 ~ 09:35", "09:45 ~ 10:35", "10:45 ~ 11:35", "11:45 ~ 12:35", "13:35 ~ 14:25", "14:35 ~ 15:25", "15:40 ~ 16:30"];

      let timelineHTML = "";
      if (todayNum === 0 || todayNum === 6) {
        timelineHTML = `<div style="padding: 20px; color:#666;">주말은 수업이 없습니다. 푹 쉬세요! ☕</div>`;
      } else {
        timelineHTML += `<div class="timeline">`;
        for (let period = 1; period <= 7; period++) {
          const classData = mySchedule.find(s => s.day === todayStr && s.period == period);
          if (classData) {
            let targetClassHtml = classData.targetClass ? ` <span style="font-size:12px; font-weight:normal; color:#666;">(${classData.targetClass})</span>` : "";
            timelineHTML += `
              <div class="timeline-item">
                <div class="timeline-time">${period}교시 (${times[period-1]})</div>
                <div class="timeline-title" style="color:#0056b3;">${classData.subject}${targetClassHtml}</div>
              </div>`;
          } else {
            timelineHTML += `
              <div class="timeline-item empty">
                <div class="timeline-time">${period}교시 (${times[period-1]})</div>
                <div class="timeline-title empty">공강</div>
              </div>`;
          }
        }
        timelineHTML += `</div>`;
      }

      let tableHTML = `<table class="schedule-table"><thead><tr><th>교시</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th></tr></thead><tbody>`;
      for (let period = 1; period <= 7; period++) {
        tableHTML += `<tr><td><strong>${period}</strong></td>`;
        ["월", "화", "수", "목", "금"].forEach(day => {
          const classData = mySchedule.find(s => s.day === day && s.period == period);
          if (classData) {
            let targetClassHtml = classData.targetClass ? `<br><span style="font-size:11px; font-weight:normal; color:#555;">(${classData.targetClass})</span>` : "";
            tableHTML += `<td class="has-class cursor-pointer" onclick="document.querySelector('.subject-btn[data-subject=\\'${classData.fullName}\\']').click()">
                ${classData.subject}${targetClassHtml}
            </td>`;
          } else {
            tableHTML += `<td></td>`;
          }
        });
        tableHTML += `</tr>`;
      }
      tableHTML += `</tbody></table>`;

      contentArea.innerHTML = `
        <div class="content-card mb-4" style="margin-bottom: 20px;">
            <h2 style="color: #0056b3; display:flex; align-items:center; gap:8px;">🏫 상일여고 교과관리시스템</h2>
            <p style="color: #666; margin-top: 5px;">좌측 나의 교과목을 클릭하여 출석표 및 좌석 배치도를 관리하세요.</p>
        </div>
        <div class="dashboard-grid mt-4">
          <div>
            <div class="content-card">
              <h3 style="margin-bottom: 15px; color:#333;">🏃 오늘의 수업 타임라인 (${todayStr}요일)</h3>
              ${timelineHTML}
            </div>
          </div>
          <div class="content-card">
            <h3 style="color:#333;">🗓️ 나의 주간 시간표</h3>
            ${tableHTML}
          </div>
        </div>
      `;
    }

    function highlightCurrentClass() {
      const userInfo = JSON.parse(sessionStorage.getItem("userInfo"));
      if (!userInfo || userInfo.role === "관리자") return; 

      const now = new Date();
      const days = ['일','월','화','수','목','금','토'];
      const todayStr = days[now.getDay()];
      const time = now.getHours() * 100 + now.getMinutes();

      let currentPeriod = 0;
      if      (time >= 845  && time < 935)  currentPeriod = 1;
      else if (time >= 945  && time < 1035) currentPeriod = 2;
      else if (time >= 1040 && time < 1135) currentPeriod = 3;
      else if (time >= 1145 && time < 1235) currentPeriod = 4;
      else if (time >= 1335 && time < 1425) currentPeriod = 5;
      else if (time >= 1435 && time < 1525) currentPeriod = 6;
      else if (time >= 1540 && time < 1630) currentPeriod = 7;

      document.querySelectorAll('.live-class-badge').forEach(el => el.remove());

      if (currentPeriod === 0 || myScheduleData.length === 0) return; 

      const currentClass = myScheduleData.find(s => s.day === todayStr && s.period == currentPeriod);
      
      if (currentClass) {
        const menuBtns = document.querySelectorAll('.subject-btn');
        menuBtns.forEach(btn => {
          if (btn.dataset.subject === currentClass.fullName) {
            // ✨ 상단 div 영역(subject-btn-top)에 불타는 배지 추가
            const topRow = btn.querySelector('.subject-btn-top');
            if (topRow && !topRow.querySelector('.live-class-badge')) {
              const badge = document.createElement('span');
              badge.className = 'live-class-badge';
              badge.innerText = '🔥수업중!';
              topRow.appendChild(badge);
            }
          }
        });
      }
    }

    window.onload = function() {
      if(checkAuth()) {
        const firstBtn = document.querySelector('.sidebar .menu-base');
        loadMenu('dashboard', firstBtn); 
      }
    };
    
    setInterval(highlightCurrentClass, 60000);
  </script>
</body>
</html>
