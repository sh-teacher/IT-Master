<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상일여고 교과수업 만능 탐색기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 모바일 최적화 스크롤바 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 p-3 md:p-4 min-h-screen pb-20">
    <div class="max-w-xl mx-auto">
        <h1 class="text-2xl md:text-3xl font-black text-slate-800 mb-6 text-center tracking-tight">🔍 교과수업 만능 탐색기</h1>

        <div class="bg-white rounded-3xl shadow-xl p-4 md:p-7 space-y-4 border border-slate-200">
            
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1.5">어떤 작업을 하실 건가요?</label>
                <select id="searchType" onchange="toggleInputs()" class="w-full p-3 bg-slate-100 rounded-xl font-black text-slate-700 outline-none focus:ring-2 ring-blue-500 cursor-pointer">
                    <optgroup label="📍 단일/실시간 위치 조회">
                        <option value="REAL_STUDENT">이 학생 지금 어디 있지? (이름)</option>
                        <option value="REAL_TEACHER">이 선생님 지금 어디 계시지? (성함)</option>
                        <option value="REAL_CLASS">특정 반 지금 수업 누구지? (예: 1-3)</option>
                        <option value="REAL_ALL" class="bg-indigo-100 font-bold">🕒 이 시간 우리 학교 모든 실의 수업은? (전체)</option>
                    </optgroup>
                    <optgroup label="🗓️ 주간 시간표 조회">
                        <option value="TIMETABLE_TEACHER">특정 선생님 [주간 시간표] 보기 (성함)</option>
                        <option value="TIMETABLE_CLASS">특정 반(실) [주간 시간표] 보기 (예: 1-3, 아름실)</option>
                        <option value="TIMETABLE_STUDENT">특정 학생 [주간 시간표] 보기 (이름)</option>
                    </optgroup>
                    <optgroup label="☕ 대강/보강 교사 찾기">
                        <option value="FREE_TEACHER">선택한 요일/교시에 [공강인 선생님] 찾기</option>
                    </optgroup>
                </select>
            </div>
            
            <div id="timeSelector" class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1.5">요일</label>
                    <select id="searchDay" class="w-full p-3 bg-blue-50 border border-blue-100 rounded-xl font-bold text-blue-700 outline-none cursor-pointer">
                        <option value="">🕒 현재 요일</option>
                        <option value="월">월요일</option><option value="화">화요일</option>
                        <option value="수">수요일</option><option value="목">목요일</option><option value="금">금요일</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1.5">교시</label>
                    <select id="searchPeriod" class="w-full p-3 bg-blue-50 border border-blue-100 rounded-xl font-bold text-blue-700 outline-none cursor-pointer">
                        <option value="">🕒 현재 교시</option>
                        <option value="1">1교시</option><option value="2">2교시</option><option value="3">3교시</option>
                        <option value="4">4교시</option><option value="5">5교시</option><option value="6">6교시</option><option value="7">7교시</option>
                    </select>
                </div>
            </div>

            <div class="relative pt-1" id="keywordBox">
                <input type="text" id="keyword" placeholder="검색어 입력..." class="w-full p-4 bg-slate-100 rounded-xl font-black text-lg outline-none focus:ring-2 ring-blue-500">
                <button onclick="runSearch()" class="absolute right-2 top-3 bottom-2 bg-blue-600 text-white px-5 rounded-lg font-bold shadow-md hover:bg-blue-700 transition">검색</button>
            </div>
            
            <button id="specialBtn" onclick="runSearch()" style="display:none;" class="w-full mt-3 text-white p-4 rounded-xl font-black text-lg shadow-md transition"></button>

        </div>

        <div id="resultArea" class="mt-6 space-y-6"></div>
    </div>

    <script>
        // 🚨 여기에 선생님의 구글 API 주소를 꼭! 넣어주세요!
        const API_URL = "https://script.google.com/macros/s/AKfycbzfIY0Fs4S1EjSSNI2kZfrFgtSqipG_u_KDCkdT8Vy1LjrIwB7k_1awE_psCNw0VQGg/exec";

        function toggleInputs() {
            const type = document.getElementById('searchType').value;
            const keywordBox = document.getElementById('keywordBox');
            const specialBtn = document.getElementById('specialBtn');
            const timeSelector = document.getElementById('timeSelector');

            // 주간 시간표일 경우 요일/교시 선택창 숨기기
            if (type.startsWith('TIMETABLE_')) {
                timeSelector.style.display = 'none';
            } else {
                timeSelector.style.display = 'grid';
            }

            // 특수 버튼(전체조회, 공강조회) 모드
            if (type === 'REAL_ALL' || type === 'FREE_TEACHER') {
                keywordBox.style.display = 'none';
                specialBtn.style.display = 'block';
                specialBtn.innerText = type === 'REAL_ALL' ? '🕒 우리 학교 수업 현황판 조회' : '☕ 공강인 선생님 찾기';
                specialBtn.className = type === 'REAL_ALL' ? 'w-full mt-4 bg-indigo-600 text-white p-4 rounded-xl font-black text-lg shadow-md hover:bg-indigo-700' : 'w-full mt-4 bg-amber-500 text-white p-4 rounded-xl font-black text-lg shadow-md hover:bg-amber-600';
            } else {
                keywordBox.style.display = 'block';
                specialBtn.style.display = 'none';
            }
        }

        async function runSearch() {
            const type = document.getElementById('searchType').value;
            const keyword = document.getElementById('keyword').value.trim();
            let day = document.getElementById('searchDay').value;
            let period = document.getElementById('searchPeriod').value;

            if (type !== 'FREE_TEACHER' && type !== 'REAL_ALL' && !keyword) return alert("검색어를 입력하세요!");

            // 🕒 현재 시간 자동 계산기
            if (!day || !period) {
                const now = new Date();
                const dayArr = ['일','월','화','수','목','금','토'];
                let currentDay = dayArr[now.getDay()];
                if (currentDay === '토' || currentDay === '일') currentDay = '월';

                const timeVal = now.getHours() * 100 + now.getMinutes();
                let currentPeriod = "1";
                if (timeVal >= 950 && timeVal < 1050) currentPeriod = "2";
                else if (timeVal >= 1050 && timeVal < 1150) currentPeriod = "3";
                else if (timeVal >= 1150 && timeVal < 1250) currentPeriod = "4";
                else if (timeVal >= 1330 && timeVal < 1430) currentPeriod = "5";
                else if (timeVal >= 1430 && timeVal < 1530) currentPeriod = "6";
                else if (timeVal >= 1530) currentPeriod = "7";

                day = day || currentDay;
                period = period || currentPeriod;
            }

            const area = document.getElementById('resultArea');
            area.innerHTML = '<div class="text-center p-10 bg-white rounded-2xl shadow-sm animate-pulse text-slate-500 font-bold">데이터를 가져오는 중입니다... 🔍</div>';

            try {
                // 1. [실시간 전체 현황판] ✅ 1-1 ~ 3-9 반 번호 직접 반복 조회
                if (type === 'REAL_ALL') {
                    const classKeywords = [];
                    for (let grade = 1; grade <= 3; grade++) {
                        for (let cls = 1; cls <= 8; cls++) {
                            classKeywords.push(`${grade}-${cls}`);
                        }
                    }
                    // 특별실 추가
                    classKeywords.push("아름실", "다움실");

                    const fetchPromises = classKeywords.map(kw =>
                        fetch(API_URL, {
                            method: 'POST',
                            body: JSON.stringify({
                                type: "SEARCH_REALTIME",
                                payload: { searchType: "CLASS", keyword: kw, forceDay: day, forcePeriod: period }
                            })
                        })
                        .then(r => r.json())
                        .catch(() => ({ success: false }))
                    );

                    const results = await Promise.all(fetchPromises);
                    let allData = [];
                    let uniqueCheck = new Set();

                    results.forEach(res => {
                        if (res.success && res.data) {
                            res.data.forEach(item => {
                                const key = item.subject + item.teacher;
                                if (!uniqueCheck.has(key)) { uniqueCheck.add(key); allData.push(item); }
                            });
                        }
                    });

                    if (allData.length === 0) return area.innerHTML = `<div class="bg-slate-200 p-5 rounded-2xl text-center font-bold text-slate-600">${day}요일 ${period}교시에는 진행 중인 수업이 없습니다.</div>`;
                    renderFullStatus(allData, day, period);
                } 
                // 2. [단건 실시간 조회]
                else if (type.startsWith('REAL_')) {
                    let realType = type.split('_')[1];
                    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ type: "SEARCH_REALTIME", payload: { searchType: realType, keyword: keyword, forceDay: day, forcePeriod: period } }) });
                    const r = await res.json();
                    
                    if (!r.success) return area.innerHTML = `<div class="bg-amber-50 p-5 rounded-2xl text-amber-700 text-center font-bold">${r.msg}</div>`;
                    if (!r.data || r.data.length === 0) return area.innerHTML = `<div class="bg-slate-200 p-5 rounded-2xl text-slate-600 text-center font-bold">진행 중인 수업이 없습니다.</div>`;
                    
                    area.innerHTML = r.data.map(item => `
                        <div class="bg-white p-5 rounded-2xl shadow-md border-l-8 border-blue-500">
                            <div class="text-xs font-bold text-slate-400 mb-1">${day}요일 ${period}교시</div>
                            <div class="text-xl font-black text-slate-800">${item.subject}</div>
                            <div class="text-blue-600 font-bold mt-2">${item.teacher} 선생님</div>
                        </div>
                    `).join('');
                }
                // 3. [주간 시간표 & 공강 찾기]
                else {
                    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ type: "GET_ADVANCED_SEARCH", payload: { searchType: type, keyword: keyword, day: day, period: period } }) });
                    const r = await res.json();
                    
                    if (!r.success) return area.innerHTML = `<div class="bg-red-50 p-5 rounded-2xl text-red-600 text-center font-bold">${r.msg}</div>`;

                    if (r.type === "FREE_TEACHER") {
                        let tags = r.data.map(t => `<span class="inline-block bg-white text-slate-700 border border-slate-300 font-black px-3 py-1.5 rounded-lg m-1 text-sm">${t}</span>`).join('');
                        area.innerHTML = `<div class="bg-amber-50 p-5 rounded-2xl border border-amber-200"><h2 class="text-md font-black text-amber-800 mb-3">☕ ${r.day || day}요일 ${r.period || period}교시 공강 (${r.data.length}명)</h2><div>${tags}</div></div>`;
                    } 
                    // 🗓️ [주간 시간표 렌더링 (모바일 최적화 + 괄호 방어 코드)]
                    else if (r.type === "TIMETABLE") {
                        if (r.data.length === 0) return area.innerHTML = `<div class="bg-slate-200 text-slate-600 p-5 rounded-2xl text-center font-bold">시간표 데이터가 없습니다.</div>`;
                        
                        const grid = {};
                        for (let p = 1; p <= 8; p++) { grid[p] = { '월': '', '화': '', '수': '', '목': '', '금': '' }; }
                        
                        r.data.forEach(item => {
                            if (item.period >= 1 && item.period <= 8 && grid[item.period][item.day] !== undefined) {
                                
                                // 🔥 확실하게 문자열로 변환 (숫자형 데이터 에러 원천 차단)
                                let subjectStr = String(item.subject || "");

                                // ✅ 학생 시간표: (배정반) 정보가 없을 때 item.room 또는 item.class 필드로 보완
                                if (type === 'TIMETABLE_STUDENT') {
                                    // 괄호 정보가 아예 없는 경우, 별도 필드(room/class/className)로 보완
                                    if (!subjectStr.includes('(')) {
                                        const roomInfo = item.room || item.class || item.className || "";
                                        if (roomInfo) subjectStr = `${subjectStr} (${roomInfo})`;
                                    }
                                }
                                
                                let formattedSubject = subjectStr;
                                if (subjectStr.includes('(')) {
                                    formattedSubject = subjectStr.replace(/\s*\(/g, '<span class="block text-[10px] md:text-[12px] text-slate-500 font-bold leading-tight mt-0.5">(').replace(/\)/g, ')</span>');
                                }
                                
                                let teacherHTML = '';
                                if (type !== 'TIMETABLE_TEACHER' && item.teacher) {
                                    teacherHTML = `<div class="text-[10px] md:text-[13px] text-blue-600 font-bold mt-0.5 truncate">${item.teacher}</div>`;
                                }
                                
                                const html = `<div class="font-black text-slate-800 leading-[1.15] md:leading-snug text-[11px] md:text-[14px] break-words">${formattedSubject}</div>${teacherHTML}`;
                                
                                grid[item.period][item.day] += (grid[item.period][item.day] ? '<hr class="my-0.5 border-slate-200">' : '') + html;
                            }
                        });

                        let tableHTML = `
                        <div class="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
                            <div class="bg-blue-600 text-white text-center py-2 md:py-4 font-black text-sm md:text-lg">${r.title}</div>
                            <div class="w-full overflow-x-auto p-0 md:p-1">
                                <table class="w-full text-center border-collapse table-fixed min-w-[300px]">
                                    <thead>
                                        <tr class="bg-slate-100 text-slate-600 text-[10px] md:text-[13px] font-black">
                                            <th class="border border-slate-200 p-1 md:p-2 w-[12%]">교시</th>
                                            <th class="border border-slate-200 p-1 md:p-2 w-[17.6%]">월</th>
                                            <th class="border border-slate-200 p-1 md:p-2 w-[17.6%]">화</th>
                                            <th class="border border-slate-200 p-1 md:p-2 w-[17.6%]">수</th>
                                            <th class="border border-slate-200 p-1 md:p-2 w-[17.6%]">목</th>
                                            <th class="border border-slate-200 p-1 md:p-2 w-[17.6%]">금</th>
                                        </tr>
                                    </thead>
                                    <tbody>`;
                        
                        for (let p = 1; p <= 7; p++) {
                            tableHTML += `<tr class="hover:bg-slate-50 transition h-[65px] md:h-[80px]">
                                <td class="border border-slate-200 p-0.5 md:p-2 font-black text-slate-500 bg-slate-50 text-[10px] md:text-sm">${p}</td>`;
                            
                            ['월', '화', '수', '목', '금'].forEach(d => {
                                const cellContent = grid[p][d] ? grid[p][d] : `<span class="text-slate-200">-</span>`;
                                tableHTML += `<td class="border border-slate-200 p-0.5 md:p-2 align-middle">${cellContent}</td>`;
                            });
                            tableHTML += `</tr>`;
                        }
                        
                        tableHTML += `</tbody></table></div></div>`;
                        area.innerHTML = tableHTML;
                    }
                }
            } catch (e) {
                console.error(e);
                area.innerHTML = `<div class="text-center p-5 text-red-500 font-bold bg-red-50 rounded-2xl">통신 오류가 발생했습니다. 잠시 후 다시 시도해주세요.</div>`;
            }
        }

        // 전체 현황판 렌더링 
        function renderFullStatus(data, finalDay, finalPeriod) {
            const area = document.getElementById('resultArea');
            const groups = { "1학년": [], "2학년": [], "3학년": [], "기타실": [] };
            
            data.forEach(item => {
                const match = item.subject.match(/\((\d)-(\d+)\)/); 
                if (match) { groups[`${match[1]}학년`].push(item); } 
                else { groups["기타실"].push(item); }
            });

            [1, 2, 3].forEach(g => {
                groups[`${g}학년`].sort((a, b) => {
                    return parseInt(a.subject.match(/\((\d)-(\d+)\)/)[2]) - parseInt(b.subject.match(/\((\d)-(\d+)\)/)[2]);
                });
            });

            let html = `<h2 class="text-xl md:text-2xl font-black text-indigo-800 text-center mb-2">🕒 ${finalDay}요일 ${finalPeriod}교시 현황</h2>`;
            
            for (const [title, list] of Object.entries(groups)) {
                if (list.length === 0) continue;
                html += `
                    <div class="space-y-2 mb-4">
                        <h3 class="text-sm md:text-md font-black text-slate-400 pl-2 border-l-4 border-slate-300">${title}</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                            ${list.map(item => `
                                <div class="bg-white p-3 md:p-4 rounded-xl shadow-sm border border-slate-100 flex justify-between items-center">
                                    <div class="flex-1 min-w-0 pr-2">
                                        <div class="text-[9px] md:text-[10px] font-bold text-indigo-500 uppercase tracking-wider">${item.subject.match(/\(([^)]+)\)/)?.[1] || '실'}</div>
                                        <div class="text-sm md:text-md font-black text-slate-800 truncate">${item.subject.replace(/\s*\(.*?\)/, '')}</div>
                                    </div>
                                    <div class="text-xs md:text-sm font-bold text-slate-500 whitespace-nowrap">🧑‍🏫 ${item.teacher}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            area.innerHTML = html;
        }

        window.onload = toggleInputs;
        document.getElementById('keyword').addEventListener('keypress', e => { if (e.key === 'Enter') runSearch(); });
    </script>
</body>
</html>
