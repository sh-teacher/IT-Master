<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>좌석 배치도 - Class Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>if (sessionStorage.getItem("isAllowed") !== "true") location.href = "index.html";</script>
    <style>
        .desk.over {
            border-color: #3b82f6 !important;
            background-color: #eff6ff !important;
            border-style: solid !important;
        }
        #waitingList.over {
            background-color: #f0fdf4 !important;
            outline: 2px dashed #22c55e;
            outline-offset: -2px;
        }
        #ghost {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.88;
            transform: rotate(2deg) scale(1.05);
            box-shadow: 0 8px 24px rgba(0,0,0,0.18);
            display: none;
        }
        .dragging-source { opacity: 0.28 !important; }
        .student-card { cursor: grab; user-select: none; -webkit-user-select: none; }

        /* 모든 행 7열 고정 그리드 */
        .row-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .desk {
            min-height: 88px;
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            background: #f8fafc;
            position: relative;
            transition: border-color 0.15s, background 0.15s;
        }

        /* 빈 공백 칸 */
        .desk-empty {
            min-height: 88px;
            border-radius: 12px;
            background: transparent;
        }

        /* 좌석 번호 인풋 */
        .seat-num-input {
            position: absolute;
            top: 3px;
            left: 5px;
            width: 28px;
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            background: transparent;
            border: none;
            outline: none;
            z-index: 10;
            cursor: text;
        }
        .seat-num-input:focus {
            color: #3b82f6;
            background: #eff6ff;
            border-radius: 3px;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-6">
    <div class="max-w-7xl mx-auto bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
        <h1 class="text-3xl font-black mb-6 text-slate-800">🪑 좌석 배치도</h1>

        <div class="flex gap-4 mb-8 flex-wrap">
            <select id="selectedSubject" onchange="loadStudents()" class="flex-1 min-w-[200px] p-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold text-slate-700 focus:border-blue-500 focus:outline-none">
                <option value="">과목을 로딩 중입니다...</option>
            </select>
            <button onclick="saveSeatingToServer()" id="saveBtn" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-md">
                💾 현재 좌석 저장
            </button>
            <button onclick="toggleTeacherView()" id="teacherBtn" class="bg-violet-100 text-violet-700 px-5 py-3 rounded-xl font-bold hover:bg-violet-200 transition">
                🧑‍🏫 교사위치
            </button>
            <button onclick="window.print()" class="bg-indigo-100 text-indigo-700 px-6 py-3 rounded-xl font-bold hover:bg-indigo-200 transition">
                🖨️ 인쇄하기
            </button>
            <button onclick="goBackToAttendance()" class="bg-slate-100 text-slate-600 px-5 py-3 rounded-xl font-bold hover:bg-slate-200 transition whitespace-nowrap">
                ⬅️ 이전으로
            </button>
        </div>

        <div class="flex gap-8">
            <!-- 학생 대기열 -->
            <div class="w-1/4 bg-slate-100 rounded-2xl p-4 flex flex-col">
                <h2 class="text-lg font-bold text-slate-700 mb-4 text-center">학생 대기열</h2>
                <div id="waitingList" class="flex-1 overflow-y-auto grid grid-cols-2 gap-2 content-start p-2 min-h-[500px] rounded-xl transition-all">
                    <div class="col-span-2 text-slate-400 text-center text-sm mt-10">과목을 선택해주세요</div>
                </div>
            </div>

            <!-- 교실 -->
            <div id="classroomContainer" class="w-3/4 flex flex-col gap-5 border-2 border-slate-100 rounded-2xl p-6 bg-white">
                <div id="board" class="bg-emerald-800 text-white text-center py-4 rounded-xl font-black text-xl shadow-inner">
                    칠 판 (교탁)
                </div>
                <div id="classroomGrid" class="flex flex-col gap-3"></div>
            </div>
        </div>
    </div>

    <!-- 고스트 카드 -->
    <div id="ghost" class="flex flex-col items-center justify-center bg-white rounded-lg border border-slate-200 font-bold text-slate-700"></div>

    <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxUgpimLYy_9K_vZjbxJYtImA4fcz3ZZxfXPvy9WlYXLv1dY-yBA6yrtHeybyAo1v_Vpg/exec";

    // ── 행 구성 정의
    // desks: 실제 책상 수, empty: 오른쪽 빈칸 수 (전체 열 = desks + empty = 7)
    const ROW_CONFIG = [
        { desks: 6, empty: 1 },  // 1행: 책상6 + 빈칸1
        { desks: 6, empty: 1 },  // 2행: 책상6 + 빈칸1
        { desks: 7, empty: 0 },  // 3행: 책상7
        { desks: 7, empty: 0 },  // 4행: 책상7
    ];
    const TOTAL_SEATS = ROW_CONFIG.reduce((a, r) => a + r.desks, 0); // 26

    let isTeacherView = false;
    const dnd = { active:false, card:null, ghost:null, offsetX:0, offsetY:0, startX:0, startY:0, currentOver:null };

    /* ── 초기화 ── */
    window.onload = async function () {
        createDesks();
        try {
            const res = await fetch(`${API_URL}?type=GET_SUBJECTS`);
            const subjects = await res.json();
            const sel = document.getElementById('selectedSubject');
            sel.innerHTML = '<option value="">배치할 과목/분반을 선택해주세요</option>';
            subjects.forEach(s => {
                const o = document.createElement('option');
                o.value = s.fullName; o.innerText = s.fullName;
                sel.appendChild(o);
            });
            const p = new URLSearchParams(window.location.search).get('subject');
            if (p) {
                for (let i = 0; i < sel.options.length; i++) {
                    if (sel.options[i].value.replace(/\s/g,'') === p.replace(/\s/g,'')) {
                        sel.selectedIndex = i; loadStudents(); break;
                    }
                }
            }
        } catch { alert("과목 목록 로드 실패!"); }
    };

    /* ── 책상 생성 ── */
    function createDesks() {
        const grid = document.getElementById('classroomGrid');
        grid.innerHTML = '';
        let seatIdx = 0;

        ROW_CONFIG.forEach((rowCfg, rowIdx) => {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'row-grid';
            rowDiv.dataset.rowIndex = rowIdx;

            // 실제 책상
            for (let c = 0; c < rowCfg.desks; c++) {
                const desk = document.createElement('div');
                desk.className = 'desk';
                desk.dataset.seatIndex = seatIdx;
                desk.dataset.row = rowIdx;
                desk.dataset.col = c;

                const numInput = document.createElement('input');
                numInput.type = 'text';
                numInput.className = 'seat-num-input';
                // 🌟 변경된 부분: 기본 번호를 지우고 빈칸으로 설정
                numInput.value = ''; 
                numInput.placeholder = '번호'; // (선택) 입력칸 안내
                numInput.maxLength = 3;
                numInput.title = '클릭하여 출석부 번호 입력';
                numInput.addEventListener('mousedown', e => e.stopPropagation());
                numInput.addEventListener('click', e => e.stopPropagation());
                desk.appendChild(numInput);

                rowDiv.appendChild(desk);
                seatIdx++;
            }

            // 오른쪽 빈 공백칸
            for (let e = 0; e < rowCfg.empty; e++) {
                const empty = document.createElement('div');
                empty.className = 'desk-empty';
                rowDiv.appendChild(empty);
            }

            grid.appendChild(rowDiv);
        });
    }

    /* ── 학생 로드 ── */
    async function loadStudents() {
        const subject = document.getElementById('selectedSubject').value;
        if (!subject) return;
        const wl = document.getElementById('waitingList');
        wl.innerHTML = "<div class='col-span-2 text-center text-slate-500 mt-10'>불러오는 중...</div>";
        
        // 🌟 화면에 있는 기존 학생 카드와 좌석 번호 모두 초기화
        document.querySelectorAll('.desk .student-card').forEach(c => c.remove());
        document.querySelectorAll('.seat-num-input').forEach(input => input.value = '');

        try {
            const [sr, seatingR] = await Promise.all([
                fetch(`${API_URL}?type=GET_STUDENTS&subject=${encodeURIComponent(subject)}`),
                fetch(`${API_URL}?type=GET_SEATING&subject=${encodeURIComponent(subject)}`)
            ]);
            const students = await sr.json();
            const saved    = await seatingR.json();
            wl.innerHTML   = "";

            if (!students.length) {
                wl.innerHTML = "<div class='col-span-2 text-center text-red-400 mt-10 font-bold'>저장된 학생이 없습니다!</div>";
                return;
            }
            
            const desks = document.querySelectorAll('.desk');

            // 🌟 1. 서버에 저장되어 있던 커스텀 좌석 번호(seatLabel) 복원하기
            saved.forEach(seatData => {
                if (seatData.seatIndex >= 0 && seatData.seatIndex < TOTAL_SEATS) {
                    const numInput = desks[seatData.seatIndex].querySelector('.seat-num-input');
                    if (numInput && seatData.seatLabel) {
                        numInput.value = seatData.seatLabel;
                    }
                }
            });

            // 2. 학생 카드 배치하기
            students.forEach((std, idx) => {
                const card = makeCard(std, idx);
                const seat = saved.find(s => s.name === std.name && s.number == std.number);
                if (seat && seat.seatIndex >= 0 && seat.seatIndex < TOTAL_SEATS) {
                    desks[seat.seatIndex].appendChild(card);
                } else {
                    wl.appendChild(card);
                }
            });
        } catch { alert("데이터 로드 오류"); }
    }

    /* ── 카드 생성 ── */
    function makeCard(std, idx) {
        const card = document.createElement('div');
        card.className = "student-card w-full flex flex-col items-center justify-center bg-white p-1 rounded-lg shadow-sm border border-slate-200 text-center font-bold text-slate-700 hover:shadow-md";
        card.style.height = "62px";
        card.dataset.grade  = std.grade;
        card.dataset.class  = std.class;
        card.dataset.number = std.number;
        card.dataset.name   = std.name;
        card.innerHTML = `
            <span class="text-[11px] text-blue-500 block mb-0.5 pointer-events-none">${std.class}반 ${std.number}번</span>
            <span class="pointer-events-none text-sm">${std.name}</span>`;
        card.addEventListener('mousedown', onMouseDown);
        return card;
    }

    /* ── 저장 ── */
    async function saveSeatingToServer() {
        const subject = document.getElementById('selectedSubject').value;
        if (!subject) return alert("과목을 먼저 선택해주세요.");
        const btn = document.getElementById('saveBtn');
        btn.innerText = "저장 중..."; btn.disabled = true;
        const data = [];
        document.querySelectorAll('.desk').forEach(desk => {
            const card = desk.querySelector('.student-card');
            const numInput = desk.querySelector('.seat-num-input');
            if (card) data.push({
                seatIndex: parseInt(desk.dataset.seatIndex),
                seatLabel: numInput ? numInput.value : '',
                grade:  card.dataset.grade,
                class:  card.dataset.class,
                number: card.dataset.number,
                name:   card.dataset.name
            });
        });
        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ type:"SAVE_SEATING", payload:{ subject, seatingData:data } })
            });
            const r = await res.json();
            alert(r.success ? "✅ 저장되었습니다!" : "❌ 저장 실패: " + r.msg);
        } catch { alert("네트워크 오류"); }
        finally { btn.innerText = "💾 현재 좌석 저장"; btn.disabled = false; }
    }

    /* ── 교사위치 토글 ── */
    function toggleTeacherView() {
        isTeacherView = !isTeacherView;
        const btn = document.getElementById('teacherBtn');

        if (isTeacherView) {
            btn.className = "bg-violet-600 text-white px-5 py-3 rounded-xl font-bold hover:bg-violet-700 transition";
            btn.innerText = '🧑‍🏫 학생시점으로';
        } else {
            btn.className = "bg-violet-100 text-violet-700 px-5 py-3 rounded-xl font-bold hover:bg-violet-200 transition";
            btn.innerText = '🧑‍🏫 교사위치';
        }

        // 상하반전: 행 순서 뒤집기
        const rows = [...document.querySelectorAll('.row-grid')];
        rows.forEach((row, i) => {
            row.style.order = isTeacherView ? (rows.length - 1 - i) : i;
        });

        // 좌우반전: 각 행 내 칸 순서 뒤집기
        rows.forEach(row => {
            const cells = [...row.children]; // desk + desk-empty 모두 포함
            cells.forEach((cell, i) => {
                cell.style.order = isTeacherView ? (cells.length - 1 - i) : i;
            });
        });

        // 칠판 위치
        document.getElementById('classroomContainer').style.flexDirection =
            isTeacherView ? 'column-reverse' : 'column';
    }

    /* ════════════════════════════════
       마우스 드래그 앤 드롭
    ════════════════════════════════ */
    function onMouseDown(e) {
        if (e.button !== 0) return;
        e.preventDefault();
        const card = e.currentTarget;
        const rect = card.getBoundingClientRect();
        dnd.card   = card;
        dnd.active = false;
        dnd.startX = e.clientX; dnd.startY = e.clientY;
        dnd.offsetX = e.clientX - rect.left;
        dnd.offsetY = e.clientY - rect.top;

        const ghost = document.getElementById('ghost');
        dnd.ghost = ghost;
        ghost.innerHTML = card.innerHTML;
        ghost.style.width   = rect.width  + 'px';
        ghost.style.height  = rect.height + 'px';
        ghost.style.display = 'none';

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup',   onMouseUp);
    }

    function onMouseMove(e) {
        if (!dnd.card) return;
        if (!dnd.active) {
            const dx = e.clientX - dnd.startX, dy = e.clientY - dnd.startY;
            if (Math.sqrt(dx*dx + dy*dy) < 5) return;
            dnd.active = true;
            dnd.card.classList.add('dragging-source');
            dnd.ghost.style.display = 'flex';
        }
        dnd.ghost.style.left = (e.clientX - dnd.offsetX) + 'px';
        dnd.ghost.style.top  = (e.clientY - dnd.offsetY) + 'px';

        dnd.ghost.style.visibility = 'hidden';
        const el = document.elementFromPoint(e.clientX, e.clientY);
        dnd.ghost.style.visibility = 'visible';

        const zone = findDropZone(el);
        if (dnd.currentOver && dnd.currentOver !== zone) dnd.currentOver.classList.remove('over');
        if (zone && zone !== dnd.currentOver) zone.classList.add('over');
        dnd.currentOver = zone;
    }

    function onMouseUp(e) {
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup',   onMouseUp);
        if (!dnd.active) { cleanup(); return; }

        dnd.ghost.style.visibility = 'hidden';
        const el = document.elementFromPoint(e.clientX, e.clientY);
        dnd.ghost.style.visibility = 'visible';
        const zone = findDropZone(el);
        if (zone) performDrop(dnd.card, zone);
        cleanup();
    }

    function findDropZone(el) {
        if (!el) return null;
        const desk = el.closest('.desk');
        if (desk) return desk;
        const wl = el.closest('#waitingList');
        if (wl) return wl;
        return null;
    }

    function performDrop(card, zone) {
        if (zone.classList.contains('desk')) {
            const existing = zone.querySelector('.student-card');
            if (!existing) {
                zone.appendChild(card);
            } else if (existing !== card) {
                const origParent = card.parentNode;
                zone.appendChild(card);
                origParent.appendChild(existing);
            }
        } else if (zone.id === 'waitingList') {
            zone.appendChild(card);
        }
    }

    function cleanup() {
        if (dnd.currentOver) dnd.currentOver.classList.remove('over');
        if (dnd.card)        dnd.card.classList.remove('dragging-source');
        if (dnd.ghost)       dnd.ghost.style.display = 'none';
        dnd.active = false; dnd.card = null; dnd.currentOver = null;
    }

    // 🌟 이전(출석 및 수업 일지) 화면으로 돌아가기 (현재 과목 기억)
    function goBackToAttendance() {
        // 1. 현재 화면의 드롭다운에서 선택된 과목 찾기
        let targetSubject = "";
        const subjectSelect = document.getElementById('selectedSubject');
        
        if (subjectSelect && subjectSelect.value) {
            targetSubject = subjectSelect.value;
        } else {
            // 2. 드롭다운에 없으면 URL 주소에서 과목 찾기
            const urlParams = new URLSearchParams(window.location.search);
            targetSubject = urlParams.get('subject');
        }

        // 3. 과목을 들고 출석부로 이동!
        if (targetSubject) {
            location.href = `attendance.html?subject=${encodeURIComponent(targetSubject)}`;
        } else {
            location.href = 'attendance.html'; // 과목을 못 찾았을 경우 기본 출석부로
        }
    }
    </script>
</body>
</html>
