<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">
    <div class="text-center w-full px-6">
        <h1 class="text-4xl font-black text-slate-800 mb-4">🏫 Class Manager에 오신 것을 환영합니다</h1>
        <p class="text-lg text-slate-500 mb-8">왼쪽 메뉴를 선택하거나 아래 메뉴를 클릭하여 교과 관리를 시작하세요.</p>
        
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 max-w-6xl mx-auto">
            <button onclick="location.href='setup.html'" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hover:bg-slate-100 transition text-center flex flex-col items-center">
                <div class="text-4xl mb-3">⚙️</div>
                <h3 class="font-bold text-lg text-slate-700">1. 환경 설정</h3>
                <p class="text-sm text-slate-500 mt-2">학기 정보와 과목/시간표 세팅</p>
            </button>
            <button onclick="location.href='students.html'" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hover:bg-slate-100 transition text-center flex flex-col items-center">
                <div class="text-4xl mb-3">👥</div>
                <h3 class="font-bold text-lg text-slate-700">2. 명단 관리</h3>
                <p class="text-sm text-slate-500 mt-2">학생 명단 복사 및 붙여넣기</p>
            </button>
            <button onclick="location.href='seating.html'" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hover:bg-slate-100 transition text-center flex flex-col items-center">
                <div class="text-4xl mb-3">🪑</div>
                <h3 class="font-bold text-lg text-slate-700">3. 좌석 배치</h3>
                <p class="text-sm text-slate-500 mt-2">드래그 앤 드롭 좌석 만들기</p>
            </button>
            <button onclick="location.href='attendance.html'" class="bg-emerald-50 p-6 rounded-2xl shadow-sm border border-emerald-200 hover:bg-emerald-100 transition text-center flex flex-col items-center">
                <div class="text-4xl mb-3">📋</div>
                <h3 class="font-bold text-lg text-emerald-800">4. 출석 및 일지</h3>
                <p class="text-sm text-emerald-600 mt-2">수업 기록 및 결석/지각 관리</p>
            </button>
        </div>
    </div>
</body>
</html>
