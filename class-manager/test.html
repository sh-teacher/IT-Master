<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>좌석 배치도 - Class Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>if (sessionStorage.getItem("isAllowed") !== "true") location.href = "index.html";</script>
</head>
<body class="bg-slate-50 min-h-screen p-6">
    <div class="max-w-7xl mx-auto bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
        <h1 class="text-3xl font-black mb-6 text-slate-800">🪑 좌석 배치도</h1>
        
        <div class="flex gap-4 mb-8 flex-wrap">
            <select id="selectedSubject" onchange="loadStudents()" class="flex-1 min-w-[200px] p-3 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold text-slate-700 focus:border-blue-500 focus:outline-none">
                <option value="">과목을 로딩 중입니다...</option>
            </select>
            <button onclick="saveSeatingToServer()" id="saveBtn" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-md">
                💾 현재 좌석 저장
            </button>
            <button onclick="toggleTeacherView()" id="teacherBtn" class="bg-violet-100 text-violet-700 px-5 py-3 rounded-xl font-bold hover:bg-violet-200 transition">
                🧑‍🏫 교사위치
            </button>
            <button class="bg-indigo-100 text-indigo-700 px-6 py-3 rounded-xl font-bold hover:bg-indigo-200 transition">
                🖨️ 인쇄하기
            </button>
            <button onclick="location.href='setup.html'" class="bg-slate-100 text-slate-600 px-6 py-3 rounded-xl font-bold hover:bg-slate-200 transition">
                홈으로
            </button>
        </div>

        <div class="flex gap-8">
            <div class="w-1/4 bg-slate-100 rounded-2xl p-4 flex flex-col">
                <h2 class="text-lg font-bold text-slate-700 mb-4 text-center">학생 대기열</h2>
                <div id="waitingList" class="flex-1 overflow-y-auto grid grid-cols-2 gap-2 auto-rows-[65px] content-start p-2 min-h-[500px]"
                     ondrop="drop(event)" ondragover="allowDrop(event)">
                    <div class="col-span-2 text-slate-400 text-center text-sm mt-10" id="emptyMsg">과목을 선택해주세요</div>
                </div>
            </div>

            <div id="classroomContainer" class="w-3/4 flex flex-col gap-6 border-2 border-slate-100 rounded-2xl p-6 bg-white transition-all duration-300">
                <div id="board" class="bg-emerald-800 text-white text-center py-4 rounded-xl font-black text-xl shadow-inner transition-all duration-300">칠 판 (교탁)</div>
                <div class="grid grid-cols-6 gap-3" id="classroomGrid"></div>
            </div>
        </div>
    </div>

    <script>
        // ★ 선생님의 앱스 스크립트 URL ★
        const API_URL = "https://script.google.com/macros/s/AKfycbxUgpimLYy_9K_vZjbxJYtImA4fcz3ZZxfXPvy9WlYXLv1dY-yBA6yrtHeybyAo1v_Vpg/exec";

        // 교사위치 토글 상태 (false = 학생시점 기본, true = 교사시점)
        let isTeacherView = false;

        window.onload = async function() {
            createDesks();
            try {
                const response = await fetch(`${API_URL}?type=GET_SUBJECTS`);
                const subjects = await response.json();
                const select = document.getElementById('selectedSubject');
                select.innerHTML = '<option value="">배치할 과목/분반을 선택해주세요</option>';
                
                subjects.forEach(sub => {
                    const option = document.createElement('option');
                    option.value = sub.fullName;
                    option.innerText = sub.fullName;
                    select.appendChild(option);
                });

                const urlParams = new URLSearchParams(window.location.search);
                const targetSubject = urlParams.get('subject');
                
                if (targetSubject) {
                    let found = false;
                    for (let i = 0; i < select.options.length; i++) {
                        const optVal = select.options[i].value.replace(/\s/g, '');
                        const targetVal = targetSubject.replace(/\s/g, '');
                        if (optVal === targetVal) {
                            select.selectedIndex = i;
                            found = true;
                            break;
                        }
                    }
                    if (found) loadStudents();
                }
            } catch (e) {
                alert("과목 목록 로드 실패!");
            }
        };

        async function loadStudents() {
            const subject = document.getElementById('selectedSubject').value;
            const waitingList = document.getElementById('waitingList');
            if (!subject) return;

            waitingList.innerHTML = "<div class='col-span-2 text-center text-slate-500 mt-10'>학생과 좌석 데이터를 불러오는 중...</div>";

            const desks = document.querySelectorAll('.desk');
            desks.forEach(desk => {
                const card = desk.querySelector('.student-card');
                if (card) card.remove();
            });

            try {
                const [studentsRes, seatingRes] = await Promise.all([
                    fetch(`${API_URL}?type=GET_STUDENTS&subject=${encodeURIComponent(subject)}`),
                    fetch(`${API_URL}?type=GET_SEATING&subject=${encodeURIComponent(subject)}`)
                ]);

                const students = await studentsRes.json();
                const savedSeating = await seatingRes.json();

                waitingList.innerHTML = "";

                if (students.length === 0) {
                    waitingList.innerHTML = "<div class='col-span-2 text-center text-red-400 mt-10 font-bold'>저장된 학생이 없습니다!</div>";
                    return;
                }

                students.forEach((std, index) => {
                    const card = createStudentCard(std, index);
                    const mySeat = savedSeating.find(seat => seat.name === std.name && seat.number == std.number);

                    if (mySeat && mySeat.seatIndex >= 0 && mySeat.seatIndex < 36) {
                        desks[mySeat.seatIndex].appendChild(card);
                    } else {
                        waitingList.appendChild(card);
                    }
                });
            } catch (e) {
                alert("데이터 로드 중 에러가 발생했습니다.");
            }
        }

        function createStudentCard(std, index) {
            const card = document.createElement('div');
            card.className = "student-card w-full h-full flex flex-col items-center justify-center bg-white p-1 rounded-lg shadow-sm border border-slate-200 text-center font-bold text-slate-700 hover:shadow-md cursor-grab active:cursor-grabbing";
            card.draggable = true;
            card.id = `std-${index}-${Date.now()}`;

            card.dataset.grade = std.grade;
            card.dataset.class = std.class;
            card.dataset.number = std.number;
            card.dataset.name = std.name;

            card.innerHTML = `
                <span class="text-[11px] text-blue-500 block mb-0.5 pointer-events-none">${std.class}반 ${std.number}번</span>
                <span class="pointer-events-none text-sm">${std.name}</span>
            `;

            card.addEventListener('dragstart', drag);
            card.addEventListener('dragend', dragEnd);
            return card;
        }

        async function saveSeatingToServer() {
            const subject = document.getElementById('selectedSubject').value;
            if (!subject) return alert("과목을 먼저 선택해주세요.");

            const btn = document.getElementById('saveBtn');
            btn.innerText = "저장 중...";
            btn.disabled = true;

            const desks = document.querySelectorAll('.desk');
            const seatingData = [];

            desks.forEach((desk) => {
                const index = parseInt(desk.dataset.seatIndex);
                const card = desk.querySelector('.student-card');
                if (card) {
                    seatingData.push({
                        seatIndex: index,
                        grade: card.dataset.grade,
                        class: card.dataset.class,
                        number: card.dataset.number,
                        name: card.dataset.name
                    });
                }
            });

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        type: "SAVE_SEATING",
                        payload: { subject: subject, seatingData: seatingData }
                    })
                });

                const result = await response.json();
                if (result.success) alert("✅ 좌석 배치가 완벽하게 저장되었습니다!");
                else alert("❌ 저장 실패: " + result.msg);
            } catch (e) {
                alert("네트워크 오류로 저장하지 못했습니다.");
            } finally {
                btn.innerText = "💾 현재 좌석 저장";
                btn.disabled = false;
            }
        }

        // --- 책상 생성 ---
        function createDesks() {
            const grid = document.getElementById('classroomGrid');
            grid.innerHTML = '';
            for (let i = 0; i < 36; i++) {
                const desk = document.createElement('div');
                desk.className = "desk border-2 border-dashed border-slate-300 rounded-xl flex items-center justify-center p-1.5 bg-slate-50 relative transition-all duration-200 h-[90px]";
                desk.dataset.seatIndex = i;
                desk.style.order = i;

                desk.addEventListener('drop', drop);
                desk.addEventListener('dragover', allowDrop);
                desk.addEventListener('dragenter', dragEnter);
                desk.addEventListener('dragleave', dragLeave);

                const seatNum = document.createElement('span');
                seatNum.className = "absolute top-1 left-2 text-slate-400 font-bold text-sm z-0 pointer-events-none";
                seatNum.innerText = i + 1;
                desk.appendChild(seatNum);
                grid.appendChild(desk);
            }
        }

        // --- 🧑‍🏫 교사위치 버튼: 좌우반전 + 상하반전 동시 적용 (토글) ---
        function toggleTeacherView() {
            isTeacherView = !isTeacherView;
            const btn = document.getElementById('teacherBtn');

            if (isTeacherView) {
                btn.classList.remove('bg-violet-100', 'text-violet-700', 'hover:bg-violet-200');
                btn.classList.add('bg-violet-600', 'text-white', 'hover:bg-violet-700');
                btn.innerText = '🧑‍🏫 학생시점으로';
            } else {
                btn.classList.remove('bg-violet-600', 'text-white', 'hover:bg-violet-700');
                btn.classList.add('bg-violet-100', 'text-violet-700', 'hover:bg-violet-200');
                btn.innerText = '🧑‍🏫 교사위치';
            }

            applyFlip(isTeacherView, isTeacherView);
        }

        function applyFlip(flipLR, flipFB) {
            const desks = document.querySelectorAll('.desk');
            desks.forEach((desk) => {
                let index = parseInt(desk.dataset.seatIndex);
                let row = Math.floor(index / 6);
                let col = index % 6;

                if (flipFB) row = 5 - row;
                if (flipLR) col = 5 - col;

                desk.style.order = row * 6 + col;
            });

            const container = document.getElementById('classroomContainer');
            if (flipFB) {
                container.classList.remove('flex-col');
                container.classList.add('flex-col-reverse');
            } else {
                container.classList.remove('flex-col-reverse');
                container.classList.add('flex-col');
            }
        }

        // --- 🔥 드래그 앤 드롭 수정 핵심 로직 ---

        // 현재 드래그 중인 요소를 전역으로 추적 (dataTransfer 대신 직접 참조)
        let draggedEl = null;

        function drag(ev) {
            draggedEl = ev.currentTarget;
            // dataTransfer에도 id 저장 (호환성)
            ev.dataTransfer.setData("text", ev.currentTarget.id);
            ev.dataTransfer.effectAllowed = "move";

            // ✅ 수정: opacity만 낮추고 pointer-events-none은 절대 추가하지 않음
            // (pointer-events-none이 있으면 드래그 중 드롭존 이벤트가 막힘)
            setTimeout(() => {
                if (draggedEl) draggedEl.style.opacity = "0.4";
            }, 0);
        }

        function dragEnd(ev) {
            if (draggedEl) {
                draggedEl.style.opacity = "1";
            }
            draggedEl = null;

            // 모든 책상 드롭 피드백 초기화
            document.querySelectorAll('.desk').forEach(d => {
                d.classList.remove('border-blue-500', 'bg-blue-50');
                d.classList.add('border-dashed', 'border-slate-300', 'bg-slate-50');
            });
        }

        function allowDrop(ev) {
            ev.preventDefault();
            ev.dataTransfer.dropEffect = "move";
        }

        function dragEnter(ev) {
            ev.preventDefault();
            // ✅ 수정: ev.currentTarget 사용 (ev.target은 자식 span일 수 있음)
            const dropZone = ev.currentTarget;
            if (dropZone && dropZone.classList.contains('desk')) {
                dropZone.classList.add('border-blue-500', 'bg-blue-50');
                dropZone.classList.remove('border-dashed', 'border-slate-300', 'bg-slate-50');
            }
        }

        function dragLeave(ev) {
            // ✅ 수정: relatedTarget이 책상 내부 요소면 dragLeave 무시 (깜빡임 방지)
            const dropZone = ev.currentTarget;
            if (dropZone && dropZone.contains(ev.relatedTarget)) return;

            if (dropZone && dropZone.classList.contains('desk')) {
                dropZone.classList.remove('border-blue-500', 'bg-blue-50');
                dropZone.classList.add('border-dashed', 'border-slate-300', 'bg-slate-50');
            }
        }

        function drop(ev) {
            ev.preventDefault();
            ev.stopPropagation();

            // ✅ 수정: ev.currentTarget으로 항상 정확한 드롭존(책상) 획득
            const dropZone = ev.currentTarget;
            if (!dropZone) return;

            // 드롭 피드백 초기화
            if (dropZone.classList.contains('desk')) {
                dropZone.classList.remove('border-blue-500', 'bg-blue-50');
                dropZone.classList.add('border-dashed', 'border-slate-300', 'bg-slate-50');
            }

            // ✅ 수정: 전역 draggedEl 참조 우선, 없으면 dataTransfer id로 fallback
            const card = draggedEl || document.getElementById(ev.dataTransfer.getData("text"));
            if (!card) return;

            if (dropZone.classList.contains('desk')) {
                const existingStudent = dropZone.querySelector('.student-card');

                // 같은 자리에 드롭 시 무시
                if (existingStudent === card) return;

                const originalParent = card.parentNode;

                if (existingStudent) {
                    // 자리 스왑
                    dropZone.appendChild(card);
                    originalParent.appendChild(existingStudent);
                } else {
                    dropZone.appendChild(card);
                }
            } else if (dropZone.id === 'waitingList') {
                dropZone.appendChild(card);
            }
        }
    </script>
</body>
</html>
