<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상일 통합 검색 엔진</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .timetable { width: 100%; border-collapse: collapse; text-align: center; font-size: 13px; }
        .timetable th, .timetable td { border: 1px solid #e2e8f0; padding: 10px 4px; }
        .timetable th { background-color: #f8fafc; color: #475569; font-weight: 800; }
        .timetable td { height: 60px; vertical-align: middle; background-color: #ffffff; }
        .tt-subj { font-weight: 900; color: #1e40af; display: block; line-height: 1.2; word-break: keep-all; }
        .tt-teach { font-size: 11px; color: #64748b; margin-top: 4px; display: block; }
    </style>
</head>
<body class="bg-slate-50 p-4 min-h-screen pb-20">
    <div class="max-w-xl mx-auto">
        <h1 class="text-2xl md:text-3xl font-black text-slate-800 mb-6 text-center">🔍 교과수업 만능 탐색기</h1>

        <div class="bg-white rounded-3xl shadow-xl p-5 md:p-7 space-y-5 border border-slate-200">
            
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2">어떤 작업을 하실 건가요?</label>
                <select id="searchType" onchange="toggleInputs()" class="w-full p-3 bg-slate-100 rounded-xl font-black text-slate-700 outline-none focus:ring-2 ring-blue-500 cursor-pointer">
                    <optgroup label="📍 단일/실시간 위치 조회">
                        <option value="REAL_STUDENT">이 학생 지금 어디 있지? (이름)</option>
                        <option value="REAL_TEACHER">이 선생님 지금 어디 계시지? (성함)</option>
                        <option value="REAL_CLASS">특정 반 지금 수업 누구지? (예: 1-3)</option>
                        <option value="REAL_ALL" class="bg-indigo-100 font-bold">🕒 이 시간 우리 학교 모든 실의 수업은? (전체)</option>
                    </optgroup>
                    <optgroup label="🗓️ 주간 시간표 조회">
                        <option value="TIMETABLE_TEACHER">특정 선생님 [주간 시간표] 보기 (성함)</option>
                        <option value="TIMETABLE_CLASS">특정 반(실) [주간 시간표] 보기 (예: 1-3, 아름실)</option>
                        <option value="TIMETABLE_STUDENT">특정 학생 [주간 시간표] 보기 (이름)</option>
                    </optgroup>
                    <optgroup label="☕ 대강/보강 교사 찾기">
                        <option value="FREE_TEACHER">선택한 요일/교시에 [공강인 선생님] 찾기</option>
                    </optgroup>
                </select>
            </div>
            
            <div id="timeSelector" class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2">요일</label>
                    <select id="searchDay" class="w-full p-3 bg-blue-50 border border-blue-100 rounded-xl font-bold text-blue-700 outline-none cursor-pointer">
                        <option value="">🕒 현재 요일</option>
                        <option value="월">월요일</option><option value="화">화요일</option>
                        <option value="수">수요일</option><option value="목">목요일</option><option value="금">금요일</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2">교시</label>
                    <select id="searchPeriod" class="w-full p-3 bg-blue-50 border border-blue-100 rounded-xl font-bold text-blue-700 outline-none cursor-pointer">
                        <option value="">🕒 현재 교시</option>
                        <option value="1">1교시</option><option value="2">2교시</option><option value="3">3교시</option>
                        <option value="4">4교시</option><option value="5">5교시</option><option value="6">6교시</option><option value="7">7교시</option>
                    </select>
                </div>
            </div>

            <div class="relative pt-2" id="keywordBox">
                <input type="text" id="keyword" placeholder="검색어 입력..." class="w-full p-4 bg-slate-100 rounded-xl font-black text-lg outline-none focus:ring-2 ring-blue-500">
                <button onclick="runSearch()" class="absolute right-2 top-4 bottom-2 bg-blue-600 text-white px-6 rounded-lg font-bold shadow-md hover:bg-blue-700 transition">검색</button>
            </div>
            
            <button id="specialBtn" onclick="runSearch()" style="display:none;" class="w-full mt-4 bg-indigo-600 text-white p-4 rounded-xl font-black text-lg shadow-md hover:bg-indigo-700 transition">🔍 현황판 조회하기</button>

        </div>

        <div id="resultArea" class="mt-6 space-y-8"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzfIY0Fs4S1EjSSNI2kZfrFgtSqipG_u_KDCkdT8Vy1LjrIwB7k_1awE_psCNw0VQGg/exec";

        function toggleInputs() {
            const type = document.getElementById('searchType').value;
            const keywordBox = document.getElementById('keywordBox');
            const specialBtn = document.getElementById('specialBtn');
            const timeSelector = document.getElementById('timeSelector');

            // 주간 시간표는 요일/교시 숨김
            timeSelector.style.display = type.startsWith('TIMETABLE_') ? 'none' : 'grid';

            // 전체 현황이나 공강 찾기는 검색어 입력창 대신 큰 버튼 표시
            if (type === 'REAL_ALL' || type === 'FREE_TEACHER') {
                keywordBox.style.display = 'none';
                specialBtn.style.display = 'block';
                specialBtn.innerText = type === 'REAL_ALL' ? '🕒 우리 학교 수업 현황판 조회' : '☕ 공강인 선생님 찾기';
                specialBtn.className = type === 'REAL_ALL' ? 'w-full mt-4 bg-indigo-600 text-white p-4 rounded-xl font-black text-lg shadow-md' : 'w-full mt-4 bg-amber-500 text-white p-4 rounded-xl font-black text-lg shadow-md';
            } else {
                keywordBox.style.display = 'block';
                specialBtn.style.display = 'none';
            }
        }

        async function runSearch() {
            const type = document.getElementById('searchType').value;
            const keyword = document.getElementById('keyword').value.trim();
            const day = document.getElementById('searchDay').value;
            const period = document.getElementById('searchPeriod').value;

            if (type !== 'FREE_TEACHER' && type !== 'REAL_ALL' && !keyword) return alert("검색어를 입력하세요!");

            const area = document.getElementById('resultArea');
            area.innerHTML = '<div class="text-center p-12 bg-white rounded-2xl shadow-sm animate-pulse text-slate-500 font-bold">전체 데이터를 분석 중입니다... 🔍</div>';

            try {
                // 1. [실시간 전체 현황판] 처리
                if (type === 'REAL_ALL') {
                    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ type: "SEARCH_REALTIME", payload: { searchType: "CLASS", keyword: "", forceDay: day, forcePeriod: period } }) });
                    const r = await res.json();
                    if (!r.success) return area.innerHTML = `<div class="bg-red-50 p-5 rounded-2xl text-red-600 text-center font-bold">${r.msg}</div>`;
                    
                    renderFullStatus(r.data, r.day, r.period);
                } 
                // 2. [리얼타임 단건 조회]
                else if (type.startsWith('REAL_')) {
                    let realType = type.split('_')[1];
                    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ type: "SEARCH_REALTIME", payload: { searchType: realType, keyword: keyword, forceDay: day, forcePeriod: period } }) });
                    const r = await res.json();
                    if (!r.success) return area.innerHTML = `<div class="bg-amber-50 p-5 rounded-2xl text-amber-700 text-center font-bold">${r.msg}</div>`;
                    
                    area.innerHTML = r.data.map(item => `
                        <div class="bg-white p-6 rounded-3xl shadow-md border-l-8 border-blue-500">
                            <div class="text-xs font-bold text-slate-400 mb-1">${r.day} ${r.period}교시</div>
                            <div class="text-xl font-black text-slate-800">${item.subject}</div>
                            <div class="text-blue-600 font-bold mt-2">${item.teacher} 선생님</div>
                        </div>
                    `).join('');
                }
                // 3. [주간 시간표 & 공강 찾기]
                else {
                    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ type: "GET_ADVANCED_SEARCH", payload: { searchType: type, keyword: keyword, day: day, period: period } }) });
                    const r = await res.json();
                    if (!r.success) return area.innerHTML = `<div class="bg-red-50 p-5 rounded-2xl text-red-600 text-center font-bold">${r.msg}</div>`;

                    if (r.type === "FREE_TEACHER") {
                        let tags = r.data.map(t => `<span class="inline-block bg-white text-slate-700 border border-slate-300 font-black px-3 py-2 rounded-lg m-1">${t}</span>`).join('');
                        area.innerHTML = `<div class="bg-amber-50 p-6 rounded-3xl border border-amber-200"><h2 class="text-lg font-black text-amber-800 mb-4">☕ ${r.day}요일 ${r.period}교시 공강 선생님 (${r.data.length}명)</h2><div>${tags}</div></div>`;
                    } else if (r.type === "TIMETABLE") {
                        renderTimetable(r);
                    }
                }
            } catch (e) {
                area.innerHTML = `<div class="text-center p-5 text-red-500 font-bold bg-red-50 rounded-2xl">통신 오류가 발생했습니다.</div>`;
            }
        }

        // 전체 현황판 렌더링 함수
        function renderFullStatus(data, finalDay, finalPeriod) {
            const area = document.getElementById('resultArea');
            if (data.length === 0) return area.innerHTML = `<div class="bg-slate-200 p-5 rounded-2xl text-center font-bold">해당 시간에 수업이 없습니다.</div>`;

            // 데이터 그룹화
            const groups = { "1학년": [], "2학년": [], "3학년": [], "기타실": [] };
            
            data.forEach(item => {
                const match = item.subject.match(/\((\d)-(\d+)\)/); // (1-1) 형식 추출
                if (match) {
                    const grade = match[1];
                    groups[`${grade}학년`].push(item);
                } else {
                    groups["기타실"].push(item);
                }
            });

            // 각 학년 내에서 반 순서대로 정렬
            [1, 2, 3].forEach(g => {
                groups[`${g}학년`].sort((a, b) => {
                    const matchA = a.subject.match(/\((\d)-(\d+)\)/);
                    const matchB = b.subject.match(/\((\d)-(\d+)\)/);
                    return parseInt(matchA[2]) - parseInt(matchB[2]);
                });
            });

            let html = `<h2 class="text-2xl font-black text-indigo-800 text-center mb-2">🕒 ${finalDay}요일 ${finalPeriod}교시 수업 현황</h2>`;
            
            for (const [title, list] of Object.entries(groups)) {
                if (list.length === 0) continue;
                html += `
                    <div class="space-y-3">
                        <h3 class="text-lg font-black text-slate-400 pl-2 border-l-4 border-slate-300">${title}</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            ${list.map(item => `
                                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center">
                                    <div>
                                        <div class="text-[10px] font-bold text-indigo-500 uppercase tracking-wider">${item.subject.match(/\(([^)]+)\)/)?.[1] || '실'}</div>
                                        <div class="text-md font-black text-slate-800">${item.subject.replace(/\s*\(.*?\)/, '')}</div>
                                    </div>
                                    <div class="text-sm font-bold text-slate-500">🧑‍🏫 ${item.teacher}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            area.innerHTML = html;
        }

        function renderTimetable(r) {
            const area = document.getElementById('resultArea');
            const grid = {};
            for (let p = 1; p <= 8; p++) grid[p] = { '월': '', '화': '', '수': '', '목': '', '금': '' };
            r.data.forEach(item => {
                if (item.period >= 1 && item.period <= 8) {
                    const teach = item.teacher ? `<div class="text-[10px] text-blue-600 font-bold mt-1">${item.teacher}</div>` : '';
                    const html = `<div class="font-black text-slate-800 leading-snug">${item.subject}</div>${teach}`;
                    grid[item.period][item.day] += (grid[item.period][item.day] ? '<hr class="my-1">' : '') + html;
                }
            });

            let tableHTML = `<div class="bg-white rounded-3xl shadow-lg border border-slate-200 overflow-hidden">
                <div class="bg-blue-600 text-white text-center py-4 font-black text-lg">${r.title}</div>
                <div class="overflow-x-auto"><table class="timetable">
                <thead><tr><th>교시</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th></tr></thead><tbody>`;
            for (let p = 1; p <= 7; p++) {
                tableHTML += `<tr class="h-[80px]"><td>${p}</td>`;
                ['월', '화', '수', '목', '금'].forEach(d => {
                    tableHTML += `<td>${grid[p][d] || '-'}</td>`;
                });
                tableHTML += `</tr>`;
            }
            area.innerHTML = tableHTML + `</tbody></table></div></div>`;
        }

        window.onload = toggleInputs;
        document.getElementById('keyword').addEventListener('keypress', e => { if (e.key === 'Enter') runSearch(); });
    </script>
</body>
</html>
